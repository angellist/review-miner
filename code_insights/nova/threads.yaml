  root:
    id: 2334612354
    author: sf8193
    body: 'this feels like it''s just adding boilerplate and i don''t really see benefit
      we get from it being a class right now , what was thought process that i''m
      missing? '
    path: graph/data/organization/organizationPublicKey.ts
    created_at: '2025-09-09T19:48:47Z'
  replies:
  - id: 2335307130
    author: ctotheameron
    body: "I don't think the super-thin wrapper around prisma that we have right now\
      \ is giving us any benefit at all, and I'm worried that it's just going to end\
      \ up being a bag of functions.\r\n\r\nSince the company historically has put\
      \ a lot of tribal knowledge into a \"thick-ish\" model-based ORM (ActiveRecord)\
      \ it feels idiomatic to try and replicate those patterns here.\r\n\r\nIf I were\
      \ writing this in a language that has more ergonmic structs w/ functions I would\
      \ probably prefer over using a class (to avoid reference semantics + object\
      \ inheritance), but I don't really like how that would look in typescript.\r\
      \n\r\nI'm anticipating that we'll be building more complexity here (preloading,\
      \ more lazy-fetching, memoization, relationship look-throughs etc) and a class\
      \ feels like a natural abstraction for that."
    created_at: '2025-09-10T02:13:54Z'
  - id: 2335317928
    author: ctotheameron
    body: "> it's just adding boilerplate\r\n\r\nPersonally, I don't often find boilerplate\
      \ arguments particularly compelling when working on foundational parts of the\
      \ system. These things are going to be written once essentially. Yeah totally\
      \ if we're introducing boilerplate to consumers I'm on board with trying to\
      \ keep things terse, but this is just structure that we can copy/paste to our\
      \ other models "
    created_at: '2025-09-10T02:24:20Z'
  pr_author: ctotheameron
