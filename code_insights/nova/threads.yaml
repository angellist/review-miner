  - id: 2248640687
    author: edwinzhng
    body: "This is complicated but we shouldn't delete these lines, can huddle to\
      \ clarify if you're still confused\r\n\r\nBasically in Nova, a vehicle can have\
      \ a `dataRoom` attached, but it's just used a a filesystem primitive to house\
      \ all files related to that vehicle (e.g. GP can upload files to vehicle, and\
      \ all LPs who have invested in the vehicle can see those files).\r\n\r\n<img\
      \ width=\"1299\" height=\"729\" alt=\"Screenshot 2025-08-01 at 12 49 16 PM\"\
      \ src=\"https://github.com/user-attachments/assets/5fbac6cd-d621-4c05-b4fd-d3acbd31cb07\"\
      \ />\r\n\r\nThis is different from `vehicleEntityDataRoomLink`, which is just\
      \ a many:many join table between a Data Room (the product) to Vehicle so that\
      \ we can configure CTAs etc. for data room based on what vehicles are associated"
    created_at: '2025-08-01T18:49:43Z'
  - id: 2248648822
    author: stathis-alexander
    body: "Okay, that's helpful! To make sure I understand the semantics, is this\
      \ right?\r\n\r\n1. `vehicleEntity`: data room that houses the files for the\
      \ vehicle.\r\n2. `vehicleEntityDataRoomLink`: data rooms that market investments\
      \ in that vehicle. \r\n\r\nAnd, this is pretty subtle, it's not the case that\
      \ data rooms that we market the vehicle with _generally won't_ be the same one\
      \ that we use to store files for the vehicle. \r\n\r\nWhat do you think about\
      \ this distinction of calling them something like \"marketingDataRooms\" or\
      \ something else instead? The current name  `vehicleEntityDataRoomLink` tells\
      \ me _what it does_, but not really _what it is_. \r\n\r\nIn any case, will\
      \ update. Thanks!"
    created_at: '2025-08-01T18:54:37Z'
  - id: 2248771108
    author: edwinzhng
    body: Yeah that rename is infinitely better - we should update in another pass
    created_at: '2025-08-01T19:57:13Z'
  - id: 2248772915
    author: edwinzhng
    body: And it's _always_ the case that data rooms we market with won't be the same
      one that's storing files. We should probably pull out the `data_room` file storage
