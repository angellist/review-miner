      \  if (allocationValue) {\n    rows.push({\n      label: 'Allocation',\n   \
      \   labelTooltip: allocationTooltip(details),\n      value: formatMoney(allocationValue,\
      \ {\n        abbreviate: true,\n        showCode: true,\n      }),\n    });\n\
      \  }\n```\n\nThere are also tooltips we render in the UI to explain things that\
      \ we don't return here, wondering if we should start by returning basic attributes\
      \ like:\n```\nattributes: [{ key: ...,value: ... }]\n```"
