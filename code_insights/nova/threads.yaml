- thread_id: 2818742014
  pr: 6855
  root:
    id: 2818742014
    author: ahlec
    body: "non-blocking callout/suggestion\r\n\r\nI love regular expressions and use\
      \ them (ahem) regularly, but I think using them here might make this harder\
      \ to understand what it's doing.\r\n\r\nChecking out the data from #6857, it\
      \ looks like there's 2 specific fields on the body you care about, and that\
      \ you're just looking to parse the query string. What data you're operating\
      \ on and _exactly_ what your operation is supposed to do doesn't feel well-expressed\
      \ via code here. TBH, I think something simpler would help document exactly\
      \ what you're intending to do here:\r\n```typescript\r\nfunction sanitizeS3Url(uri:\
      \ string): string {\r\n  const url = new URL(uri);\r\n  SENSITIVE_S3_PARAMS.forEach((paramName):\
      \ void => {\r\n    if (url.searchParams.has(paramName)) {\r\n      url.searchParams.set(paramName,\
      \ '[REDACTED]');\r\n    }\r\n  });\r\n  return url.toString();\r\n}\r\n\r\n\
      // NOTE: I renamed this from redactSensitiveS3Values\r\nfunction sanitizeS3ResponseBody(body:\
      \ string): string {\r\n  const parsed: Record<string, unknown> = JSON.parse(body);\r\
      \n\r\n  if ('uploadUri' in parsed) {\r\n    if (typeof parsed.uploadUri !==\
      \ 'string') {\r\n      throw new Error(`Unexpected 'uploadUri' type (${typeof\
      \ parsed.uploadUri})`);\r\n    }\r\n\r\n    parsed.uploadUri = sanitizeS3Url(parsed.uploadUri);\r\
      \n  }\r\n\r\n  if ('metadata' in parsed && isIndexableObject(parsed.metadata)\
      \ && 'downloadUri' in parsed.metadata) {\r\n    if (typeof parsed.metadata.downloadUri\
      \ !== 'string') {\r\n      throw new Error(\"Unexpected 'downloadUri' type\"\
      );\r\n    }\r\n\r\n    parsed.metadata.downloadUri = sanitizeS3Url(parsed.metadata.downloadUri);\r\
      \n  }\r\n\r\n  return JSON.stringify(parsed);\r\n}\r\n```\r\n\r\nI didn't run\
      \ this, so definitely test my work. And it's definitely a lot more verbose.\
      \ But I think it immediately makes it clearer what data you're looking for,\
      \ where and what it is, and what you're looking to do to it."
    path: nova-e2e/services/replay/src/endpoints/adobe.ts
    created_at: '2026-02-17T19:38:03Z'
  replies: []
