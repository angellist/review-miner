    created_at: '2025-09-10T02:26:58Z'
  - id: 2335350781
    author: ctotheameron
    body: "Updated:\r\n\r\n```ts\r\n  // If we have template details, we'll fetch\
      \ those first. Prefering the most\r\n  // performant lookup key first (we can\
      \ ignore the rest)\r\n  const templateResult = findTemplate({\r\n    id: args.templateId\
      \ ?? extPayload?.templateId,\r\n    handle: args.templateHandle ?? undefined,\r\
      \n    transmitToken: args.transmitToken ?? extPayload?.transmitToken,\r\n  \
      \  transactionId: args.transactionId ?? extPayload?.transactionId,\r\n  });\r\
      \n\r\n  // TemplateModel includes the organization relation, so we can just\
      \ use it\r\n  const organizationResult =\r\n    templateResult?.map((template)\
      \ => template.organization) ??\r\n    // If we didn't fetch the template (which\
      \ has the org), then we can fetch\r\n    // the organization details separately.\r\
      \n    findOrganization({ id: organizationId, handle: organizationHandle });\r\
      \n```\r\n\r\n```ts\r\ntype TemplateArgs = {\r\n  id?: UUID;\r\n  handle?: string;\r\
      \n  transactionId?: UUID;\r\n  transmitToken?: string;\r\n};\r\n\r\nfunction\
      \ findTemplate({ id, handle, transactionId, transmitToken }: TemplateArgs):\
      \ Optional<ResultData<TemplateModel>> {\r\n  if (id) return data.template.findBy({\
      \ id }, prisma);\r\n  if (handle) return data.template.findBy({ handle }, prisma);\r\
      \n  if (transactionId) return data.template.findBy({ transactionId }, prisma);\r\
      \n  if (transmitToken) return data.template.findBy({ transmitToken }, prisma);\r\
      \n\r\n  return undefined;\r\n}\r\n\r\ntype OrganiztionArgs = {\r\n  id?: UUID;\r\
      \n  handle?: string;\r\n};\r\n\r\nfunction findOrganization({ id, handle }:\
      \ OrganiztionArgs): Optional<ResultData<OrganizationModel>> {\r\n  if (id) return\
      \ data.organization.findBy({ id }, prisma);\r\n  if (handle) return data.organization.findBy({\
      \ handle }, prisma);\r\n\r\n  return undefined;\r\n}\r\n\r\n```"
    created_at: '2025-09-10T02:38:46Z'
  pr_author: ctotheameron
  merged_at: '2025-09-10T03:07:22Z'
