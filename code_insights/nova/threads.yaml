  replies:
  - id: 2801861030
    author: ahlec
    body: "I'd wanted to keep the DB seeders off of the public API for the fixtures.\
      \ I felt like this would help us not code directly against the DB and instead\
      \ build out entity models.\n\nOrganizations/Templates were one area where I\
      \ needed to share the seeders from `organization` with `template` — and they\
      \ can only talk to each other across the public API. To do that, I introduced\n\
      ```typescript\nconst ORG_SEEDERS = Symbol();\ntype SeededOrganization = Organization\
      \ & {\n  [ORG_SEEDERS]: { ... }\n};\n```\nSince the symbol isn't publicly exported,\
      \ nobody can access those  outside of this file.\n\nWhat I would recommend here\
      \ instead is to not put `adminUser` on the fixture. Instead, `organization`\
      \ continues to be the one that creates the `UserSeeder` for the admin.\n\nThen,\
      \ `additionalOrganizations` depends on `organization` instead of `adminUser`.\
      \ And inside of it, you can then do:\n```typescript\nconst adminUser = mainOrg[ORG_SEEDERS].admin.user\n\
      ```"
    created_at: '2026-02-13T01:38:49Z'
