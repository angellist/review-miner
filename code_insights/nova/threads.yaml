  replies:
  - id: 2137990216
    author: anthonylobko
    body: 'Hilariously enough, not for our current fields. I think the reasoning *might*
      be that this form is easy enough to reverse into the correct thing if you know
      the type (for example, currency as a string w/ a symbol or suffix for the currency
      type is very self contained). That said, it might be worth considering if we
      should shift this, and have another output type for these fields, which isn''t
      a flat single field, but an object. For currency, that might be something like:
      {value: number, currency: ''usd'' | ''cad'' ....} (w/ currency being which unit).
      It''s more structured but less self contained. I think this is something we''d
      want to change on the level of the field output for phone & currency both of
      which have this shape. '
