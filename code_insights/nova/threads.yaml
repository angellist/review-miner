    author: pradyuman
    body: "I try to avoid `let` where possible, because the reader then has to wonder\
      \ if / where it's getting mutated across the function.\n\nSomething like this\
      \ feels more explicit:\n```\nconst search = appliedFilters.search?.value?.toLowerCase();\n\
      const selectedStatus = appliedFilters.status?.selectedKey;\n\nconst matchesStatus\
      \ = (e: Entity) => {\n  if (selectedStatus === 'review') return e.alerts.length\
      \ > 0;\n  if (selectedStatus === 'ready') return e.alerts.length === 0;\n  return\
      \ true;\n};\n\nconst matches = allEntities\n  .filter(\n    (e) =>\n      !search\
      \ ||\n      e.name?.toLowerCase().includes(search) ||\n      e.id.toLowerCase().includes(search)\
      \ ||\n      e.directoryEntityId?.toLowerCase().includes(search),\n  )\n  .filter(matchesStatus);\n\
      ```"
