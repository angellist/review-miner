  replies:
  - id: 2412512562
    author: kwliang1
    body: "> @kwliang1 might know the right production values.\r\n\r\nYou can find\
      \ the config (for the client) [here](https://github.com/angellist/nova/pull/5204/files?w=1#diff-f387a01e6e3600643364dd43e4c8c84f789cce489d2ed0d6c991265058b872c8R25-R61)\
