  root:
    id: 2116613644
    author: sf8193
    body: 'sigh yea kinda weird for this be here/away from the deletion but I assume
      it was a fk constraint '
    path: graph/engbot/mergeLPOrganizations.ts
    created_at: '2025-05-30T20:45:12Z'
  replies:
  - id: 2116694332
    author: JaredWF
    body: Yeah it's a total chicken and the egg situation. You can't finish moving
      the entities without deleting the org entity members, but you can't move the
      org members without the entities existing in the target org. My general philosophy
      was to move the entities, destroying permission related models in the process.
      Then move the members and ensure that all permission related models exist in
      the target org. If we had cascading enabled, the org entity members would get
      deleted when the org entity is deleted so I suppose the current functionality
      is in line with that.
    created_at: '2025-05-30T21:34:41Z'
