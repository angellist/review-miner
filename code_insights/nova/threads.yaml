- thread_id: 2248225520
  pr: 4623
  root:
    id: 2248225520
    author: stathis-alexander
    body: "We don't need a separate temporal method for each job, nor do we need one\
      \ for each queue (although this can work fine as a pattern, depending). Likely\
      \ some of these jobs can run in some of the same queues (this is more of an\
      \ art than a science). \r\n\r\nI would expect there to be one `worker.ts` that\
      \ exports `startWorker`, and then can have some params passed in. In venture\
      \ we configure all the workers with ENV vars, then spin out different pods for\
      \ each queue. \r\n\r\nIn the worker package currently, it's fucked up. We're\
      \ running a single worker (with 4 replicas), each of which runs a copy of each\
      \ worker class. We basically have four identical machines running all of the\
      \ queues and sharing resources. We also did not tune the machines at all, so\
      \ these internal queue configs likely don't make sense (and would fall apart\
      \ if we hit any real semblance of load). \r\n\r\nWe need to invert that:\r\n\
      1. let's run each queue in a separate machine\r\n2. let's tune resources for\
      \ each machine / queue accordingly\r\n    a. # of replicas\r\n    b. threads\r\
      \n    c. etc\r\n    \r\nThis is all configured in cdk8s. "
    path: graph/index.ts
    created_at: '2025-08-01T15:10:24Z'
  replies:
  - id: 2255001611
    author: sf8193
    body: 'I agree with all of the above, but first I wanted to port things over with
      no changes, so we can more easily refactor while it''s already in graph (and
      unblock others if needed) '
    created_at: '2025-08-05T18:06:30Z'
  - id: 2262011082
    author: sf8193
