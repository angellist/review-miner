    author: edwinzhng
    body: "Also, we conditionally render term values based on vehicle type (see [SpvTerms.tsx](https://github.com/angellist/nova/blob/master/app/src/components/views/DataRoomMember/DataRoom/Terms/SpvTerms.tsx)\
