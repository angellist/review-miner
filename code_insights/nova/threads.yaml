- thread_id: 2094624695
  pr: 3539
  root:
    id: 2094624695
    author: pradyuman
    body: "I know you didn't write this function either, but in an ideal world, this\
      \ is just a zod validator. Not something that needs to be addressed in this\
      \ PR, but just an fyi.\r\n\r\nFor some extra context, I noticed `VentureDataRoomInternalKeys`\
      \ is a typescript enum -- we should be [avoiding TypeScript enums](https://github.com/angellist/nova/blob/master/.cursorrules#L95)\
      \ and using string unions or const objects instead. Also, using `z.infer`, we\
      \ can actually write the zod validator and then derive the type, which obviates\
      \ the need for functions like this one."
    path: graph/src/routers/internal/sync/dataRoom.ts
    created_at: '2025-05-18T20:56:42Z'
  replies:
  - id: 2096403562
    author: stathis-alexander
    body: Can you elaborate on why we should avoid `enums`?
    created_at: '2025-05-19T20:00:24Z'
  - id: 2096904805
    author: pradyuman
    body: "`enum`s are a relic from the early days of TypeScript before it had formalized\
      \ its design principles. Since then, they've added string unions and `as const`,\
      \ which means we can create typesafe sum types without needing to use constructs\
      \ that generate runtime code.\r\n\r\nThat last part is important, because the\
      \ ecosystem is moving in a direction where runtimes like `node` are starting\
      \ to support running [\"erasable\" typescript files directly](https://nodejs.org/en/learn/typescript/run-natively)\
      \ (there's a similar ECMAScript proposal [here](https://github.com/tc39/proposal-type-annotations)).\
      \ So I'd love to be in a place where we're comfortable enabling [`--erasableSyntaxOnly`](https://nodejs.org/en/learn/typescript/run-natively)\
      \ (which means, among other things, no longer using enums)."
    created_at: '2025-05-20T04:43:17Z'
  pr_author: stathis-alexander
  merged_at: '2025-05-20T19:48:01Z'
  repo: nova
  has_suggestion_block: false
