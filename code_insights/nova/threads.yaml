- thread_id: 2173076503
  pr: 4044
  root:
    id: 2173076503
    author: jogly
    body: the trigger for creating the test pipeline is the package.json#test script,
      but despite that existing, this other script is the entry point. it seems like
      it should be flipped, the package.json#test script should call `scripts/test.sh`
      which has a flag `if [[ -v CI ]]; then ...` for any CI specific steps. That
      way, if testing is simple, author only needs to set the `test` script in package
      json and everything works as expected. For complex setups, the test script can
      invoke an entrypoint script, and still its an expected and standard pipeline,
      for both CI and local dev. The authz package currently calls `vitest` in the
      package json and in `scripts/testCi`, confusing! The vulcan package is failing
      to get to this point bc there seems to be a permission denied error when pushing
      the package's image.
    path: .buildkite/pipeline.rb
    created_at: '2025-06-28T01:36:06Z'
  replies:
  - id: 2173079983
    author: stathis-alexander
    body: "Ah yeah, I will need to setup repositories for the images. That's annoying\
      \ and I didn't think about that. \r\n\r\nAn alternative here would be to use\
      \ the same image for all of them and just vary the script they run to do the\
      \ turbo docker and build steps. I'll have to think on it more. \r\n\r\nAs to\
      \ the test script - the setup is wholy inherited from the existing authz setup\
      \ and I take no credit for it. Honestly, I think we could just kill the script\
      \ and run the commands direct in the `test` script. That's probably fine for\
      \ now and reduces indirection and complexity. "
    created_at: '2025-06-28T01:46:21Z'
  - id: 2183682217
    author: jogly
    body: I was thinking about this again this week. I find it annoying that we build
      and push a distinct image for every service/package just to run tests. I would
      prefer there be a base image into which our repo can be loaded as a volume and
      tests can be run by invoking with whatever command, most ideally `turbo test`
      . Then we can incrementally improve our turbo build graph with better cache
      instructions, which benefits both CI and our local env. `turbo` supports `--filter`
      so we can still filter to run only packages that have changes, and finally,
      by default it invokes the `test` script for every package that implements it,
      without having to manage this logic in the pipeline.rb.
    created_at: '2025-07-03T20:18:34Z'
  - id: 2183773085
    author: stathis-alexander
    body: 'Yeah, this is what I settled on also. The separate images are nice because
      they cache the layers and don''t install anything extra if we''re running a
      specific package, but I think since we are already limiting to only those with
      changes it doesn''t matter anyways. I was going to swap it to a single image
      where we copy any relevant packages via `turbo filter` and then run each test
      step on that image individually (one image, n test steps in parallel). '
    created_at: '2025-07-03T21:24:29Z'
  pr_author: stathis-alexander
  merged_at: '2025-07-08T13:49:31Z'
  repo: nova
  has_suggestion_block: false
