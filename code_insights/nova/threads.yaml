    id: 2389297371
    author: ahlec
    body: 'We''re dropping the version here to solve a `corepack` issue:

      ```

      #9 0.686 Internal Error: Cannot find matching keyid: {"signatures":[{"sig":"MEUCIGL5mD8e7q2srMLSfBaQURvV9FTwi5VFWgy5f9hBhglOAiEAqMbYycQ5j+6SAveEYpWN7uOXz9b8q3plcIVNT0XMBKc=","keyid":"SHA256:DhQ8wR5APBvFHLF/+Tc+AYvPOdTpcIDqOhxsBHRwC7U"}],"keys":[{"expires":null,"keyid":"SHA256:jl3bwswu80PjjokCgh0o2w5c2U4LhQAE57gj9cz1kzA","keytype":"ecdsa-sha2-nistp256","scheme":"ecdsa-sha2-nistp256","key":"MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAE1Olb3zMAFFxXKHiIkQO5cJ3Yhl5i6UPp+IhuteBJbuHcA5UogKo0EWtlWwW6KSaKoTNEYL7JlCQiVnkhBktUgg=="}]}

      ```

      This image was created from the start at Node 20.18.1 (#3749). That PR did not
      call out why it took a more recent version of Node. Notably, this is the only
      location that doesn''t reference Node 20.10.0, which is the current version
      of Node in **.tool-versions**.


      `node:20.10.0-alpine` has a `corepack` version of **0.22.0**. `node:20.18.1-alpine`
      meanwhile has `corepack` version **0.29.4**. This is likely related to nodejs/corepack#612.'
    path: capital-api/Dockerfile
    created_at: '2025-09-29T21:18:08Z'
