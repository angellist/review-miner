  - id: 2169559835
    author: stathis-alexander
    body: "Forgive me, but this doesn't feel great either. I believe this is equivalent\
      \ to:\r\n```ts\r\nconst steps = [getDetailsStepConfig]\r\n\r\nconst ventureBacked\
      \ = isSelfAdvised || isALAdvised\r\n\r\n// al-advised data rooms are not able\
      \ to configure access\r\nif (!isALAdvised) steps.push(getAccessStepConfig)\r\
      \n\r\n// only venture backed data rooms have terms\r\nif (ventureBacked && hasTerms\
      \ && !existingAccessLink) steps.push(getTermsStepConfig)\r\n```\r\nWhich feels\
      \ more obvious to me?\r\n\r\nA quick note on the terminology: In venture / FSFM\
      \ land, _all vehicles are either self advised or al-advised_ (and implicitly\
      \ not both). So this break down feel weird to me. I believe what we're trying\
      \ to capture is that in nova there's a third option: which is neither, meaning\
      \ this data room is not \"venture backed\". But technically, in that case, the\
      \ vehicles are \"self advised\" since AL is not the advisor on those vehicles.\
      \ \r\n\r\nSo I think better naming here might be:\r\n```ts\r\nisALAdvised\r\n\
      isSelfAdvisedFSFM\r\nventureBacked = isALAdvised || isSelfAdvisedFSFM\r\n```\r\
      \nor something (don't love this, but you get the point). "
