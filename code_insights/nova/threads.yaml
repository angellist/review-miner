- thread_id: 2383067141
  pr: 5220
  root:
    id: 2383067141
    author: jogly
    body: "are there plans to use these labels outside of `app`? I'm a little allergic\
      \ to baking anything app-specific (including graph-specific) into the core library.\
      \ I can understand the enum being here but labels are presentation focused,\
      \ maybe this can be hoisted to the component its used in, until reusing is necessary.\r\
      \n\r\nstyle suggestions:\r\n1. You can merge the two record types such that\
      \ you get the enum key autocompletion, and allow string indexing, which avoids\
      \ the unsightly cast.\r\n2. Returning `null` if `undefined` isn't a necessary\
      \ conversion, `undefined` is semantically correct when a key doesn't exist,\
      \ as opposed to an explicit `null`. \r\n\r\n```suggestion\r\n\r\n/**\r\n * Get\
      \ the human-readable label from the frequency key\r\n */\r\nexport const labelByEmailFrequency\
      \ = (frequency: string): string | undefined => {\r\n  const map: Record<EmailFrequency,\
      \ string> & Record<string, string> = {\r\n    immediately: 'Immediately',\r\n\
      \    daily: 'Daily Digest',\r\n    weekly: 'Weekly Digest',\r\n    monthly:\
      \ 'Monthly Digest',\r\n    never: 'Never',\r\n  };\r\n  return map[frequency];\r\
      \n};\r\n```"
    path: packages/core/src/emails/utils.ts
    created_at: '2025-09-26T17:45:10Z'
  replies:
  - id: 2389316159
    author: cameronnapoli
    body: '> are there plans to use these labels outside of app? I''m a little allergic
      to baking anything app-specific (including graph-specific) into the core library.


      I''d disagree in this instance because it seems likely that `app`, `graph`,
      and `capital-api` may all need to reference this at some point.


      1. I''ll give that a try


      2. Yeah good call'
    created_at: '2025-09-29T21:29:36Z'
  - id: 2389328195
    author: jogly
    body: 'three services needing the same label maps is the issue, indicating a leaky
      separation of concerns. ideally we''d be able to encapsulate this into just
      1 service, in order to reduce the scope of context needed, but I understand
      our current arch is not ideal yet. putting the labels here *in case* they''re
      going to be reused is different than definitely going to be used in a future
      PR. I just want to make sure this situation is the latter :+1: '
    created_at: '2025-09-29T21:37:35Z'
  - id: 2389378049
    author: cameronnapoli
    body: "What's the reason it would be a leaky separation of concerns? I think there's\
      \ two legitimate use cases:\r\n- Referencing the frequency as a human-readable\
      \ string in an email (graph / capital-api)\r\n- Referencing the frequency as\
      \ a human-readable string in a setting or UI label (app)\r\n\r\nLet me know\
      \ if that's off base. I also want to make sure we're rigorous, but for the right\
      \ reasons."
    created_at: '2025-09-29T22:07:39Z'
  - id: 2389423936
    author: jogly
    body: 'Yea rendering for emails would totally be a valid use case for putting
      this in core, but in my head that is still squarely a presentation layer concern,
      and would be an exception to the rule of thumb for the purposes of "presenting"
      from the backend. For example, I don''t think it''s likely these labels would
      be used "as-is" in a sentence from an email, the title-casing is targeted for
      a menu/form. So do you manipulate the label in the backend to make it fit? Or
      would it be cleaner to co-locate the specific style of the words for the use-case.
      Then rendering the string in an email isn''t coupled to the rendering of the
      label in a drop down, something that is difficult to know without either cult
      knowledge, or tracing the use of the enum to multiple services. I totally acknowledge
      this is a small case, but just an ingredient that adds up to asking ourselves
      "why is this code so hard to refactor" '
    created_at: '2025-09-29T22:41:32Z'
  pr_author: cameronnapoli
  merged_at: '2025-09-29T22:07:57Z'
  repo: nova
  has_suggestion_block: true
