  root:
    id: 2633144946
    author: kwliang1
    body: should we have a transition for pending?
    path: graph/data/banking/payment.ts
    created_at: '2025-12-19T00:36:48Z'
  replies:
  - id: 2633619156
    author: kevinmmarlow
    body: "No? Pending is a derived state from the payment transfer. To transition\
      \ a payment to pending, you would need to find the specific payment transfer\
      \ that is created and matches, then call `transitionToPending` on that payment\
      \ transfer. This generally makes sense because the code flow is:\r\n\r\n1. User\
      \ wants to initiate transfer for a payment\r\n2. Backend creates the payment\
      \ & paymentTransfer\r\n3. Backend calls Treasury to initiate transfer\r\n4.\
      \ Treasury responds with transferId\r\n5. We set transfer ID on payment transfer\
      \ and mark as pending (this is currently 2 calls, but we should consolidate,\
      \ I agree)\r\n6. Now, querying payment state results in pending from the underlying\
      \ payment transfer."
    created_at: '2025-12-19T04:57:46Z'
  - id: 2633694338
    author: kwliang1
    body: you right.
    created_at: '2025-12-19T05:38:36Z'
