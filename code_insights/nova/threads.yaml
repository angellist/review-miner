- thread_id: 2145499560
  pr: 3824
  root:
    id: 2145499560
    author: stathis-alexander
    body: "I want to retrain us to stop moving stuff into \"catch-all\" files like\
      \ this. `helpers.ts`, `config.ts`, etc are all kind of an anti-pattern because\
      \ they turn into junk drawers. Furthermore, when you have deeply nested components,\
      \ you start to see imports from parents in children, so you're chasing `../../helpers`\
      \ when there's a `helpers` at every level and it's super confusing when they\
      \ start to reference each other.  \r\n\r\nAll of that is to say, I would push\
      \ to, in order of my personal preference:\r\n1. inline this in the component\
      \ where it's used\r\n2. split the filters component out into a `OpportunitiesTableFilters`\
      \ component, with this inlined\r\n3. use smaller, semantically meaningful and\
      \ precisely named files: `filters.ts`\r\n"
    path: app/src/components/views/AdminTools/OpportunitiesTab/OpportunitiesTable/config.ts
    created_at: '2025-06-13T16:36:51Z'
  replies:
  - id: 2145515403
    author: edwinzhng
    body: Will inline here since the definitions are very contained
    created_at: '2025-06-13T16:45:51Z'
  pr_author: edwinzhng
  merged_at: '2025-06-13T16:56:07Z'
  repo: nova
  has_suggestion_block: false
