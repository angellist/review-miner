- thread_id: 2132841809
  pr: 3705
  root:
    id: 2132841809
    author: JaredWF
    body: "This _might_ cause problems. It looks like you're setting a permission\
      \ for every file and folder. Custom permissions expect that if a resource has\
      \ a permission, none of that resource's parents have permissions. `normalizeCustomPermissions`\
      \ takes care of enforcing this structure, but I think it will strip out a file's\
      \ permission in cases where the file's folder has a permission. \r\n\r\nI would\
      \ say just set the permissions on the files only, but then if you have an empty\
      \ folder and you add a file under it without setting any permissions, that file\
      \ won't be accessible. So really the solution is all files need permissions\
      \ and all empty folders need permissions. I highly recommend adding tests to\
      \ this function if you can."
    path: graph/lib/dataroom/permissionGroup/syncRoomDefaultAndCustomPermissions.ts
    created_at: '2025-06-06T20:01:24Z'
  replies:
  - id: 2132898148
    author: cameronnapoli
    body: Changed the logic to only set custom permissions on files and added a test!
    created_at: '2025-06-06T20:55:03Z'
