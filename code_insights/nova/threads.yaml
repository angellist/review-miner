    author: stathis-alexander
    body: 'Not sure how much we''re re-using code vs not here, but generally I think
      this kind of "plumb a prop through to switch behavior" everywhere stuff is a
      bit weird in React. If the component is mostly the same except a few tweaks,
      then it makes sense, but otherwise I would probably build two separate components
      (using shared composable pieces where possible) and switch the behavior to render
      different components depending. Again, not sure if applicable here or not. '
