- thread_id: 2992501035
  pr: 7412
  root:
    id: 2992501035
    author: Copilot
    body: "`resetStore()` rejection is being passed to `errorTrackerClient.warning`,\
      \ but `warning` currently forwards directly to `Sentry.captureMessage` and expects\
      \ a string. If `resetStore()` rejects with an `Error` object, this will capture\
      \ a non-string message (or a low-signal \"[object Object]\"). Consider coercing\
      \ to a string (e.g. `String(err)`) or using `errorTrackerClient.error(err)`\
      \ so non-string errors are handled consistently.\n```suggestion\n          await\
      \ apolloClient?.resetStore().catch((err) => errorTrackerClient.error(err));\n\
      ```"
    path: app/src/components/views/TransactionItem/index.tsx
    created_at: '2026-03-26T05:08:06Z'
