      \ to test with, no frills nothing special, here's a shortcut so you don't need\
      \ to manually chain all of the commands\" since that's what 90% of our tests\
      \ will take. Requiring chaining `.withPage()` sort of defeats that. My intention\
      \ was that if you need something deviating from the \"standard recipient\" you\
      \ need to then go and manually build it up yourself — \"Don't want a page? Create\
      \ a recipient on your own\" sorta deal.\r\n\r\nw.r.t. the sender nav test, it\
      \ already isn't creating a recipient page, since it isn't calling `createStandardRecipient`\
      \ anywhere."
