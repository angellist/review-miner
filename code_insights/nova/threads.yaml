- thread_id: 2194036071
  pr: 4197
  root:
    id: 2194036071
    author: edwinzhng
    body: "Just high level, I feel like this will be brittle if we add new field types\
      \ to the Vulcan schema, what do you think about:\r\n1. Validate recursively\
      \ on the object values and loop over all fields, validating if we have an object\
      \ key with name \"key\" or \"docField\"\r\n2. Do this in a more functional style\
      \ w/ the [TypeScript `reduce`](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Array/reduce)\
      \ to avoid mutating an error array here\r\n\r\nExample:\r\n```\r\nconst FIELDS_TO_VALIDATE\
      \ = [\"key\", \"docField\"] as const\r\n\r\nconst validateKeys = (\r\n  node:\
      \ unknown,\r\n  path: string[] = [],\r\n): string[] => {\r\n  if (Array.isArray(node))\
      \ {\r\n    return node.reduce<string[]>(\r\n      (acc, item, index) =>\r\n\
      \        acc.concat(validateKeys(item, [...path, `[${index}]`])),\r\n      [],\r\
      \n    )\r\n  }\r\n\r\n  if (node && typeof node === 'object') {\r\n    return\
      \ Object.entries(node as AnyObject).reduce<string[]>((acc, [k, v]) => {\r\n\
      \      const currentPath = [...path, k]\r\n\r\n      if ((FIELDS_TO_VALIDATE.includes(k))\
      \ && typeof v === 'string') {\r\n        if (hasLeadingOrTrailingSpace(v)) {\r\
      \n          acc.push(\r\n            `${k} \"${v}\" has leading or trailing\
      \ space at path: ${currentPath.join('.')}`,\r\n          )\r\n        }\r\n\
      \      }\r\n\r\n      return acc.concat(validateKeys(v, currentPath))\r\n  \
      \  }, [])\r\n  }\r\n\r\n  return []\r\n}\r\n``` \r\n\r\n^Untested, but the code\
      \ will be more concise like this too"
    path: graph/lib/templates/validate/validators/validateLeadingOrTrailingSpace.ts
    created_at: '2025-07-09T05:16:23Z'
  replies:
  - id: 2195836680
    author: uday-al-sf
    body: "Thanks for this @edwinzhng \r\nI see that this is more concise and low\
