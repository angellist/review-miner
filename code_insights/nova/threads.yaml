- thread_id: 2400730522
  pr: 5279
  root:
    id: 2400730522
    author: JaredWF
    body: 'Thinking ahead for things like entity merges or deleting org members (I
      know we just archive right now), should the entity relationship have `onDelete:
      Cascade`? And then `invitedByOrganizationMember: SetNull`?'
    path: packages/prisma/models/organization.prisma
    created_at: '2025-10-03T04:12:56Z'
  replies: []
  pr_author: ctotheameron
  merged_at: '2025-10-07T01:35:54Z'
  repo: nova
  has_suggestion_block: false
- thread_id: 2400745395
  pr: 5279
  root:
    id: 2400745395
    author: JaredWF
    body: "I wish I had a good solution to get rid of this pattern, I don't love having\
      \ to duplicate fields like this across two tables. A few options I can think\
      \ of:\r\n1. We do this duplication and have clear separation between our invite\
      \ and org entity models. Easy to reason about, but requires updating both places\
      \ whenever you want to make a change. \r\n2. Don't add the new `OrganizationEntityInvite`\
      \ and instead put invite related attributes on `OrganizationEntity`. This is\
      \ possibly too messy. It could impact our checks of if an org member has access\
      \ to an entity through the organization unless we were to make `organizationId`\
      \ nullable in `OrganizationEntity`.\r\n3. Move the shared attributes to another\
      \ table that both models reference. Sounds like way too much refactoring involved.\
      \ \r\n\r\nNo action really needed here unless you're passionate about it. I'm\
      \ just worried about propagating this pattern as it feels like it's going to\
      \ make our code less maintainable in the future. "
    path: packages/prisma/models/organization.prisma
    created_at: '2025-10-03T04:26:26Z'
  replies:
  - id: 2400779002
    author: ctotheameron
    body: I think what I have here is the least worst of all worlds. (2) introduces
      too much risk for authz, (3) is way overengineered
    created_at: '2025-10-03T04:53:12Z'
  - id: 2402519109
    author: JaredWF
    body: Yeahhh, you're probably right
    created_at: '2025-10-03T16:16:03Z'
  pr_author: ctotheameron
  merged_at: '2025-10-07T01:35:54Z'
  repo: nova
  has_suggestion_block: false
