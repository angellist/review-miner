    body: 🪦 — we gotta fix this in ADAPT at some point.
    path: app/src/components/meridian/shared/Opportunity/OpportunityBlade/header.tsx
    created_at: '2025-07-28T09:16:20Z'
  replies:
  - id: 2236536232
    author: stathis-alexander
    body: "> we gotta fix this in ADAPT at some point.\r\n\r\nWhen I've asked about\
      \ this in hte past, the heavily opinionated-ness was intentional to keep the\
      \ design system relatively consistent. If this is coming from the designers,\
      \ it feels like that's changed?\r\n\r\nA couple of follow on comments here:\r\
      \n1. Using `Box` this way is surprising. Why would we not use a `Text` element?\
      \ `Box` is an escape value, not a default, and escaping out of the design system\
      \ just makes our lives harder when we go to change. \r\n2.  I'd almost prefer\
      \ we use `@ts-expect-error` than overriding the types like this. What we're\
      \ doing by passing in the wrong type is somewhat dangerous, since we may make\
      \ \"non-breaking\" changes in adapt that suddenly become breaking because of\
      \ it. We have had that issue before. Using `ts-expect-error` makes it explicit\
      \ that we're breaking the rules, will throw a type error if the typing is changed\
      \ in the future to support this, and will make it easier to spot these types\
      \ of issues if the internal adapt api changes. \r\n\r\n"
    created_at: '2025-07-28T13:42:13Z'
