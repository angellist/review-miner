    author: korbin
    body: "i would prefer docker-compose because it will be more like CI.\r\n\r\n\
      i am not a fan of the existing devcontainer stuff (because iirc it's not github\
      \ codespace compatible and i don't like the 1password envfile stuff), but it's\
