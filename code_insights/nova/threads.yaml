- thread_id: 2479156812
  pr: 5495
  root:
    id: 2479156812
    author: ahlec
    body: "Arguably I think the `CleanupFn` pattern here would be a natural fit as\
      \ well (for both `configureWebhook` functions). In both versions, you have some\
      \ logic to keep in sync — in this case, `!getApiKey(DEVELOPMENT)` should do\
      \ nothing. It would be very possible to have these drift over time without an\
      \ engineer being aware of it.\r\n\r\nChanging instead to something like:\r\n\
      ```typescript\r\nexport const configureWebhook = async (baseUrl: string): Promise<CleanupFn>\
      \ => {\r\n  const apiKey = getApiKey(Environments.DEVELOPMENT);\r\n  if (!apiKey)\
      \ {\r\n    return noop;\r\n  }\r\n\r\n  const client = new postmark.ServerClient(apiKey);\r\
      \n  // ...\r\n  return async () => client.deleteWebhook(webhookId);\r\n}\r\n\
      ```\r\nwould just be a lot simpler and more error-resilient over time."
    path: mailproxy/packages/core/src/providers/postmark/configureWebhook.ts
    created_at: '2025-10-30T18:40:21Z'
  replies: []
