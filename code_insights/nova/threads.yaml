- thread_id: 1988213698
  pr: 2777
  root:
    id: 1988213698
    author: edwinzhng
    body: Is this to represent the relative ordering of the templates?
    path: packages/prisma/schema.prisma
    created_at: '2025-03-11T01:09:43Z'
  replies:
  - id: 1988214122
    author: edwinzhng
    body: Would it be overkill to call this `orderKey` for consistency?
    created_at: '2025-03-11T01:10:23Z'
  - id: 1988219929
    author: campriceaustin
    body: "Yep, it's to represent order.\r\n\r\n`orderKey` is a little different,\
      \ in that we use those string ordering keys because items (files, folders etc)\
      \ might be re-ordered, new items inserted, items removed etc, and we don't want\
      \ to recalculate an `ordinal` for every item in the room every time.\r\n\r\n\
      In our case here, that doesn't happen. Updating a `DataRoomCallToActionConfig`\
      \ just nukes and recreates the target records.\r\n\r\nSo, I opted for simplicity.\
      \ We could rename the field to `orderKey`, but that would be inconsistent with\
      \ our other usages.\r\n\r\nFairly low conviction if you think it's worth converting\
      \ things to the string `orderKey` structure instead."
    created_at: '2025-03-11T01:19:50Z'
  - id: 1988220835
    author: edwinzhng
    body: Nah definitely don't think it's worth it, thanks for the explanation!
    created_at: '2025-03-11T01:21:24Z'
  pr_author: campriceaustin
  merged_at: '2025-03-11T02:01:03Z'
  repo: nova
  has_suggestion_block: false
- thread_id: 1988215491
  pr: 2777
  root:
    id: 1988215491
    author: edwinzhng
    body: "Just curious for this + below, is it generally preferable to default to\
      \ empty string vs. making them nullable?\r\n\r\nI assume there's no semantic\
      \ difference between `NULL` and `\"\"` in this situation"
    path: packages/prisma/schema.prisma
    created_at: '2025-03-11T01:12:32Z'
  replies:
  - id: 1988221072
    author: campriceaustin
    body: "No semantic difference. I prefer empty strings because it simplifies the\
      \ typing (no need for `nullable: true` etc, and coalescing empty strings to\
      \ `null` for consistency).\r\n\r\nLow conviction."
    created_at: '2025-03-11T01:21:44Z'
  pr_author: campriceaustin
  merged_at: '2025-03-11T02:01:03Z'
  repo: nova
  has_suggestion_block: false
