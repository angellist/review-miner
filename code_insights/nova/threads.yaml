- thread_id: 2658639761
  pr: 6257
  root:
    id: 2658639761
    author: pradyuman
    body: 'We''ll need to always set an `organizationId` so that we know which `OrganizationEntity`
      this maps to if they additionally specify an `entityId` (and we should have
      a relation for that).


      Separately, we’re actually thinking that controls will either be at the organization
      or at the entity financial account level (but not on entity). We don’t need
      this for Jan 15 though, so it might be safest to just ignore this for the initial
      models until we need it -- gives us some time to think about `transaction` controls
      as well.'
    path: packages/prisma/models/banking.prisma
    created_at: '2026-01-03T01:46:01Z'
  replies:
  - id: 2658652349
    author: pradyuman
    body: Also, how are you thinking about instance specific overrides? e.g. a policy
      that we write in realtime for a transfer override.
    created_at: '2026-01-03T02:17:08Z'
  - id: 2658712393
    author: fivetentaylor
    body: I was kinda thinking we'd just skip having a policy in that case. I was
      thinking of a policy as purely a template and then just put everything on the
      control that's needed for decisioning. But open to not doing that
    created_at: '2026-01-03T04:38:46Z'
  - id: 2658754458
    author: pradyuman
    body: I think we should have a policy on every transfer just so that the system
      works the same on every transfer (I feel like it'll end up being easier to reason
      about in the long run this way).
    created_at: '2026-01-03T06:23:33Z'
  - id: 2659109914
    author: fivetentaylor
    body: "okay sounds good, so basically when we're doing one off policies we'd create\
      \ a transfer + policy combo at the same time.\r\n\r\nOne decision I was making\
      \ was that all the settings from the policy will get duplicated into the control\
      \ upon creation. This way we can expect policies to evolve over time but each\
      \ control will capture exactly which rules were set on it at that moment in\
      \ time as opposed to referring back to the current state of the policy. This\
      \ way the controls will have an accurate audit history."
    created_at: '2026-01-03T19:43:50Z'
  pr_author: fivetentaylor
