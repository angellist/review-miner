    author: sf8193
    body: 'i don''t love generic find by because sometimes we''ll want to find by
      multiple that aren''t unique, but if we go with this pattern might want to make
      it a switch '
    path: graph/data/organization/organization.ts
    created_at: '2025-09-09T19:53:29Z'
  replies:
  - id: 2335312323
    author: ctotheameron
    body: "There are all mutually exclusive like it doesn't make sense to pass multiple?\
      \ Unless you wanna get into `or: {}` / `and: {}` semantics, but then we're jsut\
      \ back in prisms-land.\r\n\r\nIn theory, these map to how ActiveRecords dynamic\
      \ functions work:\r\n\r\n```rb\r\n# Either of these are good, first one is preferred\r\
      \nUser.find_by(email_address: email_address)\r\nUser.find_by_email_address(email_address)\r\
      \n```\r\n\r\nTS/JS shorthand syntax makes the `findBy()` even cleaner:\r\n```ts\r\
      \nuser.findBy({ emailAddress })\r\nuser.findByEmailAddress(emailAddress)\r\n\
      ```"
    created_at: '2025-09-10T02:19:09Z'
  - id: 2335314473
    author: ctotheameron
    body: "The other option would be to make these implicitly \"or\" and drop the\
      \ ExclusiveUnion bit, so you could pass:\r\n\r\n```ts\r\norg.findBy({ id, handle,\
      \ transactionId })\r\n```\r\n\r\nall-together, and internally we'd decide which\
      \ key to use, but that's probably not correct if you've passed me 3 incompatible\
      \ keys..."
    created_at: '2025-09-10T02:21:05Z'
