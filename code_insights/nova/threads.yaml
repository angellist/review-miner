- thread_id: 2928064405
  pr: 7226
  root:
    id: 2928064405
    author: ahlec
    body: "Something else that we'll need to handle is the `/health` check. Both the\
      \ k8s Buildkite setup and `process-compose` locally are polling `/health` to\
      \ know when the server is ready to start receiving requests.\n\nYou're only\
      \ beginning to boot up the Prophet workers after `/health` is already now returning\
      \ 200s (since the Express server's implementation is just a hardcoded 200/it\
      \ only fails when the server is initializing).\n\nI think you should tweak the\
      \ implementation of the `/health` endpoint for the Express server to only return\
      \ 200 once the Prophet servers are running. Something _like_ this (but better):\n\
      ```typescript\nlet isProphetReady: boolean = false;\napp\n  .get('/health',\
      \ (_, res) => {\n    if (!isProphetReady) {\n      res.status(503).send('Waiting\
      \ on Prophet');\n    } else {\n      res.status(200).send('OK');\n    }\n  });\n\
      \ncreateServer(app).listen(PORT, () => { ... });\nawait startProphetWorkers(NATS_URL);\n\
      isProphetReady = true;\n```"
    path: nova-e2e/services/emulator/src/main.ts
    created_at: '2026-03-12T23:41:48Z'
  replies: []
  pr_author: kevinmmarlow
  merged_at: '2026-03-17T04:35:11Z'
  repo: nova
  has_suggestion_block: false
- thread_id: 2928076786
