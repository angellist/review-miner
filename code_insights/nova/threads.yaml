- thread_id: 2071020250
  pr: 3385
  root:
    id: 2071020250
    author: kevinmmarlow
    body: "Is the issue that the \"back\" is the same url and/or there is no back\
      \ stack?\r\n\r\nIn general, it feels weird that we need to keep state here.\
      \ We should be able to use the document or window to determine if there is anything\
      \ to go back to. Pretty rough idea below, but generally _feels_ like we shouldn't\
      \ need to keep state here\r\n\r\n```\r\nconst handleBack = () => {\r\n  // If\
      \ the window/document doesn't exist, rely on NextJS\r\n  if (isNullable(window)\
      \ || isNullable(document)) {\r\n    router.back();\r\n    return;\r\n  }\r\n\
      \  \r\n  const backIsWithinNova = document.referrer && new URL(document.referrer).hostname\
      \ === window.location.hostname\r\n  if (backIsWithinNova) {\r\n    router.back();\r\
      \n  } else {\r\n    router.replace(publicConfig.BASE_URL);\r\n  }\r\n};\r\n\
      ```"
    path: app/src/components/portal/ErrorPage/index.tsx
    created_at: '2025-05-02T02:27:38Z'
  replies:
  - id: 2073819577
    author: sf8193
    body: "the problem is if where we go back too also errors, here's an example that\
      \ is pretty common to see on posthog\r\n\r\nhttps://us.posthog.com/project/37160/replay/01968460-1a19-782f-acae-d8f6c9b469b6\r\
      \n\r\nan example of nullable not working is when we're impersonating, the auth\
      \ issues just keep us in an endless loop. if we allowed this behavior clicking\
      \ go back would take the \"current\" user to their transactions homepage"
    created_at: '2025-05-05T17:00:15Z'
  - id: 2080803451
