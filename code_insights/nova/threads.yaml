  replies:
  - id: 1974344495
    author: edwinzhng
    body: "That view is only for rendering the Data rooms column on the Directory\
      \ People tables. \r\nWe created a view originally since it seemed easier than\
      \ backfilling into an actual DB field\r\n\r\nFor context, we create a directory\
      \ person for anyone added to a data room as a `DataRoomMember` (directory people\
      \ are also automatically created via transaction creation, or manually created\
      \ if the GP org has portal enabled)\r\n\r\nThe view should still work with this\
      \ change, where invites are unredeemed data room members. I'm fine to keep this\
      \ as a tracking column but it could get confusing to have `directoryPersonId`\
      \ as the name for this field - maybe we can specify `invitedDirectoryPersonId`"
    created_at: '2025-02-27T21:13:08Z'
  - id: 1974348275
    author: edwinzhng
    body: We'll still need the view to be able to sort on a count of _all_ pending
      invites (both portal + data room) since Prisma can't do joins while sorting,
      so I would probably update the view to also include this column
