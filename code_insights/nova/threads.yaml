  root:
    id: 2017716661
    author: campriceaustin
    body: 'here and above: there''s no point in doing this, right? because the `dataRoom`
      will be initially nullish, then the `useEffect` payload will fire?'
    path: app/src/components/views/DataRoomManager/Shared/InviteModal/index.tsx
    created_at: '2025-03-27T23:28:21Z'
  replies:
  - id: 2017728359
    author: edance
    body: "there's an annoying race condition here. I believe it's like this:\r\n\r\
      \n1. This code (with `{} as Payload`) sets payload to an empty object\r\n2.\
      \ The first step/form gets loaded with useForm and generates the defaultValues\
      \ from this empty payload\r\n3. The loading of the data room finishes and the\
      \ `useEffect` triggers updating the payload\r\n4. The form values do not change\
      \ because the defaultValues is only part of the initial render\r\n5. Form gets\
      \ submitted with these defaultValues from the empty payload and we get errors\r\
      \n\r\nThe only reason this code works (I think) is that the first step in both\
      \ of these don't require dataRoom as part of their `defaultValues`. For step\
      \ two and beyond, it works as expected because the form for step two is rendered\
      \ for the first time _after_ the payload has been updated in the `useEffect`"
    created_at: '2025-03-27T23:45:30Z'
  - id: 2017781926
    author: campriceaustin
    body: "i don't really understand how this change helps then -- it seems like it\
      \ only works if `dataRoom` is available on first tick (and therefore the initial\
      \ payload state can be correctly set). \r\n\r\nin the case where `dataRoom`\
      \ is nullish on first tick, [these](https://github.com/angellist/nova/pull/2969/files?w=1#diff-9ff206c0a91878b9fdc8cedef6d291108c87b82ddf01ef474375955a6b509438R79)\
      \ calls that you're adding will still initialize payload to empty, and the internal\
      \ forms will never update once `dataRoom` becomes available.\r\n\r\nif the above\
      \ race condition is what's happening, we either want to:\r\n\r\n1. ensure that\
      \ the first form in each modal has a `useEffect` to reset the form defaults\
      \ when `payload` changes, or\r\n2. prevent the first form from rendering at\
      \ all until `dataRoom` is present\r\n\r\n(2) makes the code easier to reason\
      \ about, and will catch future bugs, but i don't think there's a nice way to\
      \ do it. (1) is a pattern [i've used in the past](https://github.com/angellist/nova/blob/master/app/src/components/views/Directory/Entities/Uploads/BulkFileUploadModal/Steps/Settings/index.tsx#L54-L59)."
    created_at: '2025-03-28T01:17:22Z'
  pr_author: edance
  merged_at: '2025-03-28T16:48:13Z'
  repo: nova
  has_suggestion_block: false
