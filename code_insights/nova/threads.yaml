      3. production\r\n\r\nI've only been testing with 2 above."
    created_at: '2025-10-08T05:07:26Z'
  - id: 2414506833
    author: jogly
    body: 'I agree w korbin, it should be `nova` and not a distinct name per service
      that nova communicates with, but that isn''t strictly related to the fact that
      nova exists in multiple environments, while venture does not. as a client, this
      isn''t a problem because nova-prod and nova-staging both talk to treasury, and
      treasury just replies to whichever initiated. but when nova is the server, this
      means that there *are,* effectively, different `nova` services that venture
      can request. e.g. venture can talk to `nova` or `nova-staging` because they''re
      both provided as distinct URLs. '
    created_at: '2025-10-08T17:05:53Z'
