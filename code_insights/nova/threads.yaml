  root:
    id: 2492001841
    author: ahlec
    body: "This conflates \"there was no input\"/\"an error happened in venture\"\
      \ with \"search successful, there were no results found.\" I think we'd want\
      \ to be able to tell those two apart — if I type in asdfjkahskjfhaksjldhfaskjhf@angellist.com,\
      \ I'd expect to see an empty list rather than all emails.\r\n\r\nIn this case,\
      \ we could change the return type of `fetchUserEmails` to something like:\r\n\
      ```typescript\r\ntype UserEmailsResult =\r\n  | { success: false; }\r\n  | {\
      \ success: true; emails: readonly string[] };\r\n\r\nexport async function fetchUserEmails(...):\
      \ Promise<UserEmailsResult>;\r\n```\r\n(usually my preferred approach) or change\
      \ to\r\n```typescript\r\nexport async function fetchUserEmails(...): Promise<null\
      \ | string[]>;\r\n```\r\nwhere `null` indicates that the search didn't happen\
      \ and the array indicates that it did."
    path: mailproxy/packages/core/src/models/sentMail/extensions/model/search.ts
    created_at: '2025-11-04T20:46:30Z'
