- thread_id: 2591199659
  pr: 5968
  root:
    id: 2591199659
    author: kevinmmarlow
    body: "Maybe we could pull this ternary up and out, so we don't have the forced\
      \ unwrap nested in other logic?\n\nWish we would not force unwrap, but I think\
      \ we'd need a helper `ensureAccountIdOrOrgMemberInviteId` that returns the expected\
      \ OR type that Typescript needs.\n\nSomething like this perhaps? We could make\
      \ it more generic and just write an `ensureMutuallyExclusive(a, b): ` \n\n```\n\
      type XOR<A, B> =\n  | (A & { [K in keyof B]?: never })\n  | (B & { [K in keyof\
      \ A]?: never });\n\ntype ValidInput = XOR<\n  { accountId: string },\n  { organizationMemberInviteId:\
      \ string }\n>;\n\nfunction validateInput(input: Input): ValidInput {\n  const\
      \ { accountId, organizationMemberInviteId } = input;\n\n  const ok = Boolean(accountId)\
      \ !== Boolean(organizationMemberInviteId);\n  if (!ok) throw new Error(\"Exactly\
      \ one of accountId or organizationMemberInviteId must be present\");\n\n  return\
      \ input as ValidInput;\n}\n```"
    path: graph/src/internal/schema/orgMember/updateTransactionAccess.ts
    created_at: '2025-12-05T02:24:27Z'
  replies:
  - id: 2593900642
    author: JaredWF
    body: "I spent some time working through this suggestion and the suggestion to\
      \ use the `never` type in the subject union above and really struggled with\
      \ the type narrowing. Basically, if I have a type like this:\r\n```\r\ntype\
      \ Subject =\r\n  | { accountId: string; inviteId?: never }\r\n  | { inviteId:\
      \ string; accountId?: never };\r\n```\r\ntypescript can't figure out the narrowing\
      \ properly, eg:\r\n```\r\nif (subject.accountId) {\r\n  // accountId is defined\
      \ here\r\n}\r\n// subject.inviteId is still potentially undefined here\r\n```\r\
      \n\r\nUltimately, I just changed this to a discriminated union which typescript\
      \ handles great. This gives us the XOR enforcement and helps us narrow the type:\r\
      \n```\r\ntype Subject =\r\n  | { kind: 'account'; accountId: string; inviteId?:\
      \ never }\r\n  | { kind: 'invite'; inviteId: string; accountId?: never };\r\n\
      \  \r\nif (subject.kind === 'account') {\r\n  // subject.accountId is defined\
      \ here\r\n}\r\n// subject.inviteId is now defined here\r\n```"
    created_at: '2025-12-05T20:26:25Z'
  pr_author: JaredWF
  merged_at: '2025-12-05T21:30:34Z'
  repo: nova
  has_suggestion_block: false
