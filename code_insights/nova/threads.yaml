    created_at: '2025-06-24T13:59:06Z'
  replies:
  - id: 2164453080
    author: JaredWF
    body: 'Usually I agree with this sentiment, it''s better to have one major fork
      to render this or that, rather than a bunch of smaller forks that change some
      piece of the UI. In this case, I think there are still few enough branches in
      the logic that it''s not overwhelming, but if the view for these two dashboard
      types diverges anymore, then I think we should go ahead and make this change. '
