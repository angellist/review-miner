  root:
    id: 2543096817
    author: jogly
    body: this seems fishy but I don't have a strong enough mental model of org entities
      to resolve. I _feel_ like org entities that are and are not vehicles should
      be treated mutually exclusively... I'd like to know if thats untrue, in this
      case or ever
    path: graph/lib/organization/member/invite/create.ts
    created_at: '2025-11-19T18:18:30Z'
  replies:
  - id: 2543353631
    author: JaredWF
    body: The maintains the previous behavior where we were getting all organization
      entities for the given organization. We do still care about setting permissions
      for org entities that are vehicles because entity permissions apply for both
      GPs and LPs. As an example, I could be an admin of a GP org and I have an employee
      who is involved in running our crypto funds but should not have access to our
      real estate funds. In this case, the employee would have an edit entity permission
      to the crypto vehicle, but an entity permission with all access disabled for
      the real estate vehicle.
    created_at: '2025-11-19T19:52:08Z'
  pr_author: JaredWF
  merged_at: '2025-11-19T21:38:13Z'
  repo: nova
  has_suggestion_block: false
- thread_id: 2543125554
  pr: 5780
  root:
    id: 2543125554
    author: jogly
    body: I'm curious why positionPermission is the only one not in this setter
    path: graph/lib/organization/member/invite/create.ts
    created_at: '2025-11-19T18:28:24Z'
  replies:
  - id: 2543382534
    author: JaredWF
    body: "Yeah this is where we start getting into the product nuances of position\
      \ permissions. As a way to make it more clear to users how their org members\
      \ have access to a transaction, we're drawing a line in the sand where we have\
      \ \"regular\" org members who _could_ have all of the permissions listed here,\
      \ and then we have \"guest\" org members who can _only_ have position permissions.\
      \ This means that guest org members have to be invited investment by investment,\
      \ while full org members get broader access to all investments made with the\
      \ entities that they have access to.\r\n\r\nTying that into the code, I'm intentionally\
      \ omitting position permissions from this method because it's for the \"regular\"\
      \ org member case and I don't want people to accidentally start providing those\
      \ permissions for regular org members. You'll see that I have the inverse for\
      \ `createGuest` where it only takes position permissions and no other permissions."
    created_at: '2025-11-19T19:59:26Z'
  pr_author: JaredWF
  merged_at: '2025-11-19T21:38:13Z'
  repo: nova
  has_suggestion_block: false
