- thread_id: 2103494398
  pr: 3573
  root:
    id: 2103494398
    author: pradyuman
    body: What types of activity will be tracked?
    path: packages/prisma/schema.prisma
    created_at: '2025-05-22T22:41:24Z'
  replies:
  - id: 2103526679
    author: anthonylobko
    body: "Based on a conversation w/ Alvina, the initial intended list is apparently:\r\
      \n- Edits (when and who, potentially the category like Metadata/Notes)\r\n-\
      \ When a contact is associated/removed\r\n- When an entity is associated/removed\r\
      \n- When a file is added or removed\r\n- When data rooms are added or removed\r\
      \n- When webforms are added or removed. \r\n- When the investor is originally\
      \ created.\r\n- When an entity accepts an invite.\r\n- When an investment is\
      \ completed. \r\n\r\n@edwinzhng and I discussed the fact that some of these\
      \ can be derived, but having a mix of computed and fixed data is a great way\
      \ to have things break, so projecting those events down into a single, coherent\
      \ place that we can then tell apart and render differently seems like the best\
      \ way forward. Having a single simple representation which we can backfill seems\
      \ much less error-prone than trying to reconstruct parts of this from fixed\
      \ events, and part from things like createdAt/deletedAt on different db entries.\
      \ \r\n\r\nThis does surface the potential need for a broader log concept, since\
      \ data rooms have their own data room events as well, and perhaps that's needs\
      \ revisiting, but it's probably not something we need to solve for the moment. "
    created_at: '2025-05-22T22:54:27Z'
  - id: 2103547642
    author: edwinzhng
    body: 'Yep I think it''s okay to have the base model here for things that definitely
      _cannot_ be computed (such as edits to metadata/notes) but the rest of the activity
      will require a broader discussion on how to surface correctly '
    created_at: '2025-05-22T23:10:55Z'
  - id: 2107888195
    author: pradyuman
    body: "Yep, makes sense to have a single event log. A couple notes:\r\n- We normally\
      \ have a `type` field on models like this that's used as a discriminant (and\
      \ to make filtering more efficient).\r\n- Thoughts on naming this `DirectoryInvestorEvent`?\
      \ That's semantically more in-line with what we have elsewhere (e.g. `DataRoomEvent`).\
      \ Open to counterviews on this one though."
    created_at: '2025-05-26T22:16:59Z'
  - id: 2107894974
    author: anthonylobko
    body: "So, I actually specifically thought about having a type field but given\
      \ our use of this in TS a bunch, it makes more sense to have an internal type\
      \ field on the json since then we can naturally descriminate on that for logic\
      \ when we look at the field. We're more likely to be looking at the log and\
      \ switching between behaviors than in this case filtering down first imo. Edwin\
      \ and I discussed it as well and arrived at the same conclusion. \n\nWe could\
      \ add a secondary type field but it'd be duplicative since we'd 100% want a\
      \ type field on the json itself to make TS type inference work gracefully. \n\
      \nAs for the table name, no objections I can change it if you prefer. "
    created_at: '2025-05-26T22:32:37Z'
  - id: 2107898175
    author: pradyuman
    body: "Yeah, that's fair on the first part. Easy to change later if we wanted\
      \ to, so let's see how this pattern goes.\r\n\r\nRe: table name, let's change\
      \ to keep things consistent."
    created_at: '2025-05-26T22:40:53Z'
  - id: 2107898869
    author: anthonylobko
    body: 'The idea being that we can model the field as `type ActivityData = A |
      B | C ...` where each one conforms to `{type: ''sometype'', ...other info}`
      that way, we can do a simple if or switch or type assertion to type narrow as
      needed. Having that field separate is most annoying because it means we can''t
      know the shape purely from the data and so type inference isn''t as clean. '
    created_at: '2025-05-26T22:42:33Z'
  - id: 2107903074
    author: pradyuman
    body: Yep, makes sense.
    created_at: '2025-05-26T22:53:18Z'
  pr_author: anthonylobko
  merged_at: '2025-05-27T16:11:58Z'
  repo: nova
  has_suggestion_block: false
