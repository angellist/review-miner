- thread_id: 2656784416
  pr: 6247
  root:
    id: 2656784416
    author: ctotheameron
    body: 'Ok so I think we should address the style preferences of


      ```ts

      const foobar = () => {}


      // vs


      function foobar() {

      }

      ```


      Lately I''ve really been in favor of using the `function` keyword when defining
      named, top-level functions. There''s a few benefits:


      * intent is clearer - readers can quickly grok vars vs functions

      * function hoisting (technically less of an issue than it used to be) means
      that semantically functions can appear in any order in the file

      * stack traces are better with `function`

      * `export default const foo = () => {}` is not valid syntax `export default
      function bar() {}` is

      '
    path: graph/data/entity/entityExternalBankReference.ts
    created_at: '2026-01-02T03:36:12Z'
  replies:
  - id: 2656802768
    author: pradyuman
    body: "I think \"intent is clearer\" and \"stack traces are better\" are the ones\
      \ that resonate most with me. I don't think we should be using default exports\
      \ anyway, so that one resonates less (similar with hoisting).\r\n\r\nAre you\
      \ thinking the same for React components?\r\n\r\nI'm generally open to the idea\
      \ of using `function` going forward since we're gonna be using `function*` a\
      \ lot now as well. But haven't spent time thinking about it deeply."
    created_at: '2026-01-02T04:10:40Z'
