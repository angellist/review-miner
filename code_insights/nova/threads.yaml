- thread_id: 2228802258
  pr: 4450
  root:
    id: 2228802258
    author: stathis-alexander
    body: "I think you're missing a function invocation? It seems weird the tests\
      \ would pass without it, though?\r\n\r\n```suggestion\r\n    const actual =\
      \ await page.activeKey();\r\n```"
    path: nova-e2e/tests/fixtures/transact/index.ts
    created_at: '2025-07-24T15:07:16Z'
  replies:
  - id: 2229024297
    author: ahlec
    body: In this case it actually doesn't take parentheses. `activeKey` is declared
      with the [`get`](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Functions/get)
      keyword, which means that it's a class field that acts like a property but is
      backed by a function. These functions can't take any parameters and must return
      a value, but it means you get to use it like a normal property/variable and
      it'll automatically invoke the function every time.
    created_at: '2025-07-24T16:43:28Z'
  - id: 2229127298
    author: stathis-alexander
    body: Hm, interesting. Didn't know this! I see the power here in that, since it's
      a pretty common thing to encounter, but it feels weird to see `await` on an
      object property!
    created_at: '2025-07-24T17:27:37Z'
  pr_author: ahlec
  merged_at: '2025-07-24T16:55:35Z'
  repo: nova
  has_suggestion_block: true
