  - id: 2450449672
    author: sf8193
    body: "yea, better in #nova-graph-code-org, but i'm not sure it's things being\
      \ worked out as much as philosophical. i've observed some of these and some\
      \ have been mentioned \n\n1. need to learn new paradigm. `.map` is not the `.map`\
      \ js devs think of, as a simple example. for this switching between paradigm's\
      \ it's questionable how much gain we get out of it\n2. along same vein, there\
      \ are examples in codebase where we need to make 3-4 type transformations to\
      \ get desired type out instead of the 1-2 more natural expressions in basic\
      \ js\n2a. eschew's built in features in t/js in favor of other language idioms\
      \ which will be confusing if hiring devs that expect ts. this isn't a dealbreaker\
      \ but it does add some cognitive load\n3. we agreed to avoid callback hell we\
      \ would limit it to 1 nested callback in data layer. without linting rules this\
      \ is going to get violated sooner rather than later, and iirc biome can't lint\
      \ this properly(?). feels like we're taking step back in time in js ecosystem,\
      \ and callbacks were abandoned for good reason "
