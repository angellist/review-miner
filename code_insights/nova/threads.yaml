- thread_id: 2752172102
  pr: 6645
  root:
    id: 2752172102
    author: pradyuman
    body: "```suggestion\n/**\n * Strict money parser for 2-decimal currencies (e.g.,\
      \ USD).\n *\n * Accepts:  \"12\", \"12.3\", \"12.30\", \"-0.05\"\n * Rejects:\
      \  \"12.345\", \"1e3\", \"1,234.56\", \"\", \"  \", \"abc\"\n */\nexport function\
      \ toCentsStrict(amount: string): number {\n  const str = amount.trim();\n\n\
      \  const m = str.match(/^(-)?(\\d+)(?:\\.(\\d{1,2}))?$/);\n  if (!m) throw new\
      \ Error(`Invalid amount (max 2 decimals): \"${amount}\"`);\n\n  const sign =\
      \ m[1] ? -1 : 1;\n  const whole = Number(m[2]);\n  const frac = Number((m[3]\
      \ ?? \"\").padEnd(2, \"0\"));\n\n  const cents = whole * 100 + frac;\n\n  if\
      \ (!Number.isSafeInteger(cents)) {\n    throw new Error(`Amount out of range\
      \ for JS number cents: \"${amount}\"`);\n  }\n\n  return sign * cents;\n}\n\
      ```\n\nI think we should be a little bit stricter and throw if the input doesn't\
      \ match a two decimal string. Do you know what scenarios we'd have a `number`\
      \ or `{ toString: () => string }` as input? Or scenarios where we can't force\
      \ callers to keep their strings to two decimals?"
    path: graph/src/lib/money.ts
    created_at: '2026-02-02T00:32:11Z'
