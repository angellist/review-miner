      \ adding the credentials to the `.env.enc` file, happy to do so.\r\n\r\n> Do\
      \ we have different NATS URL/creds to segregate our traffic? AFAIK only nova\
      \ even has a staging so this might not be thought through yet.\r\n\r\nThe URL\
      \ is the same, I believe the JWT token is specific to each service.   Korbin\
