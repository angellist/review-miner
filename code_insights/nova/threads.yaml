    id: 2949874183
    author: ahlec
    body: "Going off of [this comment](https://github.com/angellist/nova/pull/7227/changes#r2937939130),\
      \ I think it might make sense to move this function to move this to the `DirectoryEntityProto`\
      \ — I think? Something like:\n```typescript\nclass DirectoryEntityProto {\n\
      \  public linkToVehicle(vehicle: OrganizationEntityProto): void {\n    this.commandManager.appendCommand(async\
      \ ({ commandResults, db }) => {\n      const organization = commandResults.get(OrganizationEntityProto.getOrgVoucher(vehicle));\n\
      \      const entitySeeder = commandResults.get(OrganizationEntityProto.getEntityVoucher(vehicle));\n\
      \      const orgEntitySeeder = commandResults.get(OrganizationEntityProto.getOrgEntityVoucher(vehicle));\n\
      \      const directoryEntitySeeder = commandResults.get(this.voucher);\n\n \
      \     const link = new VehicleEntityDirectoryEntityLinkSeeder({\n        entity:\
      \ entitySeeder,\n        organizationEntity: orgEntitySeeder,\n        directoryEntity:\
      \ directoryEntitySeeder,\n        organization,\n      });\n\n      await db.runSeeders('vehicle-directory-link',\
      \ [link]);\n    });\n  }\n}\n```\nFor this, I did need to add `OrganizationEntityProto.getOrgVoucher`,\
      \ but I think based off of both your comments (around the operation being that\
      \ the recipient connects the entity) and the parameters in the E2E tests, we\
      \ could get something like this and it makes calling the function much easier:\n\
      ```typescript\n// BEFORE\ndirectoryOrg.linkVehicleToDirectoryEntity(vehicleOrgEntity,\
      \ vehicleEntity, dirEntity);\n\n// AFTER\ndirEntity.linkToVehicle(vehicleOrgEntity);\n\
      ```\n\nIf I didn't get this totally right, feel free to move this around (ie\
      \ \"it should actually be `OrganizationEntityProto.linkToDirectoryEntity`\"\
      \ or something). But something in this vein would be nice to capture in code:\n\
      1. Which data model \"owns\" the operation\n2. Only involve the specific models\
      \ necessary for the operation\n3. The operation from the user journey view of\
      \ things\n4. Minimize parameters (easier to use in tests)"
    path: nova-e2e/tests/fixtures/nova/protos/organizationProto.ts
    created_at: '2026-03-17T22:29:38Z'
