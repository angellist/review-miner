  root:
    id: 2655860735
    author: pradyuman
    body: "Something like this feels more readable:\r\n\r\n```typescript\r\nexport\
      \ const parseColumns = (headers: string[]): ColumnGroup => {\r\n  const fixedHeaders\
      \ = [\r\n    DISTRIBUTION_UPLOAD_ENTITY_ID,\r\n    DISTRIBUTION_UPLOAD_ENTITY_NAME,\r\
      \n    DISTRIBUTION_UPLOAD_ENTITY_TYPE,\r\n    DISTRIBUTION_UPLOAD_ALLOCATION_AMOUNT,\r\
      \n    DISTRIBUTION_UPLOAD_DISTRIBUTION_DATE,\r\n  ];\r\n\r\n  return headers.reduce<ColumnGroup>(\r\
      \n    (acc, header, index) => {\r\n      const normalizedHeader = header?.toString().trim()\
      \ ?? '';\r\n      const lower = normalizedHeader.toLowerCase();\r\n\r\n    \
      \  // fixed headers\r\n      fixedHeaders.forEach((fixedHeader) => {\r\n   \
      \     if (lower === fixedHeader.toLowerCase()) {\r\n          acc.fixedCols[fixedHeader]\
      \ = index;\r\n        }\r\n      });\r\n\r\n      // helper to DRY the contact\
      \ patterns\r\n      const matchContact = (\r\n        pattern: RegExp,\r\n \
      \       type: ContactColumn['type']\r\n      ) => {\r\n        const match =\
      \ pattern.exec(normalizedHeader);\r\n        if (!match) return;\r\n\r\n   \
      \     const contactNum = Number.parseInt(match[1], 10);\r\n        acc.contactCols.push({\
      \ index, contactNum, type });\r\n        acc.maxContactNum = Math.max(acc.maxContactNum,\
      \ contactNum);\r\n      };\r\n\r\n      matchContact(CONTACT_NAME_PATTERN, 'name');\r\
      \n      matchContact(CONTACT_EMAIL_PATTERN, 'email');\r\n      matchContact(NOTIFY_CONTACT_PATTERN,\
      \ 'notify');\r\n\r\n      return acc;\r\n    },\r\n    {\r\n      fixedCols:\
      \ {},\r\n      contactCols: [],\r\n      maxContactNum: 0,\r\n    }\r\n  );\r\
      \n};\r\n```"
    path: packages/core/src/distribution/upload/parse.ts
    created_at: '2025-12-31T20:28:35Z'
  replies: []
  pr_author: edwinzhng
  merged_at: '2026-01-01T19:47:36Z'
  repo: nova
