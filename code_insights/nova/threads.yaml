    body: "I'm aligned with reducing concurrency for these high effort tasks. Do we\
      \ know what other workflows run on this queue? Do we need to reassign them to\
      \ another queue after this change? \r\n\r\nThis reduces the of concurrent executing\
      \ tasks on each machine, which will, in theory, allow each workflow / activity\
      \ to make use of more threads and memory. However, it does not alter the number\
      \ of machines at all, which is another lever we can use. If we need are trying\
      \ to run beefier jobs per machine, then this makes sense. "
