      \ the (account) ID optional - I'd rather not do this because it feels like the\
      \ 1:1 relationship reference above should be maintained by `nova` and not `treasury`.\
      \   \r\n\r\ncurious on @kevinmmarlow 's thoughts on this though.   I could be\
      \ misunderstanding the intended use of `PaymentProviderConnection`"
    created_at: '2025-10-30T00:45:32Z'
  - id: 2476109058
    author: kevinmmarlow
    body: '@kwliang1 we do still want to align somehow on the `owner_entity_api_id`.
      I know there are different account purposes, so I''m not sure how @stathis-alexander
      was imaging we''d expand the API for that, but we could either build purpose-built
      APIs in Treasury (fetch CCA, fetch other, etc) or pass in the account purpose
      (which then requires Nova to have knowledge of Treasury''s domain).


      For the fund side, we hadn''t landed on how to use the payment provider connection.
      If you imagine a different PSP (payment service provider), then you''d likely
      have a connection key, then in this case a secondary "account type" field. So
      I think it might be okay for Nova to have a very basic knowledge of which account
      through the connection it wants.'
    created_at: '2025-10-30T00:52:30Z'
  - id: 2476130286
    author: kwliang1
    body: "> I know there are different account purposes, so I'm not sure how @stathis-alexander\
      \ was imaging we'd expand the API for that, but we could either build purpose-built\
      \ APIs in Treasury (fetch CCA, fetch other, etc)\r\n\r\nThe account purposes\
      \ are mainly a FSFM/Accounting concept.  I don't _think_ they will be relevant\
      \ in either the fund or LP case.\r\n\r\n**Funds**\r\nAccount purpose is convoluted\
      \ in `treasury` \U0001F61E .   In this case, I believe what you're referring\
      \ to is `Investment` vs. `CapitalCollection` vs. `Disbursement`.   Those are\
      \ actually distinct CA's, but the same underlying bank account.   I believe\
      \ we have this concept of a sub ledger for FSFM's (accounting) convenience/distinctions.\
      \  For us, we don't concern ourselves with accounting.   I think we just store\
      \ a list of `EntityBankAccount(s)` associated with an entity, and render the\
      \ UI based on the accountType returned to us by `treasury` (e.g. MMF vs. CC).\r\
      \n\r\n**LPs**\r\nI think it's reasonable for an LP to have a 1:1 relationship\
      \ between `OwnerEntity` and `CustomerAccount` based on the current JBTDs.  \
      \ But let's say we introduce distinct account types managed by treasury (crypto?\
      \ brokerage? mmf?), then I think we want to (store) pass explicit UUIDs when\
      \ fetching any sort of account info from `treasury`.   It's a similar situation\
      \ to the Funds case above.\r\n\r\nEntityBankAccount definition [here](https://github.com/angellist/nova/blob/65f9f1e5f454bea45a0c44b2192ac3b7a7386a6f/packages/prisma/models/entity.prisma#L76-L96)\r\
      \n\r\nSide note: We should _probably_ discuss the overlap between `EntityBankAccount`\
      \ and `PaymentProviderConnection` (which one should survive?) @kevinmmarlow "
    created_at: '2025-10-30T01:11:57Z'
  - id: 2480517629
    author: kevinmmarlow
    body: 'The way payment provider connection was envisioned was based on a mix of
      Treasury versus Stripe APIs.


      The `providerConnectionId` is meant to be an access into the Payment Service
      Provider, not directly mapping to specific accounts per say. However, Treasury''s
      architecture has multiple CAs, so it gets a bit confusing.


      If, for example, we introduce distinct account types, then we''d need to decide
      if those were 1:1 with the payment provider connection or not, as you mentioned.


      The way it works for stripe (and how I was envisioning), is that the external
      ID is the key into the "user''s account" on the PSP. From there, you can query
      all accounts. So, in this way, Nova never actually knows nor stores direct access
      to the accounts on the PSP.


      Now, with Harbor, we _may_ need to change this and actually store the accounts.
      I''d caution us against storing too much, especially if it''s just for the convenience
      of the lookup. That is basically us caching truth from an external source.


      For the 1:1 case, what happens if the external source deletes an account? We
      now need to deal with webhook callbacks, etc if we are caching on our side.'
    created_at: '2025-10-31T08:35:23Z'
