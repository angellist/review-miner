      \ thing did jump out:\n\n> The account purposes are mainly a FSFM/Accounting\
      \ concept. I don't think they will be relevant in either the fund or LP case.\n\
      \n`account_purpose` is relied on by FSFM but it's not really an \"FSFM/Accounting\
      \ concept\". It's some bullshit someone did a long time ago that now we have\
      \ to use, but ideally we'd unwind our dependency on it. It's a bit involved,\
