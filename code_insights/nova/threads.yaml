- thread_id: 2122097611
  pr: 3666
  root:
    id: 2122097611
    author: stathis-alexander
    body: any reason not to align the naming here? `investmentTerms` vs `ventureDefaultTerms`?
    path: app/src/components/views/DataRoomManager/Shared/ConfigureDataRoom/components/Contents/index.tsx
    created_at: '2025-06-02T20:32:08Z'
  replies:
  - id: 2122202511
    author: edance
    body: "We have \"investment terms\" in a handful of different places and during\
      \ this migration, it's a little confusing.\r\n\r\n- ventureDefaultTerms - these\
      \ are coming directly from venture (and cptr). this was added in this PR and\
      \ contains min reservation, total carry, and total mgmt fees\r\n- nova model\
      \ `InvestmentTerms` - (min reservation, max reservation, total carry, total\
      \ mgmt) - this model is in nova's db and is connected to either DataRoomAccessLink\
      \ (links) or DataRoomMember (email invites) via a DataRoomShare. These models\
      \ are very similar to what exist in venture already and we're currently keeping\
      \ them in-sync while we figure out the future (meridian/etc)\r\n- relation `dataRoom.defaultTerms`\
      \ (deprecated in this PR but not removed yet) - this connected a nova `InvestmentTerms`\
      \ to a `DataRoom` - this served as a caching layer between venture and nova\
      \ so that we wouldn't have to refetch the terms. But this cache gets stale too\
      \ frequently and was a mistake. This PR updates that.\r\n\r\nSo sorry that was\
      \ a long winded way of saying that this component requirest something shaped\
      \ like an \"Investment Terms\". It could either be the LP's terms (via a link/invite)\
      \ or the default terms if a GP is previewing the room."
    created_at: '2025-06-02T21:37:06Z'
  - id: 2122248752
    author: stathis-alexander
    body: Appreciate the context!
