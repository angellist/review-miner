  replies:
  - id: 2292864815
    author: ctotheameron
    body: "This is the best I can do.. Open to suggestions, but we can't unwrap our\
      \ errors here or await any promises in these functions:\n\n```ts\nexport function\
      \ findByEntityId(\n  accountId: string | undefined,\n  entityId: string | undefined,\n\
      \  prisma: MaybeTransactionPrisma,\n): ResultData<Optional<OrganizationMemberModel>>\
      \ {\n  if (!accountId || !entityId) {\n    return okAsync(undefined);\n  }\n\
      \n  const orgEntityExp = checkAccountToOrgEntityExp({\n    entityLookupOptions:\
      \ { accountId },\n  });\n\n  // Find the entity if the account has access to\
      \ it, and return the\n  // organization member for that entity\n  const entityResult\
      \ = prisma.entity.findFirst({\n    where: { id: entityId, ...orgEntityExp },\n\
      \    include: {\n      organizationEntities: { where: orgEntityExp.organizationEntities.some\
      \ },\n    },\n  });\n\n  return resultFromPrisma(entityResult).andThen((entity)\
      \ => {\n    const memberOrganizationId = entity?.organizationEntities?.at(0)?.organizationId;\n\
      \n    if (!memberOrganizationId) {\n      return ok(undefined);\n    }\n\n \
      \   const organizationMemberResult = prisma.organizationMember.findFirst({\n\
      \      where: {\n        organizationId: memberOrganizationId,\n        accountId,\n\
      \        archivedAt: null,\n      },\n    });\n\n    return resultFromPrisma(organizationMemberResult);\n\
      \  });\n}\n```"
    created_at: '2025-08-22T06:52:17Z'
