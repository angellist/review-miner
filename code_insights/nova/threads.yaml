  replies:
  - id: 2854762243
    author: ywplee-al
    body: "this is react-hook-form quirk. isDirty and dirtyFields can get out of sync\
      \ and causes issues. I wish there's a better way to solve this.\r\n\r\naccording\
      \ to them: https://react-hook-form.com/docs/useform/formstate lol\r\n\r\n> isDirty\
      \ and dirtyFields are intentionally independent in react-hook-form — isDirty\
      \ compares form values against defaultValues, while dirtyFields tracks per-field\
      \ user modifications. They can disagree, especially since we set defaultValues\
      \ asynchronously via reset(). Checking both covers both directions."
    created_at: '2026-02-25T18:49:27Z'
  pr_author: ywplee-al
