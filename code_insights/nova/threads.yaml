      necessary to include right now, but I think it makes for an easier/more consistent
      pattern to have that rule, and if (for whatever reason) `repository` stopped
      depending on `organization` we'd lose our dependency here because it was only
      ever implicit. That might not happen in this particular case, but as a generalized
