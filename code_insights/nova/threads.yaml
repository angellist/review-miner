    body: 'should these be looking for a specific membership to an organization with
      the same `orgHandle`?  I could be misunderstanding, but I think some (most?)
      LPs do have org memberships if they''ve created entities 🤔 '
    path: app/lib/authz/maybeRedirectSenderRoute.ts
    created_at: '2025-04-07T15:51:09Z'
  replies:
  - id: 2031630700
    author: edwinzhng
    body: "This code is structured kind of confusingly, but I didn't want to refactor\
      \ because that's pretty dangerous - this function is only called when we load\
      \ GP/sender URLs (starting with `/[orgHandle]/...`, and `authenticatedUser.account.organizationMembers`\
      \ is already restricted to the `[orgHandle]` value from the URL (i.e. not querying\
      \ for _all_ org memberships including LP orgs.\r\n\r\n(e.g. `/icecapgroup/transaction/<ID>/sender`\
      \ will use `icecapgroup` as the `orgHandle` here when fetching `authenticatedUser`.\r\
      \n\r\nIt should be the case that almost none of the LPs have access to the `icecapgroup`\
      \ org and won't have an org membership here (unless the GP is investing into\
      \ their own fund)"
    created_at: '2025-04-07T16:44:58Z'
