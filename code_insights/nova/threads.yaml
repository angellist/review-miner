  root:
    id: 2655864561
    author: pradyuman
    body: "Something like this feels cleaner:\n\n```typescript\n  const contacts =\
      \ Array.from(\n    { length: columns.maxContactNum },\n    (_, i) => i + 1\n\
      \  )\n    .map((contactNum) => {\n      const findCol = (type: ContactColumn['type'])\
      \ =>\n        columns.contactCols.find(\n          (c) => c.contactNum === contactNum\
      \ && c.type === type\n        )?.index;\n\n      const name = getCellByIndex(findCol('name'));\n\
      \      const email = getCellByIndex(findCol('email'));\n      const notifyValue\
      \ = getCellByIndex(findCol('notify'))\n        .toLowerCase()\n        .trim();\n\
      \n      const notify =\n        notifyValue === 'yes' ||\n        notifyValue\
      \ === 'true' ||\n        notifyValue === '1';\n\n      return name || email\
      \ ? { name, email, notify } : null;\n    })\n    .filter((c): c is ParsedContact\
      \ => c !== null);\n```"
