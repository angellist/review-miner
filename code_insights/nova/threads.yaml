    author: kevinmmarlow
    body: "Perhaps slice isn't what we wanted here? Maybe destructuring is better\
      \ suited, albeit we need a bit of pre-validation? It's also a bit obtuse when\
      \ we name the header `firstRow`, but the comment says \"the first row must be\
      \ headers\".\r\n\r\n```\r\nexport const parseData = (sheetData: unknown[][],\
      \ fileCategories: string[]) => {\r\n  if (!Array.isArray(sheetData) || sheetData.length\
      \ === 0 || !Array.isArray(sheetData[0])) {\r\n    throw new Error(\"Sheet data\
      \ must be a non-empty array of arrays\")\r\n  }\r\n  \r\n  const [headers, ...entities]\
      \ = sheetData\r\n  \r\n  if (headers.length === 0) {\r\n    return []\r\n  }\r\
      \n\r\n  const groups = parseColumns(headers.map(parseCell), fileCategories)\r\
      \n  return entities.map((row) => parseEntity(row, groups))\r\n}\r\n```\r\n\r\
      \nAlso, I was looking at the caller, we could type the `sheet_to_json` call\
      \ so that we can avoid the cast later.\r\n\r\n```\r\nconst sheetData = utils.sheet_to_json<Array<unknown>>(sheet,\
      \ { header: 1 })\r\n```"
