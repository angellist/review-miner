- thread_id: 2213720447
  pr: 4323
  root:
    id: 2213720447
    author: stathis-alexander
    body: Since we're doing this inside of `parSequence`, doesn't it technically happen
      in parallel?
    path: pdfops/src/main/scala/nova/pdfops/PDFOpsService.scala
    created_at: '2025-07-17T15:51:24Z'
  replies:
  - id: 2213803387
    author: sf8193
    body: "The parSequence part (S3 downloads) happens in parallel, but the ZIP writing\
      \ happens sequentially:\r\n```\r\n  batch.map(_._1).parSequence.use { files\
      \ =>  // ← Downloads happen in parallel\r\n    files.zip(batch.map(_._2)).traverse_\
      \ { case (fileBlob, i) =>  // ← ZIP writing happens sequentially\r\n      //\
      \ This forEach processes files one by one\r\n      zip.putNextEntry(...)\r\n\
      \      zip.write(...)\r\n      zip.closeEntry()\r\n    }\r\n  }\r\n```\r\n\r\
      \nthat's why i do this nasty ass stuff with the tuple where i parSequence 1\
      \ part of it, then batch it with the second sequentially "
    created_at: '2025-07-17T16:29:53Z'
  pr_author: sf8193
  merged_at: '2025-07-17T18:19:10Z'
  repo: nova
  has_suggestion_block: false
