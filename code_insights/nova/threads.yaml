  root:
    id: 2417631601
    author: jogly
    body: this pattern pushes a lot of unrelated responsibilities and assumptions
      into picking the right search function. I don't mind relaxing the constraint
      on needing a UserContext, but there shouldn't be presentation logic baked into
      the lib layer. Validate the user is set (or not) at the callsites instead, where
