- thread_id: 2446213387
  pr: 5377
  root:
    id: 2446213387
    author: JaredWF
    body: "This dataloader gets pretty convoluted because we're not calling with a\
      \ simple key, instead, our key is the `accountId` and `transactionId` pair.\
      \ We then batch calls to the authz package by `transactionId`, store the results\
      \ in a map, then loop through the original keys to return results in the expected\
      \ order.\r\n\r\nThere's also some try/catch logic in here since `getEntityAccessBulk`\
      \ lives in the authz package and does not return a `ResultAsync` but we want\
      \ this dataloader to return a `Promise<Result>`."
    path: graph/src/internal/loaders/transactionAccess.ts
    created_at: '2025-10-20T21:49:17Z'
