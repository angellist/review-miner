    created_at: '2026-03-24T05:22:45Z'
  replies:
  - id: 2979080727
    author: kwliang1
    body: '> If we return any non-200 status code, mailproxy will not mark the individual

      >  * events as processed, and will eventually call us again with the same events

      >  * (the next webhook payload may include ADDITIONAL events as well).


      Oh. then why retry at all?'
    created_at: '2026-03-24T05:24:13Z'
  - id: 2979369682
    author: ctotheameron
    body: "These are events that get sent from mailproxy to us - mailproxy has a durable\
      \ webhook config that keeps a queue of unprocessed events. It will call us with\
      \ a max of 20 events per call.\r\n\r\nOur retries are happening outside of the\
      \ request/response lifecycle with mailproxy so once we \"ack\" the receipt of\
      \ the message to mp, its up to us to make sure we take it across the line (hence\
      \ the retries).\r\n\r\nThese values are relatively arbitrary (we can tweak them\
      \ as needed)"
    created_at: '2026-03-24T06:35:43Z'
  pr_author: ctotheameron
