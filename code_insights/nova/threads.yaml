  - id: 2281586504
    author: ctotheameron
    body: "Went on a side-quest reading through https://github.com/vega/ts-json-schema-generator\
      \ (issues, PRs + a bit of code).\r\n\r\nI believe this is a gap in functionality\
      \ when deriving types from `import * as Foo from './bar'`\r\n\r\nWe dynamically\
      \ define our icon types like:\r\n\r\n```ts\r\nimport * as icons from '../icons/generated';\r\
      \ntype StripIconPrefix<S extends string> = S extends `Icon${infer U}` ? U :\
      \ never;\r\ntype IconNames = keyof typeof icons;\r\nexport type NamedIcon =\
      \ Uncapitalize<StripIconPrefix<IconNames>>;\r\nexport declare const iconNames:\
      \ readonly NamedIcon[];\r\n```\r\n\r\nWhich is a pretty gnarly typedef so I'm\
      \ not surprised that static analysis is not functioning properly in this library"
    created_at: '2025-08-18T07:54:31Z'
  - id: 2281593553
    author: ctotheameron
    body: "https://github.com/vega/ts-json-schema-generator/issues/469\r\n\r\nThis\
      \ seems like it might be the culprit"
