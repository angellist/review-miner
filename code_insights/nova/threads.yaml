    body: 'i think we should add a clean up mechanism similar to useEffect '
    path: app/lib/hooks/useOnce.ts
    created_at: '2026-02-21T00:07:07Z'
  replies:
  - id: 2835581596
    author: cameronnapoli
    body: Clean up for what exactly?
    created_at: '2026-02-21T00:26:09Z'
  - id: 2835626220
    author: ywplee-al
    body: "so that it doesn't create orphan listener\n\n```\nexport const useOnce\
      \ = (callback: Callback, trigger: boolean): void => {\n    const run = useRef(false);\n\
      \    const callbackRef = useRef(callback);\n\n    useEffect(() => {\n      callbackRef.current\
      \ = callback;\n    }, [callback]);\n\n    useEffect(() => {\n      if (!trigger)\
      \ return;\n      if (run.current) return;\n      run.current = true;\n\n   \
      \   const cleanup = callbackRef.current();\n\n      return () => {\n       \
      \ cleanup?.();\n        run.current = false;\n      };\n    }, [trigger]);\n\
      \  };\n```"
    created_at: '2026-02-21T01:01:10Z'
