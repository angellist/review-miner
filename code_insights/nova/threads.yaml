  root:
    id: 2279442806
    author: kevinmmarlow
    body: "Why don't we just precompute the regions to? Is it because we prefer the\
      \ lazy load here?\r\n\r\n```\r\ntype CountryShortCode = (typeof COUNTRY_REGION)[number]['countryShortCode'];\r\
      \ntype RegionShortCode = NonNullable<(typeof COUNTRY_REGION)[number]['regions'][number]['shortCode']>;\r\
      \n\r\nexport const COUNTRIES = COUNTRY_REGION.reduce<Record<CountryShortCode,\
      \ string>>(\r\n  // biome-ignore lint/performance/noAccumulatingSpread: ignored\
      \ using `--suppress`\r\n  (acc, el) => ({ ...acc, [el.countryShortCode]: el.countryName\
      \ }),\r\n  {},\r\n);\r\n\r\n// Just precompute it, since we are already pre-computing\
      \ the countries.\r\nconst REGIONS_BY_COUNTRY = COUNTRY_REGION.reduce<\r\n  Record<CountryShortCode,\
      \ Record<RegionShortCode | 'notApplicable', string>>\r\n>(\r\n  (acc, country)\
      \ => {\r\n    const regions = country.regions.reduce<Record<string, string>>((regionAcc,\
      \ region) => {\r\n      if (region.shortCode) {\r\n        regionAcc[region.shortCode]\
      \ = region.name;\r\n      }\r\n      return regionAcc;\r\n    }, {});\r\n\r\n\
      \    // If no regions, use \"Not Applicable\"\r\n    acc[country.countryShortCode]\
      \ = Object.keys(regions).length > 0 ? regions : { notApplicable: 'Not Applicable'\
      \ };\r\n\r\n    return acc;\r\n  },\r\n  {} as Record<CountryShortCode, Record<string,\
      \ string>>,\r\n);\r\n\r\nexport const regionsFromCountryCode = (\r\n  countryCode:\
      \ CountryShortCode,\r\n): Record<RegionShortCode | 'notApplicable', string>\
      \ => {\r\n  return REGIONS_BY_COUNTRY[countryCode] ?? { notApplicable: 'Not\
      \ Applicable' };\r\n};\r\n```"
    path: packages/datasets/country-region/src/index.ts
