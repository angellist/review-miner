    body: "I think `assertPresent` might be the wrong name here. I feel like \"presence\"\
      \ should map to something like `key in obj`, maybe at most like\r\n```typescript\r\
      \nkey in obj && typeof obj[key] !== \"undefined\"\r\n```\r\nI think this function\
      \ negatively flagging values like `false` or `\"\"` would make it very difficult\
      \ to use with a wide set of data (which it looks like is the goal of this generic\
      \ util). For example, you wouldn't be able to use this with a field that's actually\
      \ a boolean because it'll throw on an entirely valid value.\r\n\r\nTBH I'd probably\
      \ favor the in-service `assertEnvironmentVariable` we had before — different\
      \ services will have their own validation needs and it's the simplest implementation\
      \ possible — but if you want to express it in terms of library utils, I think\
      \ we should either:\r\n1. Rename the library util slightly to be more specific\
      \ in name/purpose (eg `assertTruthyField`)\r\n    - Basically, get around the\
      \ \"this won't work in all cases\" by narrowing the scope to exclude those\r\
      \n2. Remove the `isTruthy` check and just have `assertPresent` be a convenience\
      \ for `assertValue(key, { in: record })` and that's it"
