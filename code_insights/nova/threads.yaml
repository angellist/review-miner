      \ define the label text (i.e. is user-defined)\r\n* Use \"compact\" input style\
      \ in conjunction with \"top\" label style\r\n```suggestion\r\n          <Select\r\
      \n            label={label}\r\n```\r\n(This may evolve a bit with the form input\
      \ work you're doing).\r\n\r\nWhat that means for this:\r\nIf this label can\
      \ be user-defined, we should use `size='compact'` as well"
