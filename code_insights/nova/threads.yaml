    author: ctotheameron
    body: "I feel like there's a TS cargo cult around types vs interfaces. Interfaces\
      \ are ergonomic and semantically correct here since we are truly extending the\
      \ TransactionProcess type.\r\n\r\nI think doing it this way will help us not\
      \ get so crazy with `T & ({ foo: 'bar' } | { fizz: 'buzz' })` etc.\r\n\r\nReally\
      \ we should be defining interfaces + sub interfaces of the top-level model type,\
      \ not Type intersections/unions"
