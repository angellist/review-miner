  replies:
  - id: 2098482336
    author: stathis-alexander
    body: "It's not in the world of callbacks, which is what this kind of is. In callbacks,\
      \ you respond success because you received and handled the request, whether\
      \ or not that handling was successful. \r\n\r\nHere, we fire and forget the\
      \ handler with retries, specifically need to not hold the request open so that\
      \ venture can continue processing. The issue arises because we have some deeply\
      \ nested calls that are being made from inside transactions which are a bit\
      \ tricky to unwind on the venture side. \r\n\r\nThis whole arch sux, but it's\
      \ a stop gap while we have this syncing going on. Let me know if I can provide\
      \ more context."
