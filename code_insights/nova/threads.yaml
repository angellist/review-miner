    id: 1975914307
    author: edwinzhng
    body: "Hmm I think we may want to make this endpoint specific to directory/vehicle\
      \ entities and just check that they have access to the underlying vehicle/directory\
      \ entity. \r\n\r\nThe `canViewDataRooms` function checks org member roles so\
      \ that they don't have `noAccessDataRooms`, but this is specifically related\
      \ to the actual Data Room product rooms, not the ones associated with entities.\r\
      \n\r\nI would say we can just remove `subjectId` and `dataRoomId` here and change\
      \ it to be `directoryEntityId` or `vehicleEntityId` (I can add the vehicle logic\
      \ later), and then you can:\r\n1. Fetch the directory entity and make sure they\
      \ have access to it as an org member\r\n2. Use the directoryEntity.dataRoomId\
      \ to update permissions\r\n\r\nIn the case of vehicles, I will make a call to\
      \ update permissions for all linked directory entities later"
