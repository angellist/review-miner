    created_at: '2025-10-21T05:55:40Z'
  - id: 2449622501
    author: sf8193
    body: 'this pattern was just for model layer, tbh i''d prefer this pattern doesn''t
      proliferate quite yet as it was a more contentious one and forces us to think
      in two different paradigms while building '
    created_at: '2025-10-21T20:29:06Z'
  - id: 2450285715
    author: ctotheameron
    body: 'I''m a big fan of the railway oriented style that you can get with Result.


      For example I built out a net-new feature completely using results:


      https://github.com/angellist/nova/blob/master/graph/lib/organization/entity/invite/redeem/index.ts


      My personal take is that it makes sense to bubble the result patterns upwards
      starting at the data layer. I would not recommend injecting Results in the middle
      of the stack and have to convert back and forth between promises etc.


      However I do still think we gain a lot from the TaggedError types even if we
      don''t want to use Result, its just a bit clumsier to work with them if you''re
      throwing.'
    created_at: '2025-10-22T03:02:01Z'
  - id: 2450286993
    author: ctotheameron
    body: 'That being said I''m perfectly happy with people continuing to write non-result
      code (outside of data/*) if they don''t feel confident or comfortable.


      We are still exploring what works best'
    created_at: '2025-10-22T03:02:57Z'
