  root:
    id: 2047840599
    author: jogly
    body: philosophically, pushing graphql error types down breaks API layer boundaries,
      e.g. just bc vehicle not found doesnt necessarily mean the caller wants to return
      an API not found error. its acceptable to handle DB errors that bubble up to
      API without handling. that said, we barely have the idea of layers atm, and
      graphql errors are just errors with ready-to-use semantics. If this were renamed
      just "ModelNotFoundError" , it would be fine. This is just a long-winded way
      of saying this is good for now, and we should start the discussion of adding
      application error types that we can use instead of GQL's.
