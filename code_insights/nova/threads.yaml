  root:
    id: 2963389292
    author: harshaneel
    body: '`LinkFields` is the common subset of fields needed by `upsertAccessLink`
      and its helpers. Both Venture SDK''s `DealAccessLink` (from the bulk sync path)
      and our `DealAccessLinkData` (from the prefetched path) are structurally compatible
      with it. We can''t use `DealAccessLinkData` everywhere because it requires `campaignCurrencyIso`,
      which the Venture SDK type doesn''t have, so the bulk path in `syncDealAccessLinks`
      wouldn''t type-check. `DealAccessLinkData` extends `LinkFields` with that one
      extra field.

      '
