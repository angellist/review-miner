- thread_id: 2608755331
  pr: 6050
  root:
    id: 2608755331
    author: kwliang1
    body: this can also be described as `RECONCILED`, yeah?   Not suggesting a change,
      just making sure I have the right mapping in my mind.
    path: packages/prisma/models/banking.prisma
    created_at: '2025-12-11T00:54:10Z'
  replies:
  - id: 2609378181
    author: kevinmmarlow
    body: "No, TRANSFER_COMPLETED is about transfer state. MANUAL_RECONCILIATION is\
      \ about the matching decision. They correlate for Nova-initiated flows but aren't\
      \ the same concept.\r\n\r\nI opted not to track auto reconciliation since that\
      \ feels redundant. Transfers complete during auto reconciliation, but transfers\
      \ may complete BEFORE manual reconciliation.\r\n\r\nHere's what I am thinking\
      \ for the event definitions:\r\n- TRANSFER_INITIATED = PaymentTransfer.initiatedAt\
      \ set (Treasury accepted)\r\n- TRANSFER_COMPLETED = PaymentTransfer.completedAt\
      \ set (money moved)\r\n- TRANSFER_FAILED = PaymentTransfer.failedAt set (includes\
      \ approval rejections)\r\n- TRANSFER_RETURNED = was completed, now failed (ACH/wire\
      \ return)\r\n\r\nThese logs will show changes over time, which is especially\
      \ helpful if we set and unset these timestamps multiple times."
    created_at: '2025-12-11T06:45:07Z'
  pr_author: kevinmmarlow
  merged_at: '2025-12-16T05:10:46Z'
  repo: nova
  has_suggestion_block: false
