  root:
    id: 2025913095
    author: kevinmmarlow
    body: "Will there ever be multiple section query params? If not, could we simplify\
      \ this a lot?\r\n\r\nUntested, but we could just return early if the query param\
      \ is not a string, yeah?\r\n```\r\nexport const useEditSectionQueryParamCallback\
      \ = (\r\n  sections: DataRoomSection[] | null,\r\n) => {\r\n  const enqueue\
      \ = useEnqueueEditSection()\r\n  const searchParams = useSearchParams()\r\n\
      \  const sectionId = searchParams.get(\"editSection\")\r\n\r\n  useEffect(()\
      \ => {\r\n    if (!isString(sectionId)) return\r\n\r\n    const section = sections?.find((s)\
      \ => s.internalKey === sectionId)\r\n    if (!section) return\r\n\r\n    if\
      \ (!document) return\r\n    const sectionElem = document.getElementById(getSectionDomId(section.id))\r\
      \n    if (!sectionElem) return\r\n\r\n    // Scroll the section opened into\
      \ view behind the modal\r\n    setTimeout(() => sectionElem.scrollIntoView({\
      \ behavior: \"instant\" }), 0)\r\n\r\n    // Bubble up opening the modal/blade\r\
      \n    enqueue(section.id)\r\n\r\n    // Do this on mount\r\n    // eslint-disable-next-line\
      \ react-hooks/exhaustive-deps\r\n  }, [])\r\n}\r\n```"
    path: app/src/components/views/DataRoomManager/Shared/ConfigureDataRoom/components/Contents/hooks.tsx
    created_at: '2025-04-03T02:26:36Z'
