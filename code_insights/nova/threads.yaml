    created_at: '2026-01-07T18:42:13Z'
  - id: 2670589594
    author: edwinzhng
    body: "Chatted offline, directory entity is a GP-side model and exposing that\
      \ to the client would give the LP permissions to query all of the relations,\
      \ which is a big security hole, so we can ignore my comment\r\n\r\nWould be\
      \ better to just have a `RecipientDirectoryEntity` that has `connectedEntity`\
      \ as a sub-model relation"
    created_at: '2026-01-08T01:44:07Z'
