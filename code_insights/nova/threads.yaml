- thread_id: 2088344200
  pr: 3489
  root:
    id: 2088344200
    author: campriceaustin
    body: "consider: i wonder if chunking this into batches of 20 and using [the array-style\
      \ transaction](https://www.prisma.io/docs/orm/prisma-client/queries/transactions#sequential-prisma-client-operations)\
      \ call is more efficient? \r\n\r\ni'm pretty sure what you have above will pop\
      \ a client from the pool each time (capped due to `limit` and the pool size\
      \ i think, but still taxes the db), whereas the transaction call only uses one.\
      \ \r\n\r\ntransaction will execute the 20 in sequence though, which is slightly\
      \ less efficient than parallel, but not much because it's not performing a round\
      \ trip each time.\r\n\r\nlow conviction, this is definitely an improvement over\
      \ what you have and i know you're pressed for time."
    path: graph/lib/dataroom/sync/member/create.ts
    created_at: '2025-05-14T08:12:46Z'
  replies:
  - id: 2088529939
    author: kevinmmarlow
    body: "I tend to agree with @campriceaustin here. We have [a batch updater on\
      \ Venture](https://github.com/angellist/venture/blob/9ba60c45c543d1699b7f8e2d21011b7762b9d038/.pryrc#L823)\
      \ for a very similar purpose, so batching is likely the way to go. We also know\
      \ that interactive transactions are less performant than their sequential counterparts,\
      \ per @campriceaustin's [testing](https://angellist.slack.com/archives/C05BVD3R52P/p1725243864461919).\r\
      \n\r\nI'm wondering if using the array-style transaction call would solve our\
      \ problem here"
    created_at: '2025-05-14T09:44:16Z'
  - id: 2089396851
    author: kevliu
    body: I will fast follow with this, thanks for the advice @campriceaustin and
      @kevinmmarlow !
    created_at: '2025-05-14T17:16:32Z'
