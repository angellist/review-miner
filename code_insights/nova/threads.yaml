    author: Copilot
    body: "`new Date(element.value)` is parsing a non-ISO `MM-DD-YYYY` string, which\
      \ is implementation-dependent and can become flaky across runtimes/timezones.\
      \ Parse `element.value` explicitly (split into month/day/year and construct\
      \ the date) or use the same formatting logic as the app (dayjs.utc + `MMM D,\
      \ YYYY`) to generate the expected string deterministically.\n```suggestion\n\
      \        const [monthStr, dayStr, yearStr] = String(element.value).split('-');\n\
      \        const month = Number(monthStr);\n        const day = Number(dayStr);\n\
      \        const year = Number(yearStr);\n        const date = new Date(year,\
      \ month - 1, day);\n```"
    path: nova-e2e/tests/pages/vulcan/reviewVulcanVerifier.ts
    created_at: '2026-03-26T05:08:06Z'
