  root:
    id: 2034404055
    author: kevinmmarlow
    body: Dumb question, what prevents these terms from being constructed on the backend
      and exposed as a more generic term object to the frontend?
    path: graph/src/internal/models/ventureInvestmentDetails.ts
    created_at: '2025-04-09T04:06:16Z'
  replies:
  - id: 2034424145
    author: edance
    body: That's an interesting idea. This model is a carbon copy of `Presenter::InvestApp::InvestmentOpportunity`
      in venture. I thought it would be easiest to start with the logic in the DetailsTable
      component for SPVs so that it could map one to one (although this didn't end
      up very easy 😅) What are you thinking?
    created_at: '2025-04-09T04:35:16Z'
  - id: 2034495377
    author: kevinmmarlow
    body: "This might be a moot point, but we've identified that the Venture way was\
      \ not ideal. For every term, we had to store a specific named field in the database\
      \ and then exposed these individual fields just to construct a list of terms\
      \ on the frontend.\r\n\r\nAs part of transact consolidation, we want to make\
      \ this more scalable and flexible by moving the terms into a more generic key\
      \ value store, either in the Vulcan template JSON or elsewhere (to be decided).\r\
      \n\r\nGiven that this is the future we want and we have Venture as an example\
      \ of a rather painful path, it seems like a good idea to make the terms construction\
      \ happen on the backend and just expose the generic \"terms\" to the frontend\
      \ so it can show a list.\r\n\r\nMost of the terms seem to simply be a `title`,\
      \ `description`, and a markdown-esque tooltip, but you have more context than\
      \ I do. We could construct and expose as more simple GraphQL object."
    created_at: '2025-04-09T05:51:36Z'
  pr_author: edance
  merged_at: '2025-04-10T20:22:01Z'
  repo: nova
  has_suggestion_block: false
