- thread_id: 2231851675
  pr: 4501
  root:
    id: 2231851675
    author: stathis-alexander
    body: 'Is it possible that the consumer might change its callback and want this
      to get triggered on that change? Feels unlikely, but just asking for the sake
      of completeness. '
    path: app/src/components/views/Members/InviteEditMemberBlade/FormSections/hooks.ts
    created_at: '2025-07-25T19:20:29Z'
  replies:
  - id: 2231946051
    author: JaredWF
    body: "It is possible, but I'm explicitly ignoring that case for this. The tradeoff\
      \ is that if we want to support consumers changing their callback function,\
      \ then each consumer would have to memoize its callback or risk potential infinite\
      \ rerender loops. Given the use cases I had in front of me, this made for the\
      \ cleanest API.\r\n\r\nHonestly though, I think the way you're _supposed_ to\
      \ do stuff like this is in the `onChange` handler for the admin checkbox, update\
      \ all the fields that should depend on it. I have this weird inversion of that\
      \ because we don't know which form sections are going to be included in any\
      \ given form but we do know that every form will have `isAdmin`."
    created_at: '2025-07-25T20:23:02Z'
  pr_author: JaredWF
  merged_at: '2025-07-25T20:26:35Z'
  repo: nova
  has_suggestion_block: false
- thread_id: 2231861727
  pr: 4501
  root:
    id: 2231861727
    author: stathis-alexander
    body: "Just to make sure I understand the logic here - We're trying to make sure\
      \ that if `isAdmin` is toggled on, then the other corresponding permissions\
      \ also end up checked. `isAdmin` then becomes basically a synthetic permission\
      \ that equates to all permissions being enabled, without actually having to\
      \ track it in the DB as a first class citizen. Is that right?\r\n\r\nIt feels\
      \ like we also need something going the other way - if the user unchecks any\
      \ of these permissions, we should uncheck the `isAdmin` box accordingly, but\
      \ I don't see logic anywhere that seems to do that?"
    path: app/src/components/views/Members/InviteEditMemberBlade/FormSections/MeridianEntityAccess.tsx
    created_at: '2025-07-25T19:25:42Z'
  replies:
  - id: 2231949801
    author: JaredWF
    body: '`isAdmin` is actually a permission under the hood that grants users access
      to manage team members, but we also want it to serve as this this shortcut to
      enable the rest of the permissions as well. The current designs state that we
      should leave everything checked when unchecking the admin permission. It is
      a little confusing though. I think design is going to look at this again next
      week, and I''m kind of hoping to steer them away from this ambiguous "admin"
      idea to a clearer "manage team members" verbiage.'
    created_at: '2025-07-25T20:25:53Z'
  pr_author: JaredWF
  merged_at: '2025-07-25T20:26:35Z'
  repo: nova
  has_suggestion_block: false
