- thread_id: 2893175393
  pr: 7132
  root:
    id: 2893175393
    author: ahlec
    body: "One thing we could do here is look at adding this as a custom assertion.\
      \ Since all of this function is just in service of checking the data, we could\
      \ create something like this instead:\n```typescript\nawait expect(previewModal.download()).not.toDownloadEmptyFile();\n\
      ```\n\nI think you could do that by adding something like this:\n```typescript\n\
      async toDownloadEmptyFile(downloadPromise: Promise<Download>): Promise<MatcherReturnType>\
      \ {\n  const ASSERTION_NAME = 'toDownloadValidFile';\n\n  const testInfo = test.info();\n\
      \  const download = await downloadPromise;\n  const downloadFilename = testInfo.outputPath(download.suggestedFilename());\n\
      \  await download.saveAs(downloadFilename);\n\n  const fileStats = await stat(downloadFilename);\n\
      \  await unlink(downloadFilename);\n\n  let passes = fileStats.size === 0;\n\
      \  if (this.isNot) {\n    passes = !passes;\n  }\n\n  return {\n    message:\
      \ () =>\n      this.utils.matcherHint(ASSERTION_NAME, 'downloadPromise', this.isNot\
      \ ? '> 0B' : '0B', {\n        isNot: this.isNot,\n        receivedColor: ()\
      \ => 'downloadPromise',\n      }),\n    pass: passes,\n    name: ASSERTION_NAME,\n\
      \    expected: this.isNot ? '> 0B' : '0B',\n    actual: this.isNot ? '0B' :\
      \ '> 0B',\n  };\n},\n```\nto the `mergeExpects` in **nova-e2e/tests/fixtures/nova/index.ts**\
      \ (or you could create your own fixture like **tests/fixtures/core/downloads.ts**\
      \ that just has an **expect** — just copy the stuff from **nova-e2e/tests/fixtures/core/docusign.ts**\
