- thread_id: 2179192763
  pr: 4064
  root:
    id: 2179192763
    author: ctotheameron
    body: "It's not clear to me (as a person without context) why we're hitting the\
      \ db 2x2 times (search + count).\r\n\r\nMy assumption is that the `refreshRemoteAttributes`\
      \ call here is the bottleneck and we're already awaiting on the two prisma calls\
      \ before we even try to refresh the remote attributes.\r\n\r\nMy assumption\
      \ is that this extra if check is attempting to reduce additional db calls.\r\
      \n\r\nSuggestion - what if we just always made the search/count call AFTER the\
      \ refresh call and just kill the first two.\r\n\r\nWe could also introduce concurrency\
      \ here, but that can be a footgun with prisma..."
    path: graph/lib/dataroom/attributes/search.ts
    created_at: '2025-07-02T06:05:02Z'
  replies:
  - id: 2180573267
    author: jogly
    body: "Great question, I should (and will) document this function with code comments\
      \ because it is a little unorthodox. First, the count query can be moved after\
      \ the change detection entirely, that was a miss by me. So what we have left\
      \ is a DB search query, a network call, and a final DB search query. The network\
      \ call **uses the results of the search query**. For any rooms backed by venture,\
      \ we call venture to find the latest values. If all the `sortValues` are the\
      \ same (cache hit), then we know the original search query is accurate and we\
      \ can move on to return the results. **However**, if the refresh returns different\
      \ `sortValues` than the ones we loaded (cache miss), then we re-run the search\
      \ query in case the new values are out of range of the filters provided. This\
      \ is naive, because the second search could return results using stale values.\
      \ The optimal solution would be running the search and refresh in a loop until\
      \ the search results are stable.\r\n\r\nI don't love this, and I feel its optimizing\
      \ for a case that could be so rare it doesn't matter. I'll actually revert the\
      \ second search entirely and just log if we return stale results, and if its\
      \ bad we can do something more sophisticated."
    created_at: '2025-07-02T17:06:57Z'
  - id: 2181446961
    author: ctotheameron
    body: Ah I missed the result being used in the refresh call, makes sense
    created_at: '2025-07-03T02:41:31Z'
  pr_author: jogly
  merged_at: '2025-07-02T23:06:39Z'
  repo: nova
