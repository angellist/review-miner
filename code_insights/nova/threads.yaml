  root:
    id: 2045424521
    author: edwinzhng
    body: What happens when this function errors? Do we need to update the entity
      upload itself to be in an error state or is that handled elsewhere?
    path: worker/src/queues/filePostProcessing/activities/processDirectoryEntityBulkEntityUpload.ts
    created_at: '2025-04-15T20:29:44Z'
  replies:
  - id: 2045506256
    author: jogly
    body: "Throwing an error here bubbles up to the file post-processing handler and\
      \ if after a # of retries, it still fails, the error is recorded on the post-processing\
      \ step automatically. The download manager on the client is polling this step\
      \ for status, finds this error, toasts the user, and the upload state is restored\
      \ to try again. \n\nIf we find common failure states, we can improve the error\
      \ handling here to present better information to the user in the toast on how\
      \ to rectify.\n\nGreat question."
    created_at: '2025-04-15T21:05:47Z'
