    created_at: '2025-04-22T20:55:13Z'
  - id: 2054864288
    author: ahlec
    body: I'd gone with `process-compose` at first because it was slightly easier
      to get set up and it's how `just dev up` works. But `docker-compose` being much
      closer to what we'll need to do in CI is a compelling point, let me see what
      switching over to that would look like.
    created_at: '2025-04-22T20:59:44Z'
  - id: 2056493091
    author: ahlec
    body: "I looked into this yesterday afternoon, and I think right now sticking\
      \ with `process-compose` looked to be the best option. Specifically, the developer\
      \ experience of using it for writing/fixing tests is better. I also don’t think\
      \ that switching **app/** and **graph/** to be in Docker containers here will\
      \ speed up/make CI development in Milestone 3 faster. I will, however, investigate\
      \ moving the Venture Mock into a Docker container.\r\n\r\n### Longer thoughts:\r\
      \nI looked at integrating the existing `Dockerfile`s for both **app/** and **graph/**.\
      \ These are what Buildkite currently uses. I ran into a number of issues though:\r\
      \n* Our **.dockerignore** needs to be updated with a lot more, since developer\
      \ machines have a lot of build artifacts\r\n* We'd need to privilege running\
      \ the tests since we need to fetch from another [private Git repository](https://github.com/angellist/nova/blob/5ca6f4978e40c5d535b8f078d815f131e5fd58f2/app/Dockerfile#L60)\r\
      \n* The Dockerfiles make and run production builds, rather than development\
      \ ones, which will take longer — they'll also require us to rebuild all of it\
      \ any time we update source code while writing or fixing tests\r\n\r\nMy goal\
      \ with `just e2e run` is to target the test writing/updating/fixing development\
      \ process. I expect most people to very sporadically/never run it locally, but\
      \ when they do, for it to be a tight loop of run → fix code → run → fix code\
      \ → etc. Getting just **app/** built and run took ~4min (~2min of which was\
      \ the final Next.js codegen/lint/build). In contrast, the approach on this branch\
      \ brings everything up and starts the test in ~30s.\r\n\r\nI looked at forking\
      \ the Dockerfiles and tweaking them to fit, but then we'd have two nearly identical\
      \ copies we'd need to maintain.\r\n\r\nWithin Buildkite, by the time we ever\
      \ get to running our E2E tests, we'll have already built both `Dockerfile`s.\
      \ We're also targeting a different use case — we don't need to watch files/rebuild,\
      \ we're not in the developer loop — so Next.js `build` and `start` make sense\
      \ here where `dev` makes more sense for local development. In the case of **app/**\
      \ and **graph/**, the work I do locally would _just_ be for local development\
      \ since we already have our CI solution, and this local approach looked less\
      \ optimal compared to what's in this PR. It's worth noting that I took the approach\
      \ in this PR from what `just dev up` does."
    created_at: '2025-04-23T16:47:25Z'
