- thread_id: 2778074007
  pr: 6780
  root:
    id: 2778074007
    author: edwinzhng
    body: 'I think we probably need to:

      1. Take name ordering into account

      2. Use common suffixes as hard blocks on similarity (Mr, Dr, Jr, Sr, III., etc.)

      3. For companies, maybe ignore common terms like "The" "And" "Investment", "Trading"
      and strip legal suffixes (LLC, Ltd, Corp, GmbH, S.A., Inc, Holdings, etc.)?

      4. Put lower weight on middle initials/names for individuals?


      Feels like this function should return a matching score based on the above criteria
      and we just have a best effort threshold. (which would handle the Taylor R.
      Mannett vs Taylor Mannett case)


      So we''d have like a `nameTokenizer` function that potentially returns a list
      of primary name tokens, middle name tokens, and suffix tokens, and then we assign
      weight to them -> compile a total score

      '
    path: packages/core/src/strings.ts
    created_at: '2026-02-07T21:01:15Z'
  replies:
  - id: 2778075706
    author: edwinzhng
    body: 'And yeah Jaro Winkler similarity w/ fuzzy matching doesn''t seem like the
      best use case here since false positive matches are really bad '
    created_at: '2026-02-07T21:02:51Z'
