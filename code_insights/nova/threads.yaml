    body: I also think it makes more sense to do this in parallel with the `createServer(app).list(PORT)`
      rather than inside of it. I say that not really for like speed reasons (serial
      vs. parallel), but because conceptually this makes it look like the Prophet
      workers need the API server to be running/are dependent on it rather than being
      a separate independent server.
