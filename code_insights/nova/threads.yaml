    id: 2389305120
    author: ahlec
    body: This appears to be one of the major breaking changes in [pnpm v10](https://github.com/orgs/pnpm/discussions/8945)
      — **package.json** scripts for dependencies will no longer automatically run,
      and you must first add those packages to an allowlist. This most notably will
      impact any package that builds some binary on install (eg, npm packages written
      in Rust, etc).
    path: package.json
