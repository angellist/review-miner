- thread_id: 2789774524
  pr: 6808
  root:
    id: 2789774524
    author: ahlec
    body: '```suggestion

      export APP_URL=$(. ./app.env && echo $BASE_URL)

      ```

      I''ve also tried to keep definitions synchronized within the **.env** files.
      Within **process-compose.json**, each service will only ever import its own
      **.env** file (eg, **graph** doesn''t `. ./app.env && . ./graph.env`). When
      we need to share variables between two files, we''ll have the file for that
      service import the other file and then re-export the value. This is for minimal
      duplication but also minimally exposing environment variables to each service
      (not for security reasons, but just for making it clear what we do/don''t have
      access to).'
    path: nova-e2e/emulator.env
    created_at: '2026-02-10T19:15:57Z'
