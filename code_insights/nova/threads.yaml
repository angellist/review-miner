- thread_id: 2715760747
  pr: 6537
  root:
    id: 2715760747
    author: kevinmmarlow
    body: How does this know the dupes to skip?
    path: graph/src/data/directory/personToEntityLink.ts
    created_at: '2026-01-22T08:06:38Z'
  replies:
  - id: 2715772330
    author: kwliang1
    body: "if our application logic passes a dup, prisma uses the composite unique\
      \ constraint (`directoryPersonId` + `directoryEntityId`)\n\nClaude explanation:\n\
      ```\nIt uses the table's unique constraint. From the schema (line 139):    \
      \                                                                          \
      \                                                                          \
      \      \n                                                                  \
      \                                                                          \
      \                                                                          \
      \            \n  @@id([directoryPersonId, directoryEntityId])              \
      \                                                                          \
      \                                                                          \
      \                  \n                                                      \
      \                                                                          \
      \                                                                          \
      \                        \n  This composite primary key means (directoryPersonId,\
      \ directoryEntityId) must be unique.                                       \
      \                                                                          \
      \                        \n                                                \
      \                                                                          \
      \                                                                          \
      \                              \n  When skipDuplicates: true is set, Prisma\
      \ generates:                                                               \
      \                                                                          \
      \                                    \n  INSERT INTO ... ON CONFLICT DO NOTHING\
      \                                                                          \
      \                                                                          \
      \                                      \n                                  \
      \                                                                          \
      \                                                                          \
      \                                            \n  PostgreSQL skips any rows that\
      \ would violate the unique constraint. So if a person-to-entity link already\
      \ exists, it's silently skipped rather than throwing an error.             \
      \                                             \n                           \
      \                                                                          \
      \                                                                          \
      \                                                   \n  This matches the behavior\
      \ of the original upsert() which did:                                      \
      \                                                                          \
      \                                                   \n  prisma.directoryPersonToDirectoryEntityLink.upsert({\
      \                                                                          \
      \                                                                          \
      \                        \n    where: { directoryPersonId_directoryEntityId:\
      \ { directoryPersonId, directoryEntityId } },                              \
      \                                                                          \
      \                             \n    create: { directoryPersonId, directoryEntityId\
      \ },                                                                       \
      \                                                                          \
      \                            \n    update: {},  // no-op if exists         \
      \                                                                          \
      \                                                                          \
      \                                  \n  })  \n```"
    created_at: '2026-01-22T08:10:44Z'
  pr_author: kwliang1
  merged_at: '2026-01-22T08:11:21Z'
  repo: nova
  has_suggestion_block: false
