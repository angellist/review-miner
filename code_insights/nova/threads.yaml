- thread_id: 2818971404
  pr: 6857
  root:
    id: 2818971404
    author: ahlec
    body: 'Strong opinion held weakly/flexibly, but I wouldn''t add this function.
      It''s a shortcut function but it''s very specific to one specific usage. It
      also bakes overview-tab specific functionality into this class and that was
      something I struggled to pull out → put into `tabs`. At the risk of "oh jeez
      slippery slope" arguments, I could see this starting a pattern where we''d later
      add `nthTimelineItem` and `downloadNthFile` etc. All of our util functions to
      some degree gloss over the specific things they''re clicking (eg `UnifiedNav.switchToDashboard`
      does a bunch of actions) but something about `nthProcessCard` changing which
      tab is selected feels "too" hidden.


      I think this function doesn''t save us _that_ more than 1-2 lines of code, and
      by not including it it allows us to keep all of our classes cleaner and our
      tests slightly more readable.'
