- thread_id: 2479133821
  pr: 5495
  root:
    id: 2479133821
    author: ahlec
    body: "There's a lot of infrastructural stuff in this function — code related\
      \ to `shutdown()` and making sure it's only run once, and the server shuts down,\
      \ etc. That's fine (to be expected), but it means that it can be a little daunting\
      \ to modify if we wanted to add another operation on shutdown.\r\n\r\nIn this\
      \ case, my personal approach would be allowing people to add new shutdown cleanup\
      \ functionality without needing to touch this function. That way, they don't\
      \ mess up the behavior.\r\n\r\nOne way I'd look at doing that is something like:\r\
      \n```typescript\r\ntype CleanupFn = () => void | Promise<void>;\r\n\r\nconst\
      \ setupNgrok = async (): Promise<CleanupFn> => {\r\n  if (process.env.NODE_ENV\
      \ === 'production') {\r\n    return noop;\r\n  }\r\n\r\n  // ...\r\n  const\
      \ setup ={ listener, sendGridWebhookId, postmarkWebhookId };\r\n  return ()\
      \ => cleanupNgrok(setup);\r\n}\r\n\r\nconst run = async () => {\r\n  const cleanup:\
      \ CleanupFn[] = [];\r\n  cleanup.push(await setupNgrok());\r\n\r\n  // ...\r\
      \n\r\n  const shutdown = async (signal: string) => {\r\n    // ...\r\n    await\
      \ Promise.all(cleanup.map((fn) => fn()));\r\n    logger.info('✓ Cleanup complete\\\
      n');\r\n  };\r\n}\r\n```\r\nThis offers a few benefits here:\r\n- Colocates\
      \ startup/shutdown\r\n    - Similar to the Go `defer` statement\r\n- Developers\
      \ don't need to touch the infrastructural `shutdown` code\r\n- Harder to forget\
      \ to clean something up/have bugs where you don't clean up"
    path: mailproxy/services/api/src/index.ts
    created_at: '2025-10-30T18:33:03Z'
  replies:
  - id: 2479136128
    author: ahlec
    body: In moving the ngrok stuff to its own file, it would also allow us to reduce
      the public API of that file — we don't need to `export closeNgrok` anymore,
      because that's curried/returned for us from `setupNgrok`.
    created_at: '2025-10-30T18:33:38Z'
  pr_author: anthonylobko
