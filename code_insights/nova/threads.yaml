    body: 'This is a general purpose "render markdown in ADAPT styles" component.
      If you look at the `Wrapper` component definition at the bottom of the file,
      you''ll see that we''re mapping ADAPT styles to the html elements that `react-markdown`
      outputs (e.g. `strong`, `h1`, etc).


