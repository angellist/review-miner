  - id: 2169204676
    author: stathis-alexander
    body: "Generally my take is that sharing queries across components is an anti-pattern.\
      \ If these components drift in the future for any reason, we'll either need\
      \ to split or modify the data shape for one and force the other to use the same\
      \ shape, whether it needs it or likes it or whatever. Looking at what's actually\
      \ in here, it's not clear to me what's actually shared? \r\n\r\nI would either:\r\
      \n1. break the query and mutation up into their own files, named after their\
      \ hooks or whatever they export\r\n2. or just colocate the queries / mutations\
      \ in the component file that uses them directly. "
    created_at: '2025-06-26T14:24:51Z'
