  root:
    id: 2719159628
    author: kwliang1
    body: "I've always wanted to do some version of this anyways.   I did not have\
      \ this case in mind, but it felt like a lot of code was duplicated.\n\nIn the\
      \ context of this bug, this payment initiate actually created the `PaymentTransfer`\
      \ + `Transfer` without checking the banking permissions.   Why? Because it's\
      \ original use case was for the cron, which is a \"system\" level user without\
      \ perms.   \n\nThis should be secure because we confirm that the user accessing\
      \ this service is in fact the recipient of this payment, and so semantically\
      \ we are saying \"This user has permission to approve this payment's transfer(s)\
      \ if the the sender org has enabled auto-approve\".\n\nThis actually makes sense\
      \ from the GP dashboard sense as well.   The creator already enabled auto-approve,\
      \ we should show that it was approved in the UI by them (implicitly)."
    path: graph/src/services/distribution/payments/confirmRecipientDistributionPayment/index.ts
    created_at: '2026-01-23T00:37:19Z'
  replies: []
