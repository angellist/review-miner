    author: ahlec
    body: "```suggestion\n  await Promise.all([\n    ipseityWorker.start(),\n    treasuryWorker.start()\n\
      \  ]);\n```\nAs in: doing them in parallel, and also not returning anything.\
      \ Since we aren't using the workers in our code, I think it makes it easier\
      \ to reason about who has access to the variables."
    path: nova-e2e/services/emulator/src/prophet/index.ts
