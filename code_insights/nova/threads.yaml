  - id: 2125148555
    author: campriceaustin
    body: "Yeah something is wrong here. This shouldn't be necessary. We also shouldn't\
      \ need `const [tags, setTags] = useState<string[]>([])` -- we should be able\
      \ to read it by using:\r\n\r\n```\r\nconst { watch } = useFormContext<FormValues>()\r\
      \nconst tags = watch('tags')\r\n```\r\n\r\nI think you want to add a `FormValues`\
      \ type and use it whenever you define forms (like `<Form<FormValues> …>`), and\
      \ make sure you're setting `defaultValues` and a `resolver` for validation."
    created_at: '2025-06-04T00:03:36Z'
  - id: 2125150348
    author: stathis-alexander
    body: 'I''ve run into problems before where I was using the `useForm` hook, but
      not actually passing the returned object to the `Form` component through the
      `form` prop. Didn''t look closely, but that could cause the component to not
      update the form correctly. '
    created_at: '2025-06-04T00:05:52Z'
  - id: 2126685215
    author: anthonylobko
    body: 'The tags is actually solving for a different issue: on creation, it seems
      like creating more than one entry w/ multiple & creation allowed on the combobox
      results in the box wiping itself because it doesn''t "know" about the possible
      options that were created. Basically, i''m doing this so that it can retain
      state properly. It''s definitely a bug w/ the combobox (I assume that if you
      create multiple entries, they should *all* stick around and not just disappear
      if you create another), but this is a workaround. The consequence of this "let''s
      maintain the combobox''s new possibilities for it" results in the current issue:
      we also override it''s form state behavior. '
    created_at: '2025-06-04T14:01:25Z'
  - id: 2126689613
    author: anthonylobko
    body: "Basically, the issue here is that I want to be able to create an arbitrary\
      \ number of new tags when this happens, and if I let the combobox behave as\
      \ is, it'll always overwrite the created tag with the new created one (presumably\
      \ because the first one isn't in the list of options, because this resolves\
      \ that problem). \r\n\r\nIf you guys think that I should instead go fix the\
      \ combobox itself, totally valid take, I can do that instead of this workaround."
    created_at: '2025-06-04T14:03:21Z'
