      \ automatically update the normalized cache for the updated policy and refetch\
      \ shouldn't be needed. We can just call `onClose`\r\n\r\nFor delete, we could\
      \ refetch or also just delete the value from the normalized cache directly like\
      \ so, in which case we also don't need `onSuccess` and just do `onClose`:\r\n\
      ```\r\nuseMutation(DELETE_MUTATION, {\r\n    update: (cache) => {\r\n      cache.evict({\
      \ id: cache.identify({ __typename: 'TransferControlPolicy', id: distributionId\
      \ }) });\r\n      cache.gc();\r\n    },\r\n  });\r\n```"
