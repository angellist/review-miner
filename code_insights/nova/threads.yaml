  - id: 2024033874
    author: sf8193
    body: "update here after 9 long hours of reading scala documentation\r\n\r\nIO\
      \ and resource are monads\r\n\r\nlike if in javascript we had\r\n\r\nfunc a()\r\
      \nfunc b(func a)\r\nfunc c(func b, func a)\r\n\r\nthis is similar to doing\r\
      \n\r\n```\r\nfunc doAllOfIt() {\r\n c(b,a)\r\n}\r\n```\r\n\r\nwhere func c looks\
      \ like\r\n\r\n```\r\nfunc c(b,a) {\r\n b(a)\r\n}\r\n\r\nfunc b(a) {\r\n a()\r\
      \n}\r\n```\r\n\r\nso when we do \r\n\r\n```\r\nres <-prepareFilesToArchive()\r\
      \nfinal <-buildZippedPresignedUrl(res)\r\nfinal.use()\r\n```\r\n\r\nwhat's really\
      \ happening is when we call `.use()` it executes the thing inside final\r\n\r\
      \nwhich in our case has a for comprehension\r\n\r\n```\r\n      files <- fileBlobs.parSequence\r\
      \n```\r\n\r\nwhich executes, but fileBlobs is actually just \r\n\r\n`fileBlobs:\
      \ Seq[Resource[IO, FileBlob]],`\r\n\r\nso we then execute what was described\
      \ in prepareFileToArchive here (which is what fileBlobs is)"
    created_at: '2025-04-02T04:05:48Z'
  pr_author: sf8193
