- thread_id: 2624783609
  pr: 6106
  root:
    id: 2624783609
    author: philrhinehart
    body: 'Ok, so seems like this approach won''t work since `next.config.js` is evaluated
      at build time.


      We can go back to injecting `NEXT_PUBLIC_*` envs for this at build time, but
      that doesn''t allow for using separate values for staging and production (unless
      we run separate builds for each - I don''t think we should)


      Any other good options to consider here?


      I suspect this never mattered before since there was never a staging venture.'
    path: app/next.config.js
    created_at: '2025-12-16T21:23:22Z'
  replies:
  - id: 2624788906
    author: philrhinehart
    body: '@stathis-alexander @edwinzhng any ideas?'
    created_at: '2025-12-16T21:24:50Z'
  - id: 2624795963
    author: philrhinehart
    body: One idea would be to set the CSP headers in middleware, rather than hardcoding,
      then we can dynamically set based on the runtime config
    created_at: '2025-12-16T21:27:28Z'
  - id: 2624797232
    author: stathis-alexander
    body: 'Since it''s at build time, and we''re sharing the env for that, there''s
      no way to config it based on env. It has to be logic based in the next config?
      messy, but it unblocks us. '
    created_at: '2025-12-16T21:27:56Z'
  - id: 2624847386
    author: philrhinehart
    body: "Ok, took a swing at moving this to middleware ([a22f410](https://github.com/angellist/nova/pull/6106/commits/a22f410fc23dc038f4e48a841ffef1f336844b03))\
      \ and it seems to work as expected. This should avoid the dependence on build\
      \ time env vars. Any downsides to this approach?\r\n<img width=\"921\" height=\"\
      324\" alt=\"image\" src=\"https://github.com/user-attachments/assets/208eb41b-7d5d-40fc-afff-2a61602df560\"\
      \ />\r\n"
    created_at: '2025-12-16T21:44:59Z'
  - id: 2624873057
    author: stathis-alexander
    body: Nice! Didn't think about middleware!
    created_at: '2025-12-16T21:53:48Z'
  - id: 2625047453
    author: philrhinehart
    body: "Ugh this might not work either. Apparently next.js middleware runs in their\
      \ \"edge runtime\", which only has access to the env vars that are set at build\
      \ time...\r\n\r\nWorks locally but is failing E2E tests. Will try a few things...\r\
      \n\r\n\r\nUsing node js runtime for middleware would fix this but it's only\
      \ [supported](https://vercel.com/changelog/middleware-now-supports-node-js)\
      \ on next.js 15.2+ (we're on 14.2) \U0001F622 "
    created_at: '2025-12-16T23:10:46Z'
  - id: 2627317786
    author: philrhinehart
    body: "Ok, think I've got a good solution for this:\r\n- I updated to instead\
      \ set the CSP headers at the k8s ingress layer for prod/staging\r\n- For local\
      \ dev, continue setting these headers in the app like we do today (since there\
      \ is no ingress in this case)\r\n\r\nTested these ingress changes in staging\
      \ an confirmed it works as expected. Dev also continue to work correctly.\r\n\
      \r\nStaging:\r\n<img width=\"921\" height=\"324\" alt=\"image\" src=\"https://github.com/user-attachments/assets/75f3e3aa-67c4-4c6e-9105-4ff3b3e25408\"\
