  root:
    id: 2240446620
    author: ahlec
    body: "i might suggest, instead of taking `dashboardType` to do something like\
      \ this:\r\n```typescript\r\ntype MemberTableCell = \"member\" | \"file-access\"\
      \ | \"status\" | \"date-added\" | \"date-last-active\";\r\n\r\ntype Props =\
      \ {\r\n  columns: readonly MemberTableCell[];\r\n}\r\n```\r\nThen you could\
      \ have your **columns/index** look like:\r\n```typescript\r\ntype MemberTableCell\
      \ = \"member\" | \"file-access\" | \"status\" | \"date-added\" | \"date-last-active\"\
      ;\r\n\r\nconst CELLS_FROM_NAME: Record<MemberTableCell, TableCell> = {\r\n \
      \ member: MEMBER_CELL,\r\n  \"file-access\": FILE_ACCESS_CELL,\r\n  ...\r\n\
      };\r\n\r\nexport function useColumns(requested: readonly MemberTableCell[]):\
      \ readonly TableCell[] {\r\n  return useMemo(\r\n    () => requested.map((name)\
      \ => CELLS_FROM_NAME[name]),\r\n    [requested]\r\n  );\r\n}\r\n```\r\n\r\n\
      The idea here being that the `dashboardType` approach has you hardcoding details\
      \ about Meridian and Digital Subscriptions inside of a now generic, reusable\
      \ component. Doing this approach lets you configure the Meridian-specific pieces\
      \ of the reusable component _in_ Meridian, without putting too much burden on\
      \ you (it's literally just `columns={[\"member\", \"status\", \"date-added\"\
      , ...]}`)."
    path: app/src/components/views/Members/MembersTable/index.tsx
    created_at: '2025-07-29T16:58:32Z'
