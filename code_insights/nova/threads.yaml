    id: 2738066307
    author: JaredWF
    body: "This is on me, it looks like I missed cleaning up a good chunk of the dual\
      \ writes from entity/signatory permissions. We can axe all of the code relating\
      \ to `OrganizationEntityMember` and `OrganizationEntityMemberInvite` since we\
      \ should only be reading from `OrganizationEntityPermission` now. \n\nI was\
      \ also thinking about when this sync will run, and I'm realizing that `createEntityPermissionsUsingDefaults`\
      \ may not be a good fit because it only handles granting permissions to org\
      \ entities that a member doesn't already have a permission to. This would miss\
      \ the case where someone's permissions change in venture and we sync that to\
      \ Nova.\n\nWith the `OrganizationEntityMember` stuff removed, your sync will\
      \ look like:\n1. Upsert the org\n2. Sync the entities\n2a. Create or update\
      \ the `Entity` record\n2b. Create or update the `OrganizationEntity` record\n\
      3. Upsert the team members and invites with default and all entity permissions"
    path: graph/src/services/entities/upsertFromVentureInvestmentEntity/index.ts
    created_at: '2026-01-28T18:55:19Z'
