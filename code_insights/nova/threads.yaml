  - id: 2669647645
    author: edwinzhng
    body: 'What I''ve been doing is just returning the prisma directory entity object
      directly for now, and letting Pothos handle any sub-queries for fields on the
      DE, I think that would add less complexity than adding another model right now
      (and it would be more for the caller to read off of `.directoryEntity` than
      to decipher if the `id` below refers to a directory entity or connected entity
      etc.) '
    created_at: '2026-01-07T18:34:22Z'
  - id: 2669673870
