- thread_id: 2290443534
  pr: 4879
  root:
    id: 2290443534
    author: ctotheameron
    body: 'For context - neverthrow has a few different functions you can chain with:


      * `andThen` -> returns a new Result type (allows you to change ok -> err)

      * `orElse` -> same as `andThen` but for errors (allows you to change err ->
      ok)

      * `map` -> transform the `Ok`

      * `mapErr` -> transform the `Err`


      There''s more but these are the highlights'
    path: graph/data/organization/organizationMember.ts
    created_at: '2025-08-21T09:19:08Z'
  replies:
  - id: 2292117553
    author: sf8193
    body: 'i think i''d prefer these are functions we just call rather than do in
      line to make it a bit cleaner, though that''s prterry subjective prob


      ```

      res = query()


      resultFromPrisma(res)

      .andThen(OrThrow(members, message))

      ```


      but maybe too strict'
    created_at: '2025-08-21T20:55:58Z'
  - id: 2292667670
    author: ctotheameron
    body: "Seems nice in theory. I think we'll have to be careful about our little\
      \ utility fucns to make sure they're clear. IN this particular case something\
      \ like `.andThen(firstOrThrow)`\r\n\r\nIn your case we won't have access to\
      \ members unless we await the query so we'd have to do some additional re-wrapping\
      \ of things to make it a `ResultData` again which is kind of annoying.\r\n\r\
      \nhere's an example:\r\n```ts\r\nfunction firstOrNotFoundError<T>(errorMessage:\
      \ string) {\r\n  return (array: Array<T>): ResultData<NonNullable<T>> => {\r\
      \n    const first = array.at(0);\r\n\r\n    if (!first) {\r\n      return errAsync(new\
      \ NotFoundError(errorMessage));\r\n    }\r\n\r\n    return okAsync(first);\r\
      \n  };\r\n}\r\n\r\n\r\nexport function getMember(\r\n  organizationId: string,\r\
      \n  accountId: string,\r\n  prisma: MaybeTransactionPrisma,\r\n): ResultData<OrganizationMemberModel>\
      \ {\r\n  const membersResult = resultFromPrisma(\r\n    prisma.organizationMember.findMany({\r\
      \n      where: {\r\n        organizationId,\r\n        accountId,\r\n      \
      \  archivedAt: null,\r\n      },\r\n    }),\r\n  );\r\n\r\n  return membersResult.andThen(firstOrNotFoundError(`no\
      \ member ${accountId} found in ${organizationId}`));\r\n}\r\n```\r\n\r\nThough\
      \ I feel like at this point it's just bike-shedding / code style preferences.\
      \ I don't personally care too much. We can iterate on this kind of pattern the\
      \ more of it we see!\r\n"
    created_at: '2025-08-22T04:35:30Z'
  - id: 2292668757
    author: ctotheameron
    body: 'Just to clarify, we definitely cannot use async/await in any of these functions
      that return ResultAsync because typescript enforces async functions to return
      exactly the `Promise` type


      https://github.com/supermacro/neverthrow/issues/340'
    created_at: '2025-08-22T04:36:45Z'
  pr_author: ctotheameron
  merged_at: '2025-08-25T04:35:19Z'
  repo: nova
  has_suggestion_block: false
