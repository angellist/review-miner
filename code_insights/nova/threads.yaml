- thread_id: 2488157242
  pr: 5539
  root:
    id: 2488157242
    author: ahlec
    body: "Would you be able to wrap these in an options object instead? Something\
      \ like:\r\n```typescript\r\ntype ListOptions = {\r\n  search?: string;\r\n \
      \ state?: string[];\r\n  startDate?: string;\r\n  // ...\r\n};\r\n\r\nexport\
      \ const paths = {\r\n  sent: {\r\n    list: (opts?: ListOptions): string =>\
      \ ...\r\n  }\r\n};\r\n```\r\nHaving a lot of positional arguments, all of which\
      \ are optional, and nearly all of which share the same type, lowers DX (since\
      \ you need to look up and manually count, especially if you want to only provide\
      \ some of them) and increases chances for bugs (counting parameters wrong/introducing\
      \ a new parameter not at the end → TypeScript can't really catch any of this). "
    path: mailproxy/services/app/src/lib/paths.ts
    created_at: '2025-11-03T23:34:06Z'
  replies:
  - id: 2488167336
    author: ahlec
    body: "Also, let's use more specific types for this —`state` looks like it actually\
      \ needs to be `readonly SentRecipientStates[]`, and `startDate` and `endDate`\
      \ should be `Date` instead (it's the responsibility of this function to go from\
      \ data → serialized URL, so `Date` serialization should be done in here).\r\n\
      \r\nHaving a diversity of data types would also help address concerns from my\
      \ first comment too. "
    created_at: '2025-11-03T23:39:39Z'
  pr_author: anthonylobko
  merged_at: '2025-11-04T13:45:37Z'
