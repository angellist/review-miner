    id: 2122316353
    author: stathis-alexander
    body: "This is maybe a bit nit picky, but these two anonymous functions are inextricably\
      \ linked. Separating them into two different functional applications makes that\
      \ less obvious. \r\n\r\nSince we're already \"compactifying\" below, I think\
      \ it would be clearer to just return nothing from the mapping block, which is\
      \ what your impl already does!\r\n\r\n```suggestion\r\n      .map((member) =>\
      \ {\r\n        // If member has accountId, use that\r\n        if (member.accountId)\
      \ return member.accountId\r\n\r\n        // Otherwise get the account ID from\
      \ AngelList account mapping\r\n        if (member.inviteEmail) {\r\n       \
      \   const angelListAccount = emailToAccountMap.get(member.inviteEmail)\r\n \
      \         return angelListAccount?.id\r\n        }\r\n\r\n        return null\r\
      \n      })\r\n```"
    path: graph/src/internal/schema/dataroom/manager/dataRoomShare/index.ts
    created_at: '2025-06-02T23:14:31Z'
  replies:
