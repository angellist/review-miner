    created_at: '2025-03-10T20:22:18Z'
  - id: 1988003242
    author: edwinzhng
    body: "[TreeTable is an example impl](https://github.com/angellist/nova/blob/cfc012367369ba0239221c1639a4a5786eed9851/app/src/components/core/TreeTable/Table.tsx#L48)\
      \ where we use Box to render the table structure, main benefit is that it forces\
      \ consistency with design system if we constrain ourselves to the available\
      \ `Box` props, I don't see any CSS values that shouldn't already be supported\
      \ (e.g. using `borderColor`, `borderBottomWidth` etc.) The font sizes we should\
      \ be using `200` as the equivalent to ~13px and `300` for 14px in your case\r\
      \n\r\n```\r\n<Box as=\"table\" {...rest}>\r\n      {columns && (\r\n       \
      \ <Box as=\"thead\">\r\n          <Row>\r\n            {columns.map(({ key,\
      \ label, ...boxProps }, ix) => (\r\n              <Cell\r\n                as=\"\
      th\"\r\n                key={key}\r\n                textAlign=\"left\"\r\n\
      \                color=\"text70\"\r\n                fontSize=\"text200\"\r\n\
      \                fontWeight=\"default\"\r\n                paddingLeft={ix ===\
      \ 0 ? \"0\" : undefined}\r\n                paddingRight={ix === columns.length\
      \ - 1 ? \"0\" : undefined}\r\n                {...boxProps}\r\n            \
      \  >\r\n                {label}\r\n              </Cell>\r\n            ))}\r\
      \n          </Row>\r\n        </Box>\r\n      )}\r\n      <Box as=\"tbody\"\
      >{children}</Box>\r\n</Box>\r\n```"
    created_at: '2025-03-10T20:49:37Z'
  - id: 1988016160
    author: edwinzhng
