- thread_id: 2851877819
  pr: 7002
  root:
    id: 2851877819
    author: kevinmmarlow
    body: "Prefer type guards? pattern is `value is Xyz`\n\nCan make a reusable helper:\n\
      \n```\nconst isOneOf = <T extends string>(\n  value: string,\n  allowed: readonly\
      \ T[]\n): value is T => {\n  return (allowed as readonly string[]).includes(value);\n\
      };\n\nconst toPlaidAccountType = (\n  value: string | undefined\n): PlaidAccountType\
      \ => {\n  if (!value) return 'checking';\n\n  const lower = value.toLowerCase();\n\
      \n  return isOneOf(lower, PLAID_ACCOUNT_TYPES)\n    ? lower\n    : 'checking';\n\
      };\n\nconst toPlaidVerificationType = (\n  value: string | undefined\n): PlaidVerificationType\
      \ => {\n  if (!value) return 'AUTOMATIC';\n\n  return isOneOf(value, PLAID_VERIFICATION_TYPES)\n\
      \    ? value\n    : 'AUTOMATIC';\n};\n```"
    path: graph/src/internal/schema/angellist/treasury/plaid/transformers.ts
