    author: stathis-alexander
    body: Needing this script at all is pretty nasty stuff. Fine to ship to unblock
      for the moment (and prevent regressions), but eventually we likely need to figure
      out a way to prevent this upstream unless this is actually like a ... pnpm or
      workspace issue or something?
    path: app/scripts/confirm_one_adapt_version.sh
    created_at: '2025-10-23T23:27:22Z'
  replies:
  - id: 2457978325
    author: ahlec
    body: This is a pnpm thing, to my understanding. pnpm is trying to respect the
      specific versions that your package (**app/**) said it wanted to use. They're
      trying to solve for the old-school npm problem where **app/** said it needs
      `lodash@5.0.4` but **app/** dependency **my-lib** needs `lodash@3.0.17`, and
      since it all resolves to a flat structure in **node_modules**, one of them can't
      be satisfied. pnpm is trying to solve for this by giving everybody what they
      want, but that also means that now we're going to have different packages importing
      different versions of ADAPT because their side dependencies/peer dependencies
      don't match up.
    created_at: '2025-10-23T23:48:27Z'
  pr_author: ahlec
  merged_at: '2025-10-24T02:39:13Z'
