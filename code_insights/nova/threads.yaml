- thread_id: 2169106571
  pr: 4003
  root:
    id: 2169106571
    author: stathis-alexander
    body: "I think the venture side create should be the last thing we do. Right now,\
      \ there's some risk that we create the venture side then the DR side fails (FK,\
      \ unique index, whatever), leaving us with a bunch of emails that went out that\
      \ won't work that's kind of tricky to recover from. \r\n\r\nIf we move the venture\
      \ side to either the end of the transaction, then we set all the objects up\
      \ first, create the venture side, roll back if it fails, and have little to\
      \ no risk of not saving the DR objects. If we really don't want it in the txn,\
      \ we could try to be more sophisticated and roll back the DR side of the venture\
      \ side errors. But even without that it feels better to me to have all the DR\
      \ objects even if the venture side fails, rather than the venture side succeeding\
      \ and the DR side failing. \r\n\r\n```ts\r\nawait prisma.$transaction(async\
      \ (tx) => {\r\n  // setup DR objects\r\n}\r\n\r\ntry {\r\n  const ventureDealShare\
      \ = await createVentureDealShare(ctx, { ... });\r\n  tx.dataRoomShare.update({\r\
      \n    where: {\r\n      id: drs.id\r\n    },\r\n    data: {\r\n      ventureDealShareId:\
      \ ventureDealShare.id\r\n    },\r\n  })\r\n} catch  {\r\n  // destroy all DR\
      \ objects\r\n}\r\n```"
    path: graph/src/internal/schema/dataroom/manager/dataRoomShare/index.ts
    created_at: '2025-06-26T13:41:11Z'
  replies: []
  pr_author: kevliu
  merged_at: '2025-06-25T23:52:33Z'
  repo: nova
  has_suggestion_block: false
