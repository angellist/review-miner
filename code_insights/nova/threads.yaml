    author: pradyuman
    body: will `unknown, string` work here?
    path: app/src/components/core/MultiPageFlow/context.tsx
    created_at: '2026-01-05T09:22:04Z'
  replies:
  - id: 2661085345
    author: kevinmmarlow
    body: "Unfortunately, no (in the sense you want) - there's no fully type-safe\
      \ way to create a generic React context in TypeScript. This is a known limitation.\r\
      \n\r\nThe issue: createContext is called at module level, but generics (<Payload,\
      \ Path>) only exist at call-site. You can't have a \"generic module-level value.\"\
      \r\n\r\nWe could use `unknown` instead of any to be more explicit that casting\
      \ is required. But this doesn't change behavior - the consumer hook still needs\
      \ to cast."
    created_at: '2026-01-05T10:52:40Z'
  - id: 2661091565
    author: pradyuman
    body: 'yeah, makes sense re: the consumer needing to cast. was just thinking we
      could be a bit more descriptive to readers here but understand it won''t functionally
      make a difference.'
    created_at: '2026-01-05T10:55:02Z'
  pr_author: kevinmmarlow
