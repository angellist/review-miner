    id: 2943734371
    author: cameronnapoli
    body: 'Viewer attributes - cool naming. However, I''m wondering if they definitively
      need to be their own table. I''m don''t see why we can''t add a `organizationId
      String? @map("organization_id") @db.Uuid` to the Attribute table?


      > Unlike the `Attribute` model, these are sort-only values


      I don''t know if I agree here. Attributes relation to an organization could
      be presented. (e.g. interaction state would be beneficial to surface as an attribute)'
    path: packages/prisma/models/viewerAttributes.prisma
    created_at: '2026-03-17T00:38:18Z'
  replies:
  - id: 2944299145
    author: ywplee-al
    body: "so here was my thought process\r\n1. Existing Attribute rows belong to\
      \ the deal itself — no org owner\r\n2. Viewer attributes belong to a specific\
      \ org's interaction with a deal — feels like a fundamentally different ownership.\r\
      \n\r\nSo I created a separate table as a clean logical break. Putting them together\
      \ means `organizationId = NULL` is  \"deal metadata\" and `organizationId =\
      \ <uuid>` is \"viewer state\" — they're both called attributes but represent\
      \   entirely different things (maybe debatable depends on how you look at this).\
      \ \r\n\r\nAlso with the merged table approach - if 100 orgs views a deal, doesn't\
      \ it create 100 extra rows in the attribute table? this felt weird.This was\
      \ my understanding if it's incorrect, let me know.\r\n\r\nThat said, I see the\
      \ value of keeping everything under one table too — the table is already has\
      \ 4  nullable parent foreign keys so this would be consistent. Happy to go either\
      \ way, you have more context on this codebase."
    created_at: '2026-03-17T04:32:40Z'
  - id: 2950121824
    author: ywplee-al
    body: '@cameronnapoli let me know'
    created_at: '2026-03-17T23:52:41Z'
  - id: 2955356792
    author: cameronnapoli
    body: "@ywplee-al  I see your perspective, and I could see an argument for either\
      \ direction.\r\n\r\nI'm fine separating for now - we can always merge later.\
      \ Let's at least surface to the broader team. I think @harshaneel has been owning\
      \ this surface.\r\n\r\nSeems like it at least belongs in the same schema file?\
      \ `attributes.schema`"
    created_at: '2026-03-18T18:16:06Z'
