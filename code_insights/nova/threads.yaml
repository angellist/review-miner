      \        Table \"public.organization_member\"\r\n             Column       \
      \       |            Type             | Collation | Nullable |      Default\r\
      \n---------------------------------+-----------------------------+-----------+----------+-------------------\r\
      \n organization_id                 | uuid                        |         \
      \  | not null |\r\n account_id                      | uuid                 \
      \       |           | not null |\r\n roles                           | jsonb\
      \                       |           | not null | '[]'::jsonb\r\n email     \
      \                      | text                        |           |         \
      \ |\r\n default_context_organization_id | uuid                        |    \
      \       |          |\r\n created_at                      | timestamp(6) with\
      \ time zone |           | not null | CURRENT_TIMESTAMP\r\n auto_add_authorized_signatory\
      \   | boolean                     |           | not null | false\r\nIndexes:\r\
      \n    \"organization_member_pkey\" PRIMARY KEY, btree (organization_id, account_id)\r\
      \n    \"organization_member_default_context_organization_id_idx\" btree (default_context_organization_id)\r\
      \nForeign-key constraints:\r\n    \"organization_member_account_id_fkey\" FOREIGN\
      \ KEY (account_id) REFERENCES account(id)\r\n    \"organization_member_default_context_organization_id_fkey\"\
      \ FOREIGN KEY (default_context_organization_id) REFERENCES organization(id)\r\
      \n    \"organization_member_organization_id_fkey\" FOREIGN KEY (organization_id)\
      \ REFERENCES organization(id)\r\nReferenced by:\r\n    TABLE \"file_category_permission\"\
      \ CONSTRAINT \"file_category_permission_organization_id_account_id_fkey\" FOREIGN\
      \ KEY (organization_id, account_id) REFERENCES organization_member(organization_id,\
      \ account_id) ON DELETE CASCADE\r\n    TABLE \"review_reviewer\" CONSTRAINT\
      \ \"review_reviewer_organization_id_account_id_fkey\" FOREIGN KEY (organization_id,\
      \ account_id) REFERENCES organization_member(organization_id, account_id) ON\
