  - id: 2094615583
    author: pradyuman
    body: "I don't think we have a utility function like this for a generic async\
      \ function. Probably makes sense to put it in the nova core package.\r\n\r\n\
      If this is going to be moved to a standard utility, my only feedback would be\
      \ to jitter by default just in case this ends up being used a lot in the future\
      \ (jitter helps prevent thundering herd issues). You can use `Math.random()`\
      \ to add the jitter to your existing function. Alternatively, here's an implementation\
      \ that uses `effect-ts` (which is a \"standard library\" we use instead of lodash\
      \ et al):\r\n\r\n```typescript\r\nimport { Schedule } from \"effect\"\r\nimport\
      \ { millis } from \"effect/Duration\"\r\nimport { retry, runPromise, tryPromise\
      \ } from \"effect/Effect\"\r\nimport { identity } from \"effect/Function\"\r\
      \nimport { exponential, jittered, recurs } from \"effect/Schedule\"\r\n\r\n\
      type RetryOptions = {\r\n  maxRetries?: number\r\n  baseDelayMs?: number\r\n\
      \  jitter?: boolean\r\n}\r\n\r\nexport const retryWithExponentialBackoff = <T>(\r\
      \n  asyncFn: () => Promise<T>,\r\n  { maxRetries = 5, baseDelayMs = 1000, jitter\
      \ = true }: RetryOptions = {},\r\n): Promise<T> => {\r\n  const schedule = Schedule.intersect(\r\
      \n    exponential(millis(baseDelayMs)),\r\n    recurs(maxRetries),\r\n  ).pipe(jitter\
      \ ? jittered : identity)\r\n\r\n  return tryPromise(asyncFn).pipe(retry(schedule),\
      \ runPromise)\r\n}\r\n```\r\n\r\nMore on `effect/Schedule` [here](https://effect.website/docs/scheduling/built-in-schedules/#exponential)."
    created_at: '2025-05-18T20:09:59Z'
  - id: 2094617363
    author: pradyuman
    body: "Also, just so you're aware (since you mentioned that this is your first\
      \ time writing backend typescript), the v8 engine that node uses doesn't do\
      \ tail call optimization (bun uses `JavaScriptCore` which does have TCO).\r\n\
      \r\nThat means that the function you wrote could have memory issues in the _very_\
      \ off chance that someone tries to use this function with a large N for `retries`.\
      \ I wouldn't optimize for this -- I strongly prefer recursion where possible.\
      \ But just sharing as an fyi."
    created_at: '2025-05-18T20:20:42Z'
  - id: 2096317209
    author: stathis-alexander
    body: "Useful context, thanks. IMO - if you're retrying more than a handful of\
