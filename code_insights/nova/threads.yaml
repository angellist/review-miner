- thread_id: 2167483750
  pr: 3993
  root:
    id: 2167483750
    author: anthonylobko
    body: "```suggestion\r\ntrait FileResource[A] {\r\n  def s3Key(a: A): String\r\
      \n  def documentServiceId(a: A): Option[String]\r\n}\r\n\r\nobject FileResource\
      \ {\r\n  implicit val watermarkFR: FileResource[WatermarkPDFRequest] =\r\n \
      \   new FileResource[WatermarkPDFRequest] {\r\n      def s3Key(a: WatermarkPDFRequest):\
      \ String       = a.s3ObjectName\r\n      def documentServiceId(a: WatermarkPDFRequest):\
      \ Option[String] = a.documentServiceId\r\n    }\r\n\r\n  implicit val thumbnailFR:\
      \ FileResource[ThumbnailPDFRequest] =\r\n    new FileResource[ThumbnailPDFRequest]\
      \ {\r\n      def s3Key(a: ThumbnailPDFRequest): String = a.s3ObjectName\r\n\
      \      def documentServiceId(a: ThumbnailPDFRequest): Option[String] = a.documentServiceId\r\
      \n    }\r\n\r\n  implicit val fillableDocFR: FileResource[FillableDocument]\
      \ =\r\n    new FileResource[FillableDocument] {\r\n      def s3Key(a: FillableDocument):\
      \ String  =\r\n        a.filePath.getOrElse(\r\n          s\"${a.repositoryId}/${if\
      \ (a.`type`.isFillablePdf) \"fillable-pdf\" else \"template-docx\"}/${a.fillableObjectName}\"\
      \r\n        )\r\n      def documentServiceId(a: FillableDocument): Option[String]\
      \ = a.documentServiceId\r\n    }\r\n\r\n  implicit val archiveFR: FileResource[FileToArchive]\
      \ =\r\n    new FileResource[FileToArchive] {\r\n      def s3Key(a: FileToArchive):\
      \ String         = a.s3ObjectName.getOrElse(a.id)\r\n      def documentServiceId(a:\
      \ FileToArchive): Option[String] = a.documentServiceId\r\n    }\r\n\r\n  implicit\
      \ class Ops[A: FileResource](private val a: A) {\r\n    def s3Key: String  \
      \        = implicitly[FileResource[A]].s3Key(a)\r\n    def documentServiceId:\
      \ Option[String] =\r\n      implicitly[FileResource[A]].documentServiceId(a)\r\
      \n  }\r\n}\r\n\r\nclass FileUtils(implicit\r\n  config: Config,\r\n  documentServiceClient:\
      \ DocumentServiceClient,\r\n  s3: S3,\r\n) {\r\n  def getFileResource[A: FileResource](file:\
      \ A): Resource[IO, InputStream] = {\r\n    val bucket = config.s3FilesBucket\r\
      \n    file.documentServiceId match {\r\n      case Some(docId) => documentServiceClient.getDocument(docId)\r\
      \n      case None =>\r\n        s3.getObject(bucket,  file.s3Key)\r\n    }\r\
      \n  }\r\n\r\n}\r\n\r\n```\r\n\r\nSo, when I looked at this, it seemed like a\
      \ natural case for ad-hoc polymorphism. I basically defined a trait & implemented\
      \ those divergent properties in a way that avoids most of the duplication for\
      \ us. This is usually better than a lot of overloads w/ the type swapped out.\
      \ (This still needs the Resource wrapped in an Either though, so it's not finished,\
      \ I only fixed this file). Anywhere you want to use those methods, all you'd\
      \ have to do is `import nova.pdfops.FileResource._` to bring the right implicits\
      \ into scope. "
    path: pdfops/src/main/scala/nova/pdfops/FileUtils.scala
    created_at: '2025-06-25T19:42:58Z'
