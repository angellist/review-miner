    author: ahlec
    body: 'Any change we make to a **.env** file in nova-e2e will need to be mirrored
      in the buildkite pipeline file as well.


      The **.env** files are the source of env vars in local environments; the **pipeline.rb**
      is the source of env vars in CI. Having them as a single source of truth proved
      to be difficult (and some of the values are different between the two environments).'
    path: nova-e2e/emulator.env
    created_at: '2026-02-10T19:13:21Z'
