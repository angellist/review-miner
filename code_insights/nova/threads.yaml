- thread_id: 2956223911
  pr: 7317
  root:
    id: 2956223911
    author: ahlec
    body: 'I wound up needing to patch the `nuqs` library. I checked the repository
      and the offending lines are the same as what''s on **main** there. I couldn''t
      find any open PRs or issues related to this. It''s worth considering upstreaming
      the changes, so I might give that a try? But I''m also uncertain on how _broadly_
      correct what I''m doing here is. This works for us — unsure if this is universally
      the correct answer for every codebase.


      This is meant to solve for the fact that `tab` is a Next.js path parameter —
      `/pages/[orgHandle]/settings/[[...tab]].tsx`. With what''s in the library right
      now, we can _read_ from this when loading, but all changes simply append it
      as a query parameter. This means if you load the page as `/asuna/settings/portal`,
      it''ll load as the `portal` tab, but changing tabs will redirect you to `/asuna/settings/portal?tab=general`.
      Refreshing the page will pick the first valid value — `portal` — back out of
      the URL, so you never actually persist the change.


      We aren''t using `nuqs` very much in the codebase yet. I checked the other locations,
      and all of them are currently using them for parameters that aren''t found in
      the pathname. The members table continues to work, as does the entity admin
      table filter.'
    path: patches/nuqs.patch
    created_at: '2026-03-18T20:58:57Z'
  replies: []
  pr_author: ahlec
  merged_at: '2026-03-18T21:51:00Z'
  repo: nova
  has_suggestion_block: false
- thread_id: 2956284541
  pr: 7317
  root:
    id: 2956284541
    author: JaredWF
    body: 'Dumb question: why does this need to be wrapped in a `useCallback()`? I
      would expect `setSelectedTab` to be a stable reference, but in the case that
      it''s not, won''t `setTab` just change any time `setSelectedTab` changes?'
    path: app/lib/hooks/usePageViewTabs.tsx
    created_at: '2026-03-18T21:12:17Z'
  replies:
  - id: 2956349364
    author: ahlec
    body: "It actually looks like `setSelectedTab` isn't a 100% stable reference the\
      \ way `setState` is. [It is memoized](https://github.com/47ng/nuqs/blob/7c6749f33fe846ef30df49f66c56a9bb167467fa/packages/nuqs/src/useQueryState.ts#L226),\
      \ but can be invalidated/change over time.\r\n\r\nThis this is primarily doing\
      \ though is erasing the return value. `setSelectedTab` has a return type of\
      \ `Promise<URLSearchParams>`. I feel like that's the wrong thing for our API\
      \ and want `setTab` to return `Promise<void>`. So I'm wrapping it here to erase\
      \ the return type. I want to memoize `setTab` then so that other locations can\
      \ use it as a hook dependency if they need to."
    created_at: '2026-03-18T21:27:25Z'
  pr_author: ahlec
  merged_at: '2026-03-18T21:51:00Z'
  repo: nova
  has_suggestion_block: false
