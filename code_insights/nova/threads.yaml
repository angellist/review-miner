      \ \n\nI've added these related linear tickets: \n1. https://linear.app/angellistv/issue/FUNDS-2592/dedupe-treasury-account-ids-cleanup-concept\n\
      2. https://linear.app/angellistv/issue/BAN-691/consolidate-investment-and-carry-recipient-account-purposes\n"
    created_at: '2025-10-31T14:30:36Z'
