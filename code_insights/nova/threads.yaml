      \    new Router()\r\n        .get(\"/:accountId/envelopes\", docusignInternalGetAllEnvelopes)\r\
      \n    )\r\n);\r\nroutes.use(\"/mailproxy\",\r\n  new Router()\r\n    .use(\"\
      /api/send\", mailproxyApiSend)\r\n    .get(\"/fetch/:traceId\", mailproxyGetAll)\r\
      \n);\r\n```\r\nWe could, but I'd worry about that file becoming too large, as\
      \ well as the increase in nesting. I think also, when I'm working in the emulator\
      \ server, it's always on a specific service — docusign _or_ mailproxy — rather\
      \ than something at a wider context, so having it scoped to just the service\
      \ has made it easier to cut out the noise."
