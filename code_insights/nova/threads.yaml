      \ the exception of calls to Span.context() (which are always allowed),\n   \
      \  * finish() must be the last call made to any span instance, and to do\n \
      \    * otherwise leads to undefined behavior.\n     *\n     * @param  {number}\
      \ finishTime\n     *         Optional finish time in milliseconds as a Unix\
      \ timestamp. Decimal\n     *         values are supported for timestamps with\
      \ sub-millisecond accuracy.\n     *         If not specified, the current time\
      \ (as defined by the\n     *         implementation) will be used.\n     */\n\
      \    finish(finishTime?: number): void {\n        this._finish(finishTime);\n\
      ```"
