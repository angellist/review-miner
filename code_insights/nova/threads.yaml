- thread_id: 2122131655
  pr: 3666
  root:
    id: 2122131655
    author: stathis-alexander
    body: This `Boolean` wrap is kind of interesting; from a code style standpoint,
      why not check `!= null`, which is more explicit? Or does the type actually sometimes
      return a boolean?
    path: app/src/components/views/DataRoomManager/Shared/InviteModal/index.tsx
    created_at: '2025-06-02T20:52:02Z'
  replies:
  - id: 2122220317
    author: edance
    body: '`ventureDefaultTerms` could be null or undefined so you''d want to check
      for both in this case. Another common way to do it is `!!ventureDefaultTerms`
      but I feel like `Boolean(ventureDefaultTerms)` is a little easier to understand.
      Lodash also has `isNil` which is clearer too but it feels like JS should have
      this out of the box.'
    created_at: '2025-06-02T21:46:04Z'
  - id: 2122248031
    author: stathis-alexander
    body: "Fun fact, `null ==` or `undefined == ` matches both `null` and `undefined`:\r\
      \n```ts\r\n> null == null\r\n<- true\r\n> null == undefined\r\n<- true\r\n>\
      \ undefined == null\r\n<- true\r\n```\r\n\r\nIn general it's bad practice to\
      \ use `==` instead of `===` for equality comparison, but it's often acceptable\
      \ in this particular case since `undefined` and `null`, while semantically different,\
      \ both mean \"empty\" to some degree. \r\n\r\nI also dislike using lodash for\
      \ things that JS support natively also. "
    created_at: '2025-06-02T22:11:24Z'
  - id: 2122285883
    author: edance
    body: 'Ah yes. Classic JS. I believe we have `"eqeqeq"` rule turned on in nova
      so I couldn''t type two equals if I wanted to 😅 '
    created_at: '2025-06-02T22:43:43Z'
  - id: 2122288414
    author: stathis-alexander
    body: Ah indeed we have it configured to always - https://github.com/angellist/nova/commit/93053d55fd5ecd8d04097116b2562ae1031dc1a3
    created_at: '2025-06-02T22:47:04Z'
  pr_author: edance
  merged_at: '2025-06-06T18:32:01Z'
