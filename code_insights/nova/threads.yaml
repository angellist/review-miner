    author: JaredWF
    body: Moving these `useQuery` calls to two hooks might seem weird at first, but
      it was the best way for me to reduce code duplication. The loading and error
      handling is shared despite the queries being structured slightly different (due
      to debouncing target org query). This result type pipes nicely into `<OrganizationAccordion>`
      which handles loading and error states for both queries.
    path: app/src/components/views/AdminTools/OrganizationsTab/OrganizationsTable/MergeOrganizationsModal/hooks.tsx
    created_at: '2025-10-24T17:53:27Z'
  replies:
  - id: 2461804318
    author: FoodProduct
    body: "It took me a little bit to read this, so putting it into my own words in\
      \ hope it helps someone else: the requirements for this query are\r\n* The target\
      \ organization query indirectly depends on the source org query\r\n* We want\
      \ to debounce the query\r\n\r\nBased on these requirements, we need custom logic\
      \ around the target query so it needs a custom hook. Using similar logic (for\
      \ representing the response) for the source-query is an optional nice-to-have. "
    created_at: '2025-10-24T19:47:30Z'
