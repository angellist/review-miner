- thread_id: 2625992616
  pr: 6093
  root:
    id: 2625992616
    author: kwliang1
    body: do we want a unique constraint on payment + transfer?
    path: packages/prisma/models/banking.prisma
    created_at: '2025-12-17T08:00:58Z'
  replies:
  - id: 2629477226
    author: kevinmmarlow
    body: "I'll make transferId a unique constraint, but we shouldn't have a composite\
      \ here, nor have a unique on paymentId.\r\n\r\nWhat we want:\r\n- One Payment\
      \ → many PaymentTransfers (LP pays $100k capital call via $60k wire + $40k ACH\
      \ = two PaymentTransfers)\r\n- One Nova::Transfer → one PaymentTransfer\r\n\r\
      \nA composite constraint would allow this bad state:\r\n\r\n- PaymentTransfer\
      \ A: paymentId = \"payment-1\", transferId = \"transfer-abc\"\r\n- PaymentTransfer\
      \ B: paymentId = \"payment-2\", transferId = \"transfer-abc\"  ← ALLOWED but\
      \ wrong\r\n\r\nWhy unique on transferId alone works:\r\n- Nullable columns allow\
      \ multiple NULLs in PostgreSQL unique constraints\r\n- So we can have many PaymentTransfers\
      \ with transferId = null (incoming wires awaiting reconciliation)\r\n- But once\
      \ a transferId is set, it can only appear on one PaymentTransfer"
    created_at: '2025-12-18T04:14:26Z'
  pr_author: kevinmmarlow
  merged_at: '2025-12-18T04:39:04Z'
  repo: nova
  has_suggestion_block: false
