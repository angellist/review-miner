- thread_id: 2933815458
  pr: 7227
  root:
    id: 2933815458
    author: ahlec
    body: 'This (and `linkVehicleToDirectoryEntity`) had existed previously as `OrganizationEntityProto.addDirectoryEntity`.
      This PR is removing them and creating separate functions, but to my eyes it
      looks like all of the locations that are using these functions continue to obey
      the logic that was originally in `OrganizationEntityProto.addDirectoryEntity`.


      My goals w/ protos was to make them as expressive, readable, and to minimize
      the amount of work you''d need to do to set stuff up (that way you can focus
      on writing the tests).


      Is there a need to separate these that I''m not seeing?'
    path: nova-e2e/tests/fixtures/nova/protos/organizationProto.ts
    created_at: '2026-03-13T21:18:41Z'
  replies:
  - id: 2937939130
    author: kevinmmarlow
    body: "Yes, the prior logic was passing in a `connectedEntityId`, which implies\
      \ that directory entities are created from connected entities, but that's not\
      \ the correct model of the world. Senders create directory entities for their\
      \ organization (not organization entity) and they don't connect the entity,\
      \ that's the recipient's job.\r\n\r\nThe main reason I want/need to change this\
      \ is that we have no guarantees that the entity type for a connected entity\
      \ will match 1:1 with the entity type of a directory entity. The prior logic\
      \ enforced this, but the Vulcan entity KYC **will** have mismatches here, which\
      \ is ok.\r\n\r\n"
    created_at: '2026-03-16T03:15:23Z'
  pr_author: kevinmmarlow
  merged_at: '2026-03-18T06:28:27Z'
  repo: nova
  has_suggestion_block: false
- thread_id: 2934172143
  pr: 7227
  root:
    id: 2934172143
    author: ahlec
    body: "The operations surrounding this object felt a little confusing to me.\n\
      \nI tried putting together [this branch](https://github.com/angellist/nova/compare/kmarlow/nova-775-recipient-payout-flow-e2e-tests...ahlec/e2e/distributions)\
      \ to look at this object. I broke apart `DistributionProto` into this and a\
      \ separate `DistributionPaymentProto`, and then moved the `createDistribution`\
      \ to the `OrganizationEntityProto`. The resulting invocation looks like:\n```typescript\n\
      const payment = senderOrgEntity\n  .createDistribution({\n    createdBy: senderAdmin,\n\
      \    name: 'E2E Test Distribution',\n    totalAmount: '10000.00',\n  })\n  .createPayment(directoryEntity);\n\
      ```\nThe motivation here is partially to just make it feel a little more OOP-y\
      \ (which the protos lean into). But this also allows us to, for example, create\
      \ multiple payments on a distribution.\n\nI'm not familiar with all of the data\
      \ we're modeling here. So I'd love feedback if I missed the mark on something,\
      \ to refine my own understanding."
    path: nova-e2e/tests/fixtures/nova/protos/distributionProto.ts
    created_at: '2026-03-13T23:18:32Z'
