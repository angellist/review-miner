- thread_id: 2806749096
  pr: 6855
  root:
    id: 2806749096
    author: ahlec
    body: "I think I like what this is doing, but doing it _here_ doesn't make as\
      \ much sense to me. For each endpoint, we need to maintain two separate code\
      \ functions for implementation details — the route in **nova-e2e/services/emulator/src/routes/adobe/index.ts**,\
      \ and then also here.\r\n\r\nI had a similar thing with Docusign signers/users\
      \ — a bunch of DocuSign endpoints needed to mutate their data, but it was slightly\
      \ different where/how in each location. I did that using `extractAndReplaceSigners`\
      \ (**nova-e2e/services/emulator/src/routes/docusign/utils.ts**), which I called\
      \ from within each of the routes. That way, the specific data models/actions\
      \ that each route was concerned with were all colocated (better single home\
      \ for documentation/comments, plus typing where appropriate).\r\n\r\nI think\
      \ part of what you might be optimizing for here is like \"all S3 URL schemas\
      \ stay in the same place (whether upload or download).\" I think we could solve\
      \ for both by having `getS3UploadUrl` and `getS3DownloadUrl` colocated as utils\
      \ in a file like **adobe-s3-urls.ts** or something, but then call those functions\
      \ from their respective express routes and leave `AdobeReplayClient` as _purely_\
      \ just being an `HttpClient` to call and deserialize the values from the Replay\
      \ server."
    path: nova-e2e/services/emulator/src/clients/adobe-replay-client.ts
    created_at: '2026-02-14T01:27:50Z'
