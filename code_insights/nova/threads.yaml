    created_at: '2025-09-02T22:37:52Z'
  replies:
  - id: 2317410320
    author: edance
    body: "I can update it so that we have a `profile` with the previous profile fields\
      \ underneath like below. Where I was struggling (and still am, honestly) is\
      \ that the GraphQL profile doesn't match the InvestorProfile model (for example,\
      \ avatar and name are on the Organization, not InvestorProfile).\r\n\r\nI think\
      \ it's ok/good to have our GraphQL endpoints differ from the underlying data\
      \ structures and this \"onboarding\" endpoint is following that pattern. This\
      \ pattern is more of a form submission (simplifying the frontend code a bit)\
      \ instead of directly saying which models we're updating on the backend.\r\n\
      \r\nAnother part that I struggled with is that fields like entityName, linkedInUrl,\
      \ invested last year, etc are stored on multiple models (some on Org, some on\
      \ InvestorProfile, and some on the venture LP onboarding model). It felt more\
      \ fragile to update each of these from the frontend. Additionally, we can update\
      \ the service layer when we port the accreditation models from venture to nova,\
      \ and everything else remains the same.\r\n\r\nAnyway, let me know what you\
      \ think. I spent some time thinking about it and I don't love where it ended\
      \ up tbh.\r\n\r\n\r\n```typescript\r\ngraphql(`\r\n  fragment MeridianInvestorOnboarding_investorOnboarding\
      \ on InvestorOnboarding {\r\n    entityName\r\n    avatarUrl\r\n    profile\
      \ {\r\n      bio\r\n      ...\r\n    }\r\n```"
