  root:
    id: 2146182361
    author: stathis-alexander
    body: 'Not a huge deal: returning empty frags `<></>` vs `null`, is there a good
      reason to do one vs the other?'
    path: app/src/components/views/DataRoomManager/DataRoom/components/Tabs/PipelineTab/InvestorsTable/InvestorBlade/ApplicationNote.tsx
    created_at: '2025-06-13T21:52:59Z'
  replies:
  - id: 2148886389
    author: campriceaustin
    body: "I think they're equivalent. I've generally preferred `<></>` for no real\
      \ reason, but apparently [the React docs](https://react.dev/learn/conditional-rendering#conditionally-returning-nothing-with-null)\
      \ suggest null. I'll update here.\r\n\r\nBiome [has a](https://biomejs.dev/linter/rules/no-useless-fragments/)\
      \ `noUselessFragments` rule, but I don't think it considers this case \"useless\"\
      . \r\n\r\nI've added a couple of guidelines to the doc for now [[1](https://www.notion.so/React-Guidelines-10461e866662801f82e7f40089dfcfe5?source=copy_link#21461e86666280db8a13e5d5054a4ed3)]\
      \ [[2](https://www.notion.so/React-Guidelines-10461e866662801f82e7f40089dfcfe5?source=copy_link#21461e86666280f1ab01cc339209d76a)]"
    created_at: '2025-06-16T00:42:28Z'
  - id: 2148958979
    author: ctotheameron
    body: The only other argument is the TS recommendation to avoid using `null` over
      `undefined` (I'm in this camp), but agree it might be overly dogmatic in this
      instance since it's literally part of React's API contract.
    created_at: '2025-06-16T02:52:42Z'
  pr_author: campriceaustin
