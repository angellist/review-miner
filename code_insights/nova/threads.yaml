    author: pradyuman
    body: "Will this do the same thing? A little more straightforward to follow from\
      \ my perspective.\r\n\r\n```suggestion\r\nconst buildSuggestions = (\r\n  pArr:\
      \ SuggestedQuestion[],\r\n  cArr: SuggestedQuestion[],\r\n  bArr: SuggestedQuestion[],\r\
      \n  tArr: SuggestedQuestion[],\r\n  pOffset: number,\r\n  cOffset: number,\r\
      \n  bOffset: number,\r\n  tOffset: number\r\n) => {\r\n  const distribution\
      \ = getRandom2DDistribution()\r\n\r\n  const categoryMap: Record<string, { arr:\
      \ SuggestedQuestion[], offset: number }> = {\r\n    portfolio_analysis: { arr:\
      \ pArr, offset: pOffset },\r\n    company_research: { arr: cArr, offset: cOffset\
      \ },\r\n    benchmarks: { arr: bArr, offset: bOffset },\r\n    transactions:\
      \ { arr: tArr, offset: tOffset },\r\n  }\r\n\r\n  const { suggestions, offsets\
      \ } = distribution.reduce(\r\n    ({ suggestions, offsets }, category) => {\r\
      \n      const { arr, offset } = offsets[category]\r\n      const item = arr[offset\
      \ % arr.length]\r\n\r\n      return {\r\n        suggestions: [...suggestions,\
      \ item],\r\n        offsets: { ...offsets, [category]: { arr, offset: offset\
      \ + 1 } },\r\n      }\r\n    },\r\n    {\r\n      suggestions: [] as SuggestedQuestion[],\r\
      \n      offsets: categoryMap,\r\n    }\r\n  )\r\n\r\n  setPortfolioOffset(offsets.portfolio_analysis.offset)\r\
      \n  setCompanyOffset(offsets.company_research.offset)\r\n  setBenchmarksOffset(offsets.benchmarks.offset)\r\
      \n  setTransactionsOffset(offsets.transactions.offset)\r\n\r\n  setSuggestions(suggestions)\r\
      \n}\r\n```"
    path: intelligence/services/web/src/containers/Query/Suggestions.tsx
    created_at: '2025-03-04T04:04:18Z'
