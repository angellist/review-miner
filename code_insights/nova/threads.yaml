    author: kevinmmarlow
    body: "Another workaround until we add first-class support for `selectedKeys`\
      \ to the `useTable` hook would be to just call into the reducer via `table`.\
      \ In this way, we're overriding it. That said, I think we'd prefer an adapt\
      \ change here to open up `selectedKeys`\r\n\r\n```\r\ntable.setSelectedKeys(table.selectedKeys\
      \ + myNewKey)\r\n```\r\n\r\nOr a more involved override\r\n\r\n```\r\nconst\
      \ [selectedKeys, setSelectedKeys] = useState();\r\nconst { selectedKeys: tableSelectedKeys,\
      \ setSelectedKeys: tableSetSelectedKeys, ...table} = useTable();\r\n\r\nconst\
      \ updateSelectedKeys = (selection) => {\r\n  setSelectedKeys(selection);\r\n\
      \  tableSetSelectedKeys(selection); // so that the table state is aligned\r\n\
      }\r\n\r\n<Table table={{...table, selectedKeys, setSelectedKeys: updateSelectedKeys}}\
      \ />\r\n```"
