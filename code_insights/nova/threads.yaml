    body: "When `organizationId` and `entityId` are null, that entity permission will\
      \ serve as the user's default for new entities created within the org. [This\
      \ PR](https://github.com/angellist/nova/pull/3514) contains that logic.\r\n\r\
      \nUsually I would just make them optional but I'm including `null` in the type\
      \ so that we can query existing permissions and pass them directly back into\
      \ `pushNewPermissionSet` during upsert. "
    created_at: '2025-05-16T17:31:39Z'
  - id: 2093475394
    author: edwinzhng
    body: Ah got it, we already have an `autoAddAuthorizedSignatory` flag, I'm assuming
      that's going away in favor of this default permission?
    created_at: '2025-05-16T17:58:52Z'
  - id: 2093480014
    author: edwinzhng
    body: "Also I feel like it may be a bit confusing that `null` on these fields\
      \ implicitly denotes a default permission, I'm wondering if we should add an\
      \ `isDefault` flag or something to make it clear. \r\n\r\nWe could also just\
      \ make sure that if `isDefault` is false, that the entity and org IDs are set\
      \ and enforce that with a DB check"
    created_at: '2025-05-16T18:02:55Z'
  - id: 2093520642
    author: JaredWF
    body: "> Ah got it, we already have an autoAddAuthorizedSignatory flag, I'm assuming\
      \ that's going away in favor of this default permission?\r\n\r\nThat's correct.\
      \ Right now, everybody in the org can see all transactions for all entities,\
      \ but only some people can sign for an entity. We're expanding to also include\
      \ a permission to view transactions and edit transactions. Rather than having\
      \ three `autoAdd` attributes on the permission set, I'm reusing the entity permission\
      \ to auto add. This way, if we add more entity permissions in the future, we\
      \ don't need to add the permission on the entity and a corresponding default\
      \ on the permission set. \r\n\r\n> We could also just make sure that if isDefault\
      \ is false, that the entity and org IDs are set and enforce that with a DB check\r\
      \n\r\nI'm down for that. Will add this in a follow up PR so that I don't have\
      \ to rebase the full chain of PRs."
    created_at: '2025-05-16T18:38:47Z'
  pr_author: JaredWF
  merged_at: '2025-05-16T19:00:01Z'
  repo: nova
  has_suggestion_block: false
