  pr: 3573
  root:
    id: 2107890945
    author: pradyuman
    body: "Let's use `connectedAt` for this (`joined` is actually a meridian specific\
      \ concept -- we can default it for now to when the DirectoryInvestor was connected\
      \ to the investor org, but we may need to track the two separately in the future).\r\
      \n\r\nSimilarly, we should also track `connected_organization_id` here so we\
      \ know which investor organization this was connected to."
    path: packages/prisma/models/directory.prisma
    created_at: '2025-05-26T22:23:22Z'
  replies:
  - id: 2107896659
    author: anthonylobko
    body: "I'm not sure that's what this is for. My understanding from the designs\
      \ is that we want to display the time at which the investor accepted the invitation\
      \ from the GP. I was told by Alvina this was a distinct time from creation and\
      \ distinct from association with an org. \n\nDid I misunderstand something?"
    created_at: '2025-05-26T22:37:08Z'
  - id: 2107899783
    author: anthonylobko
    body: "<img width=\"918\" alt=\"image\" src=\"https://github.com/user-attachments/assets/1312e32f-58f9-4268-9b2a-6aa9fc7b1dd7\"\
      \ />\r\nthe 'joined' column is the one in question."
    created_at: '2025-05-26T22:44:56Z'
  - id: 2107901856
    author: pradyuman
    body: "Hmm, what do you mean by \"association with an org\"?\r\n\r\nIn the current\
      \ world without `DirectoryInvestor`, the invite path looks something like:\r\
      \n1. Directory objects (Entity and People) are created and `PortalInvite` is\
      \ sent.\r\n2. When `PortalInvite` is redeemed by a user, we track `redeemedAt`\
      \ on the invite model for when they accepted the invitation and then connect\
      \ the investor's entities.\r\n\r\nWith `DirectoryInvestor`, the path is similar,\
      \ but we'd also be creating a `DirectoryInvestor` object in number one (which\
      \ means we can continue to track acceptance on the invite model). What isn't\
      \ being tracked is if the GP creates a relationship with an LP outside of an\
      \ explicit portal invite (e.g. from a public template link).\r\n\r\nSo in this\
      \ world, I'm thinking `connectedAt` would be set either when a portal invite\
      \ is redeemed, or when an investor completes an action outside of an invite\
      \ that establishes a relationship with the GP (e.g. via a public template link).\
      \ I think that captures the intent of what we're trying to display here, but\
      \ I could be thinking of it incorrectly.\r\n\r\nI'd be open to punting this\
      \ field till Alvina gets back if we want to discuss this more with her."
    created_at: '2025-05-26T22:50:26Z'
  - id: 2107903807
    author: anthonylobko
    body: 'I''ll rename it, and if we need to drop it later, so be it. '
    created_at: '2025-05-26T22:55:00Z'
  - id: 2107904226
    author: pradyuman
    body: Sounds good!
    created_at: '2025-05-26T22:56:07Z'
