      \ to one specific entity. If this user redeems the entity invite, they could\
      \ potentially not see whatever transaction they were invited to. This is quite\
      \ unlikely but still possible.\r\n\r\nWe might also need to consider a similar\
      \ case where someone's default permission is just view, then they accept this\
      \ invite and won't have edit access, but would have view and sign. We might\
      \ need to consider working in an override for edit access as well so someone\
      \ can gain full access to the entity upon accepting the invite. \r\n\r\nCurious\
      \ what product thinks here, but I generally think we lean towards more permissive\
      \ to reduce friction."
