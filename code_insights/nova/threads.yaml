- thread_id: 2801822407
  pr: 6808
  root:
    id: 2801822407
    author: ahlec
    body: "A slight tweak to the shape of this function:\n```typescript\ntype Args<TRow\
      \ extends { id: string }> = {\n  table: string;\n  column: string;\n  create:\
      \ () => Promise<TRow>;\n};\n\nexport async function withIncrementalId<TRow extends\
      \ { id: string }>(\n  { table, column, create }: Args<TRow>,\n  prisma: Prisma.TransactionClient,\n\
      ): Promise<{ incrementalId: number; row: TRow }> {\n  // ...\n  const row =\
      \ await create();\n  const rowId = row.id;\n  // ...\n  return { incrementalId:\
      \ value, row };\n}\n```\n\nThe motivation here is that the usages look a little\
      \ strange to me — specifically that we need to assign a class value (`this._organizationId\
      \ = ...`) inside of the `create` function.\n\nInstead, introducing a generic\
      \ argument and then returning it, we can now change our `OrganizationSeeder`\
      \ (and `UserSeeder`) to:\n```typescript\nconst { incrementalId, row } = await\
      \ withIncrementalId(\n  {\n    table: 'organization',\n    column: 'angellist_firm_id',\n\
      \    create: () =>\n      prisma.organization.create({\n        data: {\n  \
      \        handle: this.handle,\n          brandColor: '004D7A',\n          brandTwoColor:\
      \ '0C1A2D',\n          description: 'E2E test organization',\n          logo:\
      \ this.data.logo,\n          logoAvatar: this.data.logoAvatar,\n          name:\
      \ this.data.name,\n          dashboardType: DashboardType.SENDER,\n        \
      \  settings: this.data.settings,\n        },\n      }),\n  },\n  prisma,\n);\n\
      \nthis._organizationId = row.id;\nthis._angellistFirmId = incrementalId;\n\n\
      return [...];\n```"
    path: nova-e2e/tests/db/utils/incrementalId.ts
    created_at: '2026-02-13T01:24:06Z'
  replies: []
  pr_author: ctotheameron
  merged_at: '2026-02-13T03:17:14Z'
  repo: nova
  has_suggestion_block: false
