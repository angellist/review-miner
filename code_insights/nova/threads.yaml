  root:
    id: 2093772839
    author: edance
    body: "using plimit to batch in sets of 25 (maybe could be higher). The max invites\
      \ allowed right now is 10k and if we assume each batch takes a second, this\
      \ could run for over six minutes to invite everyone.\r\n\r\nthis isn't ideal\
      \ and we could fast follow with a temporal job. @campriceaustin what are your\
      \ thoughts?"
    path: graph/src/internal/schema/dataroom/manager/members/invite.ts
    created_at: '2025-05-16T23:37:26Z'
  replies:
  - id: 2094853155
    author: campriceaustin
    body: "It looks like `inviteUserToDataRooms` method:\r\n\r\n1. Creates a `dataRoomMember`\
      \ for each `[invitee, dataRoom]` tuple\r\n2. Upserts a `directoryPerson` for\
      \ each `[invitee, dataRoom]` tuple\r\n3. Enqueues an email to be sent (via Temporal)\r\
      \n\r\nIt does all the above in an interaction transaction.\r\n\r\nSo, we're\
      \ spawning 25 simultaneous interactive transactions here. A much faster approach\
      \ would be to collect up all the db operations we want to do, then batch execute\
      \ them within [Prisma sequential transaction calls](https://www.prisma.io/docs/orm/prisma-client/queries/transactions#sequential-prisma-client-operations).\r\
      \n\r\nWe use this pattern already in a few places (grep for `PrismaPromise`).\
      \ It would involve refactoring the internals of `inviteUserToDataRooms` so we\
      \ had a function that returned just the Prisma operations (_without_ actually\
      \ executing them) that we could call from here. We might also need to do the\
      \ same for `libDirectory.person.upsert`.\r\n\r\nWe could then defer enqueueing\
      \ the emails until right at the end. I'm not sure if Temporal has a batch enqueue\
      \ API but that'd be ideal.\r\n\r\nI suspect using the above strategy, we could\
      \ get the time down by a lot. We could then place the whole thing into a Temporal\
      \ job if it was still too slow to block the request."
    created_at: '2025-05-19T05:18:26Z'
  pr_author: edance
  merged_at: '2025-05-19T22:09:52Z'
  repo: nova
  has_suggestion_block: false
