    body: "Medium-ish conviction, but with the [`S3` client](https://github.com/angellist/nova/blob/370b64c69c67ca739046f4fde63ef0adc34956a2/pdfops/src/main/scala/nova/pdfops/S3.scala#L28)\
      \ I checked all three values and only if all of them were present did I construct\
      \ the E2E class. I'd wanted to avoid having any part of the e2e stack hardcode\
      \ fallback environment variable values because then systems might continue working\
      \ when the infrastructure changes — which sounds great on paper, until a developer\
      \ needs to spend hours figuring out why changing the value does nothing and\
      \ it only breaks in CI. I definitely had my fair share of env var issues standing\
      \ this up.\n\nI think that would look something along the lines of:\n```scala\n\
      val executionContext: ExecutionContext = {\n  if (\n    config.e2eAdobeEndpoint.isDefined\
      \ &&\n    config.e2eAdobeToken.isDefined\n  ) {\n    new InternalExecutionContext(\n\
      \      config.adobedsClientId,\n      config.e2eAdobeToken.get,\n      config.e2eAdobeEndpoint.get,\n\
      \      null\n    )\n  } else {\n    ExecutionContext.create(credentials)\n \
      \ }\n}\n```"
