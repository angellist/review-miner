  root:
    id: 2150894581
    author: stathis-alexander
    body: This is an interesting pattern for memoization by lifting to a global. I'm
      unfamiliar with how this kind of thing works in js. What is the scope of this
      variable? If I assign to the `btOrg` variable in another file, will it overwrite
      the value here? Like is this scope "open"? Additionally, how does this interact
      with threads / concurrency?
    path: graph/lib/angellist/belltower.ts
    created_at: '2025-06-16T21:10:18Z'
  replies:
  - id: 2151180778
    author: ctotheameron
    body: "AFAIK it works like this:\r\n1. modules are loaded once and cached by node\
      \ on `require.cache[moduleName]`. \r\n2. The exported functions are just tacked\
      \ on to the object there.\r\n3. The \"btOrg\" reference isn't actually \"global\"\
      \ or referencable outside of this module, but it is captured by the function\
      \ closure and stays tracked in mem \r\n4. Our code inside nodejs is completely\
      \ single-threaded. Any parallelization would be horizontal scaling and then\
      \ each process would have it's own in-mem cache "
    created_at: '2025-06-17T02:07:56Z'
  - id: 2151181799
    author: stathis-alexander
    body: 'Thanks, useful context. '
    created_at: '2025-06-17T02:09:21Z'
  pr_author: jogly
  merged_at: '2025-06-16T20:04:32Z'
  repo: nova
  has_suggestion_block: false
