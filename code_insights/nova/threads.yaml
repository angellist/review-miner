    author: ahlec
    body: "Let's actually be more aggressive with this change here:\n\n```suggestion\n\
      \  name: string;\n  type: DirectoryEntityType;\n```\nwhere above this we have\n\
      ```typescript\ntype DirectoryEntityType =\n  | 'individual'\n  | 'llc'\n  |\
      \ 'corporation'\n  | 'trust'\n  | 'fund'\n  | 'partnership'\n  | 'dao';\n```\n\
      When I started out, I had the seeders hardcode some of their data, but I've\
      \ been moving away from that over time — and especially after adding the **protos**\
      \ concept in #6977, it makes even less sense since we have a good location to\
      \ hardcode default values now.\n\nAs for `string` → `DirectoryEntityType`, I\
      \ just want to see us use strong typing at all times. This also can replace\
      \ your `RecipientEntityType` (that's where I pulled the values from)."
