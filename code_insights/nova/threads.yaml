  pr: 3744
  root:
    id: 2136651969
    author: JaredWF
    body: One thing I didn't have high conviction on was where I should do this mapping.
      In the frontend, we display these permissions as a single select, where each
      permission level grants further access, ie `sign` can also `edit`. In the backend,
      we have an attribute for each action they can take. I chose to do the mapping
      on the frontend to keep the API more true to how the backend considers the permissions,
      but I could be convinced to flip that.
    path: app/src/components/views/Members/InviteEditMemberBlade/EntityAccess/util.ts
    created_at: '2025-06-09T23:17:32Z'
  replies:
  - id: 2138575685
    author: stathis-alexander
    body: "Are we making repeated calls from the frontend to set the config, or is\
      \ it one batch call with a bunch of permissions? I'd generally lean to move\
      \ this logic into the backend because at it's core it's business logic. \r\n\
      \r\nIn the current impl, any consumer of the mutation / API needs to ensure\
      \ it follows reasonable rules about granting permissions (what does it mean\
      \ to have write with no read access?). If moved to the backend, that's not true.\
      \ I think we forsee setting a bunch of weird custom permission configs, then\
      \ we leave as is. If we don't, and we are largely going to do this, then maybe\
      \ move. "
    created_at: '2025-06-10T18:52:44Z'
  pr_author: JaredWF
