  root:
    id: 2205314094
    author: stathis-alexander
    body: I think it would be slightly more natural here to use an obj versus an array
      but it's possible you're avoiding it so you don't have to deal with renaming?
    path: packages/vulcan/utils/src/calculateItemFigures.ts
    created_at: '2025-07-14T16:16:57Z'
  replies:
  - id: 2206140666
    author: ctotheameron
    body: 'I have no preference - I tend to like tuples but I can change '
    created_at: '2025-07-15T02:20:17Z'
  - id: 2206176263
    author: ctotheameron
    body: "This is what it looks like with an object (acting as a \"named\" tuple)\r\
      \n\r\n```ts\r\nconst { numValid, numInvalid, numMissing } = Object.values(\r\
      \n  validationResults,\r\n).reduce<{ numValid: number; numInvalid: number; numMissing:\
      \ number }>(\r\n  (counts, v) => {\r\n    if (isRight(v)) return { ...counts,\
      \ numValid: counts.numValid + 1 }\r\n\r\n    return v.left[0].type === \"required\"\
      \r\n      ? { ...counts, numMissing: counts.numMissing + 1 }\r\n      : { ...counts,\
      \ numInvalid: counts.numInvalid + 1 }\r\n  },\r\n  { numValid: 0, numInvalid:\
      \ 0, numMissing: 0 },\r\n)\r\n```"
    created_at: '2025-07-15T02:55:59Z'
  pr_author: ctotheameron
  merged_at: '2025-07-21T21:10:09Z'
  repo: nova
  has_suggestion_block: false
