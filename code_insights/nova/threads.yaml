  replies:
  - id: 2978426680
    author: harshaneel
    body: '`findByAngellistId` returns AccountWithOrgs which is a narrow interface
      (id, angellistId, email, displayName, organizationMembers). `ServiceContext`
      requires the full Prisma `Account` type which also has:

      1. handle

      2. legalName

      3. settings

      4. legalAgreements

      5. createdAt


      Using findByAngellistId would need an as unknown as Account cast to bridge the
      gap. `findAccountByAngellistId` returns the full Account directly so we can
      construct `ServiceContext` without any casting.'
