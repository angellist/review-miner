- thread_id: 2143362366
  pr: 3805
  root:
    id: 2143362366
    author: stathis-alexander
    body: "I really hate this pattern of adding a generically named `helpers` file,\
      \ they end up as dumping grounds for stuff and don't provide any semantic meaning\
      \ to help me know what's in there. \r\n\r\nGiven this just houses a single type,\
      \ could we just move this into the main component and export it from there?\
      \ That's where I'd expect to see the prop type anyways. "
    path: app/src/components/core/UserCell/helpers.ts
    created_at: '2025-06-12T18:14:16Z'
  replies:
  - id: 2143368233
    author: edance
    body: I've been doing this pattern because of circular dependency. Both the main
      component and the child use the type so I pulled it into a shared context. To
      get around this, I could put the type in the child but that feel wrong too.
      I could also compact this component into one file which solves some of that
      headache. But that's not a long term fix for this pattern.
    created_at: '2025-06-12T18:18:48Z'
  - id: 2144085057
    author: ctotheameron
    body: "I think for types specifically, it's pretty idiomatic in typescript to\
      \ have a `types.ts` file which is slightly different than what @stathis-alexander\
      \ is talking about.\r\n\r\nI tend to agree that `helpers.ts` is an anti-pattern\
      \ tho as a general rule"
    created_at: '2025-06-13T02:25:45Z'
  - id: 2144096213
    author: stathis-alexander
    body: 'For prop types specifically I wouldn''t try to be overly DRY and would
      be fine defining the same type in both files. I like to see the props right
      by the component where they''re used, and moreso I wouldn''t expect components
      to have deeply coupled interfaces. '
    created_at: '2025-06-13T02:37:03Z'
  - id: 2144097659
    author: ctotheameron
    body: That's fair, but for truly shared types that would cause circular deps theres's
      really no other option. I'm just saying that in that case we should prefer `types.ts`
      and only keep types there.
    created_at: '2025-06-13T02:39:07Z'
  pr_author: edance
  merged_at: '2025-06-12T18:36:12Z'
  repo: nova
  has_suggestion_block: false
