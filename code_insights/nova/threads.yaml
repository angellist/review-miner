  root:
    id: 2013072001
    author: edwinzhng
    body: "We currently read this from `context.dataset`, would it be possible to\
      \ continue using that instead of having this additional field?\r\n\r\nYou can\
      \ see where it's defined in `packages/datasets/country-region/src/index.ts`"
    path: packages/vulcan/schema/src/elements/address.ts
    created_at: '2025-03-25T23:35:59Z'
  replies:
  - id: 2013095496
    author: FoodProduct
    body: "My understanding of `context.dataset` is that it's a method for sharing\
      \ common data sets among different components. The most relevant example here\
      \ is that since (prior to this PR) there is not a true \"address\" element,\
      \ we can have a \"select\" element that uses the `countries` dataset for the\
      \ country input, etc.\r\n\r\nHowever, the ADAPT `<Address />` component is intended\
      \ to internally already have the relevant data sets. The `allowedCountries`\
      \ \"prop\" is therefore different from a dataset because it functions as a restriction\
      \ on an existing data set.\r\n\r\nSo tl;dr I don't think these are the same\
      \ and I don't think we should use `context.dataset` here. Please let me know\
      \ if I am misinterpreting the current usage and/or the ask!"
    created_at: '2025-03-26T00:10:30Z'
  pr_author: FoodProduct
  merged_at: '2025-03-27T15:55:29Z'
  repo: nova
  has_suggestion_block: false
