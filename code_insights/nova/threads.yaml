- thread_id: 2146117651
  pr: 3793
  root:
    id: 2146117651
    author: stathis-alexander
    body: "I think I would prefer using a stack over using flex on the box and just\
      \ composing:\r\n```tsx\r\n<Box paddingBottom='500'>\r\n  <Stack direction='column'\
      \ gap='250'>\r\n    // ...\r\n  </Stack>\r\n</Box>\r\n```"
    path: app/src/components/views/DataRoomManager/DataRoom/components/Tabs/PipelineTab/InvestorsTable/InvestorBlade/index.tsx
    created_at: '2025-06-13T21:29:28Z'
  replies:
  - id: 2148896496
    author: campriceaustin
    body: I don't feel strongly. Happy to change.
    created_at: '2025-06-16T01:05:15Z'
  - id: 2148961192
    author: ctotheameron
    body: 'This approach results in less DOM. Seems like what we really want are a
      few more props on the `<Stack />` component. '
    created_at: '2025-06-16T02:55:56Z'
  - id: 2148998728
    author: stathis-alexander
    body: "I don't think it's a big deal either way in this particular case, but sharing\
      \ my thinking for discussion's sake: I'm personally less concerned about an\
      \ extra DOM node and more concerned about consistency. If we are worried about\
      \ DOM size / performance in ADAPT, it seems like there is higher leverage and\
      \ lower hanging fruit to address than killing a `div` tag. \r\n\r\nI generally\
      \ would view using `Box` to recreate components or behavior that are provided\
      \ by the design system components an antipattern. Put another way: having multiple\
      \ different ways to achieve the same thing often leads to hard to read code\
      \ that's difficult to maintain or refactor. In a way, `Box` is an escape valve\
      \ and I only use it when I can't achieve what I need to without it. \r\n\r\n\
      Adding more props to `Stack` could be a bit concerning as well (although `padding`\
      \ and `margin` seem very reasonable, honestly), since it would risk diluting\
      \ the semantics and turning it into a swiss army knife. \r\n\r\nAnother alternative\
      \ is to kill `Stack` and just always use flex box props, but honestly I quite\
      \ like the ergonomics and semantics of it. \r\n\r\ntl;dr: I think optimizing\
      \ the DOM here feels a bit bike sheddy and the better thing to optimize for\
      \ would be consistent patterns and readability. \r\n\r\nCurious if y'all have\
      \ thoughts about any of that?"
    created_at: '2025-06-16T03:54:45Z'
  - id: 2149001276
    author: ctotheameron
    body: I don't have a strong opinion either. Just calling out that this is a VERY
      common escape hatch that people try to use due to limitations/constraints on
      the Stack component. This kind of DOM inefficiency does eventually add up
    created_at: '2025-06-16T03:58:49Z'
  pr_author: campriceaustin
  merged_at: '2025-06-15T23:38:58Z'
  repo: nova
  has_suggestion_block: false
