  - id: 1991704742
    author: edwinzhng
    body: 'yeah probably but thought it''d be safer here to guarantee we don''t miss
      logic on the backend '
    created_at: '2025-03-12T15:01:53Z'
  - id: 1991774897
    author: sf8193
    body: "would a check constraint work here instead?\r\n\r\n```\r\nALTER TABLE template_version_file\r\
      \nADD CONSTRAINT ensure_repository_match\r\nCHECK (\r\n    (\r\n        SELECT\
      \ rf.repository_id \r\n        FROM repository_file rf \r\n        WHERE rf.id\
      \ = repository_file_id\r\n    ) = (\r\n        SELECT tv.repository_id \r\n\
      \        FROM template_version tv \r\n        WHERE tv.id = template_version_id\r\
      \n    )\r\n);\r\n```\r\n\r\nthey're a bit cleaner/more performant/maintainable/declarative.\
      \ you can also see them in the table definition.\r\n\r\nIn typeorm they show\
      \ up in the model/you can declare it there. not sure if you can do that in prisma\
      \ too, but i'd expect to be able to\r\n\r\nedit: wow you can't declare it in\
      \ schema file, that's wild https://github.com/prisma/prisma/issues/3388#issue-683998423\r\
      \n\r\nhttps://github.com/prisma/prisma/issues/3388#issuecomment-2414899510 \U0001F923\
      \ \r\n"
    created_at: '2025-03-12T15:37:04Z'
  - id: 1991906512
    author: edwinzhng
    body: ah good call, will update
    created_at: '2025-03-12T16:48:01Z'
  - id: 1991939717
    author: edwinzhng
    body: jk you can't use a subquery in a postgres check constraint, and we'd need
      to create a new join table on repository ID + template version ID to actually
      enable this
