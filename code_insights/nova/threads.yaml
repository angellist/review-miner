- thread_id: 2038208142
  pr: 3132
  root:
    id: 2038208142
    author: edwinzhng
    body: "Should we use a lock or something instead? This feels kind of brittle still\
      \ - also is it possible to unit test this race condition by adding some fake\
      \ item data and making sure the merge was as expected?\r\n"
    path: graph/src/internal/schema/transactionItem/saveItem.ts
    created_at: '2025-04-10T19:48:03Z'
  replies:
  - id: 2038244750
    author: sf8193
    body: "a lock will still cause issues i think, the problem is we're inserting\
      \ the entire json blob. So we insert data: {...firstFile, []}, and in the second\
      \ insert we insert {[], secondFile}  I outlined a few potential fixes in the\
      \ ticket\r\n\r\nhttps://linear.app/angellistv/issue/IM-2569/transact-question-incomplete-although-all-uploads-are-successful\r\
      \n\r\nprobably the most \"correct\" solution would be to move away from inserting\
      \ the whole jsonb for each item, instead doing it by field, but that's a larger\
      \ change.\r\n\r\ni can update with unit test\r\n"
    created_at: '2025-04-10T20:12:42Z'
  - id: 2038324485
    author: jogly
    body: I think sam's fix is necessary, in addition to a lock - this is precisely
      the case for `select for update` locks. in operation A, we start a `select for
      update` on the transaction item before we load the current data, merge the new
      data in, then persist & commit. that would block operation B from loading the
      current data bc it would also do a `select for update` on the same item.
    created_at: '2025-04-10T20:57:17Z'
  - id: 2038364622
    author: sf8193
    body: "i actually don't think a lock is functionally necessary here, we can do\
      \ it for safety, though i think it adds a lot of complexity for an issue i'm\
      \ not sure will practically exist, though maybe theoretically. the current timeline\
      \ looks like this\r\n\r\n- upload file a for field a\r\nWHILE FILE A UPLOADING\r\
      \n- find a file to upload for field b\r\n- A finishes uploading\r\n- B finishes\
      \ uploading \r\n- we call \"saveItem\" query for A\r\n- we call \"saveItem\"\
      \ query for B\r\n\r\nthe query for B doesn't have the input.context representing\
      \ that the query for A finished, which is the problem here.\r\n\r\nKeep in mind\
      \ we have a 2s debounce here, so the two save item calls wouldn't race unless\
      \ our p50s are god awful (>2s)"
    created_at: '2025-04-10T21:25:07Z'
  - id: 2038368016
    author: sf8193
    body: "tldr; the debounce acts as a poor mans lock, and if we were to invest more\
      \ here i would say it should be in more granular updates rather than concurrency\
      \ control\r\n\r\nput another way, even if the file uploads finished in the wrong\
      \ order because of gnarly latency, i think the merge should still work correctly.\
      \ So if we made it so we more granluarly make updates (to just the key rather\
      \ than update the whole data row), that would have the same functional effects"
    created_at: '2025-04-10T21:28:22Z'
  - id: 2038369803
    author: jogly
    body: It's not unreasonable to have wild latency distributions for file uploads,
      especially in unpredictable internet conditions, but I agree that races here
      are inherently rare. I don't feel strongly about whether its worth adding or
      not, but I do feel that a `select for update` statement is a pretty trivial
      thing to add, whereas refactoring transaction item workflow seems much more
      expensive.
    created_at: '2025-04-10T21:30:17Z'
  - id: 2038370763
    author: jogly
    body: 'I also agree that merging the JSON blobs is required regardless so the
      lock thing is separate. '
    created_at: '2025-04-10T21:31:09Z'
  - id: 2038378355
    author: sf8193
    body: "my concern with a pessmistic write is we have a long tail (say for whatever\
      \ reason it takes 10s to update subAmount: 1000 -> subAmount: 10000), now we're\
      \ blocking all updates to the entire form\r\n```\r\ndata | {\"name_8\": \"samuel\
      \ felder\", \"name_11\": \"samuel felder\", \"certForm\": [{\"id\": \"02168bfc-b9d8-4b9e-af19-c98d8859c386\"\
      , \"isPendingTransactionApproval\": false}], \"address_10\": \"415 Bryant Street\"\
      , \"address_13\": \"415 Bryant Street\", \"directorId\": [], \"articlesInc\"\
      : [{\"id\": \"28749902-7745-466a-b608-812cfd255eee\", \"isPendingTransactionApproval\"\
      : false}], \"authSignList\": [], \"citizenship_or_p_9\": \"US\", \"citizenship_or_p_12\"\
      : \"AO\"}\r\n```\r\n\r\nbecause an update to anything on the page will block\
      \ everything else on the page. If you think this is unwarranted i can just add\
      \ \r\n\r\n```\r\n          ...(prisma.$queryRaw ? { lock: { mode: 'pessimistic_write'\
      \ } } : {})\r\n```"
    created_at: '2025-04-10T21:38:43Z'
  - id: 2038445792
    author: sf8193
    body: '@edwinzhng  we discussed this in person, to confirm that this issue is
      distinct from locking issues we may run into, we can revert the saveItem.ts
      code, which runs the two mutations sequentially, then the test starts failing'
    created_at: '2025-04-10T22:34:36Z'
  pr_author: sf8193
  merged_at: '2025-04-10T22:41:49Z'
