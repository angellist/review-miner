    author: ahlec
    body: "This is a very intentional signature I'll use for hooks where one of the\
      \ return values is **required** to be used in order for the hook to work. This\
      \ style forces you to destructure and deal with (in some way) the first value\
      \ before you can get to the second value.\n\nComparing this to something like:\n\
      ```typescript\ntype HookResults = {\n  confirm: ConfirmFn;\n  dismiss: () =>\
      \ void;\n  isOpen: boolean;\n  modal: React.ReactNode;\n}\n```\nit's significantly\
      \ easier to overlook the `modal` property, not use it, and then the `useConfirm()`\
      \ hook does nothing when you call `confirm()`."
