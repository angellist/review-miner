  - id: 2656802766
    author: ctotheameron
    body: "using `string` works and you do get a template type that you want:\r\n\r\
      \n```ts\r\nexport type ServiceName = string\r\nexport type ServiceTag<S extends\
      \ ServiceName> = `${S}:${string}`;\r\n\r\nexport const ServiceTaggedError =\r\
      \n  <S extends ServiceName>(_service: S) =>\r\n  <Tag extends ServiceTag<S>>(tag:\
      \ Tag) =>\r\n    TaggedError(tag);\r\n\r\n/** Instance type of any error created\
      \ via ServiceTaggedError for a given service */\r\nexport type ServiceError<S\
      \ extends ServiceName = ServiceName> = InstanceType<\r\n  ReturnType<ReturnType<typeof\
      \ ServiceTaggedError<S>>>\r\n>;\r\n\r\nclass FooError extends ServiceTaggedError('foo')('foo:fooError')\
      \ {}\r\n```\r\n\r\nIf I try to do `'foobar:fooError'` I'll get a type error:\r\
      \n<img width=\"963\" height=\"102\" alt=\"Screenshot 2026-01-02 at 12 10 27\"\
      \ src=\"https://github.com/user-attachments/assets/094a6f1f-f647-4e82-8e7c-870d239d5555\"\
      \ />\r\n"
    created_at: '2026-01-02T04:10:39Z'
  - id: 2656807205
    author: ctotheameron
    body: "There's also this option:\r\n\r\n```ts\r\n\r\nexport const ServiceTaggedError\
      \ =\r\n  <S extends string>(service: S) =>\r\n  <Tag extends string>(tag: Tag)\
      \ =>\r\n    TaggedError(`${service}:${tag}`);\r\n\r\n/** Instance type of any\
      \ error created via ServiceTaggedError for a given service */\r\nexport type\
      \ ServiceError<S extends string = string> = InstanceType<\r\n  ReturnType<ReturnType<typeof\
      \ ServiceTaggedError<S>>>\r\n>;\r\n\r\nconst FooError = ServiceTaggedError('foo');\r\
      \n\r\nclass FooFooError extends FooError('error') {}\r\n\r\nnew FooFooError()._tag;\r\
      \n//                ^? `foo:error`\r\n```"
    created_at: '2026-01-02T04:18:11Z'
