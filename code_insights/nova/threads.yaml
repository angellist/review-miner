- thread_id: 2649596822
  pr: 6213
  root:
    id: 2649596822
    author: pradyuman
    body: "The factory pattern would be cleaner here:\r\n\r\n```typescript\r\nfunction\
      \ createTreasuryEventConsumer() {\r\n  let consumer: Consumer<TreasuryEvent>\
      \ | undefined;\r\n\r\n  return {\r\n    start: async () => {\r\n      if (consumer)\
      \ return consumer;\r\n\r\n      const commonArgs = {\r\n        stream: TREASURY_EVENTS_STREAM,\r\
      \n        filterSubject: TREASURY_EVENTS_SUBJECT,\r\n        durableName: CONSUMER_NAME,\r\
      \n      }\r\n\r\n      consumer = await Prophet.startConsumer({\r\n        ...commonArgs,\r\
      \n        handler: handleTreasuryEvent,\r\n      });\r\n\r\n      logger.info('Treasury\
      \ event consumer started', commonArgs);\r\n\r\n      return consumer;\r\n  \
      \  },\r\n\r\n    stop: async () => {\r\n      if (!consumer) return;\r\n\r\n\
      \      await Prophet.shutdownConsumers([consumer]);\r\n      consumer = undefined;\r\
      \n      logger.info('Treasury event consumer stopped');\r\n    },\r\n\r\n  \
      \  get: () => {\r\n      if (!consumer) throw new Error('Treasury event consumer\
      \ not started');\r\n      return consumer;\r\n    },\r\n\r\n    isRunning: ()\
      \ => !!consumer,\r\n  };\r\n}\r\n\r\nexport const treasuryConsumer = createTreasuryEventConsumer();\r\
      \n```\r\n\r\nIt encapsulates `consumer` but returns everything necessary to\
      \ manage it. If we care about that race condition that cursor flagged, we'd\
      \ store and manage a `startPromise` within this factory as well."
    path: graph/src/clients/treasury/consumer.ts
    created_at: '2025-12-28T09:52:07Z'
