  root:
    id: 2078709012
    author: campriceaustin
    body: 'consider: might be worth indexing on `entityId` too. composite index lookups
      are very effective on the tuple of both values, effective on the first value
      (e.g. fetch all for a given `organizationId`), and ineffective for the last
      value (e.g. fetch all for a given `entityId`). not sure we''ll ever need to
      query by just an entity, but if so, it''d be worth adding a second `@@index([entityId])`
      to cover that case.'
