- thread_id: 2069672946
  pr: 3370
  root:
    id: 2069672946
    author: cameronnapoli
    body: "I noticed there were several data rooms where cta button saving wasn't\
      \ working correctly. After investigating, it seemed to be due to a `null` config,\
      \ which broke [the update logic in the frontend](https://github.com/angellist/nova/blob/5e1c89f09c748e3047be3e5767837af8b4264165/app/src/components/views/DataRoomManager/Shared/ConfigureDataRoom/components/ConfigureCoverSection/EditButtonsBlade/helpers.ts#L92).\r\
      \n\r\n@campriceaustin Does this change look correct?\r\n\r\nAlso ccing @JaredWF\
      \ since I know you've done a bunch of work around LP permissions.\r\n\r\n"
    path: graph/lib/dataroom/permissionGroup/createDefaultForRoom.ts
    created_at: '2025-04-30T23:48:26Z'
  replies:
  - id: 2069709786
    author: campriceaustin
    body: 'I''m not really following the full context of the change here, but, for
      these particular lines: conceptually, I think we expected `callToActionConfig`
      to often not exist (e.g. there be no buttons). So I don''t think we want/need
      to pre-emptively created a config here? Can you say more about the `null` config
      issue and the bug?'
    created_at: '2025-05-01T00:36:43Z'
  - id: 2070457825
    author: cameronnapoli
    body: "@campriceaustin Here's a bit more context https://www.loom.com/share/abd0484e043742189288480b061fa98a?sid=d7ed7149-e99e-4ee9-9289-b61ef6fa1218\r\
      \n\r\nWould there be any side effects from initializing an empty `callToActionConfig`\
      \ for the data room permission group?"
    created_at: '2025-05-01T16:07:24Z'
  - id: 2070892956
    author: campriceaustin
    body: "Thanks for the Loom. \r\n\r\nIn general, `callToActionConfigs` are optional,\
      \ and the code everywhere (from Prisma, through graph, to app treats them as\
      \ such.\r\n\r\nThe error here is that I've incorrectly assumed the permission\
      \ group `callToActionConfig` will never be null. I think we should probably\
      \ fix that misassumption directly, maybe with something like:\r\n\r\n```\r\n\
      @@ -140,8 +140,16 @@ const isChanged = (\r\n   const originalGroup = permissionGroups.find((g)\
      \ => g.id === permissionGroupId)\r\n   if (!originalGroup) return false // Shouldn't\
      \ happen - making TS happy\r\n \r\n+  // If the original group doesn't have\
      \ a call to action config, we consider it changed if any\r\n+  // of the buttons\
      \ are enabled in the new config\r\n   const originalConfig = originalGroup.callToActionConfig\r\
      \n-  if (!originalConfig) return false // Shouldn't happen - making TS happy\r\
      \n+  if (!originalConfig) {\r\n+    return (\r\n+      callToActionConfig.templateButtonEnabled\
      \ ||\r\n+      callToActionConfig.urlButtonEnabled ||\r\n+      callToActionConfig.messageButtonEnabled\r\
      \n+    )\r\n+  }\r\n```\r\n\r\n^ disclaimer - not entirely sure that's correct.\r\
      \n\r\nIf we instead go down the path of creating a default `callToActionConfig`\
      \ whenever a permission group is created, we would probably need to go all the\
      \ way -- backfill, change the nullability in Prisma and gql, fix all the non-null\
      \ assertions and guards in app and graph etc -- so future engineers know it\
      \ will always be present and can code against that assumption."
    created_at: '2025-05-01T22:40:29Z'
  - id: 2071958185
    author: cameronnapoli
    body: Ok makes sense - I see that `callToActionConfigs` are consistently optional.
      I'll try to go down the path of fixing the incorrect assumption directly.
    created_at: '2025-05-02T17:52:21Z'
  pr_author: cameronnapoli
  merged_at: '2025-05-05T23:32:58Z'
  repo: nova
  has_suggestion_block: false
