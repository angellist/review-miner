      \ to something like:\n```typescript\ntype PreviewedFile = {\n  filename: string;\n\
      }\n\nclass TransactionSenderOverviewPage {\n  public async getPreviewedDoc():\
      \ Promise<PreviewedFile | null> {\n    // draw the rest of the owl\n  }\n}\n\
      ```\nand then you could still use it in a one-liner in your test:\n```typescript\n\
      await expect(overview.getPreviewedDoc()).resolves.toEqual(\n  expect.objectContaining<PreviewedFile>({\n\
      \    filename: \"Non-Thor-OTC-MasterConfirm.pdf\"\n  })\n);\n```\nYou could\
      \ make this a shorter call — or even just have the function return `string`\
      \ (filename) instead of `PreviewedFile — but something in this vein seems more\
      \ reusable."
