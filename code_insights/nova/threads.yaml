- thread_id: 2467382842
  pr: 5465
  root:
    id: 2467382842
    author: edwinzhng
    body: "In the Hex job, I wrote a Python fn to normalize some of these VC names\
      \ to reduce noise, I think we should do something like that here since the investor\
      \ data is not reliable:\n\n```\nimport re\n\n# Best effort attempt to remove\
      \ common suffixes from VC names so that we have a \n# standardized way to match\
      \ the top VC lists against those submitted by the GP\nCOMMON_VC_NAME_SUFFIXES\
      \ = [\n    r'-\\d+',\n    '-ventures',\n    '-venture',\n    '-capital',\n \
      \   '-holdings',\n    '-management',\n    '-partners',\n    '-investors',\n\
      \    '-global',\n    '-growth',\n    '-fund',\n    '-new-york',\n    '-california',\n\
      ]\n\ndef normalize_vc_name(name: str) -> str:\n    # Pattern to find any suffixes\
      \ at the end of the string\n    suffix_pattern = re.compile(r'(?:' + '|'.join(COMMON_VC_NAME_SUFFIXES)\
      \ + r')$', re.IGNORECASE)\n\n    # Keep removing suffixes until nothing matches\n\
      \    while suffix_pattern.search(name):\n        name = suffix_pattern.sub('',\
      \ name)\n\n    return name.replace('-', '').lower()\n```"
    path: capital-api/lib/investorTier.ts
    created_at: '2025-10-27T23:11:45Z'
  replies:
  - id: 2467533935
    author: cameronnapoli
    body: I also did something similar in [notablePortcos.ts](https://github.com/angellist/nova/blob/523a7b3725be917cce8a3cec2d014b22c996ce2c/capital-api/lib/email/templates/notablePortcos.ts).
      We might want to consolidate that logic.
    created_at: '2025-10-28T00:41:33Z'
