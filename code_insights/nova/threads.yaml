    body: "Using recursion here feels a lot more natural (and readable) to me.\r\n\
      \r\n```suggestion\r\nconst getRandom2DDistribution = (attempt = 0): string[]\
      \ => {\r\n  if (attempt >= 50) {\r\n    return [\r\n      \"company_research\"\
      ,\r\n      \"portfolio_analysis\",\r\n      \"portfolio_analysis\",\r\n    \
      \  \"company_research\",\r\n      \"transactions\",\r\n      \"benchmarks\"\
      ,\r\n    ]\r\n  }\r\n\r\n  const candidate = shuffleArray(BASE_DISTRIBUTION)\r\
      \n  const isValid = !ADJ_PAIRS.some(([i, j]) => candidate[i] === candidate[j])\r\
      \n\r\n  return isValid ? candidate : getRandom2DDistribution(attempt + 1)\r\n\
      }\r\n```"
