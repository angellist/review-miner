- thread_id: 2213691295
  pr: 4323
  root:
    id: 2213691295
    author: sf8193
    body: 'this `.use` call is the key to this all working. `.use `unwraps and uses
      the resource (s3 connection here), and gets rid of the resource once it''s done.
      the problem previously was the .use wasn''t nested, and so we were waiting for
      the zip to finish so we could release the n connections where n is number of
      files '
    path: pdfops/src/main/scala/nova/pdfops/PDFOpsService.scala
    created_at: '2025-07-17T15:38:15Z'
  replies:
  - id: 2213711237
    author: sf8193
    body: 'as an aside, my preference would be we always "eagerly" .use, if for nothing
      else but to get us closer to our code culture across rest of company. It is
      really hard to reason about the describe/execute paradigm when we''re so used
      to our much more procedural one, and this is the 3 or 4+ bug i''ve seen this
      year due to the confusion '
    created_at: '2025-07-17T15:47:21Z'
  - id: 2213716136
    author: stathis-alexander
    body: "Yeah I grok it. The general flow is:\r\n1. construct a list of resources,\
      \ these are like delayed actions (anon fcns that haven't been called yet)\r\n\
      2. batch the resources up\r\n3. iterate over the batches\r\n    4. we use `use`\
      \ here so that we open the files in the batch in parallel but don't move on\
      \ until we close everything in this batch \r\n    \r\nI assume `use` on the\
      \ `perSequence` resource propagates down to a `use` on each resource in the\
      \ sequence? "
    created_at: '2025-07-17T15:49:41Z'
  - id: 2213812548
    author: sf8193
    body: "iiuc, you mean it does this\r\n\r\n```\r\n  resource1.use { file1 =>\r\n\
      \    resource2.use { file2 =>\r\n      resource3.use { file3 =>\r\n        //\
      \ Process files 1, 2, 3\r\n      }\r\n    }\r\n  }\r\n  ```\r\n  \r\n  in which\
      \ case yea that is what parSequence does to my knowledge"
    created_at: '2025-07-17T16:34:45Z'
  pr_author: sf8193
  merged_at: '2025-07-17T18:19:10Z'
  repo: nova
  has_suggestion_block: false
