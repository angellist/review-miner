- thread_id: 2997337891
  pr: 7418
  root:
    id: 2997337891
    author: michael-breedlove
    body: '@cameronnapoli like we discussed, we''re not optimizing for performance
      here, but there''s a potential performance hit when a GP publishes an update
      after inviting tens of LPs, the matchmaking process checks the organization
      of each invited LP to see if their feature flag is enabled. That''s a sequential
      HTTP call per LP. The intersection of matchmaking hits and directly-invited
      orgs should be small, but it could add up.


      If the direct invites rollout is quick, this should be okay as we will remove
      the check. If it''s a slow rollout, we might want to attempt to optimize with
      Promise.all or similar.


      This only applies to searchFromOpportunity, searchfromOrganization only has
      to check the one org.'
    path: capital-api/lib/opportunity/match/search/searchFromOpportunity.ts
    created_at: '2026-03-26T19:53:10Z'
  replies:
  - id: 2997759075
    author: cameronnapoli
    body: Maybe we can add a `fetchOrganizations`, so that we only have a single cross-service
      call?
    created_at: '2026-03-26T21:28:20Z'
  - id: 2997812407
    author: ywplee-al
    body: "i don't think it's worth adding this but we can do this if this becomes\
      \ a problem \n``` js\n  // 1. Collect\n  const orgsToCheck = [...new Set(\n\
      \    hits.filter(h => directInviteOrgIdSet.has(h.organizationId)).map(h => h.organizationId)\n\
      \  )];\n\n  // 2. Fetch in parallel (still N calls, but concurrent not sequential)\n\
      \  const orgResults = await Promise.all(\n    orgsToCheck.map(id => fetchOrganization({\
      \ orgId: id }))\n  );\n  const excludeSet = new Set(\n    orgResults.filter(o\
      \ => o?.enableDirectInvitesConsolidation).map(o => o!.id)\n  );\n\n  // 3. Filter\n\
      \  return hits.filter(h => !excludeSet.has(h.organizationId));\n```"
    created_at: '2026-03-26T21:40:57Z'
