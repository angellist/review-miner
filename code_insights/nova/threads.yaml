      \            SELECT jsonb_agg_strict(removed_name)\r\n                FROM (\r\
      \n                    SELECT jsonb_delete(elem, 'fillableObjectName') as removed_name\r\
      \n                    FROM jsonb_array_elements(tv.\"data\"->'views'->'fillableDocuments')\
      \ as elem\r\n```"
