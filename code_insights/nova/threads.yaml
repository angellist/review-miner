    author: cameronnapoli
    body: "Yes that's correct — we need to replace the org member check logic with\
      \ \"org member OR AL admin\". For example, here's a prev PR where we added that:\
      \ https://github.com/angellist/nova/pull/2987\r\n\r\nFWIW I also suggested the\
      \ approach to have some sort of AL admin middleware that would add them to the\
      \ org (via a UI or automatically), but Garret/Matt didn't think it would be\
      \ best to take that route.\r\n\r\nThe ideal state is to maintain the status\
      \ quo of venture and allow ops folks to easily pop into data rooms to make changes.\r\
      \n\r\nMight be worth it to jam on this on a call. I'll ping you on Slack!"
