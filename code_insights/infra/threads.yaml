  root:
    id: 2884775030
    author: philrhinehart
    body: Just curious, what do these values map to? The attr names are pretty opaque
    path: pulumi/jit/index.ts
    created_at: '2026-03-04T16:25:40Z'
  replies:
  - id: 2885270525
    author: amvinnu
    body: "Looks like this is the convention for single-table design in DynamoDB.\
      \  \r\n\r\n https://aws.amazon.com/blogs/compute/creating-a-single-table-design-with-amazon-dynamodb/\
      \ \r\nhttps://www.alexdebrie.com/posts/dynamodb-single-table/\r\n> PK/SK/GSI1PK/GSI1SK\
      \ became the convention specifically for single-table designs because the same\
      \ column stores semantically different values across entity types.\r\n\r\nI\
      \ added a doc to the aws-jit repo documenting the datamodel. https://github.com/angellist/aws-jit/blob/main/docs/dynamodb-schema.md"
    created_at: '2026-03-04T18:02:20Z'
  pr_author: amvinnu
  merged_at: '2026-03-04T18:15:45Z'
  repo: infra
  has_suggestion_block: false
- thread_id: 2898223649
  pr: 363
  root:
    id: 2898223649
    author: philrhinehart
    body: Just curious, why'd we need the namespace in the name?
    path: packages/infra/src/cdk8s/console.ts
    created_at: '2026-03-06T22:45:36Z'
  replies:
  - id: 2902394931
    author: amvinnu
    body: "The sanitizedName is the PersistentVolume name. Since PVs are cluster-scoped\
      \ (no namespace), and the original PV (treasury-console-read-stash) was already\
      \ bound to a PVC in the treasury namespace, when we moved the readonly console\
      \ to treasury-ro, K8s wouldn't let us rebind the existing PV (PV bindings are\
      \ immutable). I hit this error during staging deployment:                  \
      \                                      \r\n```                             \
      \                                                                          \
      \                                                                          \
      \                              \r\n  The PersistentVolumeClaim \"console-read-stash\"\
      \ is invalid: spec: Forbidden: spec is immutable after creation except resources.requests\
      \                                                                       \r\n\
      ```                                                                        \
      \                                                                          \
      \                                                             \r\nThe fix was\
      \ to include namespace in the PV name so a new PV gets created that binds to\
      \ the PVC in treasury-ro. Both PVs point to the same EFS filesystem — no data\
      \ loss, we just needed this new binding."
    created_at: '2026-03-08T20:42:00Z'
  pr_author: amvinnu
  merged_at: '2026-03-09T20:17:52Z'
  repo: infra
  has_suggestion_block: false
