    path: pulumi/document-service/Pulumi.prod-us-west-2.yaml
    created_at: '2026-02-05T23:18:49Z'
  replies:
  - id: 2771560731
    author: philrhinehart
    body: Yea this is a bit janky, but bc of how we need to reference a kubernetes
      secret that is created by cert manager. Pulumi makes this very difficult to
      do cleanly, so this is a hack to get around that
    created_at: '2026-02-05T23:20:33Z'
  - id: 2771609751
    author: harshaneel
    body: '@amvinnu Did some digging with claude on this when I wrote this PR, it''s
      a chicken and egg problem. The initial deployment will fail if `selfSignedCaReady:
      true` because Pulumi would try to read a CA certificate secret that doesn''t
      exist yet. cert-manager needs time to generate and store the certificate. Setting
      it to false on first deploy creates the cert-manager resources but skips the
      Temporal namespace creation. Once cert-manager provisions the secret, I can
      set it to true and deploy again to create the Temporal Cloud namespace with
      the CA certificate for mTLS authentication.'
    created_at: '2026-02-05T23:40:52Z'
  - id: 2771613983
    author: harshaneel
    body: "When I run pulumi preview I see this:\r\n```\r\nPreviewing update (staging-us-west-2)\r\
      \n\r\nView in Browser (Ctrl+O): https://app.pulumi.com/angellist/document-service/staging-us-west-2/previews/e43cb898-65a4-4b9a-b7f0-b990d78fa390\r\
      \n\r\n     Type                                                Name        \
      \                        Plan       Info\r\n     pulumi:pulumi:Stack       \
      \                          document-service-staging-us-west-2             \r\
      \n +   └─ angellist:application:Temporal                   angellist-document-service\
      \          create     1 warning\r\n +      └─ angellist:app:TemporalCa     \
      \                 document-service                    create     \r\n +    \
      \     ├─ kubernetes:cert-manager.io/v1:Certificate  document-service-ca-cert\
      \            create     \r\n +         └─ kubernetes:cert-manager.io/v1:Issuer\
      \       document-service-ca-issuer          create     \r\n\r\nDiagnostics:\r\
      \n  angellist:application:Temporal (angellist-document-service):\r\n    warning:\
      \ Skipping Temporal namespace creation for angellist-document-service: no CA\
      \ certificate available. Set temporal:selfSignedCaReady to true once cert-manager\
      \ has created the CA secret, or provide a temporal:caCertificate config value.\r\
      \n````"
    created_at: '2026-02-05T23:42:46Z'
