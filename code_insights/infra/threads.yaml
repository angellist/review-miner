    author: philrhinehart
    body: 'This makes it a bit tricky to define fine grained permissions for apps.


      e.g. if an app needs to consume from topic A and produce to topic B, there''s
      not really a great way to specify that.


      I''m more inclined to abstract this piece away less.


      Maybe we follow the pattern used [here](https://github.com/angellist/infra/blob/7d8e33b66415ea32f4af60d55c111c3ae8486045/pulumi/kafka/src/MskPodIdentityRole.ts#L20-L29)
      and have a `mskPermissions` arg that takes a func.


      [example](https://github.com/angellist/infra/blob/main/pulumi/kafka/src/KafkaConnect.ts#L89-L122)


      Slightly more verbose at the app layer, but unambiguous about the permissions
      being applied


      Alternatively, could just accept a readTopicPatterns and a write patterns separately.
      Then add permissions accordingly. No role needed'
    path: packages/infra/src/app/MskPodIdentityAddon.ts
