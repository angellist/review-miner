  - id: 2592811012
    author: philrhinehart
    body: 'Also worth noting that we do see this happen occasionally in the zeus cluster
      too (timeouts on these cross cluster auth calls).


      [Logs](https://app.datadoghq.com/logs?query=Operation%20timed%20out%20subrequest%20kube_cluster_name%3A%2A%20kube_namespace%3Aingress-nginx-public&agg_m=count&agg_m_source=base&agg_q=kube_cluster_name&agg_t=count&analyticsOptions=%5B%22bars%22%2C%22warm%22%2Cnull%2Cnull%2C%22value%22%5D&cols=host%2Cservice&flat_group_bys=true&fromUser=true&messageDisplay=inline&refresh_mode=sliding&sort_m=count&sort_t=count&storage=hot&stream_sort=desc&top_n=10&top_o=top&viz=timeseries&x_missing=true&from_ts=1763733252556&to_ts=1764942852556&live=true)


