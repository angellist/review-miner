- thread_id: 2473392621
  pr: 15
  root:
    id: 2473392621
    author: stathis-alexander
    body: "The problem with hoisting package.json is that now anytime we upgrade something,\
      \ it creates a diff in _all_ stacks that we have to go resolve. That's fine\
      \ in an auto-deployment sense, but gets sketchy if there's some reason we can't\
      \ do a full apply or if the diffs pop out weird. \n\nMy knee-jerk reaction for\
      \ now is to keep separate workspaces / deps / lockfiles / whatever-you-call-it,\
      \ which keeps more stuff fixed in the interim while we are moving things around. "
    path: stacks/package.json
    created_at: '2025-10-29T14:19:21Z'
  replies:
  - id: 2473479461
    author: philrhinehart
    body: Yea agreed, I went back and forth on this. It's nice in theory but may cause
      more problems than it solves.
    created_at: '2025-10-29T14:32:54Z'
  pr_author: philrhinehart
  merged_at: '2025-10-29T16:59:01Z'
  repo: infra
  has_suggestion_block: false
