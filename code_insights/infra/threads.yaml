    id: 2581246626
    author: stathis-alexander
    body: 'Passing in the config name here is a bit weird. We''re kind of all over
      the place with how we do this right now. I don''t think it''s problematic for
      a component to require a specific key?


      I think an interesting pattern to explore could be something where we define
      the config shape / type required by a component somewhere in the code, then
      just load the config into an object of that type. '
    path: packages/infra/src/app/opensearch.ts
    created_at: '2025-12-02T13:41:09Z'
  replies:
  - id: 2581911407
    author: philrhinehart
    body: "Yea, the reason I made this configurable was just to support cases where\
      \ something needs to create multiple es domains. So this allows having like\
      \ an `esA` and `esB` in the config to differentiate. The other way to do this\
      \ cleanly is to just explicitly pass the `pulumi.Config` object into the constructor\
      \ args.\r\n\r\n> I think an interesting pattern to explore could be something\
      \ where we define the config shape / type required by a component somewhere\
      \ in the code, then just load the config into an object of that type.\r\n\r\n\
      Yea, this could be nice. Will thing about this as a follow up. Once we find\
      \ a pattern that we're happy with, I'd like to do similarly for the RDS dbs.\
      \ None of these are really doing anything custom that can't be generalized into\
      \ a shared class powered via config/params"
    created_at: '2025-12-02T16:17:13Z'
  - id: 2581941652
    author: philrhinehart
    body: Will keep this as-is for now, but can come back and think about what pattern
      we want to land on longer term
    created_at: '2025-12-02T16:24:35Z'
  - id: 2582358272
    author: stathis-alexander
    body: "> Yea, this could be nice. Will thing about this as a follow up. Once we\
      \ find a pattern that we're happy with, I'd like to do similarly for the RDS\
      \ dbs. None of these are really doing anything custom that can't be generalized\
      \ into a shared class powered via config/params\r\n\r\nTotally aligned. I think\
      \ we could lean into more complex YAML objects inside of the config that we\
      \ can then load up. Arrays, Objects, etc, allow us to provide pretty rich structured\
      \ data inside of the config. "
    created_at: '2025-12-02T18:26:57Z'
