    body: 'Just confirming my understanding: so `resourceNames: [name]` here scoping
      the k8s role to a specific konsole template (based on `metadata.name` values)?'
    path: packages/infra/src/cdk8s/console.ts
    created_at: '2026-02-09T19:02:33Z'
  replies:
  - id: 2784182509
    author: philrhinehart
    body: Also, is this scoped to a specific namespace?
    created_at: '2026-02-09T19:32:54Z'
  - id: 2786080662
    author: amvinnu
    body: ">Just confirming my understanding: so resourceNames: [name] here scoping\
      \ the k8s role to a specific konsole template (based on metadata.name values)?\r\
      \ncorrect.  `resourceNames: [name]` scopes the konsoletemplates/use permission\
      \ to the specific KonsoleTemplate by its metadata.name. e.g. console-read can\
      \ only use the console-read template.\r\nWithout this, any Role granting konsoletemplates/use\
      \ could be used to create a Konsole against any template in the namespace.\r\
      \n\r\n\r\n>Also, is this scoped to a specific namespace?\r\nyes, the `global-console-writers\
      \ group` only grants write console access within the namespace where the RoleBinding\
      \ exists. A RoleBinding like this is created in the namespace when the cdk8s\
      \ manifest is applied:\r\n```\r\napiVersion: rbac.authorization.k8s.io/v1\r\n\
      kind: RoleBinding\r\nmetadata:\r\n  labels:\r\n    app.kubernetes.io/component:\
      \ console-write\r\n    app.kubernetes.io/name: ipseity\r\n  name: console-write\r\
      \nroleRef:\r\n  apiGroup: rbac.authorization.k8s.io\r\n  kind: Role\r\n  name:\
      \ console-write\r\nsubjects:\r\n  - apiGroup: rbac.authorization.k8s.io\r\n\
      \    kind: Group\r\n    name: global-console-writers\r\n```"
    created_at: '2026-02-10T06:38:07Z'
  pr_author: amvinnu
  merged_at: '2026-02-10T19:14:42Z'
  repo: infra
  has_suggestion_block: false
