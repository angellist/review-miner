- thread_id: 2739447965
  pr: 233
  root:
    id: 2739447965
    author: philrhinehart
    body: 'I feel like this approach makes this a bit harder to reason about. Would
      be good to keep index.ts as the main like all other stacks.


      Probably cleaner to just drive most of this from config (e.g. add config params
      to enable/disable the resources like vpc). Then the logic is easy to follow.


      But if we''re planning to add a lot more resources that are specific to support
      services, just creating a separate project is probably better.'
    path: pulumi/aws/Pulumi.yaml
    created_at: '2026-01-29T02:14:02Z'
  replies:
  - id: 2743116364
    author: harshaneel
    body: "@philrhinehart Hmm good point. I looked at what resources are created in\
      \ index.ts today (using claude) I find this:\r\n\r\n  | Resource | VPC-related?\
      \ |                                                                        \
      \                                                                          \
      \             \r\n  |----------|--------------|                            \
      \                                                                          \
      \                                                         \r\n  | `awsx.classic.ec2.Vpc`\
      \ | ✅ Yes - core VPC |                                                     \
      \                                                                          \
      \             \r\n  | `aws.ec2.VpcEndpoint` (S3) | ✅ Yes - VPC endpoint |  \
      \                                                                          \
      \                                                        \r\n  | Redislabs route\
      \ | ✅ Yes - VPC route |                                                    \
      \                                                                          \
      \                    \r\n  | `aws.efs.FileSystem` (stash) | ⚠️ Depends on VPC\
      \ for mount targets |                                                      \
      \                                                               \r\n  | `awsx.classic.ec2.SecurityGroup`\
      \ | ✅ Yes - VPC security group |                                           \
      \                                                                          \
      \   \r\n  | `aws.efs.MountTarget` | ✅ Yes - requires VPC subnets |         \
      \                                                                          \
      \                                              \r\n  | `aws.rds.SubnetGroup`\
      \ | ✅ Yes - VPC subnet group |                                             \
      \                                                                          \
      \              \r\n  | `aws.elasticache.SubnetGroup` | ✅ Yes - VPC subnet group\
      \ |                                                                        \
      \                                                     \r\n  | `aws.iam.ServiceLinkedRole`\
      \ (ES) | ❌ **No** - IAM, not VPC |                                         \
      \                                                                          \
      \        \r\n  | Datadog IAM Role + policies | ❌ **No** - IAM, not VPC |   \
      \                                                                          \
      \                                                   \r\n  | `aws.s3.Bucket`\
      \ (assets) | ❌ **No** - S3, not VPC |\r\n  \r\n  I can create configs like:\r\
      \n  1. `skipVpcResources`\r\n  2. `skipDatadogRole`\r\n  3. `skipAssetsBucket`\r\
      \n  \r\nBut I feel like this config starts becoming too specific, that it makes\
      \ sense to create a separate dir under pulumi and leave current setup as it\
      \ is in the `main` branch. I only need to create pulumi role in support services\
      \ account tbh."
    created_at: '2026-01-29T19:13:37Z'
