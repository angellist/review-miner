    id: 2669095769
    author: stathis-alexander
    body: "I envisioned doing this differently:\r\n```\r\nkeypair: \r\n  publicKey:\
      \ // ...\r\n  privateKey:  // ...\r\n\r\nnonSecretKey: nonSecretValue\r\nsecretKey:\
      \ \r\n  fingerprint: // ...\r\n  secret: // ...\r\n\r\n// ...\r\n```\r\n\r\n\
      then parsing is like: \r\n```js\r\nif (typeof value === 'string') {\r\n  return\
      \ value;\r\n} else {\r\n  // expect fingerprint, secret and decrypt\r\n} \r\n\
      ```\r\n\r\nThen we use the actual `yaml` structure determines how we react to\
      \ it, rather than just kind of like using objects for everything. "
    path: packages/infra/src/configtool.ts
    created_at: '2026-01-07T16:15:01Z'
  replies:
  - id: 2669929362
    author: philrhinehart
    body: "Yea, we could do that too. The current implementation for configtool cli\
      \ uses this format, so just matching that.\r\n\r\nMy thinking was that this\
      \ just gives a much cleaner looking file (everything is one line, just a list\
      \ of key value pairs)\r\nNobody will ever need to change these values manually\
      \ so the details are really only for our programs to read/write.\r\n\r\nWill\
      \ leave as-is for now, but we can always update"
    created_at: '2026-01-07T20:09:57Z'
