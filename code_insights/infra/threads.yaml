      \n\r\nRenaming `Cron` to `CronJob` to avoid this conflict. Open to alternative\
      \ naming if anyone has a better suggestion.\r\n\r\nNote: This will require updating\
      \ any [consumers](https://github.com/search?q=org%3Aangellist+NOT+is%3Aarchived+%22new+Cron%28%22&type=code)\
