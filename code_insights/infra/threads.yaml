- thread_id: 2524480461
  pr: 94
  root:
    id: 2524480461
    author: philrhinehart
    body: 'I don''t love this tbh. Alternatively we could pass through and env or
      cluster name and select based on that.

      Any suggestions?'
    path: packages/infra/src/cdk8s/console.ts
    created_at: '2025-11-13T18:21:36Z'
  replies:
  - id: 2524557981
    author: stathis-alexander
    body: "Yeah, I agree this feels goofy, so I looked to see if there was something\
      \ reasonable we could pass along here. Honestly, I didn't see anything super\
      \ clean that just jumped out. \n\nIt feels like this should be a broader config\
      \ obj, like an ENV var or something, and not a hardcoded string that we flip\
      \ based on this kind of arbitrary value. There's a number of ways we could do\
      \ this, none of which are likely perfect and all of which are two-way doors.\n\
      \nAnticipating need for other similar type things in the future, what I would\
      \ probably try to do here is something like:\n1. Lift all of these hard coded\
      \ strings into a common `config` object exported from the `infra` package.\n\
      2. Allow plumbing that object through somehow as a param.\n3. Then select the\
      \ right config in the actual top level `cdk8s/main.ts` based on env. \n\n\n\
      So kinda like:\n```ts\n// infra/config.ts\n\nconst hermesConfig = { \n  // ...\n\
      \  consoleVolumeHandle:  'fs-099b197f39b392e89',\n};\nconst zeusConfig = { \n\
      \  // ...\n  consoleVolumeHandle: 'fs-6bc5056f',\n};\n\nconst configForCluster\
      \ = (clustName: string) => {\n  if (clusterName == 'zeus') return zeusConfig;\n\
      \  if (clusterName == 'hermes') return hermesConfig;\n\n  throw new Error('invalid\
      \ cluster name');\n}\n ```\nyou could switch this on `env` or whatever, doesn't\
      \ need to be `cluster`, although I suspect that cluster-by-cluster may be the\
      \ right central identity, then:\n```ts\n// cdk8s/main.ts\n\nclass App(...) {\n\
      \  const clusterName = // logic to determine cluster\n  const clusterConfig\
      \ = configForCluster(clusterName);\n\n  const commonArgs = {\n    image,\n \
      \   secret,\n    serviceAccount,\n    config: clusterConfig, \n  };\n\n  //\
      \ ...\n\n  new Console(this, 'console', commonArgs);\n}\n```\n\nIdk. This might\
      \ end up being wrong, but it's _an idea_. "
    created_at: '2025-11-13T18:46:02Z'
  pr_author: philrhinehart
  merged_at: '2025-11-14T16:06:55Z'
  repo: infra
  has_suggestion_block: false
