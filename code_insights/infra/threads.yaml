  root:
    id: 2709917084
    author: philrhinehart
    body: 'Allows adding a comment in the Dockerfile like `# IMAGE_TAGS: 0.50.0`

      And we''ll then tag the image with additional tags derived from that:

      - `production-<commitHash>-arm64` (standard)

      - `production-0.50.0-arm64` (from comment)


      `IMAGE_TAGS` can be a comma separated list to include multiple values if needed'
    path: .buildkite/pipeline.rb
    created_at: '2026-01-20T20:11:44Z'
  replies:
  - id: 2710044176
    author: stathis-alexander
    body: 'Would it make more sense to take image tags as just structured data as
      a key / value pair? I guess I''m not clear around the constraint we''re working
      around. '
    created_at: '2026-01-20T20:56:48Z'
  - id: 2710214509
    author: philrhinehart
    body: "What did you have in mind for how/where we'd specify the key-val pairs?\r\
      \n\r\nThe main thing I was trying to avoid with this approach was having tags\
      \ specified in wildly different places.\r\ne.g. since the tag in this particular\
      \ case are tied to versions specified in the Dockerfile, I wanted it to be (hopefully)\
      \ pretty obvious that we should update the tag, when the versions in the file\
      \ were updated.\r\n\r\nThe only other though I had was to hardcode image->tag\
      \ mapping in `pipeline.rb`, but figured we'd end up forgetting to update the\
      \ tags and then break something."
    created_at: '2026-01-20T21:56:36Z'
  - id: 2710262011
    author: philrhinehart
