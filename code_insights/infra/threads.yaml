- thread_id: 2931482633
  pr: 376
  root:
    id: 2931482633
    author: philrhinehart
    body: What was this being used for before?
    path: pulumi/atlas/src/buildkitd.ts
    created_at: '2026-03-13T14:18:28Z'
  replies:
  - id: 2934032027
    author: tibiegyed
    body: 'Tbh I''m not 100% sure. It looks like the rootless docker [image](https://github.com/moby/buildkit/blob/master/Dockerfile#L503-L504)
      sets `XDG_RUNTIME_DIR` to `/run/user/1000`. If this variable is present, it
      is then used to set the [buildkitd socket path](https://github.com/moby/buildkit/blob/master/util/appdefaults/appdefaults_unix.go#L23-L32).
      I believe the intention with this env variable was to set the path to the mounted
      volume `buildkitd-2`. We also specify the arg `''--addr'', ''unix:///run/user/1000/buildkit/buildkitd.sock'',`
      which takes precedence, so I don''t think this env variable was doing anything
      for us.

      '
    created_at: '2026-03-13T22:24:27Z'
  pr_author: tibiegyed
  merged_at: '2026-03-16T14:22:52Z'
