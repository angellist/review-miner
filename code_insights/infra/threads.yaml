    path: packages/infra/src/cluster/dex.ts
    created_at: '2026-02-09T16:50:05Z'
  replies:
  - id: 2785053333
    author: philrhinehart
    body: "I did some more digging into this, but this is still a bit of a shot in\
      \ the dark.\r\n\r\nTL;DR I was still seeing the issue happen occasionally where\
      \ we get into the state where we've generated a new refresh token, invalidating\
      \ the old one, but the store didn't get updated for whatever reason, and every\
      \ subsequent request then tried to refresh with the old one.\r\n\r\nBasically,\
      \ extending the window gives us a better shot to avoid this.\r\nBut if a user\
      \ only makes a single request in the 30s (or now 300s) window, they will be\
      \ stuck in this state until the session expires (2 weeks) and every request\
      \ fill attempt and fail to refresh.\r\n\r\nThe alternative i considered was\
      \ to just disable refresh completely, but we should try to avoid that.\r\n\r\
      \nExtending this is generally no less secure since the refresh values are only\
      \ stored on our BE, so I think we could extend this further safely."
    created_at: '2026-02-09T23:35:45Z'
  pr_author: philrhinehart
  merged_at: '2026-02-08T20:22:25Z'
  repo: infra
  has_suggestion_block: false
