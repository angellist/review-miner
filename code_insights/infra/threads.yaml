  replies:
  - id: 2786089547
    author: amvinnu
    body: 'The EKS Access Entry''s kubernetesGroups: ["engineers", "global-console-writers"]
      maps the IAM role to the K8s groups at auth time. When a user authenticates
      via this IAM role, the K8s API server sees them as a member of those groups.
      Then, the RBAC RoleBinding references global-console-writers as the subject
      group to gate access.'
