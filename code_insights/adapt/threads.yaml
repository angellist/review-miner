    id: 2214453360
    author: jogly
    body: "This is so magical \U0001F61E We depend on logos having `000` in the fill\
      \ in order to flip the stroke color on black backgrounds to white:\n\n```\n\
      // Keep in sync with `svgrConfig` in `components-core/scripts/generateSvgs/svgUtil.js`\n\
      const BASE_COLORS = ['#000', '#000000', '#002B31'];\n\n/**\n * Given a plain\
      \ SVG string, replace all instances of our base colors with the given hex color.\n\
      \ * Assumes the given color has no preceding `#` (e.g. `000` instead of `#000`).\n\
      \ *\n * @param svg - The plain SVG string\n * @param color - The hex color to\
      \ replace the base colors with (e.g. `000` instead of `#000`)\n * @returns The\
      \ SVG string with the base colors replaced with the given color\n */\nconst\
      \ colorize = ({\n  svg,\n  color = '000',\n}: Pick<TransformProps, 'svg' | 'color'>)\
      \ =>\n  BASE_COLORS.reduce(\n    (acc, toReplace) => acc.replaceAll(`\"${toReplace}\"\
      `, `\"#${color}\"`),\n    svg,\n  );\n```"
    path: components-core/logos/Meridian.svg
