      \ && only the final command would get the arguments rather than both prettier\
      \ and Biome.\r\nI broke this up and inlined them so that we could target each\
      \ glob pattern with the appropriate tools, and so that each command would always\
      \ be capable of being suffixed directly with the filenames\r\n\r\nYeah this\
      \ is how I would do this, and how I did it elsewhere."
