- thread_id: 2257846266
  pr: 2303
  root:
    id: 2257846266
    author: ahlec
    body: "I think this can be simplified now to just:\r\n```typescript\r\nconst isCompact\
      \ = 'size' in item && getInputSize(item.size) === 'compact';\r\n```\r\nThe `as`\
      \ cast is no longer necessary on my local machine.\r\n\r\nThis line exposed\
      \ a bug that I didn't catch reading through the PR diff, though. As written\
      \ right now `'size' in item` is a proxy for `!isSectionItem(item)`, because\r\
      \n```typescript\r\ntype Item = RowItem | SectionItem\r\n```\r\nand only `RowItem`\
      \ defines/has a `size` property. I think that might be a bug though? In **Section.tsx**,\
      \ we define `size` on the `<RenderedSection />` component, but not on `<Section\
      \ />`. The setup for this component is the same as React Aria's approach for\
      \ tables — the `<Section />` doesn't render anything internal, it just adds\
      \ itself to a collector provided by the parent component, and then when we iterate\
      \ over that later we go ahead and render a `<RenderedSection />` to represent\
      \ it. But I think this means that we ought to have `size` on the `<Section />`\
      \ `Props` as well so that it's possible to (legally) specify that property (I\
      \ think what we're doing here will set the value, but only b/c TypeScript isn't\
      \ catching it).\r\n\r\nIf we add `size?: InputSize;` to `Props` in **Section.tsx**,\
      \ this will then wind up meaning we can simplify all of this to just something\
      \ like:\r\n```typescript\r\nconst { size } = item;\r\nif (isSectionItem(item))\
      \ {\r\n  return {\r\n    ...item,\r\n    children: Array.from(item.children).map((item)\
      \ => ({\r\n      ...item,\r\n      size: item.size ?? size ?? \"compact\",\r\
      \n    })),\r\n  };\r\n}\r\n\r\nreturn {\r\n  ...item,\r\n  size: size ?? \"\
      compact\"\r\n};\r\n```"
    path: components-core/src/components/Input/SelectSuffix.tsx
    created_at: '2025-08-06T17:32:53Z'
  replies:
