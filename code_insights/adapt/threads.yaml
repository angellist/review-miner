- thread_id: 2289402644
  pr: 2349
  root:
    id: 2289402644
    author: FoodProduct
    body: 'Bikeshed: is there a specific reason you prefer the ternary-or-null pattern
      or is that just habit from old version of React where using `&&` often caused
      the `false` string to show up?'
    path: docs/src/layout/SearchDialog/SearchDialogResultItem.tsx
    created_at: '2025-08-20T22:02:40Z'
  replies:
  - id: 2289575520
    author: ahlec
    body: "The behavior you describe is still in React. Some falsy values continue\
      \ to render, such as `0` or the `\"\"`. Doing like `{results.length && <div>Hello</div>}`\
      \ will render this when there are no results:\r\n<img width=\"789\" height=\"\
      101\" alt=\"image\" src=\"https://github.com/user-attachments/assets/e6494479-df09-4322-8a25-87abf21bcca5\"\
      \ />\r\nYou can also occasionally get into trouble with the empty string, but\
      \ less commonly. The `0` is really the big culprit here though, and omg does\
      \ this not bleed through _all_ the time.\r\n\r\nIn terms of why I prefer the\
      \ ternary-or-null pattern, it's because above all else, I don't like needing\
      \ to have complex standards to follow. Programmers have enough meaningful decisions\
      \ to make that I pretty strongly believe in getting rid of the trivial choices\
      \ so we can push out decision fatigue each day. Where possible, I prefer standards\
      \ that unambiguously just choose a single universal approach, even if other\
      \ approaches exist. `{condition ? <div /> : null}` prevents against certain\
      \ bugs that `{condition && <div />}` allows for, so it's the better pattern\
      \ to be _the_ solution to the problem. In practice in well-factored React code,\
      \ I don't think we run into scenarios where \"oh this would be meaningfully\
      \ better if it were `{condition && <div />}` over `{condition ? <div /> : null}`\"\
      \ so having a blanket rule winds up being easier on DX in the long-run."
    created_at: '2025-08-21T00:19:22Z'
  - id: 2292025254
    author: FoodProduct
    body: "I see where you're coming from, but I personally prefer the opposite.\r\
      \n* `results.length &&` always feels semantically weird to me so I either just\
      \ `!!` or use a utility like `_.isEmpty()`\r\n* In pretty much every other circumstance,\
      \ it's just overly verbose. I'm not sure I've ever run into an issue with an\
      \ empty string\r\n\r\nOverall, seems like 1 (uncommon in my experience) exception\
      \ isn't worth the extra verbosity. I don't feel strongly enough to push on it\
      \ though."
    created_at: '2025-08-21T20:04:49Z'
  pr_author: ahlec
  merged_at: '2025-08-22T18:21:20Z'
  repo: adapt
  has_suggestion_block: false
