- thread_id: 2558320370
  pr: 2469
  root:
    id: 2558320370
    author: ahlec
    body: "The implementation of this hook is to ensure that the resultant value is\
      \ always memoized. Because of the builder pattern looking like:\r\n```jsx\r\n\
      <RichTextEditor features={RichTextEditor.features.preset(\"standard\").disable(\"\
      links\")} />\r\n```\r\nyou're going to get a new copy of the builder chain every\
      \ rerender. Putting this into a `useMemo` will therefore do nothing — the reference\
      \ changes, the value does not.\r\n\r\nWe need this on initial render, so a `useState`/`useEffect`\
      \ isn't a great solution either.\r\n\r\nI wanted to reduce DX overhead for a\
      \ required component property, avoid issues where someone forgot to memoize\
      \ their value, _and_ make it easier to be concise when configuring features,\
      \ so I chose to handle memoization inside of `<RichTextEditor />` rather than\
      \ require the incoming prop to be memoized or the result of calling a custom\
      \ hook we export."
    path: components-core/src/components/RichTextEditor/private/useFeatures.ts
    created_at: '2025-11-25T02:12:12Z'
  replies:
  - id: 2558626512
    author: kevinmmarlow
    body: Can you add a condensed version of this as a comment in the hook file itself?
    created_at: '2025-11-25T05:49:26Z'
  - id: 2561128116
    author: ahlec
    body: Added!
    created_at: '2025-11-25T19:16:33Z'
  pr_author: ahlec
  merged_at: '2025-11-25T20:30:33Z'
  repo: adapt
  has_suggestion_block: false
- thread_id: 2558322713
  pr: 2469
  root:
    id: 2558322713
    author: ahlec
    body: We require `useFeatures` to be memoized because of this location. When any
      of these dependencies change, we need to change the extensions. But changing
      the extensions will tear down and recreate the `TiptapEditor` instance, which
      is very destructive. Hence the requirement for memoization and making sure that
      we get it right/avoid footguns.
    path: components-core/src/components/RichTextEditor/private/useTiptapExtensions.ts
