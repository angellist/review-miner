  - id: 2755847601
    author: ahlec
    body: "Memoization on this object will be cumbersome at best (because we have\
      \ the `nest` function that returns a new object on demand).\r\n\r\nHowever,\
      \ `FocusPosition` _is_ an object that I want memoized, because we're using it\
      \ both for O(n log n) operations (`Array.sort`) and because we're using it as\
      \ dependencies into hooks like `useEffect`.\r\n\r\nI solved for memoization\
      \ of this object within `useFocusable`:\r\n```ts\r\n// Prefer useStableMemo\
      \ since our chain array will change REFERENCE regularly, but will change\r\n\
      // VALUE rarely\r\nconst focusIdentifier = useStableMemo(\r\n  (): FocusIdentifier\
      \ => ({\r\n    key: position.key,\r\n    positionChain: position.chain,\r\n\
      \  }),\r\n  [position.key, position.chain],\r\n);\r\n```\r\nWhere `useStableMemo`\
      \ is a custom hook that operates like a `useMemo` but _also_ does deep equality\
      \ check afterwards and only returns a new reference if we're not deep equal\
      \ to the value that we generated previously."
    created_at: '2026-02-02T19:16:17Z'
  pr_author: ahlec
