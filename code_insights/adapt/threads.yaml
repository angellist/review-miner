- thread_id: 2243827693
  pr: 2303
  root:
    id: 2243827693
    author: FoodProduct
    body: I originally implemented this as a discriminated union with `compact` but
      TSC really struggled with the complexity and it triggered all sorts of errors.
      If you have a better solution, feel free to take a stab.
    path: components-core/src/components/private/InputDecorator/InputDecorator.tsx
    created_at: '2025-07-30T20:48:36Z'
  replies:
  - id: 2243962524
    author: ahlec
    body: "Looking at it locally, this seems to have been a weird expression on TypeScript's\
      \ part of a different error. I think this is pretty specific to this setup too.\
      \ I'm also not sure I exactly understand the source of the problem \U0001F613\
      \r\n\r\nThe smallest reproduction of the issue I can make is:\r\n```typescript\r\
      \ntype Compact =\r\n  | { compact?: false;  }\r\n  | { compact: true; }\r\n\r\
      \nfunction test(compact?: boolean): ({ label: string } | { aria: string }) &\
      \ Compact {\r\n  return { compact, label: \"\" }\r\n}\r\n```\r\nIn this case,\
      \ the `return` gives an error. And it's giving an error because there's no valid\
      \ return combination that accepts `compact: boolean | undefined`. It can do\
      \ `compact: false | undefined` or `compact: true` but not `compact: boolean\
      \ | undefined`. TypeScript occasionally runs into issues like this, it's because\
      \ `boolean` is actually just a union of `true | false` under the hood and I\
      \ think things get kinda messy.\r\n\r\nHowever, when I change what you have\
      \ to:\r\n```typescript\r\ntype CompactProps = {\r\n  compact: true;\r\n  emphasizeLabel:\
      \ boolean;\r\n};\r\n\r\ntype NonCompactProps = {\r\n  compact?: boolean;\r\n\
      \  emphasizeLabel?: never;\r\n};\r\n\r\nexport type WithCompactableLabelAndDescription\
      \ = (WithLabel | WithoutLabel) & (CompactProps | NonCompactProps);\r\n```\r\n\
      This fixes all of the errors you were seeing. `compact` can still be `boolean\
      \ | undefined` — but if you want access to `emphasizeLabel`, you _must_ specify\
      \ it as `true`."
    created_at: '2025-07-30T22:16:43Z'
  - id: 2243990098
    author: ahlec
    body: "But from a usability perspective, I don't think I'd recommend going this\
      \ specific route. You can write it this way, but it'll be annoying for other\
      \ devs to use when they're writing their own components.\r\n\r\nConsider a simplistic\
      \ repro of our setup:\r\n```tsx\r\n// ADAPT\r\n\r\ntype CompactProps = {\r\n\
      \  compact: true;\r\n  emphasizeLabel: boolean;\r\n};\r\n\r\ntype NonCompactProps\
      \ = {\r\n  compact?: boolean;\r\n  emphasizeLabel?: never;\r\n};\r\n\r\ntype\
      \ BaseInputProps = {\r\n  type?: 'text';\r\n  value: string;\r\n} & (CompactProps\
      \ | NonCompactProps);\r\n\r\nfunction Input(props: BaseInputProps): React.ReactElement\
      \ {}\r\n\r\n// NOVA\r\n\r\ntype NovaInputProps = {\r\n  value: string;\r\n}\
      \ & (CompactProps | NonCompactProps);\r\n\r\nfunction NovaInput({\r\n  value,\r\
      \n  compact,\r\n  emphasizeLabel,\r\n}: NovaInputProps): React.ReactElement\
      \ {\r\n  return (\r\n    <Input\r\n      compact={compact}\r\n      emphasizeLabel={emphasizeLabel}\r\
      \n      type='text'\r\n      value={value}\r\n    />\r\n  );\r\n}\r\n```\r\n\
      If you put this into TypeScript right now, you get errors within `<NovaInput\
      \ />` — because `emphasizeLabel` is `boolean | undefined`, as is `compact`.\
      \ But in order for `emphasizeLabel` to be allowed to be `boolean | undefined`,\
      \ you must be able to assert `compact` is `true`.\r\n\r\nYou'd wind up needing\
      \ to `as` cast them or do some other kind of hacky solution to make it go away:\r\
      \n```typescript\r\nfunction NovaInput({\r\n  compact,\r\n  emphasizeLabel,\r\
      \n  value,\r\n}: NovaInputProps): React.ReactElement {\r\n  return (\r\n   \
      \ <Input\r\n      {...(compact ? { compact, emphasizeLabel } : { compact })}\r\
      \n      type='text'\r\n      value={value}\r\n    />\r\n  );\r\n}\r\n```\r\n\
      \r\nThis is why I'd favor having dependent properties as _nested_ properties.\
      \ In other words:\r\n```typescript\r\n// ADAPT\r\ntype CompactConfig = {\r\n\
      \  compact: true;\r\n  emphasizeLabel?: boolean;\r\n};\r\n\r\ntype BaseInputProps\
      \ = {\r\n  type?: 'text';\r\n  value: string;\r\n  compact?: boolean | CompactConfig;\r\
      \n};\r\n```\r\nThis is much easier to compose with — because the discriminated\
      \ union isn't on the props themselves so you don't have to worry about \"unpacking\"\
      \ the union in order to specify the props when you don't actively know the value.\
      \ I think it also makes it much clearer when you're looking at the API for the\
      \ component \"oh, `emphasizeLabel` is dependent on `compact: true`\" versus\
      \ expressing it in the original way."
    created_at: '2025-07-30T22:37:44Z'
  pr_author: FoodProduct
  merged_at: '2025-08-07T14:34:52Z'
  repo: adapt
