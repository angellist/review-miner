  pr: 2395
  root:
    id: 2356127563
    author: JaredWF
    body: When would `editor` be null?
    path: components-core/src/components/RichTextEditor/private/contents/RichTextEditorContents.tsx
    created_at: '2025-09-17T16:48:48Z'
  replies:
  - id: 2356166888
    author: ahlec
    body: "When you set `useEditor({ immediatelyRender: false })`, it will return\
      \ `Editor | null`, with `null` being on initial render/on the server. My expectation\
      \ here is that it creates the `Editor` inside of a `useEffect` internally.\r\
      \n\r\nWe want this behavior because it's what's recommended for SSR. Without\
      \ this, we face the possibility of rehydration mismatches and errors, according\
      \ to Tiptap. I didn't verify them myself and took their word for it."
    created_at: '2025-09-17T17:02:10Z'
