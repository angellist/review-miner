    author: ahlec
    body: "We don't need `children` (and we should actually remove it here, and where\
      \ we find it in other codebases). For blades, we're using `title` instead, and\
      \ we hardcode as such [here](https://github.com/angellist/adapt/blob/ed90dac5107730b13886364d7be50322700e086a/components-core/src/components/Blade/views/ScrollableContentContainer/index.tsx#L89):\r\
      \n```tsx\r\n<Header {...headerProps}>\r\n  {header.title}\r\n</Header>\r\n```\r\
      \nWhen a component looks like:\r\n```tsx\r\n<div children=\"via props\">\r\n\
      \  via JSX nesting\r\n</div>\r\n```\r\nthis nesting wins out and the props are\
      \ ignored, which ultimately means that all `header.children` are ignored all\
      \ the time.\r\n\r\nI saw a few places in Nova that had this, but explicitly\
      \ also need to then copy the `children` value to `title` anyways because of\
      \ this."
    path: components-core/src/components/Blade/types.ts
    created_at: '2025-08-15T16:54:51Z'
  replies:
