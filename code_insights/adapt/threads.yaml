  root:
    id: 2268026600
    author: JaredWF
    body: "This feels a little weird. This is the suffix component, but the props\
      \ object consists of an attribute called `suffix`. Why would props not just\
      \ be `BladeFooterProps['suffix']`? Even for the footer in general, it feels\
      \ like of weird to have the props only consist of `suffix`. There's no main\
      \ content within the footer for there to be a suffix of. \r\n\r\nWe also have\
      \ two `null` checks for `suffix`, one in this component and one in `BladeFooter`.\
      \ I would expect that by the time we reach this component, `suffix` would be\
      \ defined."
