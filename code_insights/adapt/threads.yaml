    created_at: '2025-03-31T21:48:29Z'
  replies:
  - id: 2021980159
    author: ahlec
    body: "It'll depend on the context. In this case, non-cryptographically secure\
      \ pseudorandom number is fine, because we only need it to be unique amongst\
      \ all of the toasts that are currently open. It's very low-stakes, with very\
      \ low concurrency (from an average UX perspective we probably will only have\
      \ 1-2 toasts open at any time). This also is verbatim what [React Spectrum is\
      \ doing](https://github.com/adobe/react-spectrum/blob/cfe79d329ba25cf2db4316c42255f2d5a056f8ed/packages/%40react-stately/toast/src/useToastState.ts#L114)\
      \ (I copied this line directly w/o change).\r\n\r\nWe could change it, but in\
      \ this specific application here I don't think we stand to gain anything from\
      \ doing so."
