- thread_id: 2173067682
  pr: 2256
  root:
    id: 2173067682
    author: ahlec
    body: "Removing this was load-bearing to many of the animations.\r\n\r\nI don't\
      \ think there's a world in which our `<Blade />` component _isn't_ a controlled\
      \ component. I don't think we expect\r\n```jsx\r\n<Blade header={{ title: \"\
      Hello world!\" }}>\r\n  <Stack>\r\n    ...\r\n  </Stack>\r\n</Blade>\r\n```\r\
      \nto work as written — we require some form of manual opening/closing (`isOpen`/`onClose`\
      \ or `trigger`, etc).\r\n\r\nThis `setTimeout`, however, is delaying us calling\
      \ `onClose` the prop. This was leading to animation issues on exiting — we're\
      \ not calling `onClose` until 70ms after we call `state.close()`. This was causing\
      \ weird synchronization issues with `useTransition` though.\r\n\r\nRemoving\
      \ this _looks_ scary, but conceptually I think it's conceptually correct.\r\n\
      \  "
    path: components-core/src/components/Blade/Blade.tsx
    created_at: '2025-06-28T00:59:06Z'
