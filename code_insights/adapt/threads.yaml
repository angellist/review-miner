- thread_id: 2356540039
  pr: 2396
  root:
    id: 2356540039
    author: FoodProduct
    body: 'nit: isn''t this line redundant with the initial value on the line above?'
    path: components-core/src/components/RichTextEditor/private/RichTextEditorMenuContext.tsx
    created_at: '2025-09-17T19:27:19Z'
  replies:
  - id: 2356846870
    author: ahlec
    body: "I put together a CodeSandbox [here](https://codesandbox.io/p/sandbox/strange-cohen-dwm3jc)\
      \ to demonstrate how it isn't redundant.\r\n\r\nPassing in the value to `useRef`\
      \ only specifies the initial value the `ref` is populated with, and the value\
      \ on all other renders is thrown away (even if it changes).\r\n\r\nSpecifically\
      \ what I'm doing here is that I want `menuRef.current` to always be the most\
      \ recent value of the hook parameter `menu`. On every render, we'll update the\
      \ value of `menuRef.current` to what we were passed. I want this because we\
      \ don't need to add refs to dependency arrays. For example, further down in\
      \ this hook I have a `useEffect` that I only want to run when the component\
      \ is unmounted:\r\n```typescript\r\nuseEffect(() => {\r\n  return (): void =>\
      \ {\r\n    setCurrent(current => isEqual(current, menuRef.current) ? null :\
      \ current);\r\n  };\r\n}, []);\r\n```\r\nI want this to always be checking against\
      \ the most recent `menu` value, but if I used the parameter directly, I'd need\
      \ to add it to the dependency array, which means this `useEffect` cleanup would\
      \ run every time the `menu` value changed — it'd change the lifecycle of the\
      \ function."
    created_at: '2025-09-17T21:37:32Z'
  pr_author: ahlec
  merged_at: '2025-09-17T21:59:49Z'
  repo: adapt
  has_suggestion_block: false
- thread_id: 2356676505
  pr: 2396
  root:
    id: 2356676505
    author: anthonylobko
