- thread_id: 2112490544
  pr: 2216
  root:
    id: 2112490544
    author: ahlec
    body: "In the previous version of this component, if we can't load the library,\
      \ we won't proceed onto rendering the `<PhoneInput />`. In the new version,\
      \ we will — which means we'll throw the first error, but then move into rendering\
      \ the `<PhoneInput />` and get a second (or further) error when trying to access\
      \ `window.intlTelInputGlobals`.\r\n\r\nI think using `<Skeleton />` here with\
      \ `children` means that we're going to mount `<PhoneInputInner />` immediately,\
      \ both while we're loading the library and after it fails to load.\r\n\r\nSince\
      \ the current component expects/requires the library to exist when you mount\
      \ the component, it might be better for us to manually specify the loading content,\
      \ and only leave loading when we successfully load, eg:\r\n```tsx\r\nconst [hasLoadedSuccessfully]\
      \ = useState(false);\r\n\r\nif (!hasLoadedSuccessfully) {\r\n  return (\r\n\
      \    <Skeleton isLoading={true} lines={1} />\r\n  );\r\n}\r\n\r\nreturn <PhoneInputInner\
      \ />\r\n```"
    path: components-core/src/components/PhoneInput/PhoneInput.tsx
    created_at: '2025-05-28T18:15:56Z'
