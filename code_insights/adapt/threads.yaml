- thread_id: 2109828446
  pr: 2193
  root:
    id: 2109828446
    author: ahlec
    body: "Not blocking because I don't think it should impact immediately, but it\
      \ might be worth wrapping the `toReplace` in quotes -- that is, rather than\
      \ looking for `#000` we're looking for `\"#000\"` and/or `'#000'`.\r\n\r\nThe\
      \ thought here is that the shortened hex values like `#000` would match both\
      \ `#000` but also `#000000` and `#0000ff`, and as written here could wind up\
      \ colorizing it to something like `#3e3aff0ff` (in the case of `#0000ff`).\r\
      \n\r\nThis might not be happening today, which is why it isn't blocking, but\
      \ this could mean that sometime in the future someone making a tiny one-line\
      \ change to an **.svg** file or **generateIcons.js** could introduce something\
      \ that breaks email icons without realizing it."
    path: image-server/src/lib/transforms.ts
    created_at: '2025-05-27T17:58:28Z'
  replies:
  - id: 2110640313
    author: campriceaustin
    body: Yep! Will do.
    created_at: '2025-05-28T01:07:17Z'
  pr_author: campriceaustin
  merged_at: '2025-05-30T00:45:42Z'
  repo: adapt
  has_suggestion_block: false
- thread_id: 2109839836
  pr: 2193
  root:
    id: 2109839836
    author: ahlec
    body: "Food for thought, but I think this will wind up causing the size of the\
      \ icons/logos to double in disk space, including what we bundle and send to\
      \ the clients. Or, potentially more than double, since the SVG currently is\
      \ turned into JSX which we then minify, so the raw string could be longer.\r\
      \n\r\nFor the image server, do we need to go through `@angellist/adapt`? Could\
      \ it make more sense to either generate image-server specific files, or just\
      \ flat-out copy over the source **.svg** files to the image server? I think\
      \ currently the `@angellist/adapt` usage here sort-of adds more indirection\
      \ than benefit.\r\n\r\n`generateLogos` could even, like, do everything it currently\
      \ does (for `@angellist/adapt`) but then _also_ create additional files for\
      \ `image-server`, like some file like:\r\n```typescript\r\n// FILE: image-server/generated/icons.ts\r\
      \nexport const ICON_FILENAMES: Record<string, string> = {\r\n  \"2fa\": path.resolve(__dirname,\
      \ \"svgs/icons/2fa.svg\"),\r\n  \"3vertical\": path.resolve(__dirname, \"svg/icons/3vertical.svg\"\
      ),\r\n  \"4vertical\": path.resolve(__dirname, \"svg/icons/4vertical.svg\"),\r\
      \n  // ...\r\n};\r\n```"
    path: components-core/scripts/generateSvgs/generateIcons.js
    created_at: '2025-05-27T18:05:26Z'
  replies:
  - id: 2110801243
    author: campriceaustin
    body: "Yeah, I like this idea. \r\n\r\nBy exporting these strings from the package,\
      \ I was trying to avoid any chance of a directory traversal attack. I didn't\
      \ want a situation where we were accepting the kind/name, and using that to\
      \ define a file path, then reading that file (even though there are ways to\
      \ guard against malicious use).\r\n\r\nBut I hadn't thought about just straight\
      \ up generating a file from `generateSvgs`. I went with creating a single file\
      \ that contains all the SVG strings in a map. It's largeish (~280kb), but it\
      \ means we can bring all the images into memory on load and never need to perform\
      \ any file operations.\r\n\r\nIt will depend a bit on what the Dockerfile for\
      \ the image server looks like -- it will need to run `pnpm build:components`\
      \ before it copies everything from the `./image-server` folder over to a working\
      \ app dir, but that should be fine."
    created_at: '2025-05-28T03:16:32Z'
  - id: 2110803000
    author: campriceaustin
    body: If this doesn't work for any reason, we can fall back to just copying the
      asset files directly as part of the build process.
    created_at: '2025-05-28T03:18:29Z'
