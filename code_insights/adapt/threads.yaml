    path: components-layouts/src/components/AppPage/AppPageTab.tsx
    created_at: '2026-02-04T15:39:24Z'
  replies:
  - id: 2765281617
    author: ahlec
    body: This is how our `<Tab />` is implemented as well (as well as a few other
      things, like `<Menu.Item />`). They're all JSX elements that just `return null`
      but define `getCollectionNode` on their type. When we feed `children` into something
      like `useTabListState`, it will do `React.Children.forEach` and look for every
      element that defines `getCollectionNode`, and then put that into state. That's
      why, for things like our `<Tabs />` or `<Menu />`, we don't ever render `children`
      directly — it goes `children` → React Aria hook → React Aria `state.collection`
      → render.
    created_at: '2026-02-04T17:58:10Z'
