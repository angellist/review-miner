- thread_id: 2748673716
  pr: 2577
  root:
    id: 2748673716
    author: ywplee-al
    body: most likely better to return memoized object here
    path: components-layouts/src/components/AppLayout/internal/components/useAppDrawerMenuTrigger.ts
    created_at: '2026-01-31T01:53:47Z'
  replies:
  - id: 2755466305
    author: ahlec
    body: "Not in this case. The top-level object is just a wrapper object and all\
      \ locations destructure it like so:\r\n```typescript\r\nconst { menuTriggerDomProps\
      \ } = useAppDrawerMenuTrigger();\r\n```"
    created_at: '2026-02-02T17:27:14Z'
  - id: 2755621444
    author: ywplee-al
    body: "hm, without memoization here, you're essentially returning a new object\
      \ which will trigger unnecessary rerender cycle. React had a plan to automatically\
      \ handle this but don't think it's close to production ready \n\nhttps://react.dev/learn/react-compiler/introduction"
    created_at: '2026-02-02T18:08:29Z'
  - id: 2755836607
    author: ahlec
    body: "It's important to consider how this is being used. You're correct that\
      \ this returns new objects every render, and objects changing reference will\
      \ invalidate any caching. But, memoization will do nothing for us here:\r\n\
      ```typescript\r\nreturn {\r\n  menuTriggerDomProps: mergeProps(buttonDomProps,\
      \ {\r\n    onKeyDown: handleKeyDown,\r\n  }),\r\n};\r\n```\r\nThe outer object\
      \ is never used directly. It's always destructured\r\n```typescript\r\nconst\
      \ { menuTriggerDomProps } = useAppDrawerMenuTrigger();\r\n```\r\nso its reference\
      \ changing is meaningless because it's never being used.\r\n\r\nThe inner `menuTriggerDomProps`\
      \ also changes reference every render, because it's the result of `mergeProps`\
      \ which isn't memoized. We would need to put that in a `useMemo` in order to\
      \ memoize it:\r\n```typescript\r\nconst menuTriggerDomProps = useMemo(() =>\
      \ mergeProps(...), [...]);\r\nreturn { menuTriggerDomProps }\r\n```\r\nbut,\
      \ in all cases, `menuTriggerDomProps` is spread onto the React elements:\r\n\
      ```jsx\r\n<Box {...menuTriggerDomProps} />`\r\n```\r\nso its reference is also\
      \ never being used directly.\r\n\r\n`onKeyDown` also changes every render, because\
      \ `handleKeyDown` isn't memoized in a `useCallback`. However, even if we memoize\
      \ `handleKeyDown`, when we pass it into `mergeProps(...)` the result of that\
      \ function isn't memoized. This is a React Aria utility function that, well,\
      \ merges props together. For functions specifically, it looks like:\r\n```typescript\r\
      \nconst { onKeyDown } = mergeProps(\r\n  { onKeyDown: handleKeyDown1 },\r\n\
      \  { onKeyDown: handleKeyDown2 }\r\n)\r\n// onKeyDown is effectively: (e) =>\
      \ { handleKeyDown1(e); handleKeyDown2(e) }\r\n```\r\nHowever, as said before,\
      \ `mergeProps` does no memoization. We'd need to put that inside of a `useMemo`.\
      \ But React Aria also does not memoize their event handlers _or_ their return\
      \ props — so `buttonDomProps` changes every render cycle, as does `buttonDomProps.onKeyDown`\
      \ — meaning wrapping in a `useMemo` will do nothing because it changes every\
      \ cycle.\r\n\r\nAssuming we could memoize all of it though, in the end, we're\
      \ doing that in order to pass into `<Box />`, which is a thin wrapper over `<div\
      \ />`. And React will \"rerender\" native HTML elements every render cycle,\
      \ and update event listeners (which also isn't the bottleneck since React performance\
      \ is mostly impacted by DOM changes). So in this case, memoizing anything isn't\
      \ likely to have any performance impact (in the absolute best case scenario);\
      \ but in the practical real case, because of React Aria decisions, memoization\
      \ isn't even possible here and at best will only make it _look_ like you're\
      \ memoizing something.\r\n```typescript\r\nconst onKeyDown = useCallback(()\
      \ => { ... }, []);\r\n\r\n// This does nothing in practice because `buttonDomProps`,\
      \ from React Aria, changes every render/isn't memoized\r\nconst menuTriggerDomProps\
      \ = useMemo(\r\n  () => mergeProps(buttonDomProps, { onKeyDown }),\r\n  [onKeyDown,\
      \ buttonDomProps]\r\n);\r\n```"
    created_at: '2026-02-02T19:12:24Z'
  pr_author: ahlec
  merged_at: '2026-02-02T21:18:04Z'
