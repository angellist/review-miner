- thread_id: 2274406860
  pr: 2337
  root:
    id: 2274406860
    author: ahlec
    body: "I can't comment on it, but the props are still `type BladeProps = {} &\
      \ (WithTrigger | WithoutTrigger)`. The `WithTrigger` version was added back\
      \ in the original creation of this component (#1594) so they aren't a feature\
      \ request that's come in during use, and I didn't see anywhere in either codebase\
      \ that was using this route.\r\n\r\nIMO I'd be down to drop support for that\
      \ to:\r\n- Simplify our own implementation\r\n- Remove unnecessary choices\r\
      \n    - This is a theme I want to address more broadly w/ ADAPT, but generally\
      \ I think we try to offer as many possible choices as possible which is well\
      \ intentioned but means more work for us to maintain, devs have to understand\
      \ and make more choices, and usually the tradeoffs are nonexistent or extremely\
      \ minimal\r\n    - Since ADAPT has (relative to more generalized component libraries\
      \ like MUI, React Aria, Mantine) such a small target surface area to deal with,\
      \ I feel like we could be better at being opinionated in how to use the components,\
      \ and enforce practices and standards by way of our components being opinionated\r\
      \n- Overall goal to get rid of discriminated unions from the top-level `Props`"
    path: components-core/src/components/Blade/Blade.tsx
    created_at: '2025-08-13T19:26:06Z'
  replies:
  - id: 2274500744
