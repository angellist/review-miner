- thread_id: 2277269788
  pr: 2338
  root:
    id: 2277269788
    author: JaredWF
    body: 'Should this just be a separate component? The dependency list for this
      memo is pretty big. '
    path: components-core/src/components/Blade/views/Footer/BladeFooter.tsx
    created_at: '2025-08-14T17:24:41Z'
  replies:
  - id: 2277319481
    author: ahlec
    body: "I waffled on leaving a comment here as well. We don't actually need to\
      \ memoize this — we could just have the array outside of a `useMemo` and it\
      \ shouldn't have an impact on performance. But we could also take that a step\
      \ further and just make the next/prev buttons inline rather than part of the\
      \ array:\r\n```tsx\r\nexport const BladeFooter = ({ actions, navigation }: Props)\
      \ => {\r\n  const hasActionButtons = !!(actions?.length || navigation?.items.length);\r\
      \n  if (!actions?.length && !navigation?.items?.length) {\r\n    return null;\r\
      \n  }\r\n\r\n  return (\r\n    <Box\r\n      className={bladeFooter}\r\n   \
      \   paddingBottom={{ xs: '150', sm: '100' }}\r\n      paddingX='150'\r\n   \
      \ >\r\n      <Box\r\n        display='flex'\r\n        flexShrink='0'\r\n  \
      \      justifyContent='space-between'\r\n        paddingTop='100'\r\n      \
      \  width='full'\r\n      >\r\n        {navigation ? (\r\n          <BladeFooterNav\
      \ navigation={navigation} />\r\n        ) : (\r\n          <Box flexShrink='0'\
      \ />\r\n        )}\r\n        {hasActionButtons && (\r\n          <Stack direction='horizontal'>\r\
      \n            {actions?.map((action) => (\r\n              <BladeFooterAction\
      \ action={action} key={action.key} />\r\n            ))}\r\n            {navigation?.items\
      \ ? (\r\n              <>\r\n                <BladeFooterAction\r\n        \
      \          action={{\r\n                    isDisabled: navigation.activeIndex\
      \ === 0,\r\n                    key: '',\r\n                    kind: 'button',\r\
      \n                    label: 'Back',\r\n                    onPress: navigation.onRequestPrev,\r\
      \n                    variant: 'secondary',\r\n                  }}\r\n    \
      \            />\r\n                ,\r\n                <BladeFooterAction\r\
      \n                  action={{\r\n                    isDisabled:\r\n       \
      \               navigation.activeIndex === navigation.items.length - 1,\r\n\
      \                    key: '',\r\n                    kind: 'button',\r\n   \
      \                 label: 'Next',\r\n                    onPress: navigation.onRequestNext,\r\
      \n                    suffix: 'arrowRight',\r\n                  }}\r\n    \
      \            />\r\n              </>\r\n            ) : null}\r\n          </Stack>\r\
      \n        )}\r\n      </Box>\r\n    </Box>\r\n  );\r\n};\r\n```\r\nThis would\
      \ probably be my preferred way, personally. It's simpler, doesn't involve needing\
      \ to make an array, and we also avoid any chance of having a React `key` collision."
    created_at: '2025-08-14T17:37:16Z'
