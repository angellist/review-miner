  - id: 2632153813
    author: ahlec
    body: "That's a good callout and something I waffled on a bit. The answer is \"\
      maybe\" but I chose \"no\" in the end.\r\n\r\nAll of the type checking here\
      \ is because we run this function every time the **_metadata.json** file changes.\
      \ If someone saves the file while it's temporarily invalid (invalid JSON, doesn't\
      \ adhere to schema, etc), we'd run this function and fatal error and potentially\
      \ crash the docs site, which would suck for DX. But we also have the **svg-metadata-json**\
      \ CLI checker to actually catch those errors in CI and tell you about them;\
      \ we don't _need_ the docs site to do it for us. So I left this as silent for\
      \ now because the defensiveness here is only to keep the docs site from crashing,\
      \ and it's simpler (I don't need to worry about loggers and error messages and\
      \ stuff)."
