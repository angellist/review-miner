- thread_id: 2629200588
  pr: 2502
  root:
    id: 2629200588
    author: FoodProduct
    body: "[Non-blocking/bikeshed] it feels weird to define the type on the function.\
      \ Why not\n```suggestion\n  const filteredSvgs: readonly SvgMetadata<T>[] =\
      \ useMemo((): readonly SvgMetadata<T>[] => {\n```\n?"
    path: docs/src/components/SvgSearchTable/SvgSearchTable.tsx
    created_at: '2025-12-18T01:45:39Z'
  replies:
  - id: 2632131891
    author: ahlec
    body: "Defining the type on the function passed in makes for better error messages.\r\
      \n```typescript\r\ntype User = {\r\n  id: string;\r\n  name: string;\r\n  permissions:\
      \ {\r\n    view: boolean;\r\n    edit: boolean;\r\n    admin: boolean;\r\n \
      \ };\r\n};\r\n```\r\nPutting the type annotation on the variable:\r\n<img width=\"\
      951\" height=\"391\" alt=\"image\" src=\"https://github.com/user-attachments/assets/629ca9ff-7aa7-4787-aa78-aaee219fa7be\"\
      \ />\r\nPutting the return type annotation on the function:\r\n<img width=\"\
      1120\" height=\"307\" alt=\"image\" src=\"https://github.com/user-attachments/assets/7600b771-2982-4bb8-af9b-7c09b4d2ac63\"\
      \ />\r\n\r\nWe also get autocomplete suggestions when we put it as a return\
      \ type annotation\r\n```typescript\r\ntype User = {\r\n  id: string;\r\n  name:\
      \ string;\r\n  kind: \"user\" | \"admin\";\r\n};\r\n```\r\n<img width=\"368\"\
      \ height=\"133\" alt=\"image\" src=\"https://github.com/user-attachments/assets/218a64b1-db9a-469e-9334-2cd20fe4808b\"\
      \ />\r\n<img width=\"719\" height=\"144\" alt=\"image\" src=\"https://github.com/user-attachments/assets/0570a6bf-d9f1-413d-9446-5265889d3392\"\
      \ />\r\n\r\nThe reason for all of this is that, even with type inference, putting\
      \ the type annotation on the end variable doesn't go backwards into `useMemo`\
      \ to constrain it. What we're saying with\r\n```typescript\r\nconst users: readonly\
      \ User[] = useMemo(() => [...]);\r\n```\r\nis \"take the result of `useMemo`\
      \ (whatever type it gives you) and then attempt to assign it into a `readonly\
      \ User[]`.\" Putting the type annotation on the variable catches type issues\
      \ at the destination; putting it on the return type of the function stops them\
      \ at their source.\r\n\r\nOf important note here, you can get the exact same\
      \ benefits of the return type annotation by instead specifying the generic argument\
      \ explicitly:\r\n```typescript\r\nconst users = useMemo<readonly User[]>(()\
      \ => [...]);\r\n```\r\nI just personally prefer to always specify return types\
      \ on my functions, because as a consistent style across all usages/all hooks/all\
      \ `Array.` functions it works more cleanly (specifying generic argument here\
      \ is fine b/c there's only 1, but that approach breaks down when there are 4\
      \ arguments, or you want an argument to be inferred — TypeScript [doesn't support\
      \ specifying partial generics](https://github.com/microsoft/TypeScript/issues/26242)\
      \ which sucks and I check this issue regularly). My approach also plays nicely\
      \ with the ESLint rule [`@typescript-eslint/explicit-module-boundary-types`](https://typescript-eslint.io/rules/explicit-module-boundary-types/)."
    created_at: '2025-12-18T18:23:25Z'
  pr_author: ahlec
  merged_at: '2025-12-18T19:17:46Z'
  repo: adapt
  has_suggestion_block: true
