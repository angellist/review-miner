- thread_id: 2370742086
  pr: 2400
  root:
    id: 2370742086
    author: FoodProduct
    body: '[Non-blocking] Is this actually necessary? Is there a scenario where the
      code would get here and `cancelled` is still relevant?'
    path: components-core/src/components/RichTextEditor/private/toolbar/actions/RichTextEditorToolbarImage.tsx
    created_at: '2025-09-23T01:01:28Z'
  replies:
  - id: 2373298494
    author: ahlec
    body: "Yes, it is still relevant:\r\n\r\nThere are two things that can cause this\
      \ cleanup to trigger:\r\n* `setState` call\r\n    * If we haven't already cancelled/finished\
      \ the image upload, we **should** cancel it\r\n    * We **shouldn't** call `setState`\
      \ afterwards — we've been superseded by another location that's taken control\
      \ of the FSM, so we don't want to abort → `setState({ state: \"idle\" })` (because\
      \ of the event listener) when somewhere else more recently made the decision\
      \ to show an error\r\n* The component unmounts\r\n    * If we're still trying\
      \ to upload an image, we **should** cancel it (we're destroying the whole `<RichTextEditor\
      \ />` instance, we don't need to insert an image still)\r\n    * We **shouldn't**\
      \ call `setState` afterwards — calling `setState` after the component unmounts\
      \ should be avoided in React (React considers it an indicator that you have\
      \ a memory leak/a component shouldn't leave code that runs beyond the lifecycle\
      \ of the component that triggered it)\r\n\r\nThe `cancelled` is here for both\
      \ cases.\r\n\r\nThat said, looking at the implementation, there is an unrelated\
      \ bug in the area — I don't want us to trigger the `AbortController` if we've\
      \ already resolved. I think it'll in practice be a noop, but I'd prefer we just\
      \ don't call it at all. "
    created_at: '2025-09-23T19:48:04Z'
