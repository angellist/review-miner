    author: FoodProduct
    body: "I'm hesitant on this one too. The `heading` role is [defined as](https://developer.mozilla.org/en-US/docs/Web/Accessibility/ARIA/Reference/Roles/heading_role)\r\
      \n> The heading role defines this element as a heading to a page or section\r\
      \nbut in reality these timeline items aren't actually heading page sections"
    path: components-core/src/components/Timeline/TimelineItem.tsx
    created_at: '2025-05-02T13:46:55Z'
  replies:
  - id: 2112687139
    author: ahlec
    body: "I think if anything, this might just be missing the ARIA heading level\
      \ (specifically as a lower value there). heading level 1 would be page, but\
      \ level 2 is a heading for a section under a level 1, level 3 under level 2,\
      \ etc.\r\n\r\nThe `heading` role heads up a page, but could also a section,\
      \ and i think once we get down to level 5 or so, yeah a `<Stat />` is a deeply-nested\
      \ section, and this `<Box />` does act as the `heading`."
    created_at: '2025-05-28T20:26:13Z'
