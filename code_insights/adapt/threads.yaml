    body: "For `buildBody`, during the upgrade I copied in the original [`TableLayout.buildBody`](https://github.com/adobe/react-spectrum/blob/f8f1a39f122dc7372e943c8e5f03cd45223ae712/packages/%40react-stately/layout/src/TableLayout.ts#L271)\
      \ this was forked from and ran a diff (the diff is reversed here — the original\
      \ code is + and our fork is -). This confirmed that the only change we've made\
      \ is removing the 40px padding all around when the table is empty or when it\
      \ has loading state.\r\n<img width=\"767\" alt=\"image\" src=\"https://github.com/user-attachments/assets/714c909d-4b91-47af-ba96-fb05e808288a\"\
      \ />\r\nadobe/react-spectrum#6613 removed these whole sections from `buildBody`.\
      \ `TableLayout` will now just space things out using `padding` and `gap`, both\
      \ of which default to `0` unless specified in the options (which we don't do).\r\
      \n\r\nFor `buildColumn` and `buildCell`, we were overriding the functions so\
      \ that we could make the first column of the table sticky when you scroll horizontally.\
      \ adobe/react-spectrum#6613 also added a `TableLayout.isStickyColumn(column)`,\
      \ so we no longer need to do this manually in overrides.\r\n\r\nThis comment\
      \ did remind me though that I needed to check out whether the `zIndex` behavior\
      \ we're doing as well for sticky columns is still relevant/necessary. I left\
      \ a `TODO` there that I need to return to. "
