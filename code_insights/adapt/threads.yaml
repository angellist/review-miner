      \ looks like:\r\n```typescript\r\ntype Props = {\r\n  definition: Exclude<BladeFooterProps[\"\
      suffix\"], undefined>;\r\n}\r\n\r\nfunction BladeFooterSuffix({ definition }:\
      \ Props) {\r\n  ...\r\n}\r\n```"
