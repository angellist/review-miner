  replies:
  - id: 2411746465
    author: ahlec
    body: "I hadn't been aware that we were trying to get rid of this style configuration\
      \ specifically. I've been aware that we're wanting to get rid of stuff like:\r\
      \n```typescript\r\nimport { Props as TooltipProps } from \"../Tooltip\";\r\n\
      \r\ntype HeaderProps = {\r\n  tooltipProps?: TooltipProps;\r\n};\r\n```\r\n\
      but I don't know that I'd want to replace that with something like\r\n```typescript\r\
      \ntype HeaderProps = {\r\n  tooltip?: React.ReactElement;\r\n}\r\n```\r\ninstead.\
      \ I think having configuration objects where what you're configuring is an abstraction\
      \ rather than the direct React component props is really useful. In the case\
      \ of `<RichTextEditorLinkInlineMenuView />` actually, the only reason I made\
      \ this a component in the first place was to simplify the boilerplate for adding\
      \ buttons — if we're not able to do that because we don't want to allow for\
      \ config objects at all on the props, I'd prefer to just completely get rid\
      \ of the component because otherwise it would just be like 10 lines of extremely\
      \ simplistic structure.\r\n\r\nI think David's recent refactor work on the `<Blade\
      \ />` component reaffirmed this distinction too. We have config objects there,\
      \ like `header: BladeHeaderProps`; but that's not just `HeaderProps`, but instead\
      \ us picking just the fields we want to allow, and adding some abstraction on\
      \ top of it (eg, `pinned` is part of `BladeHeaderProps` because it's conceptually\
      \ relevant to this use case, but it isn't even a property of `<Header />`)."
    created_at: '2025-10-07T19:56:47Z'
