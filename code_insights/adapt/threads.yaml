    body: "> I broke apart pnpm lint:staged because lint-staged [appends the filenames\
      \ after the command](https://www.npmjs.com/package/lint-staged#configuration).\
      \ This means that we would make a call like pnpm lint:staged /src/foo.ts /src/bar.ts.\
