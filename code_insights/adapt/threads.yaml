- thread_id: 2694676370
  pr: 2539
  root:
    id: 2694676370
    author: FoodProduct
    body: I feel pretty strongly that we shouldn't use generic names like "refresh"
      in the codebase. The names become stale very quickly and don't get cleaned up
      and you inevitably end up with another version and the names become quite ambiguous/confusing
