- thread_id: 2356700245
  pr: 2396
  root:
    id: 2356700245
    author: FoodProduct
    body: My brain is kind of breaking on why we need to use both the parameter, the
      current state, and the current ref value 😵
    path: components-core/src/components/RichTextEditor/private/RichTextEditorMenuContext.tsx
    created_at: '2025-09-17T20:30:28Z'
  replies:
  - id: 2356860749
    author: ahlec
    body: "We talked about this in our 1:1, but putting an explanation here.\r\n\r\
      \nMy goal with `setOpen` is as follows:\r\n- `setOpen(false)` → `context.setOpenMenu(null)`\
      \ if `context.openMenu == menu`\r\n- `setOpen(true)` → `context.setOpenMenu(menu)`\
      \ if `context.openMenu == null`\r\n- `setOpen` must _never_ change reference\r\
      \n    - This is because this hook is meant to be a drop-in replacement for `useState`,\
      \ whose `setState` function is an unchanging reference\r\n\r\nThe simplest possible\
      \ way to write this kind of function would be something like (for clarity, I've\
      \ fully qualified the values of variables):\r\n```typescript\r\nconst setOpen\
      \ = useCallback((next: boolean): void => {\r\n  if (next) {\r\n    if (context.openMenu\
      \ === null) {\r\n      context.setOpenMenu(hookParams.menu);\r\n    }\r\n\r\n\
      \    return;\r\n  }\r\n\r\n  if (isEqual(context.openMenu, hookParams.menu))\
      \ {\r\n    context.setOpenMenu(null);\r\n  }\r\n\r\n  return;\r\n}, [context.openMenu,\
      \ hookParams.menu]);\r\n```\r\nHowever, `setOpen` changes reference whenever\
      \ the context changes. It also requires that `hookParams.menu` be memoized (or\
      \ else this is an unmemoized function).\r\n\r\nI can eliminate the dependency\
      \ on `context.openMenu` by using the `context.setOpenMenu((current) => ...)`\
      \ signature. This drops the dependencies down to just `hookParams.menu`. I can\
      \ then remove that dependency by way of\r\n```typescript\r\nconst menuRef =\
      \ useRef(hookParams.menu);\r\nmenuRef.current = hookParams.menu;\r\n```\r\n\
      Within `setOpen`, I _exclusively_ use `menuRef` — I never access `hookParams.menu`\
      \ directly. This allows me to still access the always-most-recent `hookParams.menu`\
      \ value but _without_ requiring the `setOpen` function to change reference.\
      \ This is sometimes a code smell, but it's also the only really safe way to\
      \ go about solving for this constraint."
    created_at: '2025-09-17T21:46:59Z'
  - id: 2356877184
    author: ahlec
    body: "One of the confusions here is that I'm shadowing the hook parameter `menu`\
      \ with my destructing of `menuRef`\r\n```typescript\r\nconst { current: menu\
      \ } = menuRef;\r\n```\r\nSo the rest of this function it _looks_ like I'm referencing\
      \ the hook parameter, but it's just the ref instead. I don't particularly like\
      \ shadowing because it makes this kind of thing confusing, but we don't prohibit\
      \ it within ADAPT/use it often, so I followed that approach here."
    created_at: '2025-09-17T21:58:59Z'
