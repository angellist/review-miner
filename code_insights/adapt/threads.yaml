- thread_id: 2268048992
  pr: 2320
  root:
    id: 2268048992
    author: ahlec
    body: "You can leverage TypeScript to force you to handle new `suffix`es when\
      \ you define them.\r\n\r\nFirst, specify an explicit return type of `React.ReactElement\
      \ | null`:\r\n```typescript\r\nexport const BladeFooterSuffix = ({ suffix }:\
      \ Props): React.ReactElement | null => {\r\n```\r\nExact types are flexible,\
      \ but you specifically want something that a JS `Object` isn't a valid return\
      \ for.\r\n\r\nYou will need to switch to doing\r\n```typescript\r\nswitch (suffix.kind)\
      \ {\r\n  case \"buttons\": {\r\n    return suffix.buttons.map(...);\r\n  }\r\
      \n}\r\n```\r\nHowever, you have to do that anyways. The current code won't work\
      \ when there are multiple `kind`s, because you've destructured `kind` from `suffixProps`\
      \ and TypeScript has lost the binding that `kind` dictates the type of `suffixProps`\
      \ (you can test this yourself by changing `BladeFooterProps[\"suffix\"]` → `ButtonsSuffix\
      \ | { kind: \"foo\" };`)\r\n\r\nThen, add a `default` `case` to the `switch`\
      \ block:\r\n```typescript\r\nswitch (suffix.kind) {\r\n  ...\r\n  default: {\r\
      \n    return suffix;\r\n  }\r\n}\r\n```\r\nRight now, this is valid TypeScript.\
      \ We've handled every possible `kind`, so the `suffix` variable evaluates to\
      \ `never` and we can `return never` in cases like this.\r\n\r\nHowever, the\
      \ moment that you define a new `kind`, this now evaluates as an object, which\
      \ isn't valid as `React.ReactElement | null`. It'll be a type error until we\
      \ add support for it.\r\n\r\nI prefer doing this wherever possible as structuring\
      \ code in this way leverages TypeScript to ensure that new features — regardless\
      \ of whom they're added by — don't fall through the cracks/people forget to\
      \ update this-or-that file."
    path: components-core/src/components/Blade/views/Footer/BladeFooterSuffix.tsx
    created_at: '2025-08-11T21:22:51Z'
  replies:
  - id: 2268115005
    author: FoodProduct
    body: 'Ah this was also copy/paste from the header impl -- good catch! I didn''t
      even notice 👍 '
    created_at: '2025-08-11T22:02:29Z'
  pr_author: FoodProduct
  merged_at: '2025-08-12T18:17:51Z'
  repo: adapt
  has_suggestion_block: false
