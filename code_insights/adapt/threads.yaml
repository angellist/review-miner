- thread_id: 2179253029
  pr: 2264
  root:
    id: 2179253029
    author: ctotheameron
    body: "Truthfully, the issue is with FocusScope... While putting together the\
      \ previous PR I at one point attempted to see if there was an easy way to detect\
      \ if we're inside a focus scope, but the resulting Dom that it creates is weird\
      \ and inconvenient (non-performant) to traverse.\r\n\r\nIt looks something like\
      \ like:\r\n\r\n```html\r\n<div id=\"box-containing-focus-scope\">\r\n  <span\
      \ data-focus-start=\"true\" hidden=\"true\" />\r\n  <div id=\"box-inside-of-focus-scope\"\
      \ />\r\n  <span data-focus-scope-end=\"true\" hidden=\"true\" />\r\n</div>\r\
      \n```\r\n\r\nSo essentially the query to detect if you're \"inside\" a focus\
      \ scope is to search up the tree until you you find a parent node where one\
      \ of it's children ALSO contains these focus bookend spans as a sibling of one\
      \ of your ancestors...\r\n\r\n\r\nI think a better approach might be for us\
      \ to just wrap FocusScope in our own context provider and consume it or smth.\
      \ Not sure if this is worth doing "
    path: components-core/src/components/Dialog/Dialog.tsx
    created_at: '2025-07-02T06:45:31Z'
  replies: []
  pr_author: ctotheameron
  merged_at: '2025-07-02T07:44:39Z'
  repo: adapt
  has_suggestion_block: false
