- thread_id: 2299496752
  pr: 2359
  root:
    id: 2299496752
    author: ahlec
    body: "This needed to be changed following #2303.\r\n\r\nThat PR generally propagated\
      \ a refactor from `compact={true}` to `size=\"compact\"`. However, in `<Option\
      \ />` ([**Option.tsx**](https://github.com/angellist/adapt/blob/07db8e34af274e20c46b1e10d3683e3afef5c01e/components-core/src/components/ListBox/Option.tsx#L38))\
      \ we take whatever React node was there and then `cloneElement` with new properties\
      \ coming out of [`useListBoxOption`](https://github.com/angellist/adapt/blob/07db8e34af274e20c46b1e10d3683e3afef5c01e/components-core/src/components/ListBox/useListBoxOption.ts#L117)\
      \ — one of which is `size: \"compact\"` (in the case of this test.\r\n\r\nThis\
      \ _ultimately_ means that we were effectively generating something like:\r\n\
      ```jsx\r\n<Text size=\"compact\">Create new</Text>\r\n```\r\n\r\nThe implementation\
      \ of `<Text />` takes whatever `size` value it gets in props and prepends it\
      \ with `text` (assuming that TypeScript protected us and we're only getting\
      \ values like `\"100\"` or `\"200\"`). We then pass this to Vanilla Extract,\
      \ expecting we're giving a value like `text100` or `text200`.\r\n\r\nIn this\
      \ case, we're actually passing it `textcompact`, which isn't defined, and Vanilla\
      \ Extract fatally errors (as it does whenever it receives an invalid value).\r\
      \n\r\nI've worked around it for the moment by just swapping the component to\
      \ avoid this."
    path: components-core/src/components/ComboBox/ComboBox.test.tsx
    created_at: '2025-08-26T01:29:28Z'
  replies:
  - id: 2300842473
    author: FoodProduct
    body: Interesting. I would love if we never used `cloneElement`
    created_at: '2025-08-26T12:30:36Z'
  pr_author: ahlec
  merged_at: '2025-08-26T02:18:17Z'
  repo: adapt
  has_suggestion_block: false
