- thread_id: 2430893277
  pr: 2432
  root:
    id: 2430893277
    author: FoodProduct
    body: '```suggestion

      The reason the `RichTextEditorImageUploader` does not just return a `Promise`
      is because we also need to include an [AbortController](https://developer.mozilla.org/en-US/docs/Web/API/AbortController).
      This allows the `<RichTextEditor />` to signal to your upload code that the
      user has canceled the image upload. This signal is bidirectional, though &mdash;
      if your function (or a third code location) signals to abort, the `<RichTextEditor
      />` will treat it as the upload canceling and will quit the process and close
      the relevant UI.

      ```

