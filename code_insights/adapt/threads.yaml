      \n    let isMounted = true;\r\n    const loadIntlTelInput = async () => {\r\n\
      \      try {\r\n        setLoading(true);\r\n        await import('intl-tel-input');\r\
      \n      } catch (er) {\r\n        throw 'Missing `intl-tel-input` dependency\
      \ for phone input';\r\n      } finally {\r\n        if (isMounted) {\r\n   \
      \       setLoading(false);\r\n        }\r\n      }\r\n    };\r\n\r\n    loadIntlTelInput();\r\
      \n    return (): void => {\r\n      isMounted = false;\r\n    };\r\n  }, []);"
