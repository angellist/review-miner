- thread_id: 2268010434
  pr: 2320
  root:
    id: 2268010434
    author: ahlec
    body: "I'll stay by saying that I'm OK with this approach and we could merge it.\
      \ Since you'd ask for like, a thorough API/architecture review, I took longer\
      \ to give my not-super-blocking thoughts.\r\n\r\nLooking at `BladeHeaderProps`,\
      \ there's a BUNCH of props — many of which are only used when we aren't pinned\
      \ (we spread onto `<Header />` [here](https://github.com/angellist/adapt/blob/fc791ffd341aa961645f26f9fd09c0a89686148d/components-core/src/components/Blade/views/ScrollableContentContainer/index.tsx#L91)\
      \ which we _don't_ do when we [aren't pinned](https://github.com/angellist/adapt/blob/fc791ffd341aa961645f26f9fd09c0a89686148d/components-core/src/components/Blade/views/TitleAndTopNav/index.tsx#L153)).\
      \ My gut tells me we probably don't need most of those other properties (from\
      \ `HeaderProps`) since they aren't consistently/formally part of our spec —\
      \ setting `as` or `color` only works in some cases, without being documented,\
      \ so have we not known/addressed those limitations b/c nobody's actually doing\
      \ that?\r\n\r\nI would probably go about doing it something like:\r\n```typescript\r\
      \ntype ComplexHeaderConfig = {\r\n  eyebrow?: React.ReactNode;\r\n  text: string;\r\
      \n}\r\n\r\ntype BladeProps = {\r\n  children: React.ReactElement | string;\r\
      \n  overlay?: boolean;\r\n  // ... include other non-Blade props here\r\n\r\n\
      \  /* BladeHeaderProps → HeaderProps[\"description\"] */\r\n  description?:\
      \ React.ReactNode;\r\n  /* BladeHeaderProps[\"title\"] → HeaderProps[\"children\"\
      ] → string */\r\n  header: string | ComplexHeaderConfig;\r\n  /* BladeHeaderProps[\"\
      font\"] */\r\n  headerFont?: BoxProps[\"fontFamily\"];\r\n  /* BladeHeaderProps[\"\
      pinned\"] */\r\n  isHeaderPinned?: boolean;\r\n  /* BladeHeaderProps[\"suffix\"\
      ] & { kind: \"nav\" } */\r\n  navigation?: NavSuffix;\r\n  /* BladeHeaderProps[\"\
      suffix\"] & { kind: \"overflowMenu\" } */\r\n  overflow?: OverflowMenuSuffix;\r\
      \n  /* BladeFooterProps[\"suffix\"] */\r\n  actions?: ButtonsSuffix;\r\n}\r\n\
      ```\r\nI did an audit of our usage of ADAPT `<Blade />` in the codebases now.\r\
      \n\r\n* Nova: **10** usages total\r\n    * 4/10 use `description`\r\n    * 3/10\
      \ use `font`\r\n    * 0/10 use `eyebrow`\r\n* Venture: **2** usages total (there's\
      \ an older custom `<Blade />` component still in primary use)\r\n    * 1/2 uses\
      \ `subtitle` — bleedthrough from `HeaderProps` (will talk more on that later)\r\
      \n\r\nThe reasoning here:\r\n* The `header` prop indicates the _what_ that we're\
      \ rendering (it's only answering a single question)\r\n    * I wanted to optimize\
      \ for the general case — just let you set `header=\"Add User\"` and be done\
      \ with it\r\n    * If you need something more complex — additional `eyebrow`\
      \ alongside your `text` — then you can specify that\r\n        * We're still\
      \ _just_ answering the same original question: \"_what_ are we rendering?\"\r\
      \n        * This is just meant as a more structured alternative to `string |\
      \ React.ReactNode` in effect\r\n* `description` is a mainline prop because,\
      \ looking at implementation, it's not strictly part of the header\r\n    * Specifically,\
      \ when we have a pinned header, the `description` _doesn't_ stay pinned (we\
      \ don't render it with the [pinned header](https://github.com/angellist/adapt/blob/fc791ffd341aa961645f26f9fd09c0a89686148d/components-core/src/components/Blade/views/TitleAndTopNav/index.tsx#L176),\
      \ and instead we always render it [inside `<ScrollableContentContainer />`](https://github.com/angellist/adapt/blob/d66d59416a2f4826b969f9f8f885c261e7e51f21/components-core/src/components/Blade/views/ScrollableContentContainer/index.tsx#L96)\
      \ in the same DOM spot\r\n* Because `font` isn't about _what_ we're rendering\
      \ but rather _how_ it looks, I'd put it as a different property\r\n    * I waffled\
      \ on \"should we even have this prop?\" for a while, because I'm not sure what\
      \ the guidelines are for when we don't want a consistent font family — is this\
      \ the right prop to be exposing, or is this too much freedom, or is this a proxy\
      \ for some _other_ thing a la \"when pinned, `display`; otherwise, `default`?\"\
      \ But I erred on keeping it for now\r\n* I split `suffix` out into their own\
      \ descriptive props\r\n    * This _does_ introduce our need to support like\
      \ \"you specified both `overflow` _and_ `navigation` — but we ought to structure\
      \ our implementation such that this is really easy\r\n    * This protects against\
      \ the kinds of breaking API changes we're doing in this and #2324\r\n    * In\
      \ general I think we lean _way_ more heavily on the affix approach than we need\
      \ to — it's great for like, icon or avatar on a `<Text />` element, but we have\
      \ a lot of mainline functionality that winds up being put there because it's\
      \ easier/because \"hey it comes after the text too so that's a suffix\""
    path: components-core/src/components/Blade/Blade.tsx
    created_at: '2025-08-11T21:01:49Z'
  replies:
  - id: 2268016992
    author: ahlec
    body: "As a secondary note, we have a _lot_ of props on `BladeHeaderProps` today\
      \ that we don't officially support. Because we're effectively doing `HeaderProps\
      \ & { title: string }`, we get all of these other props on the official type\
      \ — `as`, `color`, `subtitle`, `before`.\r\n\r\n1. Those are only going to work\
      \ when `!pinned`, despite being documented for both\r\n2. Many duplicate actual\
      \ official props — `avatar` and `suffix`, or `subtitle` and `description`\r\n\
      \r\nWe actually have a number of locations in Nova and Venture doing this today.\
      \ I'd definitely opt for _at the very least_ switching from `Omit` to `Pick`:\r\
      \n```typescript\r\nexport type BladeHeaderProps = Pick<HeaderProps, 'font' |\
      \ 'description' | 'eyebrow'> & {\r\n  title: HeaderProps['children'];\r\n  pinned?:\
      \ boolean;\r\n  suffix?: NavSuffix | OverflowMenuSuffix;\r\n};\r\n```\r\nbut\
      \ my ideal would be that we just don't use `HeaderProps` at all and then inline\
      \ the props:\r\n```typescript\r\nexport type BladeHeaderProps = {\r\n  font?:\
      \ HeaderProps[\"font\"];\r\n  description?: HeaderProps[\"description\"];\r\n\
      \  eyebrow?: HeaderProps[\"eyebrow\"];\r\n  title: HeaderProps['children'];\r\
      \n  pinned?: boolean;\r\n  suffix?: NavSuffix | OverflowMenuSuffix;\r\n};\r\n\
      ```\r\nI think this latter version is way easier to read."
    created_at: '2025-08-11T21:06:07Z'
  - id: 2268075806
    author: ahlec
    body: 'Following up on my assertion that "we probably don''t need most of these
      [inherited-from-`HeaderProps`] props" when I did my audit of the current usages,
      there were like 4 locations that used one of those props — three place used
      `subtitle`, two places used `before: { kind: "avatar" }`, and one place used
      `subtitle`. All other props are unspecified from what I saw.'
    created_at: '2025-08-11T21:34:37Z'
  - id: 2268145109
    author: FoodProduct
    body: "Interesting discussion and thank you for diving deep here \U0001F64F. There\
      \ are several points here so I'll try to address them separately.\r\n1. Unioning\
      \ with `Pick<>`s and `Omit<>`s is something we've discussed before and implicitly\
      \ agreed to move away from (despite tradeoffs), so I should have just proactively\
      \ updated these since I'm updating the API anyway. Mea culpa. Side note: I discovered\
      \ that this exact pattern with `<Header />` is also used in `<Modal>` so I suspect\
      \ it has many of the same issues \U0001F622\r\n3. I strongly disagree that we\
      \ should separate header content and styling props -- that's just very unintuitive.\r\
      \n4. Low conviction: considering `description` part of header vs body is a bit\
      \ hair-splitty, but because it \"behaves\" with the header (and I can't imagine\
      \ it ever doing otherwise) I can see the reason it is currently lumped with\
      \ the header.\r\n5. I do like the direction of splitting function (e.g. overlay)\
      \ from location (e.g. header suffix) -- that's the direction I took in https://github.com/angellist/adapt/pull/2324\
      \ and you have some nice suggestions for taking that further \U0001F44D "
    created_at: '2025-08-11T22:25:15Z'
  - id: 2268180273
    author: ahlec
    body: "re: \"considering `description` as part of header vs. body,\" I think it's\
      \ important to note that the `description` neither functionally nor visually\
      \ is part of the header when `pinned`. In this [playroom](https://adapt.angellist.com/playroom/#?code=N4Igxg9gJgpiBcIA8AhANgQ1gHQHYAJ8ALGLGAJwF5hg9DCAXASwbRnn2xHTPwAlSsclwA0degDMIuBhy5QmAZwAOmAJ6jxhWIrDkmy5tLkgAKkSX5LDEvh16DRggHcSBGzGKCKVxfmVMuLgwUJoE9AFBIRwM5ACuMOIAvkniSgDyyjC44tIAwmgQijDUEnG4YE74zgAUAJT4wCl4AHziqBAAHm3hhMAAguTkGGoAdBLkEAC2NcD4bLgA5jYcAJzr%2BEl1o1MYyjU1TA2ULfg1SKYwnQz4ANYwatRMSS08sPiQMtkMSAD0l9cWnU6qlwn8UF0euDMLAeiARCAPFMYIoEABtEBoJiLIgMEAAXQRziYUBsqPgaIAzAAmAAMIgAjNSABy0-FJIA),\
      \ you can see that the description renders outside of the header visually, and\
      \ it also scrolls away (that is, it doesn't respect `header.pinned`) despite\
      \ being located inside the `header` object.\r\n<img width=\"979\" height=\"\
      562\" alt=\"image\" src=\"https://github.com/user-attachments/assets/4a0a7310-3315-40c7-acea-a18ab221f86c\"\
      \ />\r\n\r\nRegarding separating header content from styling props, that's maybe\
      \ the wrong takeaway here. That isn't my criteria — rather, I think reducing\
      \ prop nesting (`header={{ title: \"foo\", font: \"display }}`) makes it easier\
      \ to read, document, and understand; and, I think that having properties be\
      \ responsible for one thing rather than multiple things is good. In this case,\
      \ I wanted to clearly indicate why I was OK with having `header: string | ComplexHeaderConfig\
      \ ` but not having `font` as part of it. It's because `ComplexHeaderConfig`\
      \ is still only responsible for the same job as the `string` variant.\r\n\r\n\
      Looking at our current documentation site, any prop put into a nested object\
      \ doesn't get documented — so `font` and `subtitle` and `description` and so\
      \ on currently don't show up. When we look at other component libraries out\
      \ there, they're also choosing to break apart what could be \"nested\", multi-purpose\
      \ props into standalone top-level component props; consider [Menu](https://mantine.dev/core/menu/?t=props)\
      \ from Mantine, which has `arrowOffset`/`arrowPosition`/`arrowSize`, or [Popover](https://mui.com/material-ui/api/popover/#popover-prop-anchorOrigin)\
      \ from MUI which has `anchorEl`/`anchorOrigin`/`anchorPosition`.\r\n\r\nFinally,\
      \ I also think it helps us factor better code and build better components. When\
      \ we go the route of\r\n```typescript\r\ntype Props = {\r\n  header: BladeHeaderProps;\r\
      \n  footer: BladeFooterProps;\r\n}\r\n```\r\nI think this winds up become a\
      \ bit of a leaky abstraction. It winds up allowing _us_ to think about the `<Blade\
      \ />` as just a proxy for \"`<Header />` + `<Box />` inside of a `<Stack />`\"\
      \ and it forces our customers to think about it the same way. `BladeHeaderProps[\"\
      font\"]` continues to stand out as weird to me — if we're setting the header\
      \ to a different font family, should we have it apply to the body as well? When\
      \ we build these really large multi-_purpose_ props like `BladeHeaderProps`,\
      \ we:\r\n1. Build nested components and utilities that depend on/require too\
      \ much data they don't use — (`collapseHeaderAt` takes in `BladeHeaderProps`\
      \ despite using 2 values on it)\r\n2. Bleed through implementation concerns\r\
      \n    - Choosing ill-fitting prop names because the underlying component calls\
      \ them that\r\n    - Scoping a prop that could be applicable to the whole component\
      \ to _just_ that component"
    created_at: '2025-08-11T22:55:47Z'
  - id: 2270067801
    author: FoodProduct
    body: "> re: \"considering description as part of header vs. body,\"\r\n\r\nWell\
      \ consider me a fool because I was convinced description animated away with\
      \ the header (despite the fact that I checked the pinned version too -- I guess\
      \ I suffered from confirmation bias) \U0001F602. Thanks for correcting me there\
      \ \U0001F64F \r\n\r\n> Regarding separating header content from styling props\r\
      \n\r\nI hear your viewpoint, but to use your language, this depends on the \"\
      job\" you are expecting this prop to do. You are saying that you expect the\
      \ prop to define the text in the header; I say that it should define the display\
      \ of the header (which includes text + style options). Sure, we could go the\
      \ direction of some of the examples you posted and flatten all the props, but\
      \ to me that's a different direction than where we've aligned by precedent and\
      \ also would mean not nesting header at all (we'd have flat `headerText` and\
      \ `headerEyebrow` props). (I also don't like some of the API decisions on MUI,\
      \ but that's a bit tangential).\r\n\r\n> Looking at our current documentation\
      \ site, any prop put into a nested object doesn't get documented\r\n\r\nI don't\
      \ think we should be making API decisions around documentation limitations that\
      \ are owned and fixable by us.\r\n\r\n> BladeHeaderProps[\"font\"] continues\
      \ to stand out as weird to me — if we're setting the header to a different font\
      \ family, should we have it apply to the body as well?\r\n\r\n`header.font`\
      \ seems pretty straightforward to me (it controls the header font) \U0001F937\
      \ \r\n\r\n> I also think it helps us factor better code and build better components\r\
      \n\r\nIf I'm interpreting you correctly, \"it\" means semantic-oriented props\
      \ vs layout-oriented, which I already agreed with above. Let me know if I missed\
      \ your point here."
    created_at: '2025-08-12T14:30:34Z'
  - id: 2270629836
    author: ahlec
    body: "Stepping back, I'm comparing these two potential usages. They're the same\
      \ configuration, just props defined differently.\r\n\r\n```jsx\r\n<Blade\r\n\
      \  header={{\r\n    font: \"display\",\r\n    title: \"Hello world\",\r\n  \
      \  suffix: { kind: \"nav\", onRequestPrev, onRequestNext },\r\n  }}\r\n  overlay\r\
      \n  footer={{\r\n    suffix: { kind: \"buttons\", buttons }\r\n  }}\r\n/>\r\n\
      ```\r\nand\r\n```jsx\r\n<Blade\r\n  header=\"Hello world\"\r\n  headerFont=\"\
      display\"\r\n  overlay\r\n  buttons={buttons}\r\n  navigation={{ onRequestPrev,\
      \ onRequestNext }}\r\n/>\r\n```\r\n\r\nI feel that the second one was both easier\
      \ to write and is easier to read. In general, I believe that the less we nest\
      \ props and instead have them directly on the component makes for easier components\
      \ to use.\r\n\r\nHowever, I don't think we need to 100% do away with object\
      \ nesting — I'm even using it in the above \"flattened\" version. In particular,\
      \ I think there are two cases where they make good sense to me:\r\n\r\n- **Optional\
      \ elements/plugins/addons.** Some feature of the component that isn't there\
      \ by default, but if you provide a config object/define the prop, it'll create\
      \ the element:\r\n    - `type BladeProps = { navigation?: NavigationSuffix;\
      \ }`\r\n    - `type NullStateProps = { icon?: NullStateIconProps; }`\r\n   \
      \ - I think this is useful b/c it makes tracking \"should I render this thing?\"\
      \ trivially answerable — you can just say `!!props.navigation` rather than like\
      \ `const hasNavigation = props.withNavigation && props.onRequestNext !== undefined\
      \ && props.onRequestPrevious !== undefined && ...`\r\n- **Polymorphic properties.**\
      \ Most notably our affixes. When we have some property like `suffix` and many\
      \ different heterogeneous items could fit there\r\n    - `type HeaderProps =\
      \ { prefix?: IconAffix | AvatarAffix }`\r\n    - Some of our components have\
      \ conditional properties/discriminated unions on props. `<Progress />` is an\
      \ example: when `as=\"bar\"`, we also have props `size` and `width`, but when\
      \ `as=\"donut\"` we have `border` and `variant`. In a world where we no longer\
      \ do `type ProgressProps = { ... } & (BarProps | CircleProps)` I would express\
      \ this as `type ProgressProps = { as?: { kind: \"bar\"; width: number } | {\
      \ kind: \"donut\"; variant: CircleVariant } }` \r\n\r\nI don't think we need\
      \ to be dogmatic about this — if we nest something that could be flattened once\
      \ or twice, OK sure that's fine, this isn't an exact science. But _generally_\
      \ I'd prefer us to minimize nesting as much as possible, using it only when\
      \ _necessary_ or in like \"advanced\" off-the-beaten-path cases.\r\n\r\nFor\
      \ me, the `navigation` falls into the first case — it's an optional feature,\
      \ and we group them in a prop that expresses \"does this exist? and if so, how\
      \ is it configured?\" And for me, my suggestion on `header: string | { text:\
      \ string; eyebrow: ReactNode }` was the second case. But honestly, the more\
      \ I'm forced to look at it, yeah I might actually be fine with doing:\r\n```typescript\r\
      \ntype BladeProps = {\r\n  header: string;\r\n  headerEyebrow?: React.ReactNode;\r\
      \n}\r\n```\r\n\r\n> header.font seems pretty straightforward to me (it controls\
      \ the header font) \U0001F937\r\n\r\nThis wasn't really my point in saying \"\
      BladeHeaderProps[\"font\"] continues to stand out as weird to me — if we're\
      \ setting the header to a different font family, should we have it apply to\
      \ the body as well?\" Naturally, `header.font` controls the font of the header.\
      \ What I was trying to ask was: \"if we're changing the font in one part of\
      \ the blade, should the font elsewhere also be changing, per designs?\" It seems\
      \ strange to me that out of the box, our designs specify that the header + body\
      \ of a blade have the same fonts — but we allow you to then get into a situation\
      \ where the header + body _don't_ have the same font. The question I was asking\
      \ was: \"Should this have been `type BladeProps = { font: BoxProps[\"fontFamily\"\
      ] }` all along? Or, did we capture the wrong thing — should this be like, 'if\
      \ `pinned` then the header should be baked-in as `default`; if not `pinned`,\
      \ then should be baked-in as `'display'`?\""
    created_at: '2025-08-12T17:27:12Z'
  - id: 2270652287
    author: ahlec
    body: "Taking a _bigger_ step back though:\r\n- This conversation has entered\
      \ into the sphere of ADAPT design patterns and is less scoped to this specific\
      \ PR\r\n- The _primary_ thing I was objecting to was adding `footer: BladeFooterProps`.\
      \ It sounded like (from your earlier comment) that you were planning on removing\
      \ that and just putting `buttons` or `actions` directly on `BladeProps` instead\r\
      \n    - We're now going back and forth on `BladeHeaderProps[\"font\"]`, which\
      \ isn't really in scope for this PR\r\n- This comment isn't necessarily blocking,\
      \ and if we do replace `footer` with `buttons` I think it becomes even _less_\
      \ blocking than it already was(n't) lol\r\n- We're probably at a limit for success\
      \ via async messaging, and might be good to transition to a Huddle or video\
      \ call\r\n- I want to express my appreciation for you taking this conversation\
      \ seriously, bringing up really good points, being respectful, and that I value\
      \ the fact that we have different opinions precisely because we get to hash\
      \ out the best/worst points of each of our perspectives and that will average\
      \ out to us finding the best solutions overall"
    created_at: '2025-08-12T17:35:53Z'
