- thread_id: 2268022283
  pr: 2320
  root:
    id: 2268022283
    author: ahlec
    body: "This is a personal preference/hot take, but I don't love child components\
      \ that choose not to render (`return null`). It makes it a little harder when\
      \ reading through code since you expect it to be there from a parent→child approach.\
      \ In more complex layouts, you also wind up needing to duplicate the conditional\
      \ logic since the parent needs to know \"when i'm doing my layout/`grid-template-columns`/`gap`/etc,\
      \ do I have 4 children or 3?\"\r\n\r\nIMO, you could change this instead to:\r\
      \n```typescript\r\ntype Props = {\r\n  suffix: ButtonsSuffix;\r\n}\r\n```\r\n\
      and then the parent `<Blade />` is responsible for:\r\n```tsx\r\nreturn (\r\n\
      \  <Box>\r\n    {footer?.suffix ? <BladeFooter suffix={footer.suffix} : null}\r\
      \n  </Box>\r\n);\r\n```"
    path: components-core/src/components/Blade/views/Footer/BladeFooter.tsx
    created_at: '2025-08-11T21:09:31Z'
  replies:
  - id: 2268120687
    author: FoodProduct
    body: I don't agree in this scenario because if we add more props to `<BladeFooter>`
      that may cause it to render even if `footer.suffix` is falsey then the render
      condition in the parent is then wrong in a way that cannot be programmatically
      detected.
    created_at: '2025-08-11T22:06:47Z'
  - id: 2268141355
    author: ahlec
    body: "IMO the most critical part of the response is \"if we add more props.\"\
      \ I don't think we have plans for other props to add in the future yet, and\
      \ I think if we do ever reach that point, a refactor at that time when we have\
      \ more knowledge about our specific situation/constraints would help us choose\
      \ the most appropriate solution then. I think it's worth thinking about how\
      \ code will age when you're working on public-facing APIs or something you _know_\
      \ you'll need to expand in the future or something that'd be really hard to\
      \ tear out if you get it wrong today, but this specific location doesn't meet\
      \ any of those criteria for me. We'd be able to refactor the implementation\
      \ of this (if we ever needed to) as a library patch version in ~20 seconds,\
      \ so I don't feel compelled to really architect for the hypothetical future.\r\
      \n\r\nIt's also worth noting that, for example, if we add like:\r\n```typescript\r\
      \ntype ButtonFooterProps = {\r\n  suffix?: ButtonsSuffix;\r\n  statusLabel?:\
      \ string;\r\n}\r\n```\r\nand we're taking the approach of explicitly passing\
      \ properties into `<BladeFooter />` component, that we _will_ need to modify\
      \ the parent component — we have to update it to `<BladeFooter suffix={footer.suffix}\
      \ statusLabel={footer.statusLabel} />`. That will mean that the programmer _has_\
      \ to modify the line of code where we're saying `footer?.status ? <BladeFooter\
      \ /> : null`. It's not programmatically detectable, but it does guarantee the\
      \ programmer will have to change that line — and it'll show up in the diff for\
      \ reviewers to see as well."
    created_at: '2025-08-11T22:22:42Z'
  - id: 2268153094
    author: FoodProduct
    body: 'Yeah I mean we could go back and forth here more but ultimately this is
      bikeshedding on whether there''s marginally more gain in having the props be
      very slightly more future-friendly vs very slightly easier to determine what
      renders in a arguably-obvious null case 🤷‍♂️ '
