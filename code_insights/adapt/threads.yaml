- thread_id: 1954930949
  pr: 2048
  root:
    id: 1954930949
    author: ahlec
    body: "Instead of expecting to call after the script is loaded, you could listen\
      \ for `script.onload`. Both of these hooks look pretty trivial, with their complexity\
      \ just wrapping getting the value once or making sure we should be calling the\
      \ function. You could probably just change `useInjectGoogleMapsScript` to do\
      \ something like:\r\n```typescript\r\nconst [placesService, setPlacesService]\
      \ = useState(null);\r\nconst [autocompleteService, setAutocompleteService] =\
      \ useState(null);\r\nuseEffect(() => {\r\n   ....\r\n   script.onload = () =>\
      \ {\r\n     setAutocompleteService(...);\r\n     setPlacesService(...);\r\n\
      \   };\r\n}, []);\r\n```"
    path: components-core/src/components/Address/Autocomplete/useGoogleMapsApi.ts
    created_at: '2025-02-13T17:28:28Z'
  replies:
  - id: 1955024600
    author: FoodProduct
    body: I don't really have a strong preference between your suggestion and the
      current impl, but your suggestion alone doesn't solve for the scenario where
      this is invoked before the script is loaded; I'd have to do a bit more work
      there to conditionally invoke in the `onload`.
    created_at: '2025-02-13T18:27:16Z'
  - id: 1955286095
    author: ahlec
    body: "The original idea I had here was propagating the `null` down through the\
      \ chain. So something like:\r\n```typescript\r\nconst useInjectGoogleMapsScript\
      \ = (): {\r\n  placesService: google.maps.PlacesService | null;\r\n  autocompleteService:\
      \ google.maps.AutocompleteService | null;\r\n} => { ... };\r\n\r\nconst useGoogleMapsApi\
      \ = () => {\r\n  const { placesService, autocompleteService } = useInjectGoogleMapsScript();\r\
      \n\r\n  const findPlaceFromQuery = useCallback(() => {\r\n    if (!placesService)\
      \ {\r\n      throw new Error(\"<not ready, or w/e>\");\r\n    }\r\n    ...\r\
      \n  }, [placesService]);\r\n\r\n  return {\r\n    findPlaceFromQuery: placesService\
      \ ? findPlaceFromQuery : null,\r\n    ...\r\n  };\r\n}\r\n```\r\nI don't think\
      \ one is more correct than the other, but this helps hint to the component \"\
      hey the API isn't ready yet\" and \"OK the API just became available, you can\
      \ use it now\" which can sometimes be helpful.\r\n\r\nNot blocking, but the\
      \ core of the comment is the implementation of `getAutocompleteService` — it\
      \ doesn't retry if we call it earlier than expected, which right now we can\
      \ guarantee, but it could be changed so we do something on component mount in\
      \ the future and now it _does_ call earlier and we see a race condition crash\
      \ where we didn't know to expect it."
    created_at: '2025-02-13T22:13:48Z'
  - id: 1955313179
    author: FoodProduct
    body: 'I spiked on this and ultimately decided that I prefer the current lazy
      instantiation, warts and all, over the equivalent proactive instantiation. The
      ugly part is from when a consumer tries to do a lookup before the script is
      loaded, which is a problem scenario no matter which direction we go 🤷 '
    created_at: '2025-02-13T22:43:05Z'
  pr_author: FoodProduct
