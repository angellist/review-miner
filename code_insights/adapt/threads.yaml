- thread_id: 2819889271
  pr: 2605
  root:
    id: 2819889271
    author: ahlec
    body: "Adding `backgroundColor` to the `<SelectListItem />` props also means it\
      \ starts showing up on `SelectListBox.items[*]`:\n```\n<CheckboxSelectList items={[{\
      \ key: 'foo', label: 'Hello world', value: 'foo', backgroundColor: 'white' }]}\
      \ />\n```\nI think we'll want to change the `<SelectList />` implementations\
      \ — `<CheckboxSelectList />`, etc to something like:\n```\nconst CheckboxSelectList\
      \ = ({ backgroundColor }) => {\n  return (\n    <SelectListBox>\n     {items.map(({\
      \ key, value, ...itemProps }) => (\n       <SelectListItem\n          backgroundColor={itemProps.backgroundColor\
      \ ?? backgroundColor}\n       />\n    </SelectListBox>\n  );\n};\n```\nThat\
      \ is, if it's explicitly specified on an item in the array, we use that color;\
      \ otherwise, inherit from the parent component."
    path: components-core/src/components/SelectList/SelectList.tsx
    created_at: '2026-02-18T01:38:03Z'
