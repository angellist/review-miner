  pr: 2597
  root:
    id: 2785049855
    author: FoodProduct
    body: "Once I click this once, every subsequent time I mouse over it (without\
      \ clicking) this triggers again \U0001F615 \n_edit_: until I select a different\
      \ tab"
    path: docs/src/pages/layouts/app-layout/[[...page]].tsx
    created_at: '2026-02-09T23:34:29Z'
  replies:
  - id: 2785092891
    author: ahlec
    body: I'm seeing this too. Let me put in a fix for it.
    created_at: '2026-02-09T23:49:35Z'
  - id: 2785113388
    author: ahlec
    body: 😨
    created_at: '2026-02-09T23:58:14Z'
  - id: 2881198632
    author: ahlec
    body: "Took me a hot second to remember the terrible thing I discovered three\
      \ weeks ago.\r\n\r\nThis appears to be intended behavior from React Aria. It's\
      \ happening from a couple locations, but `useSingleSelectListState` (which `useTabListState`\
      \ wraps) [intentionally fires `onSelectionChange` even when the key is the same](https://github.com/adobe/react-spectrum/blob/17358f7938148f521bc73f636d75304c21ab2b63/packages/%40react-stately/list/src/useSingleSelectListState.ts#L58).\
      \ The specific code pathway that we're in when we fire repeatedly is different,\
      \ but in large part it's because `useSingleSelectListState` is opting us into\
      \ _always_ receiving this. I'm not sure why.\r\n\r\nI'm going to work around\
      \ this for the tab controller because that's a really weird and incorrect decision??"
    created_at: '2026-03-04T00:38:09Z'
  - id: 2881250009
    author: ahlec
    body: All of that is true. But actually, it looks like it's an issue with `usePress`
      where, for some reason, `pointerEnter` is triggering `pressStart`. That's the
      real culprit, I'm taking at that
    created_at: '2026-03-04T00:58:36Z'
  - id: 2881417772
    author: ahlec
    body: "So, this was actually very unique to this example. Using `alert()` requires\
      \ that you click the button in the alert, _and_ it blocks execution on the main\
      \ thread until you do. `usePress` has a lot of complexity but it uses `onPointerDown`\
      \ to detect `pressStart`, and then `onClick` to detect `press` and clean things\
      \ up. When we had an `alert()` as part of this, it wound up interrupting the\
      \ event flow and `usePress` never received the `click` event, meaning it never\
      \ \"finished clicking\" and thus we saw all of the above behavior.\r\n\r\nI've\
      \ resolved the issue by swapping `alert()` for `addToast()` — it's dogfooding\
      \ more ADAPT into the docs _and_ it doesn't interrupt the event flow."
    created_at: '2026-03-04T02:08:52Z'
  - id: 2885180424
    author: FoodProduct
    body: Ohhhh. Weird
    created_at: '2026-03-04T17:43:20Z'
  pr_author: ahlec
  merged_at: '2026-03-04T19:41:39Z'
  repo: adapt
  has_suggestion_block: false
