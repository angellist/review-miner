  root:
    id: 1999083588
    author: FoodProduct
    body: "[Non-blocking/bikeshed] Why not\r\n```suggestion\r\ntype ProviderProps\
      \ = {\r\n  frontMatter: FrontMatter;\r\n} & React.PropsWithChildren;\r\n```\r\
      \n?"
    path: docs/src/contexts/doc.tsx
    created_at: '2025-03-17T15:54:45Z'
  replies:
  - id: 1999176125
    author: ahlec
    body: "Personally I'm not a huge fan of using the built-in prop types from React.\
      \ I don't see them has having a huge amount of value, and often times their\
      \ `children` typings are more permissive than I want.\r\n\r\nBut I'm also not\
      \ a huge fan in general on doing unions and intersections for props (specifically\
      \ for props, I love unions/intersections otherwise). I think it makes them harder\
      \ to read and you have to do more work to see which properties are available\
      \ for configuration.\r\n\r\nIn this case, we're (IMO) making it harder to read\
      \ (you have to hunt in multiple files to see what your full props are) without\
      \ making it significantly more writeable (`children?: React.ReactNode` is approximate\
      \ the same length as `& React.PropsWithChildren`)."
    created_at: '2025-03-17T16:33:00Z'
  - id: 1999769944
    author: FoodProduct
    body: The "unions are harder to read" point is valid; I do tend to trend in the
      opposite direction of erring on the side of importing values so any underlying
      changes get propagated automatically though -- the React 17 => 18 migration
      (if I remember the version correctly) where the types changed is semi-fresh
      in my brain though
    created_at: '2025-03-17T22:32:50Z'
