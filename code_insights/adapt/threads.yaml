  - id: 2252052096
    author: ahlec
    body: "In this case, I'd probably just do something like:\r\n```typescript\r\n\
      type Props = {\r\n  size?: \"compact\" | { size: \"compact\"; emphasizeLabel?:\
      \ boolean };\r\n}\r\n```\r\nI think it's redundant/unnecessary at the moment,\
      \ yes. But I also think it makes it clearer \"other sizes don't exist yet\"\
      \ and it gives us room in our API to very easily roll out support for additional\
      \ sizes without it being a breaking change. `size: \"compact\"` → `size: InputSizes`\
      \ would be a minor version bump, but removing `emphasizeLabel` as a prop and\
      \ adding `size` would be a major version bump. And as w/ the other comment,\
      \ it provides familiarity for developers — you just always reach for `size`,\
      \ that prop exists and is consistent even if the possible values you can pass\
      \ in might differ slightly (you might only have a subset of values available)."
    created_at: '2025-08-04T16:52:30Z'
