      \ 7 components this comment applies to"
    path: components-core/src/components/Row/Row.tsx
    created_at: '2025-08-01T23:20:47Z'
  replies:
  - id: 2249028895
    author: FoodProduct
    body: 'This is mostly forward-looking: we have explicit future plans for creating
      4 input sizes but not creating 4 densities that I know of.'
    created_at: '2025-08-02T00:11:07Z'
  - id: 2252030490
    author: ahlec
    body: IMO in this case, it'd be better to have the two concepts share the same
      property name (but the type can/should be different). In both cases, developers
      will be thinking "I need to control how big this element is" and I don't know
      that the distinction of "oh it's an input so it has four sizes and called `size`
      vs. oh it's a select list and those only have two sizes so it's `density`" will
      be something kept top-of-mind. I think we want all of the components in the
      library to have a "if you've worked with 14 other ADAPT components, when you
      pick up a 15th you'll know how to use it" feel to them. From an IDE perspective,
      developers can type what's familiar to them (`size=`) and then the IDE will
      give them autocomplete for which sizes are available for this particular component,
      and I think it'll be understandable "ok, this `<Row />` doesn't have all four
      types, it only has two."
    created_at: '2025-08-04T16:47:16Z'
  - id: 2252435833
    author: FoodProduct
    body: I hear what you're saying, but to me these are a bit different. `size` typically
      affects the whole unit, whereas `density` affects how much fits inside the unit/how
      packed the unit is. So `size` seems a good fit for inputs but `density` for
      lists. It's subtle and I don't feel strongly about it so I'll put it up for
      input 🙂. But even then `<Row />` is kind of a gray area haha.
    created_at: '2025-08-04T19:48:58Z'
