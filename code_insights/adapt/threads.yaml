    author: ahlec
    body: "The `useVirtualizer` hook was removed in adobe/react-spectrum#6494.\r\n\
      \r\nEven though `virtualizerProps` was returned, it was always empty, and `scrollViewProps`\
      \ only specified `onVisibleRectChange`. Internally, this was also what powered\
      \ the behavior to load additional rows when appropriate.\r\n\r\nI applied the\
      \ change from the above PR by copying over their implementation for `onVisibleRectChange`,\
      \ and using the hook introduced in that PR (`useLoadMore`, which replaced `useVirtualizer`)."
