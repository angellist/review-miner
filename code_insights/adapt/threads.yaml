- thread_id: 2710509272
  pr: 2541
  root:
    id: 2710509272
    author: JaredWF
    body: 'I''m generally kind of skeptical on useEffects that both rely on and set
      state. Not saying that this will happen here, but I''ve seen so many times at
      AngelList where this turns into an infinite loop. Does this have to be a use
      effect? Or can we move this logic into the callback? '
    path: components-layouts/src/components/BaseLayout/internal/DrawerContext.tsx
    created_at: '2026-01-21T00:14:36Z'
  replies:
  - id: 2710533681
    author: ahlec
    body: "It's technically possible to do it in the callback, but `useEffect` is\
      \ the better fit here. In this case, we want a `useEffect` because it ties the\
      \ background/async code (a timer) to the React lifecycle (we cancel if the component\
      \ unmounts or if state changes).\r\n\r\nI think I'm against having a `useEffect`\
      \ that _directly_ calls `setState` based off of `state`, because that's a code\
      \ smell that your state should maybe be a `useMemo` or that your data pipeline\
      \ should be reworked. But I think it's OK when you have it doing some kind of\
      \ async process like this or you're careful about your inputs and outputs."
    created_at: '2026-01-21T00:29:07Z'
  - id: 2710534103
    author: ahlec
    body: I did narrow the hook dependency to just `state.transitionId` since that's
      all I needed from it.
    created_at: '2026-01-21T00:29:24Z'
  - id: 2713574709
    author: JaredWF
    body: 👍 Makes sense
    created_at: '2026-01-21T17:18:57Z'
