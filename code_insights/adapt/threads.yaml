  replies:
  - id: 2755540382
    author: ahlec
    body: "I'd started it out as just a raw object originally:\r\n```typescript\r\n\
      const focusManager = useMemo(() => {\r\n  const entries = new Map();\r\n  return\
      \ {\r\n    get: () => { ... },\r\n    register: () => { ... },\r\n    ...\r\n\
      \  };\r\n}, []);\r\n```\r\nbut as the complexity grew, that approach reached\
      \ its maintainability limits. And at that point it really did just start being\
      \ \"well now I'm reinventing a `class`\". I definitely don't think using `class`\
      \ is wrong; we use them regularly throughout ADAPT, and the underlying libraries\
      \ we're using also use them (React Aria has a version of `FocusManager` as well,\
      \ which is also a `class`).\r\n\r\nIn this case:\r\n- Making it be a `class`\
      \ meant I could separate this logic from the React hook (making smaller files)\r\
      \n- Models internal state a little easier\r\n- We don't have access to variables\
      \ we shouldn't have, via closure (if `FocusEntry` were nested inside `FocusManager`,\
      \ we could just access `entries` or other functions directly)\r\n- Reduces nesting\r\
      \n- Separates logical entities into their own concern\r\n\r\nThere are three\
      \ classes here and if we were to collapse all of them together into the functional\
      \ style, I think it'd be extremely difficult to separate them cleanly in our\
      \ heads."
