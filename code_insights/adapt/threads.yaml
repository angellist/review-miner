    id: 2887126980
    author: FoodProduct
    body: '[Non-blocking] Does this technically mean we''re dropping support for `intent:
      ''default`? (I am in favor of it regardless)'
    path: components-core/src/components/StatusDot/StatusDot.tsx
    created_at: '2026-03-05T01:59:54Z'
  replies:
  - id: 2891503618
    author: ahlec
    body: "We're dropping support for _something_, but that something is definitely\
      \ not what they wanted.\r\n\r\nAs written, this is specifically looking for\
      \ string values that optionally have an `intent` field on them of value `'default'`\
      \ — so something like, uh, this if it were valid?\r\n```tsx\r\nconst myIntent\
      \ = 'success'\r\nmyIntent.intent = 'default'\r\nreturn <StatusDot intent={myIntent}\
      \ />\r\n```\r\nI think what the author wanted was:\r\n```ts\r\ntype Props =\
      \ {\r\n  intent?: Exclude<Intent, 'info'> | 'default'\r\n}\r\n```\r\nor this\
      \ maybe at some point was a `Pick` or something. But like it was super wrong:\r\
      \n- Should be `Exclude` instead of `Omit`\r\n- Should be `|` instead of `&`\r\
      \n- Should be the string value not a nested object\r\n\r\nOne thing to watch\
      \ out for is that because of what we have currently, the `intent` prop on `<StatusDot\
      \ />` actually isn't typechecked. It's currently valid in TypeScript for us\
      \ to do:\r\n```tsx\r\n<StatusDot intent=\"asdfasdf\" />\r\n```\r\n\r\nThis change\
      \ is going to turn back on type checking for the `intent` prop, and I imagine\
      \ that could actually be a breaking change?"
    created_at: '2026-03-05T18:17:46Z'
  - id: 2891525332
    author: FoodProduct
    body: 'Oh hahaha I definitely read it as `Omit<Intent, ''info''> | { intent? ''default''
      }''` 🙈 '
    created_at: '2026-03-05T18:23:42Z'
