    author: ahlec
    body: "After this `useCallback`, I think we should add a `useEffect` for cleanup,\
      \ just to be certain:\r\n```typescript\r\nuseEffect(() => {\r\n  return ():\
      \ void => {\r\n    if (rafIdRef.current !== null) {\r\n      cancelAnimationFrame(rafIdRef.current);\r\
      \n    }\r\n  };\r\n}, []);\r\n```\r\nThis will only run on component unmount\
      \ and I expect in practice it'll rarely if ever be called, but it's good practice\
      \ to make sure we clear up any floating timeouts when we unmount."
    path: components-core/src/hooks/useUpdateOverlayPosition.ts
