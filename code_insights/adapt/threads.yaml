- thread_id: 2010974608
  pr: 2127
  root:
    id: 2010974608
    author: ahlec
    body: "We might need to construct a new instance of this. [`ListLayout.getContentSize`](https://github.com/adobe/react-spectrum/blob/e7b1c7fa869fbf3f03194f98c3e2f35c9861a613/packages/%40react-stately/layout/src/ListLayout.ts#L431)\
      \ just returns an instance variable that isn't tied to that function — which\
      \ would also mean that if we call this function multiple times without constructing\
      \ a new `TableLayout` instance, we'll keep adding the footer to the height (among\
      \ other things).\r\n\r\nI wish we could use `padding` in the constructor `options`\
      \ — we nearly can (it's only applied to the vertical, so it isn't X padding).\
      \ The only downside is that it applies to top and bottom, not just bottom.\r\
      \n\r\nIt also looks like `contentSize` is used for a few things internally,\
      \ where we could wind up out of sync with the total height we expect? Unsure\
      \ if that'll happen but it'd be a concern that internally height is still 1000px\
      \ but we're tacking on the extra 50px when rendering.\r\n\r\nA next-best solution\
      \ might be instead for us to override [`TableLayout.buildCollection`](https://github.com/adobe/react-spectrum/blob/e7b1c7fa869fbf3f03194f98c3e2f35c9861a613/packages/%40react-stately/layout/src/TableLayout.ts#L118).\
      \ That's the function that'll actually instantiate `contentSize`. I'd think\
      \ we could do something like:\r\n```typescript\r\nbuildCollection() {\r\n  const\
      \ result = super.buildCollection();\r\n  this.contentSize = new Size(\r\n  \
      \  this.contentSize.width,\r\n    this.contentSize.height + (this.footerHeight\
      \ || 0)\r\n  );\r\n  return result;\r\n}\r\n```\r\nI think that should work\
