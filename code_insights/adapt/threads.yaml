- thread_id: 1931298215
  pr: 2019
  root:
    id: 1931298215
    author: JaredWF
    body: What's the purpose of copying over just the `package.json` files before
      pnpm install?
    path: .buildkite/Dockerfile
    created_at: '2025-01-27T23:05:57Z'
  replies:
  - id: 1931324435
    author: ahlec
    body: "Right now, I've loosely got\r\n```\r\nCOPY **/package.json\r\nRUN pnpm\
      \ install\r\nCOPY *\r\n```\r\n\r\nThe `RUN` instruction always caches if the\
      \ command you're running itself isn't changed (eg. `pnpm install` -> `yarn install`).\
      \ We want to cache `pnpm install` since otherwise it can take a few minutes,\
      \ even if we share the PNPM store between containers.\r\n\r\nWhen you use `COPY`\
      \ or `ADD`, if any of the files you're bringing into the image change, it invalidates\
      \ that layer in the build cache. So if we had\r\n```\r\nCOPY *\r\nRUN pnpm install\r\
      \n```\r\n\r\nAny time you changed source code, you'd need to rerun `pnpm install`.\
      \ By just bringing over the **pnpm-lock.yaml** and **package.json** files, you\
      \ should only need to rerun `pnpm install` when you change one of those files\
      \ -- otherwise, you should be able to restore from cache and skip needing to\
      \ run `pnpm install`."
    created_at: '2025-01-27T23:39:15Z'
  pr_author: ahlec
  merged_at: '2025-01-28T21:47:15Z'
  repo: adapt
  has_suggestion_block: false
