  root:
    id: 2033888053
    author: FoodProduct
    body: This file is copy/pasted from react-spectrum source code with minimal modification
      for multiselect support. Do we really need all of these changes?
    path: components-core/src/components/ComboBox/useAdaptComboBoxState.ts
    created_at: '2025-04-08T19:23:05Z'
  replies:
  - id: 2034024542
    author: ahlec
    body: "Debatably, but I'd lean towards yes:\r\n- These type changes here are just\
      \ explicitly documenting what we're returning + the types they should be. We\
      \ didn't have these, and that meant during the upgrade here we were getting\
      \ type violations in other files because the implementation here had changed.\
      \ Documenting the types here doesn't change any of the runtime, but it does\
      \ help us have a better contract to uphold\r\n- `selectedKeys` was updated to\
      \ use `itemKey()` because that utility function already handles `React.Key`\
      \ → `ReactAriaKey`. Without it, we'd need to handle `bigint` here. So either\
      \ way, we need to break from what's in source code\r\n- The `Array.filter` calls\
      \ were all relying on `!= null` to convert `undefined` → `null`, this is more\
      \ explicit and type safe\r\n\r\nIn the end we will need some kind of change.\
      \ This tried to keep the changes as constrained as possible while aligning them\
      \ to the rest of our codebase.\r\n\r\nSeparately but also sort-of relevant,\
      \ I do think we'll need to bite the bullet and accept that in forking their\
      \ files, we are making it our code and not theirs. Having gone through #2134\
      \ where they made even \"minor\" changes to `<Toast />` and `<Table />` (which\
      \ we've also forked), even knowing exactly which React Spectrum commit we forked\
      \ from and then being able to diff against the latest version was a lot harder\
      \ than just \"reapply the patches we've made to the latest version of the file.\"\
      \ In the end it was a _lot_ closer to totally reimplementing the behaviors (in\
      \ that PR) than it was to just updating/tweaking them."
    created_at: '2025-04-08T20:58:28Z'
