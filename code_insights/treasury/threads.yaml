- thread_id: 2257660602
  pr: 5812
  root:
    id: 2257660602
    author: stathis-alexander
    body: "Can we remove these force conditions? I think this is critical to actually\
      \ testing the behavior we want.\r\n\r\nI think the reason the lock _does work_\
      \ is because we do the [balance checks are part of the model's validations](https://github.com/angellist/treasury/blob/master/app/models/ledger_entry.rb#L312)\
      \ unless we specify a force reason or forced by user id. I don't quite understand\
      \ all the reasons we'd want to force an entry and bypass validations like this,\
      \ but I suspect that it is for exceptional cases and most ledger entries are\
      \ created without these values. \r\n\r\nSince the validations occur within the\
      \ save lock, the balances should never be stale in the validation (although\
      \ I guess there's a world where it's cached on the model already), and the lock\
      \ actually is preventing us from double dipping in a race condition. \r\n\r\n\
      What you're showing in your test is also a concern, but IMO less so, since when\
      \ we pass along the force parameters we're intentionally saying we don't care\
      \ about these balance validations. "
    path: spec/models/ledger_entry_spec.rb
    created_at: '2025-08-06T16:09:31Z'
  replies:
  - id: 2257745640
    author: fivetentaylor
    body: 'Ah good call, dropping them 👍 '
    created_at: '2025-08-06T16:45:26Z'
