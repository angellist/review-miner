  replies:
  - id: 2880250053
    author: devin-ai-integration[bot]
    body: 'Yes, still needed — they do different things:


      - `DD_SERVICE=treasury-cron` sets the **pod-level** service identity via `c.service
      = ENV.fetch(''DD_SERVICE'', ''treasury'')`. This controls runtime metrics, profiling,
      Sentry correlation (`dd.service`), and any non-rake traces (Rails boot, middleware,
      etc.).

      - `service_name: ''treasury-rake''` only tags rake-specific spans.


      Without `DD_SERVICE`, the cron pod would still report as `treasury` (the default)
      for everything except rake spans — which defeats the ticket''s goal of having
      crons appear under `treasury-cron` in Datadog.


      If you''d prefer a single service identity, we could remove the rake instrumentation
      line and let rake spans inherit `treasury-cron` from `c.service`. That would
      put everything under one service. Tradeoff: you lose the ability to filter rake-specific
      spans separately.'
    created_at: '2026-03-03T20:09:42Z'
