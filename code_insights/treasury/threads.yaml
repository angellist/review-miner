  root:
    id: 2589778140
    author: fivetentaylor
    body: Hmm, is all this necessary? Somehow CI was already respecting the values
      set in `.env` for me
    path: .buildkite/pipeline.rb
    created_at: '2025-12-04T16:33:28Z'
  replies:
  - id: 2589796473
    author: stathis-alexander
    body: "We were using `.dotenv` to load them into the application. We're now being\
      \ much more intentional and specific about our environments, and no longer allowing\
      \ or requiring the application to define environment variables (I've removed\
      \ dotenv). \r\n\r\nThe impetus for all of this is staging, which needs to run\
      \ in `production` _mode_, but is a different environment.\r\n\r\nBefore, we\
      \ were doing a lot of implicit loading / overwrites (hard to follow), env switching\
      \ in code (anti-pattern, breaks staging), and generally just other messy behavior.\
      \ \r\n\r\nWe can def improve the ergo here, but it's an intended outcome that\
      \ developers have to think about the various different environments now:\r\n\
      1. local machine: managed via direnv (`.env`)\r\n2. docker: managed via docker\
      \ compose (`.devcontainer/.env`)\r\n3. ci: managed via `pipeline.rb`\r\n4. staging:\
      \ managed via configtool / cdk8s\r\n5. prod: managed via configtool / cdk8s"
    created_at: '2025-12-04T16:38:37Z'
  - id: 2589797745
    author: fivetentaylor
    body: Oh I think I see now, you're dropping `.env` and setting these more explicitly?
    created_at: '2025-12-04T16:38:55Z'
  - id: 2589804201
    author: stathis-alexander
    body: "> Oh I think I see now, you're dropping .env and setting these more explicitly?\r\
      \n\r\nYeah, exactly. There are actually important differences between the CI\
      \ env and the local dev env that we were fixing in a bunch of random ways. This\
      \ makes it explicit what is what. "
    created_at: '2025-12-04T16:40:48Z'
