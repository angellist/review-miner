    id: 2982537538
    author: dcetlin
    body: '**Smell: no natural invocation trigger**


      Workflow skills (flakey-spec, pr-update) have a clear trigger: the user explicitly
      types the command. Knowledge skills need the agent to *decide* to load them
      — but there''s no structural trigger for "I''m about to touch GraphQL." The
      agent would need to categorize its task before having full context.


      At 19 lines — Pundit authorization, UUID handling, and a `make graphql` reminder
      — this is a convention reminder, not a workflow. The content was already partially
      in CLAUDE.md and fit naturally there.


      **Suggestion**: Fold back into CLAUDE.md. Two sentences of convention + one
      `make graphql` reminder doesn''t justify the overhead of a separate skill with
      its own invocation routing.'
