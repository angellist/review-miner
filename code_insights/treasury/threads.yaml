- thread_id: 2105453567
  pr: 5548
  root:
    id: 2105453567
    author: fivetentaylor
    body: I think you explained it already to me, but how do we decide when to add
      type signatures vs not?
    path: backend/dibs/app/models/concerns/dibs/account.rb
    created_at: '2025-05-23T21:35:55Z'
  replies:
  - id: 2105456808
    author: harsohailB
    body: "We always try to add them on new files and on existing files if feasible\
      \ and not too much work. In this case, Sorbet does not recognize that this concern\
      \ is for active record decedent classes so it throws these errors. We can try\
      \ to add signatures but it would involve adding plugins/shims on top of sorbet?\
      \ @stathis-alexander Any easy way of doing this?\r\n\r\n<img width=\"793\" alt=\"\
      Screenshot 2025-05-23 at 3 36 33 PM\" src=\"https://github.com/user-attachments/assets/73ca2b11-aa07-4ac4-b64f-7bb9ad8b179c\"\
      \ />\r\n"
    created_at: '2025-05-23T21:39:39Z'
  - id: 2105479564
    author: stathis-alexander
    body: "No _easy_ way, no. `ActiveSupport::Concern`'s `included` hook is a particular\
      \ bit of metaprogramming magic that Sorbet just isn't really ever going to understand\
      \ well (it's built on `eval` / `class_eval`). \r\n\r\nYou have a few outs:\r\
      \n1. You can add `extend T::Sig` inside the `included` block and then probably\
      \ get it to work using the `T.bind(self, T.class_of(ActiveRecord::Base)` to\
      \ make it recognize what you're trying to do.\r\n2. You could throw out the\
      \ multiple inheritance approach, and rewrite `DIBS::Account` as an abstract\
      \ class that defines an interface and inherit from it where needed. I'm not\
      \ 100% sure that will work or if that works for your use case. \r\n3. You could\
      \ try to see if the experimental `requires_ancestor` helps out, but when I've\
      \ tried it in the past its kinda sucked. \r\n4. You can accept that this code,\
      \ unfortunately, is not going to be typed. \r\n\r\nMy guess is that 2 is the\
      \ most promising approach long term. \r\n\r\nPhilosophically, using Sorbet is\
      \ not as much about writing whatever Ruby code you want with types. Yes, it\
      \ adds typing, but it also is kind of opinionated about _how you write Ruby\
      \ code_. IMO, that's a feature - it prevents doing all the sort of wacky or\
      \ irresponsible things you can do, which makes code more readable. But it's\
      \ definitely an intentional choice you have to make when adopting Sorbet. For\
      \ me, the trade off is worth it. "
    created_at: '2025-05-23T22:10:47Z'
  pr_author: harsohailB
  merged_at: '2025-05-27T15:48:10Z'
  repo: treasury
  has_suggestion_block: false
