  root:
    id: 2594443321
    author: harsohailB
    body: "Assume we do a cross transfer ACH from one bank to another and for some\
      \ reason it returns (very low chance but I see 53 in the DB). We will essentially\
      \ get two notifications for the return, one from the initiating payment processor\
      \ and one for the receiving because the return occurs after completion.\r\n\r\
      \nWe previously did not have the functionality to identify the extract cross\
      \ transfer for this case. But now, transfer v2 has `receiving_payment_processor_id`\
      \ so we can attribute perfectly. So we ignore on the receiving side and let\
      \ the initiating payment process return."
    path: app/public_api/treasury_app/notification_service.rb
