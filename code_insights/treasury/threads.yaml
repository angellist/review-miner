    body: "It doesn't exist yet; I'm matching the pattern in the other entity update\
      \ modals. Separately, I feel weird about the pattern `useToastIfGraphQLError`.\
      \ It's a hook that returns a function that checks if errors exist to show a\
      \ toast, but it doesn't give the user control of the toast, which in Nova's\
      \ case has proven to be context specific to the graphQL errors.\r\n\r\nIn Nova,\
      \ we actually pass back graphQL input errors that are auto-passed into the react-hook-form.\
      \ We also key off of these type-safe input errors in the frontend to show different\
      \ toasts."
