    body: "Yeah I have been going back on forth on how to deal with this in tests.\
      \ We can mock but there are so many places in the code base where state changed\
      \ occur so we would need to mock everywhere everytime. I attempted a better\
      \ solution in [a8f4adf](https://github.com/angellist/treasury/pull/5473/commits/a8f4adff4d0e8d1ad1cea55b8ca9a396446e92a4).\
