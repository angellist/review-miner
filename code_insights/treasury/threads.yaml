    author: kwliang1
    body: I'm not as familiar with Temporal.   Are these the only states that would
      throw an exception?
    path: backend/dibs/app/controllers/dibs/api/bny_controller.rb
    created_at: '2025-06-24T16:07:41Z'
  replies:
  - id: 2164439790
    author: harsohailB
    body: 'We specify an ID reuse policy with `workflow_id_reuse_policy: :allow_failed`
      for idempotency. This means if we start the Temporal with the same ID for one
      that is in progress or completed, it will raise `Temporal::WorkflowExecutionAlreadyStartedFailure`.
      We catch and do nothing to keep idempotency. If the previous workflow failed,
      we will start a new workflow. '
    created_at: '2025-06-24T16:23:51Z'
