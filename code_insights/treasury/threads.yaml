- thread_id: 2246396797
  pr: 5792
  root:
    id: 2246396797
    author: harsohailB
    body: "We are calling `ach_pulls` three times here and I think it's going to do\
      \ three joins on the assocation? Thoughts on the following?\r\n\r\n```ruby\r\
      \npulls = ach_pulls.load # loads and caches association\r\n\r\ncompleted_ok\
      \ = pulls.with_state(:completed).count >= MIN_COMPLETED_ACH_PULLS_FOR_RELIABILITY\r\
      \nnothing_returned = pulls.with_state(:returned).count == 0\r\nlatest_ach_pull_successful\
      \ = pulls.order(:created_at).last&.completed?\r\n```"
    path: app/models/external_ach_account.rb
    created_at: '2025-07-31T21:18:28Z'
  replies:
  - id: 2246871422
    author: amvinnu
    body: "Good call, @harsohailB .\r\n\r\nI asked Claude Code for a second opinion\
      \ :)\r\n\r\n```\r\n> @app/models/external_ach_account.rb#L293-295 Do the method\
      \ calls on ach_pulls in this code result in multiple queries to the database?\
      \ Can this be optimized?\r\n  ⎿  Read app/models/external_ach_account.rb (3\
      \ lines)\r\n\r\n⏺ Yes, this code results in 3 separate database queries and\
      \ can be optimized.\r\n\r\n  The current code executes:\r\n  1. ach_pulls.with_state(:completed).count\
      \ - 1 query\r\n  2. ach_pulls.with_state(:returned).count - 1 query\r\n  3.\
      \ ach_pulls.order(:created_at).last&.completed? - 1 query\r\n\r\n  This can\
      \ be optimized by loading the ach_pulls once and performing the calculations\
      \ in Ruby:\r\n\r\n  ach_pulls_loaded = ach_pulls.includes(:state_transitions).to_a\r\
      \n  completed_ok = ach_pulls_loaded.count { |pull| pull.state == 'completed'\
      \ } >= MIN_COMPLETED_ACH_PULLS_FOR_RELIABILITY\r\n  nothing_returned = ach_pulls_loaded.none?\
      \ { |pull| pull.state == 'returned' }\r\n  latest_ach_pull_successful = ach_pulls_loaded.max_by(&:created_at)&.completed?\r\
      \n\r\n  This reduces it to 1 query. The trade-off is loading all ach_pulls into\
      \ memory, which is acceptable if the association isn't too large.\r\n\r\n> How\
      \ about this code: pulls = ach_pulls.load # loads and caches association\r\n\
      \r\n  completed_ok = pulls.with_state(:completed).count >= MIN_COMPLETED_ACH_PULLS_FOR_RELIABILITY\r\
      \n  nothing_returned = pulls.with_state(:returned).count == 0\r\n  latest_ach_pull_successful\
      \ = pulls.order(:created_at).last&.completed?\r\n\r\n⏺ That code will still\
      \ result in 3 database queries. The issue is that with_state() and order() are\
      \ ActiveRecord scope methods that create new query objects, even when called\
      \ on a loaded association.\r\n\r\n  When you call pulls.with_state(:completed).count,\
      \ Rails doesn't use the cached records - it builds a new query with the WHERE\
      \ clause and executes it against the database.\r\n\r\n  To truly optimize using\
      \ the loaded association, you need to work with the Ruby array:\r\n\r\n  pulls\
      \ = ach_pulls.load # loads and caches association\r\n\r\n  completed_ok = pulls.select\
      \ { |p| p.state == 'completed' }.size >= MIN_COMPLETED_ACH_PULLS_FOR_RELIABILITY\r\
      \n  nothing_returned = pulls.none? { |p| p.state == 'returned' }\r\n  latest_ach_pull_successful\
      \ = pulls.max_by(&:created_at)&.completed?\r\n\r\n  This performs all operations\
      \ in Ruby memory using the cached records, resulting in just 1 database query\
      \ from the initial load call.\r\n```"
    created_at: '2025-08-01T04:30:31Z'
  - id: 2246880035
    author: amvinnu
    body: "If we go with the load once approach, we would do a bunch of work in Ruby\
      \ for users who have a lot of ACH pulls. The tradeoff is CPU/Memory on the nodes\
      \ running this code vs. letting the database do its thing. I am not sure how\
      \ busy the treasury DB in prod is, but I would guess the DB would be more performant/smarter\
      \ in doing these computations.\r\n\r\nFor users who have fewer ACH pulls, loading\
      \ them in one call and doing the filtering in process would be much performant.\
      \ We also avoid the network round trips which probably contribute the most to\
      \ overall latency."
    created_at: '2025-08-01T04:40:22Z'
  - id: 2246918195
    author: amvinnu
    body: "@harsohailB I think it makes sense to do it in code vs. query the DB multiple\
      \ times. \r\n\r\nI found this [dashboard](https://app.datadoghq.com/apm/entity/service%3Atreasury-trilogy?dependencyMap.showNetworkMetrics=false&deployments=qson%3A%28data%3A%28hits%3A%28selected%3Aversion_count%29%2Cerrors%3A%28selected%3Aversion_count%29%2Clatency%3A%28selected%3Ap95%29%2CtopN%3Aall%29%2Cversion%3A%210%29&env=prod&fromUser=false&graphType=flamegraph&groupMapByOperation=null&operationName=trilogy.query&panels=qson%3A%28data%3A%28%29%2Cversion%3A%210%29&resources=qson%3A%28data%3A%28visible%3A%21t%2Chits%3A%28selected%3Atotal%29%2Cerrors%3A%28selected%3Aratio%29%2Clatency%3A%28selected%3Ap95%29%2CtopN%3Aall%2Csearch%3Aach_pulls%29%2Cversion%3A%211%29&shouldShowLegend=true&sort=time&spanKind=client&summary=qson%3A%28data%3A%28visible%3A%21t%2Cchanges%3A%28%29%2Cerrors%3A%28selected%3Aratio%29%2Chits%3A%28selected%3Acount%29%2Clatency%3A%28selected%3Alatency%2Cslot%3A%28agg%3A95%29%2Cdistribution%3A%28isLogScale%3A%21f%29%2CshowTraceOutliers%3A%21t%29%2Csublayer%3A%28slot%3A%28layers%3AserviceAndInferred%29%2Cselected%3Apercentage%29%2ClagMetrics%3A%28selectedMetric%3A%21s%2CselectedGroupBy%3A%21s%29%29%2Cversion%3A%211%29&traceQuery=&start=1753938223670&end=1754024623670&paused=false)\
      \ useful for looking at treasury DB calls. Filtering for ach_pulls, the p95\
      \ latency is in the 800ms range already."
    created_at: '2025-08-01T05:06:48Z'
  - id: 2248144386
    author: harsohailB
    body: "Makes sense. Here are the top 10 external ACH accounts and number of ACH\
      \ pulls.\r\n\r\n<img width=\"582\" height=\"733\" alt=\"Screenshot 2025-08-01\
      \ at 8 31 22 AM\" src=\"https://github.com/user-attachments/assets/55640b6b-e6c4-40d8-83aa-29c2123db167\"\
