  - id: 2920840919
    author: devin-ai-integration[bot]
    body: 'Without `optional: true`, `NotificationOfChange.create!` raises `Validation
      failed: Notification of change file must exist` since Rails 7.2 requires `belongs_to`
      associations by default. Webhook-originated NOCs from Treasury Prime don''t
      have an associated `IncomingAchFile` — only file-based NOCs (SVB) do.


      The DB column `notification_of_change_file_id` is already nullable (no `NOT
      NULL` constraint in the schema), so the model validation is the only thing enforcing
      presence. Making it `optional: true` aligns the Rails validation with the DB
      schema and the new webhook-based creation path.


      Existing file-based NOC creation always passes a file, so this change doesn''t
      affect that path. Happy to handle differently if you''d prefer another approach.'
