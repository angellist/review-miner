    created_at: '2025-01-15T06:18:03Z'
  replies:
  - id: 1916935144
    author: harsohailB
    body: "The job handler produces the following for all stalled queued transfers:\r\
      \n\r\n```ruby\r\n[8] TREASURY-PROD(main)> Rake::JobHandler.process!(QueuedTransfer.where(state:\
      \ :queued).where('created_at < ?', 2.business_days.ago)) do |queued_transfer|ted_at.to_date}\"\
