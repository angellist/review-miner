      same idempotency key. Unlikely to happen but just added as a safety measure.
    created_at: '2026-01-06T19:17:27Z'
  pr_author: harsohailB
  merged_at: '2026-01-08T16:20:02Z'
  repo: treasury
  has_suggestion_block: false
- thread_id: 2633325907
  pr: 6378
  root:
    id: 2633325907
    author: stathis-alexander
    body: 'How do I understand synchronous transfers? Are they just ledger entries?
      Basically, the concern I would have is that if they actually move any money,
      then the following could occur:

      1. the waiting on transfer is synchronous and is executed in line here

      2. somewhere further in the txn fails

      3. the transaction rolls back, leaving us in bad state'
    path: app/services/transfers/v2/create_service.rb
    created_at: '2025-12-19T02:16:06Z'
  replies:
  - id: 2666016906
    author: harsohailB
    body: "execute_transfer! does one of two things:\r\n* Sync: Creates a ledger entry\r\
      \n* Async: Creates a solid queue job\r\n\r\nIn both cases, if somewhere further\
      \ something fails, we rollback completely. We transfer and the waiting on the\
      \ transfer and we rollback the ledger entry or the solid queue job for async\
      \ execution.\r\n\r\n```ruby\r\ndef execute_transfer!(transfer)\r\n      if transfer.can_process_synchronously?\r\
      \n        transfer.process_synchronously!\r\n        return transfer\r\n   \
      \   end\r\n\r\n      Transfers::ExecuteJob.perform_later(transfer.id)\r\n  \
      \    transfer\r\nend\r\n```"
    created_at: '2026-01-06T19:19:33Z'
  pr_author: harsohailB
  merged_at: '2026-01-08T16:20:02Z'
  repo: treasury
  has_suggestion_block: false
