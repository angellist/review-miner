- thread_id: 2659670510
  pr: 6450
  root:
    id: 2659670510
    author: pradyuman
    body: Is there a way to do this without casting? It's safe here because we check
      to make sure it's an `enum` before doing this, but I'm curious if there's a
      different, better pattern that's preferred.
    path: app/handlers/base_handler.rb
    created_at: '2026-01-04T13:34:39Z'
  replies:
  - id: 2659999039
    author: kwliang1
    body: 'In order to avoid this, I think you can extract the `raw_type` like so:

      ```

      raw_type = type.respond_to?(:raw_type) ? type.raw_type : type

      ```


      and then have conditional logic on it so that sorbet can recognize it.   The
      issue is that we are determining the type of the output at runtime. '
    created_at: '2026-01-04T23:17:33Z'
  - id: 2659999619
    author: kwliang1
    body: "there's some recursion involved with nested structs/arrays when you do\
      \ this.   (what you're doing below)\n\n```\n# Deserialize a value based on its\
      \ Sorbet type, recursing into arrays and structs\n  sig { params(value: T.untyped,\
      \ type: T.untyped).returns(T.untyped) }\n  def deserialize_value(value, type)\n\
      \    type = unwrap_nilable(type)\n\n    # Handle arrays - recursively deserialize\
      \ each element\n    if type.is_a?(T::Types::TypedArray) && value.is_a?(Array)\n\
      \      return value.map { |v| deserialize_value(v, type.type) }\n    end\n\n\
      \    # Get the raw class from T::Types::Simple wrapper\n    raw_type = type.respond_to?(:raw_type)\
      \ ? type.raw_type : type\n    return value unless raw_type.is_a?(Class)\n\n\
      \    # Handle T::Enum - deserialize from string\n    if raw_type < T::Enum &&\
      \ value.is_a?(String)\n      return T.unsafe(raw_type).deserialize(value)\n\
      \    end\n\n    # Handle T::Struct - recursively deserialize props\n    if raw_type\
      \ < T::Struct && value.is_a?(Hash)\n      nested_args = deserialize_props(value.symbolize_keys,\
      \ raw_type)\n      return raw_type.new(nested_args)\n    end\n\n    value\n\
      \  end\n```"
    created_at: '2026-01-04T23:18:44Z'
  pr_author: pradyuman
  merged_at: '2026-01-05T04:16:28Z'
  repo: treasury
  has_suggestion_block: false
