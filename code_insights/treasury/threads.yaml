- thread_id: 3017208543
  pr: 7253
  root:
    id: 3017208543
    author: dcetlin
    body: "```suggestion\n# Omnibus queued payments are kept queued indefinitely until\
      \ the sub-account is migrated,\n# so they should not reduce the migration balance.\n\
      excluded_omnibus_queued_payment_amount =\n  Money.new(outgoing_wires.queued.ghb_omnibus.sum(:amount_cents))\
      \ +\n  Money.new(ach_pushes.queued.ghb_omnibus.sum(:amount_cents))\n\ntotal_pending_debit_amount\
      \ =\n  pending_debit_amount(\n    include_mirror_transfers: true,\n    include_queued_transfers:\
      \ false,\n    exclude_funds_migration_transfers: false\n  )\n\nnet_pending_debit_amount\
      \ =\n  total_pending_debit_amount - excluded_omnibus_queued_payment_amount\n\
      \ncash_balance - net_pending_debit_amount\n```"
    path: app/models/customer_account.rb
    created_at: '2026-03-31T17:12:12Z'
  replies:
