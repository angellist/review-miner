    id: 2670393575
    author: denis
    body: "Should be double quotes? This is what I see:\n```\n ✔ Container treasury-mysql-1\
      \     Stopped                                                              \
      \                                                                          \
      \                         0.0s \n-e \\nLoading latest Tonic data...\n-e \\nStarting\
      \ MySQL...\n```"
    path: Makefile
    created_at: '2026-01-07T23:31:43Z'
  replies:
  - id: 2670399921
    author: denis
    body: '```

      The Makefile sets SHELL := /bin/bash, but on macOS, /bin/bash is an older version
      (3.2) where echo builtin behavior can be inconsistent with the -e flag depending
      on shell options.


      The fix: Replace echo -e with printf, which is POSIX-compliant and works consistently
      across all shells.


      For example:

      # Instead of:

      echo -e ''\nLoading latest Tonic data...''


      # Use:

      printf ''\nLoading latest Tonic data...\n''

      ```'
    created_at: '2026-01-07T23:35:30Z'
  - id: 2670477276
    author: amahon
    body: Fixed! Good call.
