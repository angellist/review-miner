  - id: 2551407692
    author: dcetlin
    body: "Okay turns out:\r\n```\r\nVARCHAR(255):\r\n  - Stores: actual content +\
      \ 1-2 bytes length prefix\r\n  - \"Hello\" = 5 bytes + 1 byte = 6 bytes total\r\
      \n  - Does NOT allocate 255 bytes\r\n\r\n  TEXT(65535):\r\n  - Stores: actual\
      \ content + 2-4 bytes length prefix\r\n  - \"Hello\" = 5 bytes + 2 bytes = 7\
      \ bytes total\r\n  - Does NOT allocate 65,535 bytes\r\n\r\n  Where the Limit\
      \ Matters:\r\n\r\n  Schema limits only matter for:\r\n  1. Maximum value enforcement\
      \ (prevents storing larger data)\r\n  2. Memory allocation during query processing\
      \ (temp tables, sorts)\r\n  3. Index key limits (MySQL has max key length limits)\r\
      \n  ```"
    created_at: '2025-11-22T00:27:18Z'
  - id: 2556809585
    author: kwliang1
    body: "> 2. Memory allocation during query processing (temp tables, sorts)\r\n\
