    author: xinranxiao
    body: The canonical `!` on a method implies a mutating action, so that's why I
      asked originally (no explicit mutation, but does set some fields)
    created_at: '2025-02-26T21:11:16Z'
  - id: 1972451447
    author: harsohailB
    body: Ah. What is your preference here? Have the `!` or not. It doesn't mutate
      anything on the DB but it does change an object that is about to be saved. Grey
      area.
