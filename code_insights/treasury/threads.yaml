  root:
    id: 2874230728
    author: amahon
    body: Doesn't this risk conflicting with other concurrent tests creating a slightly
      different flake related to expected records missing, as opposed to there being
      more records than expected?
    path: spec/handlers/treasury_events_handler_spec.rb
    created_at: '2026-03-02T19:24:22Z'
  replies:
  - id: 2874233268
    author: devin-ai-integration[bot]
    body: 'No — this spec uses the default `transaction` strategy (it''s not marked
      `:concurrent`), so the `delete_all` and everything else in the test runs inside
      a transaction that gets rolled back at the end. Other tests in the same process
      are in their own DatabaseCleaner-managed transaction and won''t see the delete.
      Parallel CI runners use separate databases entirely, so no conflict there either.


      The `delete_all` only cleans up stale rows that were committed to the real database
      by earlier `:concurrent` (truncation-strategy) tests before this test''s transaction
      began.'
    created_at: '2026-03-02T19:24:57Z'
