- thread_id: 2282470077
  pr: 5764
  root:
    id: 2282470077
    author: stathis-alexander
    body: "When would a transfer be \"internal\"? This is a strange concept. From\
      \ treasury's POV, \"internal\" likely most closely means transfers from a CA\
      \ to itself, which should likely be invisible to external consumers anyways.\
      \ \r\n\r\n"
    path: app/controllers/api/transfers_controller.rb
    created_at: '2025-08-18T13:49:16Z'
  replies:
  - id: 2323176700
    author: Sheeler
    body: "Naming here might be part of the issue, but to back up:\r\n\r\nWhat _Comptroller_\
      \ wants is the list of money movements that leave the fund's accounting universe.\
      \ So like, a transfer from the CCA to the IVA doesn't matter to CPTR, but following\
      \ the transfer from the IVA to Belltower does.\r\n\r\n_This PR_ achieves that\
      \ by adding a route that takes a collection of Customer Accounts, and returns\
      \ all their ledger entries that aren't _amongst_ themselves. This is obviously\
      \ informed by the goal I'm working backwards from, but is set up in a way that\
      \ doesn't require Treasury to know anything about the accounts involved.\r\n\
      \r\nWe could just fetch all the ledger entries for the inputted accounts, then\
      \ do the filtering in CPTR. That eliminates this endpoint, but it is nice to\
      \ be able to do all this filtering in the DB instead of sending it all to CPTR."
    created_at: '2025-09-04T18:55:06Z'
  - id: 2325128321
    author: stathis-alexander
    body: "> What Comptroller wants is the list of money movements that leave the\
      \ fund's accounting universe. So like, a transfer from the CCA to the IVA doesn't\
      \ matter to CPTR, but following the transfer from the IVA to Belltower does.\r\
      \n\r\nYeah, I understood what you were doing and why, I was just pressing on\
      \ the naming. \r\n\r\n> This PR achieves that by adding a route that takes a\
      \ collection of Customer Accounts, and returns all their ledger entries that\
      \ aren't amongst themselves. This is obviously informed by the goal I'm working\
      \ backwards from, but is set up in a way that doesn't require Treasury to know\
      \ anything about the accounts involved.\r\n>\r\n> We could just fetch all the\
      \ ledger entries for the inputted accounts, then do the filtering in CPTR. That\
      \ eliminates this endpoint, but it is nice to be able to do all this filtering\
      \ in the DB instead of sending it all to CPTR.\r\n\r\nI'm honestly ambivalent\
      \ towards either approach. My major concern is not tacking on more bad and leaky\
      \ abstractions into treasury. "
    created_at: '2025-09-05T13:37:22Z'
  - id: 2328779355
    author: Sheeler
    body: "Made a few changes here, instead a bulk api for fetching transfers for\
      \ multiple accounts (with the standard options for revised, pending transfers,\
      \ and balance), and an additional param to trigger the filtering logic I care\
      \ about.\r\n\r\nI don't love the name, but \"transfers\" feels a little too\
      \ generic."
    created_at: '2025-09-07T17:41:50Z'
  pr_author: Sheeler
  merged_at: '2025-09-12T20:27:20Z'
