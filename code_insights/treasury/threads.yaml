  replies:
  - id: 2670578163
    author: amahon
    body: 'So... I''m running the dev environment inside a Linux VM on my MBP. For
      whatever reason I find Linux to be quite efficient. You''re probably better
      off avoiding the topic -- but I''m always glad to discuss! :)


      In any case, the `/run/host-services/ssh-auth.sock` host feature is only available
      on Mac OS Docker hosts.. thus, I need to find an alternative approach to allowing
      the container to use the host''s SSH agent.


      I have made some progress in that direction, in particular by binding the hosts
      `$SSH_AUTH_SOCK` to the guest `/agent.sock`.. this works and avoids sharing
      credentials.. but conflicts with the Mac OS approach. I''ll continue to push
      in this direction and feel confident that we can avoid sharing creds into the
      container. I''ll commit current work in case you have any ideas..'
    created_at: '2026-01-08T01:35:52Z'
  - id: 2670654381
    author: stathis-alexander
    body: "This change is rather small and unoffensive, but as a general rule we only\
      \ support darwin environments set up as defined in our Apple Silicon doc. This\
      \ is to reduce dealing with complexity from different dev envs. If you decide\
      \ to stray, that's fine, but know that we unfortunately don't have the resources\
      \ to help debug or fix issues in dev envs outside of our prescribed one.\r\n\
      \r\nThese days, there's not a ton of variance between *nix on aarm64 (pretty\
      \ much everything works on ubuntu-slim more or less out of the box), but not\
      \ all of our apps are containerized, and we do have a fair amount of ruby gems\
      \ and js packages that require building binaries from source. Since all of our\
      \ prod images are alpine, we have some pathways defined for those builds if\
      \ needed, but that's more or less our willingness to support beyond darwin.\
      \ \r\n\r\n> So... I'm running the dev environment inside a Linux VM on my MBP.\
      \ For whatever reason I find Linux to be quite efficient. You're probably better\
      \ off avoiding the topic -- but I'm always glad to discuss! :)\r\n\r\nIt's been\
      \ a while since I've messed with VMs overly much, but I'd be really surprised\
      \ if you didn't experience performance issues as a result. Even running Docker\
      \ Desktop for darwin arm, our containers were slow. Orbstack is built to optimize\
      \ running docker containers on apple silicon, and even then building grpc can\
      \ take several minutes. "
    created_at: '2026-01-08T02:31:38Z'
  - id: 2670920164
    author: amahon
