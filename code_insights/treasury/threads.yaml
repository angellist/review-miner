    id: 2982537543
    author: dcetlin
    body: '**Valuable content, fragile delivery**


      116 lines of genuinely useful orientation — V1/V2 routing, state machine, key
      files, cron jobs. Two structural concerns:


      1. **Drift class**: This skill is dense with falsifiable claims — file paths,
      enum values, state transitions, cron schedules. Any of these can change in code
      without anyone remembering to update the skill. There''s no mechanism (test,
      lint, hook) that detects skill-to-code divergence.

      2. **Cross-domain gap**: Transfer work almost always requires ledger context
      (off-ledger CrossTransfers, when LedgerEntries are created). Loading this skill
      without treasury-ledger produces subtly incomplete reasoning about balance states.


      **Suggestion**: Keep a compressed transfer routing summary in CLAUDE.md (~5
      lines — the V1 type list + "V2 unifies these into a single Transfer model").
      This skill holds the *deep* detail (metadata model, cron jobs, state machine,
      key files) as an additive supplement for when someone is specifically working
      on transfer internals.'
