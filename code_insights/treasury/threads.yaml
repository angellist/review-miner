      `created` or `provisioned` where the wire hasn''t been "sent" yet but is in
      progress.


      "Wires that have been sent to it" would be inaccurate for those early states.
      The double-negative phrasing ("have not been rejected or cancelled") is always
      truthful regardless of which non-terminal state is blocking.


      Happy to workshop the wording though — open to suggestions that stay accurate
      across all blocking states. @dcetlin thoughts?'
    created_at: '2026-03-04T21:41:58Z'
