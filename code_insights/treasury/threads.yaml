- thread_id: 2834966300
  pr: 6694
  root:
    id: 2834966300
    author: harsohailB
    body: Should we lock customer accoun there to avoid race conditions?
    path: app/services/sub_account_requests/create_service.rb
    created_at: '2026-02-20T20:23:58Z'
  replies:
  - id: 2835609398
    author: amahon
    body: 'Good call — added a `customer_account.with_lock` guard around the creation.
      Inside the lock, it checks for any existing in-flight request (`pending`, `processing`,
      or `application_submitted`) for the same customer account + program before creating.
      This follows the same pattern as `Transfers::V2::CreateService` (lock parent,
      check, create).


      The workflow start is outside the lock since it doesn''t need the row lock and
      we don''t want to hold it during the Temporal RPC.'
    created_at: '2026-02-21T00:47:47Z'
