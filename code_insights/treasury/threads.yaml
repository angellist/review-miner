    author: phanle
    body: "I think to deploy this safely, we would need to make a code change to ignore\
      \ this field first, and then deploy this migration. \r\n\r\nhttps://www.cloudbees.com/blog/rails-migrations-zero-downtime"
    path: db/migrate/20250207003314_remove_state_from_dibs_piermont_settlement_sweep.rb
    created_at: '2025-02-07T18:44:02Z'
  replies:
  - id: 1947060528
    author: phanle
    body: "specifically this https://www.cloudbees.com/blog/rails-migrations-zero-downtime#removing-columns\
      \ and remove all references to this column in a PR before dropping it. \n\n\
      My take on the order of a production deploy is: \n1. Run migration\n2. Deploy\
      \ new code\n\nwhen 1 is running, there are still live pods that still cache\
      \ the old schema with the column and will fail if the column is dropped. Hence\
      \ the need to have a new deploy to tell all pods to ignore the columns"
    created_at: '2025-02-07T19:18:52Z'
  pr_author: harsohailB
  merged_at: '2025-02-07T20:33:07Z'
  repo: treasury
