  root:
    id: 2547648629
    author: fivetentaylor
    body: you said the current max was 191 or something?  And just to be sure, the
      300 here represents char length, not byte length right? Like this should mean
      1200 bytes if mysql is using mb4 here or whatever it's called?
    path: app/models/external_wire_account.rb
    created_at: '2025-11-20T20:56:57Z'
  replies:
  - id: 2547917844
    author: dcetlin
    body: "Good question\r\n\r\nWhen i ran `ExternalWireAccount.all.map {|ewa|ewa.read_attribute_before_type_cast('beneficiary_account_number').size}.sort.tally`,\
      \ the Longest was 194 characters\r\n\r\n  VARCHAR(300) Means:\r\n  - 300 characters\
      \ (not bytes)\r\n  - Up to 1,200 bytes in MySQL with utf8mb4 (4 bytes per character\
      \ max)\r\n  - Buffer: 300 - 194 = 106 extra characters for growth\r\n\r\n  Index\
      \ Key Size Calculation:\r\n```\r\n  Your 3-column index:\r\n  - entity_id: ~36\
      \ chars × 4 = 144 bytes\r\n  - beneficiary_account_number: 300 chars × 4 = 1,200\
      \ bytes\r\n  - beneficiary_routing_number: 255 chars × 4 = 1,020 bytes\r\n \
      \ - Total: ~2,364 bytes (under 3,072 limit ✅)\r\n```"
    created_at: '2025-11-20T22:37:31Z'
  pr_author: dcetlin
  merged_at: '2025-11-21T20:29:41Z'
  repo: treasury
  has_suggestion_block: false
