- thread_id: 1916002377
  pr: 4990
  root:
    id: 1916002377
    author: thibaut-pro
    body: "I definitely missed reviewing these as part of my oncall rotation. While\
      \ Cronitor is a decent mechanism to ensure we investigate failing crons, I think\
      \ there is a way to improve the ergonomics of this type of oncall work.\r\n\r\
      \nWhat I have in mind is a Flowdash workflow with all Treasury operations that\
      \ require eng attention. It would include balance checks, stuck ACHs, stalled\
      \ transfers.\r\nBenefits:\r\n1. Will have better visibility into the volume\
      \ over time.\r\n2. We can track assignees and comments for longstanding issues\
      \ like negative balances.\r\n3. We can get rid of custom table UIs in Treasury\
      \ and benefit from Flowdash filtering and sorting.\r\n4. We can dedupe alerts\
      \ by setting a unique id (e.g. `<ErrorType>-<ObjectType>-<ObjectId>`, `Stalled-QueuedTransfer-12345`)\r\
      \n5. We can create Slack notifications into the #banking-alerts channel from\
      \ Flowdash that show the resolution status"
    path: lib/tasks/health.rake
    created_at: '2025-01-15T06:24:45Z'
  replies:
  - id: 1916936020
    author: harsohailB
    body: Makes sense to me. Should we still continue down the Cronitor path for now
      until we move to Flowdash?
