      \ = pulls.max_by(&:created_at)&.completed?\r\nend\r\n\r\ndef in_db(external_ach_account)\r\
      \n  completed_ok = external_ach_account.ach_pulls.where(state: :completed).count\
      \ >= 2\r\n  nothing_returned = external_ach_account.ach_pulls.where(state: :returned).none?\r\
      \n  latest_ach_pull_successful = external_ach_account.ach_pulls.order(created_at:\
      \ :desc).first&.completed?\r\nend\r\n\r\nBenchmark.bm do |x|\r\n  external_ach_account\
      \ = ExternalAchAccount.find(14317)\r\n  x.report(\"In Memory:\") { in_memory(external_ach_account)\
      \ }\r\n  x.report(\"In DB:\") { in_db(external_ach_account) }\r\nend\r\n\r\n\
      \                user     system      total        real\r\nIn Memory:  0.020224\
      \   0.000197   0.020421 (  0.023021)\r\nIn DB:      0.005362   0.005019   0.010381\
      \ (  0.023129)\r\n```"
