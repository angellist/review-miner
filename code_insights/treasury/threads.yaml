      \ a new ExternalWireAccount.\""
    created_at: '2026-03-04T22:24:14Z'
  - id: 2886464757
    author: devin-ai-integration[bot]
    body: 'Done — replaced the static message with dynamic lock reasons in commit
      `226b50be2`:


      - **Completed wire exists** → "Account identifiers cannot be edited while an
      OutgoingWire to the destination they represent has been completed. Please create
      a new ExternalWireAccount."

      - **In-progress wires only** → "Account identifiers cannot be edited while OutgoingWires
      to the destination they represent are in progress. Cancel the active wires if
      possible, or create a new ExternalWireAccount."


      Logic: plucks distinct blocking states via `outgoing_wires.where.not(state:
      REJECTED_OR_CANCELLED_STATES).distinct.pluck(:state)`, then checks for `completed`
      presence to pick the right message.'
