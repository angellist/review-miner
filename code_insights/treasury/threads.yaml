  root:
    id: 1908285758
    author: thibaut-pro
    body: "Mapping 'cash management' to `ExternalAchAccount::AccountType::CHECKING`\
      \ seems like the simplest solution here. A cash management account will behave\
      \ like a checking account for all our needs.\r\n\r\nIt's a breaking change from\
      \ Plaid from December 4th: https://plaid.com/docs/changelog/#december-4-2024\r\
      \nThey added \"cash management\" as an account subtype in addition to \"checking\"\
      \ and \"savings\".\r\n\r\n![image](https://github.com/user-attachments/assets/95648a5c-c4f1-423d-acb4-bf5571ee681d)\r\
      \n\r\nOur system just failed on that with\r\nActiveRecord::RecordInvalid: Validation\
      \ failed: Account type can't be blank, Account type is not included in the list\r\
      \n\r\n![image](https://github.com/user-attachments/assets/e1263161-0685-4180-8ea2-ff5f060d9b24)\r\
      \n"
    path: app/services/plaid/ach_account_service.rb
    created_at: '2025-01-09T07:34:31Z'
  replies: []
  pr_author: thibaut-pro
  merged_at: '2025-01-09T17:41:34Z'
