    created_at: '2025-01-14T20:34:04Z'
  - id: 1915667440
    author: harsohailB
    body: "Wrote this quick test and it seems to be working as expected:\r\n\r\n```ruby\r\
      \nit 'tests the locking', :concurrent do\r\n      thread1 = Thread.new do\r\n\
      \        ActiveRecord::Base.transaction do\r\n          DIBS::PaymentTransfer.svb.achs.batch_processable.in_batches(of:\
      \ 2).each do |batch|\r\n            locked_achs = batch.lock('FOR UPDATE').to_a\r\
      \n            puts \"Thread #{Thread.current.object_id} obtained lock for: #{locked_achs.pluck(:id)}\"\
      \r\n            sleep(2.seconds)  # Simulate work\r\n            locked_achs.each\
      \ { |x| x.update!(state: :completed) }\r\n            puts \"Thread #{Thread.current.object_id}\
      \ completed processing: #{locked_achs.pluck(:id)}\"\r\n          end\r\n   \
      \     end\r\n      end\r\n    \r\n      thread2 = Thread.new do\r\n        ActiveRecord::Base.transaction\
      \ do\r\n          sleep 1.second\r\n          \r\n          DIBS::PaymentTransfer.svb.achs.batch_processable.in_batches(of:\
      \ 2).each do |batch|\r\n            locked_achs = batch.lock('FOR UPDATE').to_a\r\
      \n            puts \"Thread #{Thread.current.object_id} obtained lock for: #{locked_achs.pluck(:id)}\"\
      \r\n            sleep(2.seconds)  # Simulate work\r\n            locked_achs.each\
      \ { |x| x.update!(state: :completed) }\r\n            puts \"Thread #{Thread.current.object_id}\
      \ completed processing: #{locked_achs.pluck(:id)}\"\r\n          end\r\n   \
      \     end\r\n      end\r\n\r\n      [thread1, thread2].each(&:join)\r\n    end\r\
      \n```\r\n\r\nThe second thread waits for the first one:\r\n\r\n```ruby\r\nDIBS::Integrations::Svb::BatchAchProcessor\r\
      \n  .submit!\r\nThread 15640 obtained lock for: [1, 2]\r\nThread 15640 completed\
      \ processing: [1, 2]\r\nThread 15640 obtained lock for: [3, 4]\r\nThread 15640\
      \ completed processing: [3, 4]\r\nThread 15640 obtained lock for: [5, 6]\r\n\
      Thread 15640 completed processing: [5, 6]\r\nThread 15640 obtained lock for:\
      \ [7, 8]\r\nThread 15640 completed processing: [7, 8]\r\nThread 15640 obtained\
      \ lock for: [9, 10]\r\nThread 15640 completed processing: [9, 10]\r\nThread\
      \ 15640 obtained lock for: [11, 12]\r\nThread 15640 completed processing: [11,\
      \ 12]\r\nThread 15640 obtained lock for: [13, 14]\r\nThread 15640 completed\
      \ processing: [13, 14]\r\nThread 15688 obtained lock for: []\r\nThread 15688\
      \ completed processing: []\r\n    tests the locking\r\n\r\nFinished in 18.63\
      \ seconds (files took 5.57 seconds to load)\r\n1 example, 0 failures\r\n```\r\
      \n"
