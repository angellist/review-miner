    author: amahon
    body: 'Good catch! `DIBSApi::InternalAccountsService.submit_application!` returns
      a `DIBS::InternalAccount::Application`, but we were throwing away the return
      value.


      Fixed in two places:

      1. **Model + StateService type signatures** (Phase 1): Added `DIBS::InternalAccount::Application`
      to the `T.any(...)` union on `mark_application_submitted!` so the polymorphic
      association accepts it

      2. **process_dibs!** (Phase 3): Captured the return value from `submit_application!`
      and passed it through to `mark_application_submitted!(request, account_application:
      application)`


      Now BNY DIBS applications are tracked on the SubAccountRequest the same way
      TP and MMF applications are.'
