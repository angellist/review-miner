  pr: 5574
  root:
    id: 2122334799
    author: fivetentaylor
    body: My context is limited, but this will prevent these records from getting
      saved to the db right?  Do we want to prevent saving these records or just truncate
      the address when we actually create the wire?
    path: lib/wire/validations/account_information.rb
    created_at: '2025-06-02T23:35:52Z'
  replies:
  - id: 2122347505
    author: kwliang1
    body: "Correct.   I think it's intentionally restrictive, as we want to avoid\
      \ bad inputs from users at time of creation, rather than wait until the wire\
      \ needs to be submitted to uncover bad data.\r\n\r\nThe pro of this is that\
      \ we have less operational overhead due to bad data.   A con would be that we\
      \ are pretty heavily coupling our data model to restrictions imposed by a single\
      \ provider (TreasuryPrime).   \r\n\r\ncc @harsohailB in case I'm off here. \
      \  "
    created_at: '2025-06-02T23:49:40Z'
  - id: 2125061956
    author: harsohailB
    body: "From @FoodProduct's work on these fields, we took a stance to save as much\
      \ data as we can in our DB (higher length restrictions, special chars, etc.).\
      \ I think we should sanitize the data before sending it out to TP or a specific\
      \ bank instead.\r\n\r\n@FoodProduct curious to get your thoughts on this too"
    created_at: '2025-06-03T22:44:07Z'
  - id: 2125081809
    author: kwliang1
    body: "Ah, interesting.   So I'm assuming that Google Maps API will take care\
      \ of converting:\r\n`BRAS BASAH ROAD, 51 PLAZA BY THE PARK` => `BRAS BASAH RD,\
      \ 51 PLAZA BY THE PARK` ?"
    created_at: '2025-06-03T23:02:19Z'
  - id: 2125140441
    author: FoodProduct
    body: "1. Yes, we want to save non-truncated/filtered data in the database and\
      \ filter on read. This is better for a few reasons, but an easy example is if\
      \ we integrate with another bank that has different/more extensive data expectations\
      \ we aren't SoL based on the limitations of our current partners. That said,\
      \ we should still have good validation on entry to ensure that the data is \"\
      good,\" such as the character limit on state indicating that they should be\
      \ state codes and not the full state names.\r\n2. When we use the Google Maps\
      \ Geocoding API, we throw them a raw concatenated string and parse the API results\
      \ into the structured format"
    created_at: '2025-06-03T23:57:26Z'
  pr_author: kwliang1
