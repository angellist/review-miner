  - id: 2722432678
    author: fivetentaylor
    body: Hmm, I thought we only call transfer v2 when we know we need to move money
      in the real world, otherwise we should directly call `LedgerEntry.create!`.  The
      old code called `Transfers::CreateService` which would only create a ledger
      entry when that was the right choice but now we're being explicit right?  Is
      there code upstream from this that uses a ledger entry when a transfer isn't
      necessary?
    created_at: '2026-01-23T18:48:58Z'
  - id: 2722458264
    author: harsohailB
    body: "> The old code called Transfers::CreateService which would only create\
      \ a ledger entry when that was the right choice but now we're being explicit\
      \ right?\r\n\r\nThis still falls under the bucket of transferring between two\
      \ customer accounts. If later, we decide to have seperate sub accounts for account\
      \ in the IVC (not gonna happen but just an example), this will continue to work.\
      \ Similar thing happens for incoming wire reassignment right now: https://treasury.internal.angellist.com/v/ledger/5368640\r\
      \n\r\nThe re-assigment calls transfers v2 for the revision which handles the\
      \ case where assignment is within the IVC and does:\r\n\r\n```ruby\r\n[9] TREASURY-PROD(main)>\
      \ Transfers::Metadata.where(initiating_payment_processor: 'ledger').last\r\n\
      => #<Transfers::Metadata:0x0000ffff5ee11910\r\n id: 2140,\r\n requester_type:\
      \ \"IncomingWire\",\r\n requester_id: 289799,\r\n revised_ledger_entry_id: 5368639,\r\
      \n force_reason: nil,\r\n forced_by_user_id: nil,\r\n force_note: nil,\r\n description:\
      \ \"Assigning wire to the correct destination after or...\",\r\n created_at:\
      \ \"2026-01-23 17:50:49.120975000 +0000\",\r\n updated_at: \"2026-01-23 17:50:49.467739000\
      \ +0000\",\r\n from_sub_account_id: 358320,\r\n to_sub_account_id: 358320,\r\
      \n category: \"DESTINATION_CHANGE\",\r\n payment_type: \"book\",\r\n initiating_payment_processor:\
      \ \"ledger\",\r\n initiating_payment_processor_transfer_id: \"ledger\",\r\n\
      \ ledger_entry_id: 5368640,\r\n direction: \"credit\",\r\n receiving_payment_processor:\
      \ \"ledger\",\r\n receiving_payment_processor_transfer_id: \"ledger\",\r\n```\r\
      \n\r\n> Is there code upstream from this that uses a ledger entry when a transfer\
      \ isn't necessary?\r\n\r\nNo it just calls this and expects it to handle it.\r\
      \n\r\n----\r\n\r\nOverall, I think yes, we want to be more explicit but I think\
      \ it's fine to have the intra-IVC transfers in V2 as \"ledger\"\r\ntransfers.\
      \ Otherwise, we would increase complexity too much by need to determine between\
      \ transfers v2 and just ledger entry. This will all go away when we remove IVCs."
    created_at: '2026-01-23T18:58:03Z'
  pr_author: harsohailB
  merged_at: '2026-01-23T19:21:16Z'
