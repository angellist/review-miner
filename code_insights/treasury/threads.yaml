- thread_id: 2577969140
  pr: 6267
  root:
    id: 2577969140
    author: fivetentaylor
    body: 'Nice, so the metadata is attached to the wire here if the ewa is deduplicated
      ❤️ '
    path: app/models/outgoing_wire.rb
    created_at: '2025-12-01T17:22:25Z'
  replies:
  - id: 2578032942
    author: dcetlin
    body: "Yes exactly. That is the key here. We are enforcing two things based on\
      \ `deduplication=true`:\r\n1. expect `entity_id` and reject `customer_account`\
      \ on `EWA`.\r\n2. memo must be set on `OutgoingWire`, not EWA\r\n\r\nSo this\
      \ nifty fork on `OutgoingWire#memo` allows us to centralize the flow split.\r\
      \n\r\nAnd I have done my best to design enforcement from creation to provisioning\
      \ to reads that keeps things partitioned cleanly on this premise."
    created_at: '2025-12-01T17:40:21Z'
