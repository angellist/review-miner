    body: "Seems like doing in the DB is twice as fast but even in memory for the\
      \ largest computation only takes 0.02s. Upto you which path you wanna go.\r\n\
      \r\n```ruby\r\ndef in_memory(external_ach_account)\r\n  pulls = external_ach_account.ach_pulls.reload\r\
      \n  completed_ok = pulls.count { |p| p.state == 'completed' } >= 2\r\n  nothing_returned\
