  replies:
  - id: 1972355383
    author: harsohailB
    body: "We do the following to avoid `.update!` to DB for each configuration change\
      \ the payment transfer:\r\n1. Create the payment transfer in memory with `.new`\r\
      \n2. Configure it as we like in memory (set internal transfer stuff, reference\
      \ ID, partner bank FBO, etc.)\r\n3. `.save!` to commit it to DB"
    created_at: '2025-02-26T20:24:58Z'
  - id: 1972394529
    author: harsohailB
    body: I think the save outside is just better readability if someone is reading
      the public method of the service.
