- thread_id: 2908743104
  pr: 6983
  root:
    id: 2908743104
    author: dcetlin
    body: can you explain why this makes sense? what was the issue? What was the collision
      that cause failure?
    path: spec/factories/external_wire_account.rb
    created_at: '2026-03-10T01:13:36Z'
  replies:
  - id: 2908757565
    author: devin-ai-integration[bot]
    body: "The collision happens in `is_to_fund_svb_account?` (in `Funds::TransactionInfoService`),\
      \ which was changed in `f2ab64f35` from:\n\n```ruby\noutgoing_wire.external_wire_account.investment_vehicle_configuration_id\
      \ == fund_config.id\n```\n\nto:\n\n```ruby\newa.beneficiary_account_number ==\
      \ ach.account_number &&\n  ewa.beneficiary_routing_number == ach.routing_number\n\
      ```\n\nIn the failing test (`external investment returns true`), two factories\
      \ are in play:\n\n1. The `investment_vehicle_configuration` factory creates\
      \ an `external_ach_account` with `account_number: '10000001'` and `routing_number:\
      \ '021000021'`\n2. `use_external_investment!` creates an `outgoing_wire`, whose\
      \ default `external_wire_account` gets `beneficiary_account_number: '10000001'`\
      \ and `beneficiary_routing_number: '021000021'`\n\nBoth sequences use `(10_000_000\
      \ + n)` as the base and `'021000021'` as the routing number. When FactoryBot\
      \ sequences align (which they do deterministically in this test), the account\
      \ numbers match — so `is_to_fund_svb_account?` returns `true`, which causes\
      \ `is_external_investment?` to bail early with `false` (it excludes \"wires\
      \ to the fund's SVB account\"), and `can_build?` returns `false`.\n\nShifting\
      \ this factory's base to `20_000_000` ensures the two factories can never produce\
      \ matching account numbers, regardless of sequence alignment."
    created_at: '2026-03-10T01:19:34Z'
  pr_author: app/devin-ai-integration
  merged_at: '2026-03-10T19:17:56Z'
  repo: treasury
