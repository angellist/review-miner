- thread_id: 2926924345
  pr: 7039
  root:
    id: 2926924345
    author: fivetentaylor
    body: won't we overwrite values with `nil` accidentally if we drop the compact?
    path: app/models/concerns/submittable_ach.rb
    created_at: '2026-03-12T19:34:05Z'
  replies:
  - id: 2926926944
    author: devin-ai-integration[bot]
    body: 'The `.compact` was removed intentionally per @harsohailB''s request (see
      thread above). The reasoning: each NOC code maps `raw_info` to exactly one structured
      field, leaving the rest nil. Without removing `.compact`, a re-received webhook
      with a different NOC code would leave the old structured field populated on
      the Treasury `NotificationOfChange` even though it was cleared to nil on the
      DIBS side, causing the two to diverge.


      That said, one edge case to be aware of: callers that don''t pass `notification_of_change_file`
      (e.g. the `before_commit` callback path from webhook processing) will now write
      `nil` over a previously-set `notification_of_change_file`. If that''s a concern,
      we could selectively exclude `notification_of_change_file` from the hash when
      it''s nil, or re-add `.compact` and instead explicitly set the structured fields
      to empty strings. Happy to adjust based on what you and @harsohailB decide.'
    created_at: '2026-03-12T19:34:30Z'
  - id: 2927022794
    author: harsohailB
    body: I think it's fine. It's likely better to stay in sync with other systems
