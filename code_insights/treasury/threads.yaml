  pr: 5112
  root:
    id: 1947039256
    author: phanle
    body: One thing an Temporal Activity needs to maintain is its idempotency. What
      if this activity retried multiple times? Would we get an error from piermont?
    path: backend/dibs/lib/dibs/temporal/activities/piermont/settlement_sweep_activity.rb
    created_at: '2025-02-07T19:08:23Z'
  replies:
  - id: 1947060942
    author: harsohailB
    body: No we will not get an error from Piermont but the activity should only retry
      if the call the Piermont fails. In that case we rollback the record creation
      and are good try again.
    created_at: '2025-02-07T19:19:13Z'
  - id: 1947063260
    author: phanle
    body: an activity can be retried by our infra failures as well (like we did have
      yesterday).
    created_at: '2025-02-07T19:20:56Z'
  - id: 1947114036
    author: harsohailB
    body: "From https://community.temporal.io/t/what-is-the-best-way-to-have-an-http-post-within-an-activity/7926\r\
      \n\r\n> There is no way to implement an idempotent activity that calls a nonidempotent\
      \ API. This is not Temporal specific but applies to any distributed system."
    created_at: '2025-02-07T19:57:14Z'
  pr_author: harsohailB
