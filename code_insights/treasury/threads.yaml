- thread_id: 2274491692
  pr: 5764
  root:
    id: 2274491692
    author: harsohailB
    body: This feels very unnatural to me. Passing in ledger entry IDs and customer
      account IDs just to do some filtering. What is the use case here?
    path: app/controllers/api/transfers_controller.rb
    created_at: '2025-08-13T19:56:17Z'
  replies:
  - id: 2274581130
    author: Sheeler
    body: "There are a few goals here. The primary goal is for Comptroller to have\
      \ a persisted model tracking the purpose (or purposes) of a given money movement.\
      \ This gets us out of the current situation, where making a logic change in\
      \ `Treasury#TransfersService` or `Comptroller#CPTR::MembershipClasses::IncomingTransfersService`\
      \ can reinterpret the full history of a fund, and conflict with any accounting\
      \ we've already done based on those contributions.\r\n\r\nWe're achieving that\
      \ with a generic approach, treating Treasury more like an external system we\
      \ sync from. So that flow looks like:\r\n1. Comptroller fetches the ledger entries\
      \ \"external\" to a given fund, stores them in a [lightweight model](https://www.notion.so/Technical-Spec-1e661e866662805b8e09c0b38e0e99d0?source=copy_link#1ed61e866662807bb172efd9d14c848b)\r\
      \n    a. after the initial sync, this is paged to fetch only the net-new data\
      \ \r\n2. Comptroller uses our existing heuristics to determine which of these\
      \ transfers are LP contributions.\r\n    a. Today, this logic lives in Treasury#TransfersService\r\
      \n3. Comptroller uses our existing heuristic to _attribute_ a transfer to a\
      \ given LP\r\n    a. Today, we handle this via `CPTR::Command::RecordMemberCommitmentFunding`.\
      \ We'll extend this command to persist an attribution\r\n\r\nThe net result\
      \ is, when you want to refresh the contributed amounts on a fund, you can read\
      \ the attributions directly, optionally hitting Treasury to append just the\
      \ most recent transfers. If our heuristics are wrong on for a fund up to some\
      \ shenanigans, you update the attribution objects in the DB rather than changing\
      \ a random service in Treasury.\r\n\r\nCircling back to this API: A given MembershipClass\
      \ controls multiple Treasury accounts. When we're running the logic to determine\
      \ the purpose of a given transfer, we could be inspecting a LedgerEntry related\
      \ to any of them. The `Transfer` proto is oriented around an inputted account.\
      \ The idea here is to one-shot getting the metadata for all the transfers Comptroller\
      \ needs to categorize, which could come from any of the CustomerAccounts it\
      \ controls.\r\n\r\nThis didn't fit very naturally into this existing `index`\
      \ method, which is centered around a single customer account."
    created_at: '2025-08-13T20:42:16Z'
  - id: 2277586141
    author: kwliang1
    body: "@harsohailB to catch you up, @Sheeler and I synced on this 1:1.   I (like\
      \ you) just had concerns around the ergonomics of the endpoint.  \r\n\r\nMy\
      \ proposal was to couple the LE id's with the source_ca uuid they are _intended_\
      \ to be related to in the request param structure.\r\nSomething like:\r\n```\r\
      \n\r\n[{\r\n    source_ca_uuid: \"asdfasdfasdf\",\r\n    le_ids: [1,2,3]\r\n\
      },\r\n{\r\n    source_ca_uuid: \"ertertertert\",\r\n    le_ids: [4,5,6]\r\n\
      }]\r\n```\r\n\r\nAs for the response format, this remains in Sheeler's court.\
      \   He just needs an array of LE's, not necessarily it's association to the\
      \ `source_ca`.  (I think this is fine)"
    created_at: '2025-08-14T19:52:50Z'
  - id: 2277650570
    author: Sheeler
    body: The `Transfer` proto specifies the account it's oriented around, so _imo_
      returning as a map is somewhat duplicative.
    created_at: '2025-08-14T20:23:58Z'
  - id: 2277758239
    author: kwliang1
    body: sorry, I updated my language to be more clear.  The structure I proposed
      was for the request params.
    created_at: '2025-08-14T21:29:50Z'
  - id: 2277772803
    author: Sheeler
    body: I think we're on the same page -- I was replying about to your point on
      "response format".
    created_at: '2025-08-14T21:40:20Z'
  - id: 2282461116
    author: stathis-alexander
    body: Instead of doing a bunch of gymnastics to make the transfer proto work,
      why not just add a new proto? This endpoint could take a list of ids and return
      a list of objects if not for the desire to overload the existing proto object.
    created_at: '2025-08-18T13:47:07Z'
  - id: 2323130529
    author: Sheeler
    body: "I'm not attached to the \"map\" approach, but I do think we want to use\
      \ the Transfer proto here. I don't like the idea of adding a proto that exposes\
      \ the same objects and info in a slightly different way, and I think the \"\
      orientation\" around the inputted accounts will make the code that consumes\
      \ this easier to follow\r\n\r\nAs an example, today [transfers_service](https://github.com/angellist/treasury/blob/master/app/services/transfers_service.rb#L467-L484)\
      \ filters a bunch of transfers based on the accounts involved. Re-implementing\
      \ this in CPTR is more annoying if we don't know \"which end\" of the transfer\
      \ is who automatically. It's not _hard_, but you end up with more conditions/branches\
