- thread_id: 2982537550
  pr: 7175
  root:
    id: 2982537550
    author: dcetlin
    body: '**The routing problem: skill invocation requires knowing what you need
      before you need it**


      Most real Treasury work is cross-cutting. A bug in transfer completion touches
      ledger entries, state machines, and balance computation simultaneously. This
      directive forces a routing decision at task start, but the agent often can''t
      correctly categorize the task until mid-diagnosis.


      The compressed domain knowledge that lived here — Ledger invariants, Transfer
      type routing, Two-Hop money flow — totaled ~19 lines and formed the conceptual
      spine of the codebase. The routing table that replaces it is ~10 lines. Nine
      lines saved, ambient understanding lost.


      Specifically, what I''d restore:

      - **Ledger invariants** (~5 lines): LedgerEntry immutability, advisory locks,
      computed-never-stored balance, two views, available_balance formula

      - **Transfer routing** (~5 lines): the 5 V1 types + V2 unification

      - **Two-Hop pattern** (~5 lines): GlobalAccount → staging → CustomerAccount,
      and why AchPull/IncomingWire include the Account concern


      Let the details (cron schedules, V2 metadata model, state machine transitions,
      `amount_cents` sizes) live in skills as additive deep dives.


      **Suggestion**: Change this section from "invoke these *instead of* reading
      about it here" to "invoke these *for deeper detail beyond what''s below*."'
