- thread_id: 2539895061
  pr: 6191
  root:
    id: 2539895061
    author: harsohailB
    body: "Passing in a `workflow_id` allows you to prevent concurrent execution of\
      \ a workflow — a subsequent\r\ncall with the same `workflow_id` will always\
      \ get rejected while it is still running, raising\r\n`Temporal::WorkflowExecutionAlreadyStartedFailure`.\
      \ You can adjust the behaviour for finished\r\nworkflows by supplying the `workflow_id_reuse_policy:`\
      \ argument with one of these options:\r\n\r\n- `:allow_failed` will allow re-running\
      \ workflows that have failed (terminated, cancelled, timed out or failed)\r\n\
      - `:allow` will allow re-running any finished workflows both failed and completed\r\
      \n- `:reject` will reject any subsequent attempt to run a workflow"
    path: backend/dibs/app/services/dibs/reporting/piermont/alloy/api_service.rb
    created_at: '2025-11-18T23:06:36Z'
