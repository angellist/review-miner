      \ Please create a new ExternalWireAccount\"                                \
      \  \r\n                                                                    \
      \                                                                          \
      \ \r\nElsif at least 1 wire (not :completed, :rejected, :cancelled):       \
      \                                                                        \r\n\
      \  \"Account identifiers cannot be edited while OutgoingWires to the destination\
