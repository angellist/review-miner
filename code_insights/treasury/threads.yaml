- thread_id: 2093141968
  pr: 5513
  root:
    id: 2093141968
    author: stathis-alexander
    body: "Where is `SubAccountStatusTags` rendered, I don't see it in this component,\
      \ so I wouldn't expect its fragment to get included here. \r\n\r\nI suspect\
      \ you may be unfamiliar with the [Colocated Fragments](https://www.notion.so/GraphQL-How-does-it-work-1efa73266e4f4c60a038b905a6756969#dbe4b67fa4154f5da82b2be67793bd53)\
      \ pattern we use to manage data for our components. \r\n\r\nThe TL;DR: is that\
      \ each component defines a fragment that describes exactly the data it needs,\
      \ then its parents can expand that fragment on their queries or fragments. Props\
      \ are typed to the generated fragment type to ensure the fragments are included\
      \ correctly. "
    path: frontend/app/(authenticatedRoutes)/outgoing_wires/[id]/page.tsx
    created_at: '2025-05-16T14:16:36Z'
  replies:
  - id: 2093171581
    author: fivetentaylor
    body: It's [used here](https://github.com/angellist/treasury/blob/f3dfca1e0e1633bcab163eb7194870cdb025dcdc/frontend/app/(authenticatedRoutes)/outgoing_wires/%5Bid%5D/page.tsx#L680)
      is there a better way to do this?
    created_at: '2025-05-16T14:32:39Z'
  - id: 2093188960
    author: stathis-alexander
    body: "Yep - expand the `SubAccountStatusTagsSubAccount` fragment in the `CustomerAccountCardSubAccount`\
      \ since the `SubAccountStatusTags` component is rendered as a child of the `CustomerAccountCard`\
      \ component. \r\n\r\nOne way to see this is the right way, is that if you rendered\
      \ the `CustomerAccountCard` elsewhere, you could easily not notice that the\
      \ `SubAccountStatusTagsSubAccount` also needs to be included in the new spot\
      \ and cause errors. The way it's all typed using the fragments themselves should\
      \ prevent that, but it's less work if you just follow the contract of including\
      \ any child component fragments in the parent component. "
    created_at: '2025-05-16T14:42:10Z'
  pr_author: fivetentaylor
  merged_at: '2025-05-16T18:15:15Z'
  repo: treasury
  has_suggestion_block: false
