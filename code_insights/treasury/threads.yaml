- thread_id: 2982537513
  pr: 7175
  root:
    id: 2982537513
    author: dcetlin
    body: '**Pattern: side-effecting guard**


      `--autocorrect` mutates the working tree inside a PreToolUse hook. But `git
      commit` commits what''s *staged*, not what''s on disk. So the actual consequence:
      the commit contains the pre-autocorrect code, while the working tree now has
      post-autocorrect modifications that appear as unstaged changes. The agent proceeds
      unaware of this divergence.


      A guard''s contract is "should this proceed?" — not "let me fix things first."


      Note: this also diffs against `main` (branch-scoped) rather than staged files
      (commit-scoped) — defensible for branch hygiene, but worth being aware of since
      the hook fires on every commit.


      **Suggestion**: Report-only mode (`--fail-level error` without `--autocorrect`).
      If autocorrect is desired, run it as a separate explicit step the agent can
      observe before staging.'
    path: .claude/hooks/pre-commit-lint.sh
    created_at: '2026-03-24T15:42:01Z'
  replies: []
  pr_author: kwliang1
  merged_at: '2026-03-24T22:16:38Z'
  repo: treasury
  has_suggestion_block: false
- thread_id: 2982537527
  pr: 7175
  root:
    id: 2982537527
    author: dcetlin
    body: '**Pattern: wall named as gate**


      This hook has no pass condition. Every `gh pr create` with changed files hits
      `exit 2`, regardless of whether the agent has reviewed docs. Two possible intents,
      worth being explicit about which one:


      **(a)** PR creation should be human-initiated (the agent is deliberately blocked
      from creating PRs). If so, the hook works but the naming and structure (enumerating
      files, listing what to check) suggest a conditional check rather than a hard
      wall. Renaming to reflect the actual purpose would prevent confusion.


      **(b)** The agent should review docs, then proceed. If so, it needs a bypass
      — a marker file, an env var, or a second-attempt pass condition — because the
      hook will block identically on retry.


      **Suggestion**: Decide which intent, then either rename (a) or add a bypass
      mechanism (b).'
    path: .claude/hooks/pre-pr-claude-docs-check.sh
    created_at: '2026-03-24T15:42:01Z'
  replies:
