    author: harsohailB
    body: "Sorry for the vagueness, I was going to explain in the next PR. The cancellation\
      \ lifecycle looks like this:\r\n\r\n```\r\nTreasury tells DIBS to cancel a payment\r\
      \nif payment is submitted to the bank\r\n   DIBS tells the bank to cancel (if\
      \ possible - not possible with Piermont but is possible with BNY)\r\n      \
      \ - This is not hooked up yet\r\nelse\r\n   DIBS cancels the payment so it cannot\
      \ be submitted - state change\r\nend\r\n```\r\n\r\nI don't see a cancel method\
      \ in `DIBS::Integrations::Bny::ApiService`. Do you know how the [cancellation](https://marketplace.bnymellon.com/treasury/api-library/delete-ach)\
      \ endpoint is exposed through the bny API gem? I only see `InitiatePaymentApi`\
      \ and `TrackPaymentApi`"
    created_at: '2025-07-01T20:08:22Z'
