  - id: 2745049575
    author: thibaut-pro
    body: "Sorbet still flags it because try is nilable. Even though you guard with\
      \ `present?`, Sorbet doesn’t treat `present?` as a flow-sensitive non-nil check,\
      \ so `ledger_entry.revised_destination.try(:reserve_account?)` is typed as `T.nilable(T::Boolean)`.\
      \ That makes the whole expression potentially nil, which conflicts with the\
      \ `T::Boolean` return type.\r\nWhy it happens:\r\n- `present?` isn’t a Sorbet\
      \ nil-check (`nil?`, `!nil?`, `T.must`, `T.cast`, etc.).\r\n- `try(:reserve_account?)`\
      \ is defined to return nil if the receiver is nil (and Sorbet types it that\
      \ way), so the expression becomes `T.nilable(T::Boolean)`."
    created_at: '2026-01-30T07:45:07Z'
  pr_author: harsohailB
  merged_at: '2026-01-28T22:19:44Z'
  repo: treasury
  has_suggestion_block: false
