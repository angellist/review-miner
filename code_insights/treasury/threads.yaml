  root:
    id: 2866806019
    author: amahon
    body: Do we actually need this policy on the activity, or does the workflow policy
      alone suffice?
    path: lib/temporal/activities/sub_account_requests/process_activity.rb
    created_at: '2026-02-28T01:01:20Z'
  replies:
  - id: 2873699574
    author: devin-ai-integration[bot]
    body: 'The activity-level policy is the one that actually matters here. When the
      workflow calls `execute_activity!`, the gem constructs `ExecutionOptions` from
      the **activity class** (not the workflow), so only the activity''s own `retry_policy`
      governs activity retries.


      The workflow-level policy controls retry behavior for the **workflow execution
      itself** (e.g. if started as a child workflow or re-scheduled). It does not
      propagate to activities within it.


      So the activity policy is required; the workflow policy is belt-and-suspenders.
      Happy to remove the workflow-level one if you''d prefer to keep it minimal,
      or keep both for defense-in-depth. What''s your preference?'
    created_at: '2026-03-02T17:23:46Z'
  - id: 2873870025
    author: amahon
    body: Let's remove the workflow configuration for now.
    created_at: '2026-03-02T17:56:25Z'
