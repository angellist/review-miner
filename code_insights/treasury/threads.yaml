- thread_id: 2504990718
  pr: 6156
  root:
    id: 2504990718
    author: dcetlin
    body: "Is there a reason why Dibs balance inclusion is just `provisioned`, but\
      \ TP is `provisioned` or `processing`? Would be great to have comments here.\
      \ (e.g. \"we include TP ACHs in processing state in balance because...\")\r\n\
      \r\nJust thinking philosophically.. This solves the problem, but in my mind,\
      \ in the ideal there would be a single ACH state transition where our system\
      \ can confidently say \"include this in balance\". And TP vs DIBS vs SVB sub-states\
      \ would be handled domain-specifically and rolled up into the global ACH state."
    path: app/services/customer_accounts/balance_service.rb
    created_at: '2025-11-07T18:47:30Z'
  replies:
  - id: 2505108401
    author: harsohailB
    body: "There is seperation of concerns here which dictate this complexity. The\
      \ layers are:\r\n* Bank\r\n* Payment Processor (TP or DIBS)\r\n* Treasury\r\n\
      \r\nThe bank notifies the payment processor as soon as they credit the funds.\
      \ For ACH debits, the bank level is pretty messed up where they credit very\
      \ fast even tho the external account might not have the funds (this causes a\
      \ return after). The payment processor and Treasury layers protect us against\
      \ this.\r\n\r\nTreasuryPrime places their own hold on ACH debits where they\
      \ put on `treasury_prime_scheduled_settlement` to denote when the funds will\
      \ be available through their API. [They add this when the ACH starts processing](https://github.com/angellist/treasury/blob/3eceee2e902a257f1c4b2d5b8531d822cf3e5851/app/services/treasury_prime/submittable_achs/state_service.rb#L90).\
      \ IIRC TP deposits the funds and then places a hold on it at this time so cash\
      \ balance has the ACH deposit amount but available balance doesn't. We always\
      \ check our cash balance against theirs.\r\n\r\nOn the other hand, DIBS does\
      \ not have a concept of scheduled settlement, it exactly mimics the money at\
      \ the bank and let's the user (Treasury) do it's holding. So here the states\
      \ are pretty clear:\r\n| DIBS State        | Treasury State           | Bank\
      \ Funds            | Description                                           \
      \                                                                  |\r\n|------------------|----------------------|-----------------------|-------------------------------------------------------------------------------------------------------------------------|\r\
      \n| processing | processing     | No Funds Yet          | Payment is processing\
      \ between banks                                                            \
      \                         |\r\n| completed  | provisioned    | Funds are in\
      \ the bank | Bank credits as long as account exists (ACH debits). Treasury puts\
      \ a hold given ACH history to protect against returns. We need to add this to\
      \ the to the Treasury balance. |\r\n| completed  | completed      | Funds are\
      \ in the bank | Treasury makes funds available for us (investments)        \
      \                                                             |\r\n\r\nI think\
      \ there is always going to be some level uniqueness for balance mismatch calculation\
      \ given multiple bank partners. I think the way forward is Treasury <-> DIBS\
      \ has a pretty well defined balance check when DIBS is our only payment processor.\
      \ And then DIBS has separate balance checks for each bank like the one we have\
      \ for [Piermont currently](https://github.com/angellist/treasury/blob/3eceee2e902a257f1c4b2d5b8531d822cf3e5851/backend/dibs/app/services/dibs/integrations/piermont/balance_check_service.rb#L4).\r\
      \n"
    created_at: '2025-11-07T19:20:11Z'
  - id: 2505342935
    author: dcetlin
    body: Wow phenomenal context, Harsh. Thank you. Your conceptual framing here is
      very helpful
