- thread_id: 2874637273
  pr: 6885
  root:
    id: 2874637273
    author: amahon
    body: Do we need this `non_retriable_errors` and the `if e.is_a?(SubAccountRequests::StateService::AccountCreationBlockedError)`
      line below?
    path: lib/temporal/activities/sub_account_requests/process_activity.rb
    created_at: '2026-03-02T20:57:51Z'
  replies:
  - id: 2874639244
    author: devin-ai-integration[bot]
    body: 'They serve different purposes:


      - **`non_retriable_errors`** tells Temporal "don''t retry this activity at all"
      — the activity fails once and the workflow gets the error immediately.

      - **`is_a?(AccountCreationBlockedError)` in the rescue** calls `handle_failure!`
      to mark the `SubAccountRequest` record as failed in the DB *before* re-raising.
      Without this, the request would stay in `processing` state even though the workflow
      is about to fail.


      Without `non_retriable_errors`, Temporal would still retry 100 times before
      `final_attempt` triggers `handle_failure!`. Without the `is_a?` check, the request
      record wouldn''t get marked failed on the first (and only) attempt.


      That said — if you''d prefer to simplify and just rely on `non_retriable_errors`
      + let the workflow''s failure handler mark the request as failed (if there is
      one), we could remove the `is_a?` check. But right now the workflow doesn''t
      have a separate failure callback, so the rescue block is the only place that
      calls `handle_failure!`.'
    created_at: '2026-03-02T20:58:23Z'
  pr_author: app/devin-ai-integration
  merged_at: '2026-03-02T21:50:54Z'
  repo: treasury
  has_suggestion_block: false
