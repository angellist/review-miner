    author: harsohailB
    body: What's `provider_verified_at`?
    path: backend/dibs/app/models/dibs/aba_routing_record.rb
    created_at: '2026-03-30T18:26:10Z'
  replies:
  - id: 3011664340
    author: kwliang1
    body: 'This is the timestamp I''ll use when I periodically refresh the fed record
      from a provider.   '
    created_at: '2026-03-30T19:06:23Z'
  - id: 3011795433
    author: harsohailB
    body: Can you elaborate further on how it will be used? i.e. in which case will
      `source_last_synced_at` and `provider_verified_at` differ?
    created_at: '2026-03-30T19:34:47Z'
  - id: 3011914617
    author: kwliang1
    body: "So my thinking would be that we would distinguish between when a record\
      \ is updated by it's source, and when it's existence is verified IRT by a provider.\
      \   \r\n\r\nIn most cases, `source_last_synced_at` tells you when it was last\
      \ synced from the fed file.   There are ~3.5k records were we will create from\
      \ a provider (e.g. Increase) via a backfill.\r\n\r\nTheoretically, a record's\
      \ source may be a fed file, but it's verified on an ongoing basis by another\
      \ Provider, which could potentially update the record.   \r\n\r\nAre you suggesting\
      \ I collapse the fields?"
    created_at: '2026-03-30T19:59:49Z'
  - id: 3012355836
    author: harsohailB
    body: I am not sure we need to go to the depth of "it's verified on an ongoing
      basis by another Provider". The idea of this is it's a aggregation and cache
      of what the providers have. Will there be a TTL before we verify against a provider?
      I think that will just increase complexity when these barely change over time.
    created_at: '2026-03-30T21:46:36Z'
  - id: 3012377281
    author: kwliang1
    body: ">Will there be a TTL before we verify against a provider?\r\n\r\nYeah,\
      \ I was initially thinking 1 week, but it depends on the provider we choose.\
      \   AFAIK Increase is free, whereas LexisNexis charges per request."
    created_at: '2026-03-30T21:52:34Z'
  - id: 3012400328
    author: harsohailB
    body: Yeah I don't think that's needed. There is no way these things update within
      weeks let alone months
    created_at: '2026-03-30T21:59:27Z'
  - id: 3012401772
    author: harsohailB
    body: Let's keep it to `provider` and `last_synced_at`
    created_at: '2026-03-30T21:59:48Z'
