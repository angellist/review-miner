  root:
    id: 2658058275
    author: stathis-alexander
    body: 'I''m confused. Why would we skip checking the payment processor balance
      for certain movement types? It feels like something is setup wrong here. '
    path: app/services/transfers/v2/queueing_service.rb
    created_at: '2026-01-02T16:55:19Z'
  replies:
  - id: 2658063836
    author: harsohailB
    body: "This is for the peculiar case of when we need to move money from SVB to\
      \ a non-SVB sub account. We cannot submit ACHs to SVB so we submit ACH debits\
      \ to the receiving bank.\r\n\r\nExample: Move $100 from SVB to TP (we submit\
      \ an ACH debit to TP to pull $100 from SVB)\r\n\r\nWe don't know the sub account\
      \ balance for SVB as there is no sub ledgering there so we skip the check. For\
      \ ACH debits in general there are no balance checks. When we pull money from\
      \ an external account (ach pull), we don't know the balance of the external\
      \ account."
    created_at: '2026-01-02T16:59:18Z'
  - id: 2658082176
    author: harsohailB
    body: Merging to unblock but can address any feedback you provide in a separate
      PR
    created_at: '2026-01-02T17:07:45Z'
  - id: 2658086083
    author: stathis-alexander
    body: Always skipping this still doesn't feel like the correct condition? Are
      you saying that ach debits always pull cash into the account from other accounts
      (negative amount), so we shouldn't check the balance at the provider?
    created_at: '2026-01-02T17:10:07Z'
  - id: 2658091926
    author: harsohailB
    body: Yes we can do that but the only case where this occurs is for SVB where
      we cannot check the balance. We will **never** allow ACH debits for internal
      transfers in any other case. We always submit a push (ACH or wire) for every
      other case.
    created_at: '2026-01-02T17:13:21Z'
  pr_author: harsohailB
  merged_at: '2026-01-02T17:07:55Z'
