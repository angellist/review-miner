  - id: 2859965647
    author: harsohailB
    body: We have two FBOs on GHB. The GHB main and GHB omnibus. The GHB omnibus was
      set up back in 2023 during the SVB collapse to rapidly move over customers without
      all the KYC info. The idea with the omnibus account is it can accept funds but
      does not allow withdrawals. The path to withdrawal here is ACH will stay queued
      until you will in KYC info, you will get migrated off of GHB omnibus and the
      payment will get processed.
