    body: can we add a comment here explaining the thought process for these other
      conditions?  Is it just that these types of CA's (on-core, mirror, etc) don't
      have other accounts in the IVC?   Is this validated by a checker somewhere?
    path: app/services/balance_checks/difference_service.rb
    created_at: '2025-05-20T05:37:12Z'
  replies:
  - id: 2098738218
    author: harsohailB
    body: "These IVC accounts don't have shared sub accounts so we treat them as separate\
      \ balances when doing a mismatch check. Example:\r\n\r\n* IVC (CCA, IVA, Mirror)\r\
      \n  * CCA and IVA have shared GHB sub account\r\n  * Mirror has an FTB sub account\r\
      \n\r\nWe will check CCA and IVA combined balance to equal GHB sub account balance\
      \ and then separately check the mirror against FTB."
    created_at: '2025-05-20T19:46:02Z'
