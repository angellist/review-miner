    created_at: '2025-08-14T20:33:07Z'
  - id: 2277675471
    author: harsohailB
    body: "For any account that has X balance, we may decide to put X - Y balance\
      \ into another banking partner for better referral revenue. In this case, we\
      \ create a mirror account (a separate customer account and sub account) to park\
      \ the funds at the other banking partner. The end user still sees the total\
      \ available balance (account + mirror account). When the funds are required,\
      \ we move the money back and it can be utilized for a transfer.\r\n\r\nBut in\
      \ this case, you will see these transfers on the audit ledger. They are hidden\
      \ in the revised ledger."
    created_at: '2025-08-14T20:37:49Z'
  - id: 2277723426
    author: Sheeler
    body: I see -- that sounds like I should be simply _including_ the mirror accounts
      in the population of `CustomerAccount`s I'm considering "internal" to the fund's
      accounting. The transfers are immaterial from the fund's perspective
    created_at: '2025-08-14T21:06:35Z'
  - id: 2277729504
    author: Sheeler
    body: "I guess it's tricky, whether CPTR should know/care about them at all.\r\
      \n\r\nI think we want to get away from the revised ledger for reporting purposes.\
      \ So for my purposes, just ensuring mirror accounts are considered when fetching\
      \ the initial population of transfers to consider works. Or I could explicitly\
      \ exclude them with a param -- that might be a bit more in line with the patterns\
      \ here."
    created_at: '2025-08-14T21:10:20Z'
  - id: 2277736591
    author: Sheeler
    body: "I've been waffling a bit on the mirror account situation.\r\n\r\nThe purpose\
      \ of this endpoint is to fetch any transfers external to the inputted accounts.\
      \ We can add the revised flag easily, but I do think it's the right approach\
      \ to side-step mirror account special casing: if the mirror accounts are \"\
      external\" in your use case, you simply don't input them."
    created_at: '2025-08-14T21:14:57Z'
  - id: 2325144437
    author: stathis-alexander
    body: "I think the intent of the mirror account would be that it would be imperceptible\
      \ to any consumer with a customer account that had one, like a fund. So ideally,\
      \ mirror accounts & transfers would be a thing that treasury knew about but\
      \ consumers did not. \r\n\r\nOn the other hand, we haven't done a great job\
      \ of maintaining this abstraction with our consumers, in part because auditors\
      \ requested and wanted to see the underlying bank ledgers themselves (we gave\
      \ them TP creds, etc), so we've had to surface up some stuff we might otherwise\
      \ not have. (Side note: I think this is because our treasury abstraction is\
      \ not solid; too much monkey business going on and the auditors got suspicious).\
      \ \r\n\r\nFrom an accounting POV, we will not need to \"attribute\" or care\
      \ about mirror transfers, since the account is wholly owned by another one,\
      \ so if we pass them back, we'll need to just re-filter them out. Again, feels\
      \ like a leaky abstraction since the whole concept is this thing is the same\
      \ customer account, just different underlying banks. \r\n\r\nI think it's fine\
      \ in this case to have consumers pass along customer account ids they actually\
      \ care about (cca, iva) and for the api to not return mirror transfers."
    created_at: '2025-09-05T13:43:54Z'
  - id: 2325147940
    author: stathis-alexander
    body: 'On the revised ledger vs audit ledger thing: let''s just make it an option.
      We need the audit ledger for our purpose, and I don''t see an immediate use
      case for getting the revised ledger using this endpoint, but it seems pretty
      straightforward to plumb the option through?'
    created_at: '2025-09-05T13:45:25Z'
