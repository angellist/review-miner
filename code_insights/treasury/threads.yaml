    author: sf8193
    body: "could there be a race here?\n\n  1. Poller creates the WebhookEvent via\
      \ find_or_create_by! → previously_new_record? is true\n  2. Between that moment\
      \ and the start_workflow call, the webhook endpoint also processes the same\
      \ event, creates its own workflow, and it completes\n  3. Poller calls start_workflow\
      \ with ALLOW_DUPLICATE_FAILED_ONLY → the workflow already exists and succeeded\
      \ → Temporal raises WorkflowAlreadyStartedError\n  4. That exception is unrescued\
      \ → blows up the entire events.each loop → cursor never advances for that page"
