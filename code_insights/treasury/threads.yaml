      \ given ID means you believe this account exists. If it, does not, in fact,\
      \ exist, there's a pretty major problem on the caller's side. Returning an empty\
      \ array makes that scenario indistinguishable from a new account with no activity\
      \ yet.\r\n\r\nThere might be some edge cases here with account merges, but I'd\
      \ rather handle that independently in a smaller PR. It shouldn't be a major\
      \ issue for the first use case: vFund operating accounts. "
