      \ to really have good hygiene... \r\n\r\nI did this analysis here of all text\
      \ records based on encrypted and unencrypted size:\r\nhttps://www.notion.so/ExternalWireAccount-Analysis-of-every-text-field-2b361e86666280c78400d38b9460e316\r\
      \n\r\nMy sense is that banks have limitations for length of fields, so we could\
