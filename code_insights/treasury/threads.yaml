  root:
    id: 2130459680
    author: kwliang1
    body: Why is this located separately from the query itself?
    path: frontend/components/BookTransfersTable.tsx
    created_at: '2025-06-05T21:26:58Z'
  replies:
  - id: 2130504150
    author: harsohailB
    body: "We use [co-located GraphQL fragments](https://cbranch101.github.io/scrimshaw-react/docs/colocating-fragments.html),\
      \ meaning each component defines the specific data it needs via a fragment placed\
      \ in the same file as the component itself. When a parent component renders\
      \ a child, it also imports the child’s fragment and includes it in its own query.\
      \ This ensures type safety and guarantees that the child component receives\
      \ all the data it requires.\r\n\r\nFor example, the `BookTransferTable` component\
      \ declares a fragment specifying which `bookTransfer` fields it needs to display.\
      \ Any parent that renders this table is responsible for including that fragment\
      \ in its GraphQL query and passing the appropriate data down, ensuring the table\
      \ has everything it needs to render correctly."
    created_at: '2025-06-05T21:38:20Z'
  pr_author: harsohailB
  merged_at: '2025-06-06T19:31:09Z'
  repo: treasury
  has_suggestion_block: false
