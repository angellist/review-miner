- thread_id: 2738651418
  pr: 1288
  root:
    id: 2738651418
    author: stathis-alexander
    body: "This is pretty gnarly. It's cleaner to use a prepend module to overwrite\
      \ the `PostgreSQLAdapater#new_client` method: https://github.com/rails/rails/blob/main/activerecord/lib/active_record/connection_adapters/postgresql_adapter.rb#L57\n\
      \nIt'd look something like this:\n```ruby\n# Allow postgreSQL clients to be\
      \ created with \nmodule PostgreSQLNewClientPatch\n   def new_client(conn_params)\n\
      \     # ... modify conn_params and inject AWS IAM based auth code\n     super(conn_params)\n\
      \   end\nend\nActiveRecord::ConnectionAdapters::PostgreSQLAdapter.singleton_class.prepend(PostgreSQLNewClientPatch)\n\
      ```\n\nAlternatively, we could still monkey patch the `PG::Connection` class,\
      \ but instead of using `class << PG::Connection`, we can use the `prepend` on\
      \ the `singleton_class` approach.  "
    path: config/initializers/rds_iam_authentication.rb
    created_at: '2026-01-28T21:18:40Z'
  replies:
  - id: 2739147565
    author: amvinnu
    body: Much cleaner, thanks for the suggestion. Changed to this structure and verified
      on staging.
    created_at: '2026-01-29T00:06:56Z'
  pr_author: amvinnu
  merged_at: '2026-01-29T19:45:14Z'
  repo: ipseity
