      When `address_verification_document_ids` isn''t provided in the input, Ruby
      returns `nil` from the hash lookup and passes that `nil` explicitly to the method—which
      bypasses the default `[]` parameter. The downstream `create_batch_from_document_service!`
      method has strict Sorbet typing that requires an actual array, so CI fails with
      a type error even though it works locally where runtime checks are more relaxed.'
    path: app/services/entities/ownership/fill_service.rb
    created_at: '2026-01-29T14:27:02Z'
  replies:
