- thread_id: 2744904007
  pr: 1282
  root:
    id: 2744904007
    author: kevinmmarlow
    body: 'This creates a **circular destroy dependency**:

      1. `EncryptedFile` has `has_many :document_service_documents, dependent: :destroy`

      2. `DocumentServiceDocument` has `belongs_to :encrypted_file, dependent: :destroy`


      When we try to destroy the `EncryptedFile`, it tries to destroy the `DocumentServiceDocument`,
      which then tries to destroy the `EncryptedFile` back (which is already being
      destroyed), causing the failure.


      The `dependent: :destroy` on a `belongs_to` is almost never correct, so I''m
      removing it.


      The `dependent: :destroy` on `has_many` (in `EncryptedFile`) is correct and
      sufficient - it will delete all associated `DocumentServiceDocument` records
      when we delete an `EncryptedFile`. The child record shouldn''t try to delete
      its parent.


      cc: @thibaut-pro @clogan1 mind confirming my assumption above? I hit the issue
      when testing my destroy path locally.'
    path: app/models/document_service_document.rb
    created_at: '2026-01-30T06:50:55Z'
  replies: []
  pr_author: kevinmmarlow
  merged_at: '2026-01-30T07:52:32Z'
  repo: ipseity
