    id: 2706239122
    author: amahon
    body: Thoughts on file saving being in transaction? From a correctness POV, it
      seems preferable -- from a "holding a transaction open while some external service
      takes a while to return perspective", it seems questionable.
    path: app/services/entities/kyc_fill_service.rb
    created_at: '2026-01-19T22:36:43Z'
  replies:
  - id: 2709919628
    author: fivetentaylor
    body: "Yeah this happens a lot in our codebase, I think it's probably fine here...\
      \ but the more robust way we've been handling things like this is to put them\
      \ in a job. The job gets created in the transaction (or rolls back if the transaction\
      \ fails) and then durably retries until success after the transaction commits.\r\
      \n\r\nThe thing that makes your's more tricky is a job wouldn't work because\
      \ you're saving these large documents from memory that are coming in over the\
      \ api \U0001F914 "
    created_at: '2026-01-20T20:12:38Z'
  - id: 2709948047
    author: stathis-alexander
    body: "> but the more robust way we've been handling things like this is to put\
      \ them in a job. The job gets created in the transaction (or rolls back if the\
      \ transaction fails) and then durably retries until success after the transaction\
      \ commits.\r\n\r\nThis only works if the job queue is a table in the same db\
      \ as your biz logic. It also means we need to build out some observability on\
      \ whether these jobs complete. \r\n\r\nI think these are simple enough we don't\
      \ need to worry about it now. Do we know how long these take to complete?"
    created_at: '2026-01-20T20:22:48Z'
