  pr: 5056
  repo: nova
  status: synthesized
  content: 'A utility function that formats addresses silently returned empty strings

    when the address was null/undefined, hiding the absence of data from

    callers. The reviewer suggested the function should enforce that the address

    exists and let callers handle the nullable case explicitly. The PR author

    agreed and added more type safety.


    Lesson: Utility functions should not silently degrade to empty/default

    values when required data is missing. Prefer stricter types or throwing

    errors so callers are forced to handle the missing-data case explicitly.

    Silent empty strings mask data issues and make debugging harder.

    '
