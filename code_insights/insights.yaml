  pr: 234
  repo: infra
  status: synthesized
  content: 'An IAM policy in a Pulumi stack granted a service access to an entire
    MSK cluster

    ARN, giving it permissions over all topics in the cluster. A reviewer suggested

    scoping the resource to specific topics using a topic ARN pattern with a prefix.


    Fix: The resource ARN was changed from the cluster-level to a topic-level pattern:

    `${clusterArn.replace('':cluster/'', '':topic/'')}/evt.webhook.*`, limiting access
    to

    only the relevant topic namespace.


    Lesson: IAM permissions for MSK/Kafka should be scoped to specific topic ARNs
    using

    prefix patterns rather than cluster-wide wildcards. This follows the principle
    of

    least privilege and prevents a compromised or misbehaving service from reading
    or

    writing unrelated topics. Use the `:topic/` ARN pattern with meaningful prefixes

    (e.g., `evt.webhook.*`) when defining Kafka IAM policies.

    '
