- id: ext_2632016824_0
  thread_id: 2632016824
  pr: 23874
  repo: venture
  status: synthesized
  content: 'A public API service method was returning a CPTR internal boundary type
    directly

    (e.g., a `CPTR::*` object), leaking the internal module''s types across the API

    boundary into `app/public_api/`.


    Fix: The PR author acknowledged the issue and created a follow-up PR (#23916)
    to

    map the result into a proper struct type before crossing the boundary.


    Lesson: Public API services must not expose internal bounded-context types. When
    a

    service in `app/public_api/` calls into a bounded context (e.g., CPTR), map the

    response into a neutral struct before returning it. This keeps the API boundary
    clean

    and prevents tight coupling between the public interface and internal module

    implementations.

    '
  topic: api_design
  retry_count: 0
  last_error: null
- id: ext_2632406570_0
  thread_id: 2632406570
  pr: 23862
  repo: venture
  status: synthesized
  content: 'A database migration was included in the same PR as the feature code that
    depended

    on it, rather than being shipped in a dedicated PR first.


    Fix: The reviewer noted the best practice; the PR author acknowledged it ("good
    to

    know") and confirmed it was not critical only because the feature was unused at
    that

    point.


    Lesson: Ship database schema changes (migrations) as separate PRs from the

    application code that uses them. This makes rollbacks simpler and cleaner — if

    something goes wrong post-deploy, you can revert the feature code independently

    from the schema change. Keeping migrations isolated also makes the blast radius
    of

    each PR smaller.

    '
  topic: migration_safety
  retry_count: 0
  last_error: null
- id: ext_2907303895_0
  thread_id: 2907303895
  pr: 26320
  repo: venture
  status: synthesized
  content: 'After a login mutation succeeded, a subsequent query was using the Apollo
    cache

    (default fetch policy), which returned the pre-authentication state of `currentUser`

    (null). This caused downstream checks on T&C/2FA status to be incorrect.


    Fix: The query was issued with `fetchPolicy: ''network-only''` to bypass the stale

    cache and fetch fresh, authenticated user state from the server.


    Lesson: After mutations that change authentication state (login, session refresh),

    any follow-up queries that depend on the authenticated user''s data must use

    `network-only` fetch policy. The Apollo cache reflects pre-auth state and will
    not

    automatically invalidate on login — explicitly bypassing the cache is required
    to

    get accurate post-auth data.

    '
  topic: graphql_schema
  retry_count: 0
  last_error: null
- id: ext_2907307804_0
  thread_id: 2907307804
  pr: 26368
  repo: venture
  status: synthesized
  content: 'A toast notification displayed after triggering an async operation was
    using a

    success/confirmed visual style, even though the operation had only been initiated

    and not yet completed. This gave users a misleading signal that the action had

    already succeeded.


    Fix: The reviewer suggested using an `info` variant instead, which the PR author

    accepted ("Oh good call").


    Lesson: Use a neutral/informational toast style (e.g., `info`) for async operations

    that have been kicked off but not yet confirmed as complete. Reserve success-state

    feedback for when the operation result is known. Misusing success toasts for

    pending operations degrades user trust in status feedback.

    '
  topic: code_organization
  retry_count: 0
  last_error: null
- id: ext_2907872398_0
  thread_id: 2907872398
  pr: 26371
  repo: venture
  status: synthesized
  content: 'A GraphQL mutation contained two consecutive validation checks: one that
    verified

    KYC fields were complete (`validate_kyc_fields_complete!`) and one that checked

    KYC verification status via the Entity API. The reviewer noticed the first check

    was redundant because the second check already covers the case where fields are

    complete but KYC verification has not passed.


    Fix: The PR author agreed and removed the redundant check: "You''re right, we

    should just remove line 25."


    Lesson: When layering validation checks in a mutation or service, verify that
    each

    check covers a distinct failure case. A check that validates field completeness
    is

    redundant if a downstream check already validates verification status (which

    subsumes field completeness). Redundant validations add noise and can mask which

    check actually failed.

    '
  topic: graphql_schema
  retry_count: 0
  last_error: null
