- id: ext_1931379480_0
  thread_id: 1931379480
  pr: 2019
  repo: adapt
  status: synthesized
  content: 'A Buildkite Dockerfile used multiple separate `COPY` instructions to

    selectively copy `package.json` files from nested directories (to support

    Docker layer caching for `pnpm install`). Each package got its own `COPY`

    line, making the Dockerfile verbose and harder to maintain.


    Fix: Consolidated into a single `COPY --link --parents` instruction,

    following the pattern already established in the Venture Dockerfile.


    Lesson: Use `COPY --link --parents` to copy multiple files while preserving

    their directory structure in a single instruction. This is particularly

    useful for the `COPY package.json files → RUN install → COPY source`

    layer-caching pattern, where you need to selectively copy manifests from

    many nested packages without duplicating `COPY` lines. Reference the

    Venture Dockerfile for the established team convention.

    '
  topic: naming_conventions
  retry_count: 0
  last_error: null
