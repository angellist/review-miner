  pr: 19932
  repo: venture
  status: synthesized
  content: 'A migration defined cascading deletes at the database level (ON DELETE
    CASCADE) for an association. The reviewer recommended using Rails'' `dependent:
    :destroy` on the association instead.


    Lesson: In Rails applications, prefer configuring cascade deletes at the application
    level with `dependent: :destroy` rather than database-level ON DELETE CASCADE.
    Application-level callbacks are more visible to Rails developers, trigger ActiveRecord
    callbacks and observers, and keep deletion logic discoverable in the model layer
    where Rails conventions expect it.

    '
  topic: migration_safety
