- id: ext_2342407748_0
  thread_id: 2342407748
  pr: 5087
  repo: nova
  status: synthesized
  content: 'A React hook''s dependency array was missing the `organization` variable.
    The reviewer

    asked why the hook wouldn''t reset when the organization changes. The PR author
    had

    initially omitted it due to fear of infinite re-renders, but upon investigation
    confirmed

    that the infinite re-render issue was only present when the hook depended on `form`,

    not `organization`.


    Fix: Added `organization` to the dependency array since it can safely be included

    without causing re-render loops.


    Lesson: Don''t omit React hook dependencies based on assumed re-render risk without

    verifying. Investigate the actual dependency chain — the re-render culprit may
    be a

    different variable. Missing dependencies can cause stale closures and subtle bugs.

    '
  topic: react_state
