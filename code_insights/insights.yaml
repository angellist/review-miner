- id: ext_2415197114_0
  thread_id: 2415197114
  pr: 5323
  repo: nova
  status: synthesized
  content: 'A Prisma data layer function accepted a typed input object and spread
    it

    directly into the `create` call. This is dangerous because if the caller

    passes an object with extra properties (duck-typing), spreading can

    inadvertently set columns to `null` — e.g., a field not in the intended

    interface but present on the spread object as `null` would nil out that

    column in the database.


    Fix: Explicitly destructure and list each field from the input rather than

    spreading the entire object into Prisma''s create/update calls.


    Lesson: When using Prisma (or any ORM) in JavaScript/TypeScript, avoid

    spreading input objects into create/update operations. Explicitly pick

    the fields you intend to set. The spread operator combined with JS duck

    typing is a footgun that can silently null out database columns.

    '
  topic: data_integrity
  retry_count: 0
  last_error: null
