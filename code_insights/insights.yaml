- id: ext_2243827693_0
  thread_id: 2243827693
  pr: 2303
  repo: adapt
  status: synthesized
  content: 'A TypeScript component was modeled with a top-level discriminated union

    (e.g., `type Props = BaseProps & (CompactProps | NonCompactProps)`) to express

    that some props are only valid when `compact: true`. TypeScript compilation

    struggled with this pattern, and composing the component from consuming components

    also required awkward `as` casts or spread tricks to pass props through.


    Fix: After detailed review discussion, the team moved to a nested config approach:

    `compact?: boolean | CompactConfig` where `CompactConfig` bundles the dependent

    properties. This way the discriminated union is not on the props object itself,

    so callers don''t need to "unpack" the union to pass props through.


    Lesson: Avoid top-level discriminated unions on component props when dependent

    props are few. Instead, bundle dependent properties into a nested config type

    (e.g., `compact?: true | { emphasizeLabel: boolean }`). This avoids TypeScript''s

    `boolean | undefined` → `true | false | undefined` union explosion bug and makes

    component composition vastly easier — callers don''t need to narrow the union

    before forwarding props.

    '
  topic: react_components
  retry_count: 0
  last_error: null
