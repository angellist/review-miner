    and pin package managers like `pnpm` or `yarn` in Dockerfiles and CI

    environments. Corepack reads the `packageManager` field from `package.json`,

    ensuring the correct version is used without manual version pinning in the

    Dockerfile. This also keeps the approach consistent across repos — reference

    how existing Dockerfiles (e.g., Nova) handle this when setting up a new

    build environment.

    '
