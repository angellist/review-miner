- id: ext_1927663013_0
  thread_id: 1927663013
  pr: 2014
  repo: adapt
  status: synthesized
  content: 'A test file in the ComboBox suite mixed `fireEvent` and `userEvent` to

    simulate click interactions, creating inconsistency and potential gaps in

    event simulation fidelity. The reviewer noted the inconsistency and asked

    which method was preferred.


    Fix: `userEvent` is the team''s preferred method; the reviewer confirmed

    it was a good catch.


    Lesson: In React Testing Library tests, prefer `userEvent` over `fireEvent`

    for simulating user interactions. `userEvent` more closely mirrors real

    browser behavior (it fires the full sequence of pointer/keyboard events),

    making tests more realistic. Use `fireEvent` only for low-level events

    that `userEvent` doesn''t support. Keep test files internally consistent

    — mixing the two creates confusion about which is correct.

    '
