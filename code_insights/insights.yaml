  status: synthesized
  content: 'A reviewer identified an N+1 API query problem in a data rooms table component,

    where individual API calls were being made for each row in an unpaginated table.

    The discussion explored several solutions: switching to a paginated hook, using
    a

    dataloader to batch API calls by time interval (referencing `graph/src/internal/loaders.ts`),

    or creating a Venture redirect route to avoid the per-row lookup entirely.


    Lesson: When rendering tables that fetch additional data per row, be aware of
    N+1

    query patterns at the API layer. Solutions include paginating the table, batch-loading

    with a dataloader, or restructuring the API to avoid per-row calls. For cross-service

    lookups (e.g., Nova fetching Venture data per row), consider server-side redirect

    routes or storing the needed data locally to eliminate the N+1 entirely.

    '
