  content: 'A paginated cursor-based query over a Postgres table did not include an

    `ORDER BY` clause. PostgreSQL does not guarantee row ordering by default,

    which can cause rows to appear in different positions across pages,

    leading to duplicates or missed rows during pagination.


    Fix: Add an `ORDER BY id` clause to the query before applying cursor-based

    pagination.


    Lesson: Always include an explicit ORDER BY clause (typically by primary key)

    when using cursor-based pagination in PostgreSQL. Without deterministic

    ordering, pagination results are unpredictable and can silently lose or

    duplicate data.

