- id: ext_2342357074_0
  thread_id: 2342357074
  pr: 5062
  repo: nova
  status: synthesized
  content: 'A frontend form was sending a user-supplied handle to the server for data
    room creation.

    Since users don''t directly control handles, this introduced a validation conflict
    risk

    where the user would see an error they couldn''t resolve.


    Fix: Remove the handle from the client-side request entirely and let the server
    generate

    it via parameterize + unique handle generation in the data room creation function.


    Lesson: When a value is derived/generated (not user-supplied), generate it server-side

    rather than sending a client-computed version. This avoids validation conflicts
    that

    the user cannot fix and keeps the source of truth in one place.

    '
  topic: data_integrity
  retry_count: 0
