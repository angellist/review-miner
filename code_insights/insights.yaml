  repo: venture
  status: synthesized
  content: 'A React component manually wired up a GraphQL mutation with its own toast

    notification logic, duplicating behavior that a shared project hook already

    provides.


    Fix: A reviewer pointed out the `useMutationWithToast` hook available in the

    venture frontend. The PR author was unaware it existed and accepted the suggestion.


    Lesson: Before manually implementing mutation + toast feedback patterns in the

    venture frontend, check for existing utility hooks like `useMutationWithToast`.

    Shared hooks reduce boilerplate, ensure consistent UX behavior, and prevent

    re-implementing patterns that already exist in the project.

    '
