  status: synthesized
  content: 'UI label text used title/capital case (e.g., "Capital Account Summary")

    where the codebase convention requires sentence case ("Capital account

    summary"). The reviewer flagged this with a code suggestion, and the PR

    author applied the fix broadly across multiple views in the same PR.


    Lesson: Use sentence case for all UI display text — labels, headings, table

    headers, and button text. Title case is not the convention in this frontend.

    When adding new UI copy, default to sentence case unless the design spec

    explicitly calls for title case (e.g., proper nouns or branded terms).

    '
