- id: ext_2154686829_0
  thread_id: 2154686829
  pr: 20044
  repo: venture
  status: synthesized
  content: 'A GraphQL resolver used `find_by` to look up a record, but the return
    type was

    declared as non-nullable, meaning the resolver should never return nil.


    Fix: Use `find_by!` instead so a missing record raises an exception rather than

    silently returning nil. Add a type signature on the resolve method to enforce

    non-nullability via types.


    Lesson: When a GraphQL field''s return type is non-nullable, use bang-method finders

    (`find_by!`, `find!`) in the resolver. This ensures a clear error is raised on

    missing data instead of a confusing nil propagation through the GraphQL response.

    Pair it with Sorbet/type signatures on the resolve method to catch mismatches

    statically.

    '
  topic: graphql_schema
  retry_count: 0
  last_error: null
