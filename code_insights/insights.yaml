  content: 'A reviewer noticed that a TypeScript type assertion (typecast) on a value
    made the

    nullish coalescing fallback (`?? "confirmed"`) unreachable — the cast convinced

    TypeScript the value was non-null, so the default was silently dead code. The
    PR

    author confirmed and fixed it.


    Lesson: Be careful with type assertions (`as Type`) on values that may be null
    or

    undefined. A typecast can suppress TypeScript''s nullability checks, making fallback

    operators like `??` and `?.` silently unreachable. If a value genuinely needs
    a

    fallback, avoid casting away its nullability — let the type system reflect the

    actual runtime possibility.

    '
