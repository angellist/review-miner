    its side effects for the user. A reviewer suggested adding a tooltip to communicate

    what enabling the toggle would change (e.g., tags still update but delivery date

    becomes fixed).


    Fix: Add a tooltip explaining the ramifications of the toggle.


    Lesson: When a UI control has non-obvious side effects — especially overrides
    that

    change default system behavior — always provide inline guidance (tooltip, helper

    text) explaining what will and won''t change. Users shouldn''t have to guess what
    a

    toggle does to downstream data.

    '
