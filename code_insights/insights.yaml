- id: ext_2353794059_0
  thread_id: 2353794059
  pr: 5124
  repo: nova
  status: synthesized
  content: 'A fire-and-forget async call used `void` to discard the promise, which
    silently swallows

    any errors. The reviewer pointed out that using `void` on promises is an anti-pattern
    because

    errors are completely lost — no logging, no Sentry alerts, nothing.


    Fix: Replace `void asyncCall()` with `asyncCall().catch(err => errorTracker.report(err))`

    so failures are at least logged and reported to error tracking.


    Lesson: Never use `void` to discard promises for fire-and-forget operations. Always
    chain

    `.catch()` with error logging/reporting. Even if you can''t recover from the error,
    visibility

    into failures is essential for debugging. Using `void` silently swallows errors
    that would

    otherwise surface in error tracking tools.

    '
  topic: error_handling
  retry_count: 0
  last_error: null
- id: ext_2353971860_0
  thread_id: 2353971860
  pr: 5123
  repo: nova
  status: synthesized
  content: 'A feature toggle was hardcoded in frontend code rather than using a proper
    feature flag

    system. The reviewer flagged that feature rollout should be controlled via server-side

    feature flags (e.g., flipper), not frontend constants.


    Fix: The PR author moved to using sender organization admin feature flags and
    introduced

    a new `uploadFilesToDocumentService` server-side feature flag.


    Lesson: Feature rollout toggles should be managed via server-side feature flag
    systems,

    not hardcoded in frontend code. Server-side flags allow toggling without deploys,
    provide

    audit trails, and support gradual rollout — frontend constants require code changes
    to

    toggle and can''t be controlled per-org or per-user.

    '
