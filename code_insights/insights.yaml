- id: ext_2908347654_0
  thread_id: 2908347654
  pr: 26308
  repo: venture
  status: synthesized
  content: 'A React component was triggering a query refetch unconditionally, which
    the

    reviewer flagged as potentially causing excess fetching. The PR author

    acknowledged the issue and updated the component to only refetch the query

    after the mutation completes, not on every render or update cycle.


    Lesson: In React components using GraphQL (or any data-fetching library),

    avoid triggering refetches broadly. Scope refetches to specific events —

    typically after a mutation that invalidates the relevant data. Unconditional

    or over-eager refetching degrades performance and can cause unnecessary

    network load.

    '
  topic: graphql_schema
  retry_count: 0
  last_error: null
- id: ext_2908720887_0
  thread_id: 2908720887
  pr: 26395
  repo: venture
  status: synthesized
  content: 'A `<Stack>` component was rendered with an explicit prop that matched
    the

    component''s default value (e.g., `direction="column"` when column is the

    default). The reviewer suggested omitting the prop entirely and writing

    `<Stack>` with no direction specified. The discussion revealed this is a

    recurring pattern in LLM-generated code — AI assistants tend to explicitly

    pass default prop values, adding noise without meaning. The team already had

    a rule in `tasks/lessons.md` against this, and the PR author added it to

    `memory.md` to reinforce LLM behavior.


    Lesson: Do not explicitly pass props whose values match a component''s default.

    Omitting them is cleaner and signals intentionality — if you''re passing the

    default, you''re not overriding anything. This is especially worth enforcing

    when reviewing LLM-assisted code, which systematically over-specifies props.

    '
  topic: react_components
  retry_count: 0
  last_error: null
- id: ext_2908770648_0
