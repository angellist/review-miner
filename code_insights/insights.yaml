  repo: venture
  status: synthesized
  content: 'In a distribution amount calculation service, rollovers were not being
    filtered,

    meaning incorrectly split rollovers between parallel funds would cause distributions

    to compensate, and then double-compensate when the rollovers were later fixed.


    Fix: Add a check to filter out rollovers if the fund hasn''t been migrated to
    the

    new setup yet.


    Lesson: When calculating derived financial values (like distributions) that depend

    on other correctable data (like rollovers), guard against consuming unfixed upstream

    data. Add explicit checks for prerequisite data quality before including it in

    calculations, otherwise corrections applied later will cause double-counting.

    '
