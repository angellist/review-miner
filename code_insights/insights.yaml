  content: 'A switch statement on a discriminated union was using destructured `kind`
    and

    `as` casting, which meant TypeScript lost the type narrowing and couldn''t enforce

    exhaustiveness. When a new `kind` was added, the default branch would silently

    fall through rather than produce a type error.


    Fix: Switch to using `suffix.kind` (not destructured) in the switch statement,

    specify an explicit return type of `React.ReactElement | null`, and add a

    `default` case that returns `suffix` (which evaluates to `never` when all cases

    are handled). The moment a new `kind` is added to the union, the `default` returns

    an object — not valid as `ReactElement | null` — producing a compile error.


    Lesson: Use TypeScript''s exhaustive narrowing pattern for discriminated unions
    in

    React components: switch on the discriminant property directly (not destructured),

    declare a narrow return type, and add a `default: return suffix` (never) case.

    This turns missing-case bugs into compile errors and makes new variant support

    impossible to forget, regardless of who adds them.

    '
