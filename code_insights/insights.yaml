  status: synthesized
  content: 'A Buildkite Dockerfile installed `pnpm` via a manual npm install command

    rather than using Corepack. The reviewer pointed to how the Nova repo

    handles this using Corepack and suggested adopting the same approach.


    Fix: Switched to Corepack for package manager management. PR author

