- id: ext_2848495207_0
  thread_id: 2848495207
  pr: 320
  repo: infra
  status: synthesized
  content: 'A Tonic restore workflow ran `pg_restore --data-only` against a Rails
    Postgres

    database without `--disable-triggers`. This caused foreign key constraint

    violations because triggers enforcing FK relationships fire during data-only

    restores when rows are inserted before their referenced rows.


    Fix: The reviewer suggested defaulting `--disable-triggers` to true for Postgres

    DBs. The PR author refactored to always include `--disable-triggers` when

    restoring a Rails Postgres DB with `--data-only`. Prisma services use a full

    `pg_restore` (schema + data) which creates the schema first and doesn''t hit

    the same FK ordering issue, so the flag is omitted there.


    Lesson: When running `pg_restore --data-only` against a Rails Postgres database,

    always include `--disable-triggers` to suppress FK constraint checks during the

    restore. Without it, insert order can violate FK constraints. This is specific

    to data-only restores; full restores (schema + data) handle ordering correctly

    through schema creation order.

    '
  topic: migration_safety
  retry_count: 0
  last_error: null
