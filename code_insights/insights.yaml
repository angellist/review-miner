  status: synthesized
  content: 'Reviewer suggested that when a modal form depends on async data for one
    field, only

    skeleton that specific input rather than the entire modal. The approach: extract

    `useForm` from `FormModal`, then call `form.setValue` in a `useEffect` when the

    async data arrives, and disable the submit button until loaded.


    Fix: PR author initially resisted due to type issues with FormModal, but after
    the

    reviewer explained the `useForm` + `setValue` pattern, successfully implemented
    it.


    Lesson: When a React form modal has a field that depends on async data, prefer
    using

    `useForm` externally and calling `form.setValue` via `useEffect` when data loads,

    rather than skeletonizing the entire modal. This provides better UX by showing
    the

    rest of the form immediately, and only the async-dependent field shows a loading
    state.

    The `defaultValues` prop won''t update after first render, so `setValue` is the
    correct

    approach for late-arriving data.

    '
  topic: react_state
