  content: 'A SQL query migration from raw SQL to Ruby/ActiveRecord introduced a subtle
    time discrepancy. MySQL''s CURDATE() returns a date object (midnight), while Ruby''s
    `14.days.ago` returns a timestamped datetime (current time minus 14 days). This
    caused a difference of many hours depending on when the query ran, leading to
    mismatched record counts.


    Fix: Changed the Ruby code to use `Date.current - 14.days` to match the date-only
    semantics of the original SQL CURDATE().


    Lesson: When migrating SQL queries to ActiveRecord, be careful with date/time
    semantics. SQL date functions (CURDATE, CURRENT_DATE) return date-only values
    while Ruby time helpers (X.days.ago) return datetime values. The difference can
    cause subtle data discrepancies. Always verify record counts match between old
    and new implementations.

    '
