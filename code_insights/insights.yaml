  thread_id: 2335418233
  pr: 5063
  repo: nova
  status: synthesized
  content: 'A shared library package (themable) had its peer dependency on a design
    system

    package pinned to an exact version instead of using a semver range like "55.x".


    Fix: Keep the version as a semver range ("55.x") since it''s a peer dependency
    and

    consumers of the library may not all be on the exact same version.


    Lesson: Peer dependencies in shared library packages should use semver ranges,
    not

    exact versions. Pinning exact versions forces all consumers to match precisely,

    which breaks in monorepos where different workspaces may be on slightly different

    patch versions.

    '
  topic: dependency_management
  retry_count: 0
  last_error: null
- id: ext_2337382531_0
  thread_id: 2337382531
  pr: 5068
  repo: nova
  status: synthesized
  content: 'A database entity deletion was happening before its dependent records
    (permission

    sets) were merged/migrated, causing a foreign key constraint error in production.


    Fix: Reorder the operations so that permission sets are merged first, then the

    source entity is deleted afterward.


    Lesson: When deleting database records that have foreign key dependencies, always

    process dependent records first (migrate, merge, or delete them) before deleting

    the parent record. Operation ordering matters for referential integrity, and these

    bugs often only surface in production with real data.

    '
  topic: migration_safety
  retry_count: 0
  last_error: null
- id: ext_2338146957_0
  thread_id: 2338146957
  pr: 5062
  repo: nova
  status: synthesized
  content: 'Reviewer asked whether a uniqueness check for data room handles should
    also

    consider archived rooms to avoid collisions. The PR author realized the code

    path was actually deleting records despite being called "archive," and agreed

    to update it.


    Lesson: When enforcing uniqueness constraints (e.g., handles, slugs), always

    query across all records including soft-deleted or archived ones. Otherwise

    reusing a name can collide with an existing but hidden record, causing

    confusing errors or data integrity issues.

    '
  topic: data_integrity
  retry_count: 0
  last_error: null
- id: ext_2338154552_0
  thread_id: 2338154552
  pr: 5062
  repo: nova
  status: synthesized
  content: 'The update function for data room handles silently appended a numeric
    suffix

    (e.g., "-1") when a handle collision occurred, rather than erroring. The

    reviewer pointed out this is surprising behavior — a GP updating a handle

    would not expect it to silently change. The PR author agreed after

    discovering the logic was copied from a create path where it also shouldn''t

    have been used.


    Lesson: Mutation functions should fail explicitly on invalid input rather

    than silently modifying the user''s data. Auto-generating fallback values

    (like appending suffixes) hides errors and confuses users who expect their

    exact input to be persisted. Reserve auto-generation for create flows only

    if at all, and prefer validation errors that let the user choose.

    '
  topic: data_integrity
  retry_count: 0
  last_error: null
- id: ext_2338280982_0
  thread_id: 2338280982
  pr: 5075
  repo: nova
  status: synthesized
  content: 'A developer discovered that Temporal serializes activity return values
    when

    passing them back to workflows, which breaks JavaScript tuple destructuring

    (the result becomes non-iterable). They switched to using TaggedErrors

    instead of tuple return types for activity results.


    Lesson: Temporal activities serialize return values across the

    activity-workflow boundary. Avoid returning tuples or objects that rely on

    iterability or prototype methods. Use simple serializable objects or tagged

    discriminated unions for activity return types to ensure they survive

    serialization.

    '
  topic: temporal_workflows
  retry_count: 0
  last_error: null
- id: ext_2338281856_0
  thread_id: 2338281856
  pr: 5075
  repo: nova
  status: synthesized
  content: 'Changes to files in the `packages/vulcan/*` directory caused lint-staged

    vitest failures because lint-staged resolved to the repo root''s vitest

    config, which tried to run tests in a path that doesn''t work for that

    package. The fix was adding co-located vitest config files in each package.


    Lesson: In monorepos, each package that has tests needs its own vitest (or

    test runner) config file. Without co-located configs, lint-staged and other

    tools that resolve configs by walking up the directory tree will pick up the

    root config, which may not work for nested packages.

    '
  topic: testing_patterns
