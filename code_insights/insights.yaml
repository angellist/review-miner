  repo: adapt
  status: synthesized
  content: 'In a docs example, `alert()` was used inside an `onSelectionChange` handler
    to

    demonstrate the callback. This caused erratic behavior: after clicking once,

    every subsequent mouse-over triggered the press cycle again. The PR author spent

    significant time debugging — first suspecting `useSingleSelectListState` firing

    `onSelectionChange` on unchanged keys, then identifying `usePress` mapping

    `pointerEnter` to `pressStart` — before discovering the root cause.


    The real culprit: `alert()` is a blocking call that interrupts main thread

    execution. React Aria''s `usePress` uses `onPointerDown` to detect `pressStart`

    and `onClick` to detect `press` and clean up. When `alert()` was called during

    the press, it blocked the thread before the `click` event arrived, so `usePress`

    never completed the press cycle and was left in a broken state.


    Fix: Replaced `alert()` with `addToast()` (non-blocking).


    Lesson: Never use `alert()`, `confirm()`, or other synchronous blocking APIs

    inside React Aria event handlers. These calls interrupt the browser event flow

    that `usePress` depends on to complete the press cycle, causing stuck press

    state and spurious re-triggers. Use non-blocking alternatives (toasts,

    state updates, console.log) when demonstrating callbacks or debugging.

    '
