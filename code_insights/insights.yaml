- id: ext_2785310865_0
  thread_id: 2785310865
  pr: 283
  repo: infra
  status: synthesized
  content: 'In a Pulumi IAM policy document, `sensitiveDataBucketName` was a Pulumi

    `Output<string>` but was being used inside a `aws.getCallerIdentity().then()`

    promise callback. This caused a runtime failure during `pulumi preview` because

    the output value isn''t resolved at the time the promise runs.


    Fix: Replace `pulumi.output(aws.getCallerIdentity().then(...))` with

    `aws.iam.getPolicyDocumentOutput({ ... })` — the `*Output` variant of the

    function automatically handles Pulumi output values as inputs, resolving them

    lazily during the apply phase.


    Lesson: When constructing Pulumi resources that depend on `Output<T>` values

    (from other Pulumi resources or stack config), always use the `*Output` suffix

    variants of Pulumi SDK functions (e.g., `getPolicyDocumentOutput` instead of

    `getPolicyDocument`). Mixing plain async calls with Pulumi outputs will fail at

    preview time because unresolved outputs cannot be coerced into plain values.

    '
  topic: design_system
  retry_count: 0
  last_error: null
