- id: ext_1902134897_0
  thread_id: 1902134897
  pr: 2002
  repo: adapt
  status: synthesized
  content: 'A `useEffect` was used to sync derived state in a `DateRangeFilter` component

    when the same logic could be placed directly in the `onChange` handler.

    The reviewer flagged this as problematic: `useEffect`s that react to state

    changes introduce subtle ordering bugs, double renders, and are harder to

    reason about than event-driven updates.


    Fix: The logic was moved into the `onChange` handler, eliminating the effect.


    Lesson: Avoid `useEffect` for state synchronization that can be driven by

    user events. When logic only needs to run in response to a specific interaction

    (e.g., a value change), put it in the event handler directly. Reserve

    `useEffect` for true side effects that must sync with external systems or

    run after render.

    '
  topic: react_state
  retry_count: 0
  last_error: null
- id: ext_1921097928_0
  thread_id: 1921097928
  pr: 2010
  repo: adapt
  status: synthesized
  content: 'A boolean prop on a Table component was named `batchSelection` (noun form),

    making call sites ambiguous — it was not obvious the prop was a boolean toggle.

    The reviewer suggested standardizing to a verb-prefixed name: `allowBatchSelection`.


    Fix: Prop renamed to `allowBatchSelection`.


    Lesson: Boolean props should begin with a verb (`allow`, `is`, `has`, `can`,

    `show`) to make their type and intent immediately clear at the call site.

    A prop named `batchSelection` reads as if it could be a configuration object

    or a string; `allowBatchSelection` is unambiguously a feature toggle.

    Apply this consistently across all component APIs in the design system.

    '
